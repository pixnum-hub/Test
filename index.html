<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SkyTrace — Live Flight Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
  :root{
    --bg:#0b1220; --panel:#121a2b; --border:#1f2b42; --text:#e6edf5;
    --muted:#93a4bf; --accent:#ffb020; --accent2:#35c46b; --danger:#ff5d5d;
    --radius:14px; --focus:2px solid var(--accent);
  }
  [data-theme="light"]{
    --bg:#f3f5f8; --panel:#ffffff; --border:#d8dee8; --text:#16202c;
    --muted:#5b6b82; --accent:#b45f00; --accent2:#1f8f4e; --danger:#c62828;
  }
  [data-theme="oled"]{
    --bg:#000000; --panel:#0a0a0a; --border:#1a1a1a; --text:#f2f2f2;
    --muted:#8a8a8a; --accent:#ffb020; --accent2:#35c46b; --danger:#ff5d5d;
  }
  [data-theme="hc"]{
    --bg:#000000; --panel:#000000; --border:#ffffff; --text:#ffffff;
    --muted:#ffffff; --accent:#ffe400; --accent2:#00e5ff; --danger:#ff5d5d;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono',monospace;
    display:flex; flex-direction:column; min-height:100vh;
    transition:background .2s,color .2s;
  }
  h1,h2,.brand{font-family:'Space Grotesk',sans-serif;}
  a{color:var(--accent);}
  button{font-family:inherit;}
  :focus-visible{outline:var(--focus); outline-offset:2px;}

  header{
    padding:14px 16px; border-bottom:1px solid var(--border);
    display:flex; flex-direction:column; gap:12px;
    position:sticky; top:0; background:var(--bg); z-index:20;
  }
  .brandrow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .brand{font-size:1.25rem; font-weight:700; display:flex; align-items:center; gap:10px;}
  .radar{
    width:22px; height:22px; border-radius:50%;
    border:1px solid var(--accent2); position:relative; overflow:hidden;
    background:radial-gradient(circle, transparent 60%, transparent 100%);
    flex:none;
  }
  .radar::before{
    content:""; position:absolute; inset:0;
    background:conic-gradient(from 0deg, var(--accent2), transparent 35%);
    animation:sweep 2.4s linear infinite;
  }
  @media (prefers-reduced-motion:reduce){ .radar::before{animation:none;} }
  @keyframes sweep{ to{ transform:rotate(360deg); } }

  .themes{display:flex; gap:6px; flex-wrap:wrap;}
  .themes button{
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:999px; padding:6px 10px; font-size:.72rem; cursor:pointer;
    letter-spacing:.03em;
  }
  .themes button[aria-pressed="true"]{border-color:var(--accent); color:var(--accent);}

  .statusbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    font-size:.78rem; color:var(--muted);
  }
  .statusbar strong{color:var(--text);}
  #refreshBtn{
    background:transparent; border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:6px 10px; cursor:pointer; font-size:.75rem;
  }

  main{flex:1; display:flex; flex-direction:column;}
  #map{ height:46vh; min-height:280px; width:100%; border-bottom:1px solid var(--border); background:var(--panel); }
  .leaflet-container{ background:var(--panel); font-family:'JetBrains Mono',monospace; }

  #list{
    flex:1; padding:12px; display:grid; gap:10px;
    grid-template-columns:1fr;
  }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 14px; cursor:pointer; transition:border-color .15s;
  }
  .card:hover, .card:focus-visible{ border-color:var(--accent); }
  .card .row1{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .callsign{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.02rem;}
  .country{color:var(--muted); font-size:.75rem;}
  .metrics{display:flex; gap:14px; margin-top:8px; font-size:.78rem; flex-wrap:wrap;}
  .metrics span b{color:var(--accent); font-weight:600;}
  .ground{color:var(--accent2);}
  .empty, .error{padding:24px; text-align:center; color:var(--muted); font-size:.85rem;}
  .error{color:var(--danger);}

  .plane-icon{ font-size:18px; line-height:1; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }

  footer{
    border-top:1px solid var(--border); padding:16px 12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:4px; font-size:.75rem; color:var(--muted);
  }
  footer strong{color:var(--text);}

  @media (min-width:768px){
    main{flex-direction:row;}
    #map{ height:auto; min-height:100%; flex:1.4; border-bottom:none; border-right:1px solid var(--border); }
    #list{ flex:1; max-height:calc(100vh - 92px); overflow-y:auto; }
    .brandrow{ }
  }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="brandrow">
    <div class="brand"><span class="radar" aria-hidden="true"></span> SkyTrace</div>
    <div class="themes" role="group" aria-label="Theme">
      <button data-theme-btn="dark" aria-pressed="true">Dark</button>
      <button data-theme-btn="light" aria-pressed="false">Light</button>
      <button data-theme-btn="oled" aria-pressed="false">OLED</button>
      <button data-theme-btn="hc" aria-pressed="false">HC</button>
    </div>
  </div>
  <div class="statusbar">
    <span id="status">Locating you…</span>
    <button id="refreshBtn" type="button">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="map" role="application" aria-label="Live flight map"></div>
  <div id="list" aria-live="polite"><div class="empty">Waiting for flight data…</div></div>
</main>

<footer>
  <div><strong>© Manik Roy <span id="yearRange"></span>.</strong> All Rights Reserved.</div>
  <div>Live positions via the OpenSky Network — no key, no signup.</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
(function(){
  "use strict";

  if(typeof L === 'undefined'){
    document.getElementById('status').textContent = 'Map library failed to load — check your connection and reload.';
    document.getElementById('list').innerHTML = '<div class="error">Leaflet did not load from the CDN. Please refresh the page.</div>';
    return;
  }

  /* ---------- Footer year ---------- */
  var startYear = 2026, now = new Date().getFullYear();
  document.getElementById('yearRange').textContent = now > startYear ? (startYear + '–' + now) : String(startYear);

  /* ---------- Theme ---------- */
  var THEME_KEY = 'skytrace-theme';
  function applyTheme(t){
    document.body.setAttribute('data-theme', t);
    document.querySelectorAll('[data-theme-btn]').forEach(function(b){
      b.setAttribute('aria-pressed', String(b.dataset.themeBtn === t));
    });
    try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  }
  document.querySelectorAll('[data-theme-btn]').forEach(function(b){
    b.addEventListener('click', function(){ applyTheme(b.dataset.themeBtn); });
  });
  var saved = null;
  try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
  applyTheme(saved || 'dark');

  /* ---------- Map ---------- */
  var DEFAULT_CENTER = [51.4700, -0.4543]; // Heathrow, used if geolocation is unavailable
  var map = L.map('map', { zoomControl:true }).setView(DEFAULT_CENTER, 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors', maxZoom:12
  }).addTo(map);

  var markersLayer = L.layerGroup().addTo(map);
  var statusEl = document.getElementById('status');
  var listEl = document.getElementById('list');
  var lastBbox = null;
  var lastStates = [];

  function planeDivIcon(track, onGround){
    var rot = onGround ? 0 : (track || 0);
    var color = onGround ? 'var(--muted)' : 'var(--accent)';
    var html = '<div class="plane-icon" style="transform:rotate('+rot+'deg); color:'+color+';">✈</div>';
    return L.divIcon({ html:html, className:'', iconSize:[22,22], iconAnchor:[11,11] });
  }

  function bboxAround(lat, lon, deg){
    return { lamin:lat-deg, lamax:lat+deg, lomin:lon-deg, lomax:lon+deg };
  }

  function fetchFlights(bbox){
    lastBbox = bbox;
    statusEl.textContent = 'Fetching live traffic…';
    var url = 'https://opensky-network.org/api/states/all?lamin='+bbox.lamin+
      '&lomin='+bbox.lomin+'&lamax='+bbox.lamax+'&lomax='+bbox.lomax;
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(data){
      var states = (data && data.states) || [];
      lastStates = states;
      render(states);
    }).catch(function(err){
      statusEl.textContent = 'Could not load flights. See note below.';
      listEl.innerHTML = '<div class="error">'+ escapeHtml(err.message) +
        ' — this can happen if the page is running inside a sandboxed preview that blocks outside network calls, ' +
        'if you are offline, or if the free OpenSky API is temporarily rate limited. Opening this file directly in a browser ' +
        '(rather than an embedded preview) usually fixes it.</div>';
    });
  }

  function render(states){
    markersLayer.clearLayers();
    listEl.innerHTML = '';
    if(!states.length){
      statusEl.textContent = 'No aircraft currently reporting in this area.';
      listEl.innerHTML = '<div class="empty">No flights nearby right now. Try refreshing in a moment.</div>';
      return;
    }
    statusEl.innerHTML = '<strong>'+states.length+'</strong> aircraft tracked';
    states
      .filter(function(s){ return s[5] != null && s[6] != null; })
      .sort(function(a,b){ return (b[7]||0) - (a[7]||0); })
      .forEach(function(s){ addFlight(s); });
  }

  function addFlight(s){
    var icao = s[0], callsign = (s[1]||'').trim() || icao.toUpperCase();
    var country = s[2], lon = s[5], lat = s[6], altM = s[7];
    var onGround = s[8], velMs = s[9], track = s[10];
    var alt = altM != null ? Math.round(altM * 3.28084) : null;      // metres to feet
    var speed = velMs != null ? Math.round(velMs * 1.94384) : null;  // m/s to knots

    var marker = L.marker([lat, lon], { icon: planeDivIcon(track, onGround) });
    marker.bindPopup(
      '<b>'+escapeHtml(callsign)+'</b><br>'+escapeHtml(country)+
      '<br>Alt: '+(alt!=null? alt+' ft':'—')+
      '<br>Speed: '+(speed!=null? speed+' kt':'—')
    );
    marker.addTo(markersLayer);

    var card = document.createElement('div');
    card.className = 'card'; card.tabIndex = 0;
    card.innerHTML =
      '<div class="row1"><span class="callsign">'+escapeHtml(callsign)+'</span>'+
      '<span class="country">'+escapeHtml(country)+'</span></div>'+
      '<div class="metrics">'+
        '<span>Alt <b>'+(alt!=null? alt.toLocaleString()+' ft':'—')+'</b></span>'+
        '<span>Spd <b>'+(speed!=null? speed+' kt':'—')+'</b></span>'+
        (onGround ? '<span class="ground">● On ground</span>' : '<span>Hdg <b>'+(track!=null? Math.round(track)+'°':'—')+'</b></span>')+
      '</div>';
    function focusFlight(){ map.flyTo([lat, lon], 10); marker.openPopup(); }
    card.addEventListener('click', focusFlight);
    card.addEventListener('keydown', function(e){ if(e.key==='Enter') focusFlight(); });
    listEl.appendChild(card);
  }

  function escapeHtml(str){
    return String(str==null?'':str).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  /* ---------- Locate + boot ---------- */
  function boot(lat, lon, label){
    map.setView([lat, lon], 8);
    L.circleMarker([lat, lon], { radius:5, color:'var(--accent2)', fillOpacity:1 })
      .addTo(map).bindPopup(label);
    fetchFlights(bboxAround(lat, lon, 2.2));
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){ boot(pos.coords.latitude, pos.coords.longitude, 'You are near here'); },
      function(){ statusEl.textContent = 'Location unavailable — showing London Heathrow area.'; boot(DEFAULT_CENTER[0], DEFAULT_CENTER[1], 'Default: London Heathrow'); },
      { timeout:6000 }
    );
  } else {
    boot(DEFAULT_CENTER[0], DEFAULT_CENTER[1], 'Default: London Heathrow');
  }

  document.getElementById('refreshBtn').addEventListener('click', function(){
    if(lastBbox) fetchFlights(lastBbox);
  });
  setInterval(function(){ if(lastBbox) fetchFlights(lastBbox); }, 15000);
})();
</script>
</body>
</html>
