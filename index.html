<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a" id="metaThemeColor">
<title>WeatherOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1c2539;
  --glass:rgba(255,255,255,.045);--gb:rgba(255,255,255,.09);
  --a:#38bdf8;--a2:#818cf8;--a3:#fb923c;
  --g:#22c55e;--r:#ef4444;--y:#eab308;
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --card:rgba(17,24,39,.88);
  --sh:0 8px 40px rgba(0,0,0,.45);
  --gw:0 0 32px rgba(56,189,248,.14);
  --rad:18px;--rsm:12px;
  --ease:.32s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#eef4ff;--bg2:#dbeafe;--bg3:#c7d9f7;
  --glass:rgba(255,255,255,.6);--gb:rgba(99,102,241,.2);
  --a:#1d6be8;--a2:#7c3aed;--a3:#ea580c;
  --t:#0f172a;--t2:#334155;--t3:#64748b;
  --card:rgba(255,255,255,.75);
  --sh:0 6px 30px rgba(29,107,232,.1);
  --gw:0 0 24px rgba(29,107,232,.1);
}
[data-theme="oled"]{
  --bg:#000;--bg2:#040404;--bg3:#0c0c0c;
  --glass:rgba(255,255,255,.022);--gb:rgba(255,255,255,.065);
  --a:#00e5ff;--a2:#b388ff;--a3:#ff7043;
  --t:#fff;--t2:#b0bec5;--t3:#546e7a;
  --card:rgba(6,6,6,.97);
  --sh:0 8px 40px rgba(0,0,0,.9);
  --gw:0 0 36px rgba(0,229,255,.1);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;transition:background var(--ease),color var(--ease);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── BG ORBS ── */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.15;animation:drift 20s ease-in-out infinite alternate;}
.o1{width:360px;height:360px;background:var(--a);top:-80px;left:-80px;}
.o2{width:300px;height:300px;background:var(--a2);bottom:-60px;right:-60px;animation-delay:-7s;}
.o3{width:240px;height:240px;background:var(--a3);top:45%;left:40%;animation-delay:-14s;}
[data-theme="oled"] .orb{opacity:.06;}[data-theme="light"] .orb{opacity:.09;}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}

/* ── APP ── */
.app{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;padding:16px 14px 100px;display:flex;flex-direction:column;gap:12px;flex:1;}
@media(min-width:540px){.app{padding:24px 20px 100px;gap:15px;}}
@media(min-width:860px){.app{max-width:820px;}}
@supports(padding:max(0px)){
  .app{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right));padding-top:max(16px,env(safe-area-inset-top));}
  footer{padding-bottom:max(16px,env(safe-area-inset-bottom));}
}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.28rem;letter-spacing:-.04em;background:linear-gradient(120deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.logo em{font-style:normal;font-weight:400;opacity:.55;}
.theme-group{display:flex;gap:3px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:4px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
.tbtn{border:none;cursor:pointer;border-radius:50px;padding:6px 9px;font-size:.67rem;font-weight:700;font-family:'Syne',sans-serif;background:transparent;color:var(--t2);transition:all var(--ease);min-width:44px;line-height:1;}
.tbtn.on{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;}
.tbtn:active{transform:scale(.94);}

/* ── REFRESH BAR ── */
.rbar-wrap{height:3px;background:var(--gb);border-radius:2px;overflow:hidden;}
.rbar{height:100%;background:linear-gradient(to right,var(--a),var(--a2));border-radius:2px;width:100%;}

/* ── GPS BANNER ── */
.gps-banner{display:flex;align-items:center;gap:8px;background:linear-gradient(120deg,rgba(34,197,94,.1),rgba(34,197,94,.03));border:1px solid rgba(34,197,94,.25);border-radius:var(--rsm);padding:9px 13px;font-size:.72rem;color:var(--t2);animation:fadeUp .4s ease both;}
.gps-banner .gdot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pdot 2s ease infinite;flex-shrink:0;}
.gps-banner strong{color:var(--g);}
.gps-banner .gdx{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.75rem;margin-left:auto;padding:2px 5px;}

/* ── SEARCH ── */
.srow{display:flex;gap:8px;align-items:stretch;}
.swrap{flex:1;position:relative;}
.sinput{width:100%;padding:13px 12px 13px 38px;background:var(--glass);border:1px solid var(--gb);border-radius:var(--rsm);color:var(--t);font-family:'Instrument Sans',sans-serif;font-size:.9rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all var(--ease);outline:none;-webkit-appearance:none;appearance:none;}
.sinput::placeholder{color:var(--t3);}
.sinput:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(56,189,248,.15);background:var(--card);}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:.9rem;}
.aclist{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--bg2);border:1px solid var(--gb);border-radius:var(--rsm);overflow:hidden;z-index:100;box-shadow:var(--sh);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;}
.aclist.open{display:block;}
.acitem{padding:10px 14px;font-size:.84rem;color:var(--t2);cursor:pointer;transition:background var(--ease);display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--gb);}
.acitem:last-child{border-bottom:none;}
.acitem:hover{background:var(--glass);color:var(--t);}
.acname{font-weight:600;color:var(--t);}
.acregion{font-size:.68rem;color:var(--t3);}
.lbtn,.sbtn{border:none;border-radius:var(--rsm);cursor:pointer;transition:all var(--ease);-webkit-appearance:none;}
.lbtn{padding:0 13px;border:1px solid var(--gb);background:var(--glass);color:var(--a);font-size:1rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);min-width:48px;display:flex;align-items:center;justify-content:center;}
.lbtn:active{transform:scale(.92);}
.lbtn:disabled{opacity:.6;cursor:not-allowed;}
.sbtn{padding:13px 16px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;white-space:nowrap;}
.sbtn:active{transform:scale(.95);opacity:.88;}

/* ── CONTROLS ── */
.crow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.clbl{font-size:.7rem;color:var(--t3);font-family:'DM Mono',monospace;}
.utog{display:flex;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:3px;gap:2px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.ubtn{border:none;cursor:pointer;border-radius:50px;padding:5px 11px;font-size:.7rem;font-weight:700;font-family:'DM Mono',monospace;background:transparent;color:var(--t3);transition:all var(--ease);min-width:38px;}
.ubtn.on{background:var(--a);color:#fff;}
.ubtn:active{transform:scale(.93);}

/* ── FAVS ── */
.favbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.favbar::-webkit-scrollbar{display:none;}
.fpill{display:inline-flex;align-items:center;gap:5px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:6px 11px;font-size:.72rem;color:var(--t2);white-space:nowrap;cursor:pointer;transition:all var(--ease);flex-shrink:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.fpill:active{transform:scale(.94);}
.fpill.cur{border-color:var(--a);color:var(--a);}
.fdel{opacity:.45;font-size:.7rem;color:var(--a3);margin-left:2px;}
.fadd{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(129,140,248,.07));border:1px dashed var(--a);border-radius:50px;padding:6px 11px;font-size:.72rem;color:var(--a);cursor:pointer;transition:all var(--ease);flex-shrink:0;white-space:nowrap;}
.fadd:active{transform:scale(.94);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pdot{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}
@keyframes rping{0%{transform:translate(-50%,-50%) scale(.4);opacity:1;}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0;}}

/* ── GPS PERMISSION CARD ── */
.gps-card{background:var(--card);border:1px solid var(--gb);border-radius:var(--rad);padding:32px 24px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--sh),var(--gw);animation:fadeUp .5s ease both;}
.gps-card .gem{font-size:3.5rem;margin-bottom:14px;animation:float 4s ease-in-out infinite;display:block;}
.gps-card h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:8px;}
.gps-card p{font-size:.8rem;color:var(--t2);line-height:1.6;max-width:280px;margin:0 auto 20px;}
.gps-card .gbtnwrap{display:flex;flex-direction:column;gap:9px;max-width:260px;margin:0 auto;}
.gbtn-yes{padding:14px;border:none;border-radius:var(--rsm);cursor:pointer;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--ease);}
.gbtn-yes:active{transform:scale(.95);}
.gbtn-no{padding:13px;border:1px solid var(--gb);border-radius:var(--rsm);cursor:pointer;background:var(--glass);color:var(--t2);font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;transition:all var(--ease);}
.gbtn-no:active{transform:scale(.95);}
.gps-card .gnote{font-size:.6rem;color:var(--t3);margin-top:12px;}

/* ── GPS DETECTING STATE ── */
.gps-detecting{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;animation:fadeUp .4s ease both;}
.gps-detecting .gem2{font-size:2.8rem;animation:float 2.5s ease-in-out infinite;}
.gps-detecting .gt{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--a);}
.gps-detecting .gs{font-size:.68rem;color:var(--t3);font-family:'DM Mono',monospace;}

/* ── HERO ── */
.hero{background:var(--card);border:1px solid var(--gb);border-radius:var(--rad);padding:18px 18px 16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--sh),var(--gw);position:relative;overflow:hidden;animation:fadeUp .5s ease both;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,.07),transparent 55%);pointer-events:none;}
.htop{display:flex;justify-content:space-between;align-items:flex-start;}
.hloc{font-family:'Syne',sans-serif;font-size:.68rem;color:var(--a);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.hcity{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.45rem,6vw,2.1rem);letter-spacing:-.04em;line-height:1.05;}
.hdate{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);margin-top:3px;}
.hem{font-size:clamp(3rem,14vw,4.8rem);animation:float 5s ease-in-out infinite;margin-left:8px;flex-shrink:0;line-height:1;filter:drop-shadow(0 6px 14px rgba(0,0,0,.3));}
.htr{display:flex;align-items:flex-end;gap:10px;margin-top:12px;}
.htemp{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,16vw,5.2rem);letter-spacing:-.07em;line-height:.9;background:linear-gradient(140deg,var(--t) 55%,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hmeta{padding-bottom:4px;}
.hfeel{font-size:.8rem;color:var(--t2);}
.hdesc{font-size:.85rem;color:var(--t2);margin-top:2px;text-transform:capitalize;}
.hpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:5px 9px;font-size:.7rem;color:var(--t2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.pill strong{color:var(--t);font-weight:600;}
.lupd{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:5px;}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pdot 2s ease infinite;flex-shrink:0;}

/* ── ALERT ── */
.alert{background:linear-gradient(120deg,rgba(251,146,60,.12),rgba(251,146,60,.03));border:1px solid rgba(251,146,60,.28);border-radius:var(--rsm);padding:11px 13px;display:flex;align-items:flex-start;gap:9px;font-size:.78rem;color:var(--t2);animation:fadeUp .5s ease both;}
.alert strong{color:var(--a3);}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;animation:fadeUp .5s .06s ease both;}
@media(min-width:860px){.sgrid{grid-template-columns:repeat(6,1fr);}}
.sc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:12px 8px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;transition:transform var(--ease);cursor:default;}
.sc:active{transform:scale(.95);}
.si{font-size:1.2rem;margin-bottom:4px;}
.sl{font-size:.58rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;font-family:'DM Mono',monospace;}
.sv{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin:3px 0 1px;color:var(--t);}
.ss{font-size:.58rem;color:var(--t3);}

/* ── SECTION TITLE ── */
.stitle{font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.11em;text-transform:uppercase;color:var(--t3);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gb),transparent);}

/* ── HOURLY ── */
.hwrap{animation:fadeUp .5s .1s ease both;}
.hscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x mandatory;}
.hscroll::-webkit-scrollbar{display:none;}
.hcard{background:var(--card);border:1px solid var(--gb);border-radius:11px;padding:11px 9px;min-width:68px;max-width:68px;text-align:center;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-shrink:0;transition:all var(--ease);scroll-snap-align:start;}
.hcard.now{background:linear-gradient(135deg,rgba(56,189,248,.17),rgba(129,140,248,.1));border-color:var(--a);}
.hcard:active{transform:scale(.94);}
.htm{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);line-height:1;}
.htm.nl{color:var(--a);font-weight:700;}
.he{font-size:1.25rem;margin:5px 0;display:block;line-height:1;}
.htp{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;}
.hr{font-size:.58rem;color:var(--a);font-family:'DM Mono',monospace;margin-top:3px;}

/* ── TREND CHART ── */
.tc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:fadeUp .5s .13s ease both;}
.ttabs{display:flex;gap:5px;margin-bottom:10px;}
.ttab{border:1px solid var(--gb);cursor:pointer;border-radius:50px;padding:5px 11px;font-size:.68rem;font-weight:600;font-family:'DM Mono',monospace;background:var(--glass);color:var(--t3);transition:all var(--ease);}
.ttab.on{background:var(--a);border-color:var(--a);color:#fff;}
.tsvg{width:100%;height:80px;overflow:visible;}
.tlbls{display:flex;justify-content:space-between;margin-top:4px;}
.tlbl{font-size:.56rem;color:var(--t3);font-family:'DM Mono',monospace;}

/* ── 7-DAY ── */
.fwrap{animation:fadeUp .5s .15s ease both;}
.flist{display:flex;flex-direction:column;gap:6px;}
.frow{background:var(--card);border:1px solid var(--gb);border-radius:11px;padding:11px 13px;display:grid;grid-template-columns:1fr 26px minmax(52px,72px) auto;align-items:center;gap:9px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:all var(--ease);}
.frow:active{background:var(--bg3);}
.fd{font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;}
.fdesc{font-size:.62rem;color:var(--t3);margin-top:1px;}
.fe{font-size:1.25rem;text-align:center;}
.fbw{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.fb{height:100%;border-radius:2px;background:linear-gradient(to right,var(--a2),var(--a3));}
.frang{font-family:'DM Mono',monospace;font-size:.75rem;display:flex;flex-direction:column;align-items:flex-end;gap:1px;white-space:nowrap;}
.fhi{color:var(--a3);font-weight:600;font-size:.82rem;}
.flo{color:var(--t3);font-size:.68rem;}

/* ── 2-COL PANELS ── */
.p2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(min-width:540px){.p2{gap:10px;}}
.pc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px 13px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.pt{font-family:'Syne',sans-serif;font-weight:700;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}

/* UV */
.uvbig{font-family:'Syne',sans-serif;font-weight:800;font-size:1.9rem;line-height:1;}
.uvlbl{font-size:.72rem;color:var(--t2);margin-top:2px;}
.uvt{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:7px 0;}
.uvf{height:100%;border-radius:3px;background:linear-gradient(to right,#22c55e,#eab308,#ef4444);}
.uvtip{font-size:.65rem;color:var(--t3);}

/* AQI */
.aqirw{display:flex;justify-content:center;margin:4px 0 7px;}
.aqir{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg3);}
.aqir::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--card);}
.aqin{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;position:relative;z-index:1;}
.aqil{text-align:center;font-size:.7rem;}
.aqimr{display:flex;justify-content:space-between;margin-top:7px;}
.aqim{font-size:.6rem;color:var(--t3);font-family:'DM Mono',monospace;text-align:center;}
.aqim strong{display:block;color:var(--t2);font-size:.72rem;}

/* BODY COMFORT */
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:4px;}
.bi{background:var(--glass);border:1px solid var(--gb);border-radius:9px;padding:10px 11px;display:flex;align-items:center;gap:9px;}
.bii{font-size:1.4rem;flex-shrink:0;}
.bln{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;}
.blv{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-top:1px;}
.blt{font-size:.6rem;color:var(--t3);margin-top:2px;}

/* MOON */
.moon{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;gap:14px;}
.mvis{font-size:2.8rem;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(255,255,255,.2));}
.mpn{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;}
.mpi{font-size:.75rem;color:var(--t2);margin-top:2px;}
.mpd{font-size:.68rem;color:var(--t3);font-family:'DM Mono',monospace;margin-top:5px;display:flex;gap:10px;}

/* HEALTH */
.hrow{display:flex;flex-direction:column;gap:8px;margin-top:4px;}

.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:4px;}

/* CLOTHING */

/* SUN ARC */
.sunc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px 15px 12px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.sunsvg{width:100%;height:68px;}
.suntm{display:flex;justify-content:space-between;margin-top:5px;}

/* BOTTOM PANELS */

@media(min-width:540px){.bpnl{gap:10px;}}
@media(min-width:860px){.bpnl{grid-template-columns:1fr 1fr 1fr;}}
.wc,.rc,.pc2{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:13px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.rc{grid-column:span 2;}
@media(min-width:860px){.rc{grid-column:span 1;}}
.cpw{display:flex;align-items:center;gap:12px;margin-top:7px;}
.comp{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--gb);background:var(--bg3);position:relative;flex-shrink:0;}
.cn{position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:.58rem;color:var(--a);font-family:'DM Mono',monospace;font-weight:700;}

.cw{position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:.52rem;color:var(--t3);font-family:'DM Mono',monospace;}
.cneedle{position:absolute;top:50%;left:50%;width:2.5px;height:28px;margin-left:-1.25px;transform-origin:50% 100%;transform:translateY(-100%) rotate(var(--wd,0deg));background:linear-gradient(to top,transparent 10%,var(--a));border-radius:2px;}
.cdot{position:absolute;top:50%;left:50%;width:7px;height:7px;background:var(--a);border-radius:50%;transform:translate(-50%,-50%);}
.wspd{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;line-height:1;}
.wunit{font-size:.68rem;color:var(--t3);}
.wdir{font-size:.72rem;color:var(--t2);margin-top:3px;}
.wgust{font-size:.65rem;color:var(--a3);font-family:'DM Mono',monospace;margin-top:5px;}
.rbody{border-radius:9px;overflow:hidden;position:relative;background:var(--bg3);height:100px;margin-top:7px;display:flex;align-items:center;justify-content:center;}
.rgrid{position:absolute;inset:0;background-image:linear-gradient(var(--gb) 1px,transparent 1px),linear-gradient(90deg,var(--gb) 1px,transparent 1px);background-size:24px 24px;}
.rp{position:absolute;top:50%;left:50%;width:55px;height:55px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.45) 0%,transparent 70%);animation:rping 2.2s ease-in-out infinite;z-index:1;}
.rp2{animation-delay:-1.1s;opacity:.5;width:85px;height:85px;}
.rdot{width:9px;height:9px;border-radius:50%;background:var(--a);box-shadow:0 0 9px var(--a);position:relative;z-index:2;}
.rlbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);text-align:center;margin-top:5px;}
.pbars{display:flex;align-items:flex-end;gap:3px;height:65px;margin-top:7px;}
.pcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;}
.pbg{flex:1;width:100%;background:var(--bg3);border-radius:3px;position:relative;overflow:hidden;display:flex;align-items:flex-end;}
.pf{width:100%;background:linear-gradient(to top,var(--a),var(--a2));border-radius:3px;transition:height .9s ease;}
.phr{font-size:.52rem;color:var(--t3);font-family:'DM Mono',monospace;text-align:center;}

/* COMPARE */
.cmpcard{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.cmptbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:.78rem;}
.cmptbl th{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--gb);}
.cmptbl td{padding:8px 8px;border-bottom:1px solid var(--gb);color:var(--t2);vertical-align:middle;}
.cmptbl td:first-child{font-family:'Syne',sans-serif;font-weight:600;color:var(--t);}
.cmptbl tr:last-child td{border-bottom:none;}
.cmpadd{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:9px;padding:9px;border:1px dashed var(--gb);border-radius:9px;background:transparent;color:var(--t3);font-size:.75rem;cursor:pointer;transition:all var(--ease);}
.cmpadd:hover{border-color:var(--a);color:var(--a);}

/* ACTION ROW */
.actrow{display:flex;gap:7px;}
.actbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 10px;border:1px solid var(--gb);border-radius:var(--rsm);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;color:var(--t2);cursor:pointer;transition:all var(--ease);}
.actbtn:hover{border-color:var(--a);color:var(--a);}
.actbtn:active{transform:scale(.95);}
.actbtn.aon{border-color:var(--g);color:var(--g);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;}
.spinner{width:42px;height:42px;border:3px solid var(--gb);border-top-color:var(--a);border-radius:50%;animation:spin .75s linear infinite;}
.ltxt{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--t3);}

/* TOAST */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--gb);border-radius:50px;padding:8px 16px;font-size:.75rem;color:var(--t2);opacity:0;transition:all .35s ease;pointer-events:none;z-index:200;white-space:nowrap;max-width:88vw;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* FOOTER */
footer{position:relative;z-index:1;text-align:center;padding:16px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t3);letter-spacing:.04em;border-top:1px solid var(--gb);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);margin-top:auto;}
footer .hi{color:var(--a);}
</style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">Weather<em>OS</em></div>
    <div class="theme-group">
      <button class="tbtn" id="tl" onclick="setTheme('light')">☀️ Light</button>
      <button class="tbtn on" id="td" onclick="setTheme('dark')">🌙 Dark</button>
      <button class="tbtn" id="to" onclick="setTheme('oled')">⚫ OLED</button>
    </div>
  </header>

  <!-- AUTO-REFRESH PROGRESS BAR -->
  <div class="rbar-wrap"><div class="rbar" id="rbar"></div></div>

  <!-- GPS BANNER (shown after GPS success) -->
  <div id="gpsBanner" style="display:none;"></div>

  <!-- SEARCH -->
  <div class="srow">
    <div class="swrap" style="position:relative;flex:1;">
      <span class="sico">🔍</span>
      <input class="sinput" id="sinput" type="search" autocomplete="off"
        placeholder="Search city, ZIP or coordinates…"
        oninput="onAC(this.value)"
        onkeydown="if(event.key==='Enter'){closeAC();this.blur();doSearch();}if(event.key==='Escape')closeAC();">
      <div class="aclist" id="aclist"></div>
    </div>
    <button class="lbtn" id="lbtn" onclick="manualGPS()" title="Detect my location" aria-label="Use GPS">📍</button>
    <button class="sbtn" onclick="doSearch()">Search</button>
  </div>

  <!-- UNIT CONTROLS -->
  <div class="crow">
    <span class="clbl">Temp</span>
    <div class="utog">
      <button class="ubtn on" id="uc" onclick="setUnit('C')">°C</button>
      <button class="ubtn"    id="uf" onclick="setUnit('F')">°F</button>
    </div>
    <span class="clbl" style="margin-left:6px;">Wind</span>
    <div class="utog">
      <button class="ubtn on" id="uk" onclick="setWind('kmh')">km/h</button>
      <button class="ubtn"    id="um" onclick="setWind('mph')">mph</button>
    </div>
  </div>

  <!-- FAVORITES BAR -->
  <div class="favbar" id="favbar"></div>

  <!-- MAIN CONTENT -->
  <div id="wx"></div>

  <!-- ACTION ROW -->
  <div class="actrow" id="actrow" style="display:none;">
    <button class="actbtn" onclick="shareWx()">📤 Share</button>
    <button class="actbtn" onclick="manualRefresh()">🔄 Refresh</button>
    <button class="actbtn" id="nbtn" onclick="toggleNotify()">🔔 Alerts</button>
  </div>

</div>

<footer>© <span class="hi" id="yr"></span> <span class="hi">Manik Roy</span>. All Rights Reserved.</footer>
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ════ STATE ════ */
let unit='C', wunit='kmh', wxData=null;
let acTimer=null, rfTimer=null, rfStart=null;
let tMode='temp', notifyOn=false, curCity='';
let compareData=[];
const RF_MS = 10*60*1000; // 10 min

/* ════ YEAR ════ */
document.getElementById('yr').textContent = new Date().getFullYear();

/* ════ THEME ════ */
const THEME_COLORS = {dark:'#0a0f1a', light:'#eef4ff', oled:'#000000'};
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('metaThemeColor').content = THEME_COLORS[t];
  ['l','d','o'].forEach(x => document.getElementById('t'+x).classList.toggle('on', (x==='l'&&t==='light')||(x==='d'&&t==='dark')||(x==='o'&&t==='oled')));
  localStorage.setItem('wxTheme',t);
}
setTheme(localStorage.getItem('wxTheme')||'dark');

/* ════ UNITS ════ */
function setUnit(u){ unit=u; document.getElementById('uc').classList.toggle('on',u==='C'); document.getElementById('uf').classList.toggle('on',u==='F'); if(wxData)render(wxData); }
function setWind(u){ wunit=u; document.getElementById('uk').classList.toggle('on',u==='kmh'); document.getElementById('um').classList.toggle('on',u==='mph'); if(wxData)render(wxData); }
const dT = c => `${unit==='C'?Math.round(c):Math.round(c*9/5+32)}°${unit}`;
const dW = k => wunit==='kmh'?`${Math.round(k)} km/h`:`${Math.round(k*0.621371)} mph`;

/* ════ TOAST ════ */
let tTimer=null;
function toast(msg,ms=3200){
  clearTimeout(tTimer);
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  tTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

/* ════ FAVORITES ════ */
let favs = JSON.parse(localStorage.getItem('wxFavs')||'["Kolkata","Mumbai","Delhi","London"]');
function saveFavs(){ localStorage.setItem('wxFavs',JSON.stringify(favs)); }
function renderFavs(){
  document.getElementById('favbar').innerHTML =
    favs.map(c=>`<div class="fpill${c===curCity?' cur':''}" onclick="loadFav('${c}')">
      📍${c}<span class="fdel" onclick="event.stopPropagation();delFav('${c}')">✕</span>
    </div>`).join('') +
    `<div class="fadd" onclick="addFav()">＋ Save</div>`;
}
function loadFav(c){ document.getElementById('sinput').value=c; doSearch(); }
function delFav(c){ favs=favs.filter(f=>f!==c); saveFavs(); renderFavs(); toast('Removed '+c); }
function addFav(){ if(!curCity||favs.includes(curCity)){toast('Already saved!');return;} favs.push(curCity); saveFavs(); renderFavs(); toast('✅ Saved '+curCity); }
renderFavs();

/* ════ AUTOCOMPLETE ════ */
let acRes=[];
function onAC(v){
  clearTimeout(acTimer);
  if(v.length<2){closeAC();return;}
  acTimer=setTimeout(async()=>{
    try{
      const j=await(await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=5&language=en&format=json`)).json();
      acRes=j.results||[];
      const el=document.getElementById('aclist');
      if(!acRes.length){el.classList.remove('open');return;}
      el.innerHTML=acRes.map((r,i)=>`<div class="acitem" onclick="pickAC(${i})"><span>🌍</span><div><div class="acname">${r.name}</div><div class="acregion">${[r.admin1,r.country].filter(Boolean).join(', ')}</div></div></div>`).join('');
      el.classList.add('open');
    }catch{closeAC();}
  },300);
}
function pickAC(i){
  const r=acRes[i];
  document.getElementById('sinput').value=r.name;
  closeAC();
  loadCoords(r.latitude,r.longitude,{lat:r.latitude,lon:r.longitude,name:r.name,country:r.country||'',admin:r.admin1||''});
}
function closeAC(){ document.getElementById('aclist').classList.remove('open'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.swrap')) closeAC(); });

/* ════ AUTO-REFRESH BAR ════ */
function startRBar(){
  clearInterval(rfTimer);
  rfStart=Date.now();
  const bar=document.getElementById('rbar');
  bar.style.transition='none'; bar.style.width='100%';
  void bar.offsetWidth;
  rfTimer=setInterval(()=>{
    const pct=Math.max(0,100-((Date.now()-rfStart)/RF_MS)*100);
    bar.style.width=pct+'%';
    if(pct<=0){ clearInterval(rfTimer); if(wxData)doSearch(true); }
  },1000);
}
function manualRefresh(){ doSearch(true); toast('🔄 Refreshing…'); }

/* ════════════════════════════════════════════
   GPS SYSTEM — AUTO DETECT ON LOAD
════════════════════════════════════════════ */

/* Entry point called on DOMContentLoaded */
function initApp(){
  if(!('geolocation' in navigator)){
    // No GPS support at all → load Kolkata
    loadKolkata(); return;
  }

  if(navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(perm=>{
      if(perm.state==='granted'){
        // Permission already granted — silently get GPS
        silentGPS();
      } else if(perm.state==='denied'){
        // Previously denied — load cached or Kolkata
        loadCachedOrKolkata();
      } else {
        // 'prompt' — show our nice card first
        showGPSCard();
      }
      // React to live permission changes
      perm.onchange = ()=>{
        if(perm.state==='granted') silentGPS();
        else if(perm.state==='denied') loadCachedOrKolkata();
      };
    }).catch(()=>{
      // permissions API failed (e.g. Firefox quirk) — try silent GPS
      silentGPS();
    });
  } else {
    // Safari doesn't support permissions API → show card
    showGPSCard();
  }
}

/* Show our permission card (before triggering browser prompt) */
function showGPSCard(){
  document.getElementById('wx').innerHTML = `
    <div class="gps-card">
      <span class="gem">📍</span>
      <h2>Use Your Location?</h2>
      <p>WeatherOS can instantly show weather for where you are right now. Your location is never stored on any server.</p>
      <div class="gbtnwrap">
        <button class="gbtn-yes" onclick="triggerGPS(true)">📍 Use My Location</button>
        <button class="gbtn-no"  onclick="loadCachedOrKolkata()">🌆 Use Kolkata Instead</button>
      </div>
      <div class="gnote">You can change this anytime via the 📍 button</div>
    </div>`;
}

/* Get GPS without showing loading screen (permission already granted) */
function silentGPS(){
  navigator.geolocation.getCurrentPosition(
    pos => onGPSSuccess(pos),
    ()  => loadCachedOrKolkata(),
    { enableHighAccuracy:true, timeout:8000, maximumAge:300000 }
  );
}

/* Get GPS with a visible loading state (user just tapped "Use My Location") */
function triggerGPS(showUI=false){
  if(showUI){
    document.getElementById('wx').innerHTML = `
      <div class="gps-detecting">
        <div class="gem2">📡</div>
        <div class="gt">Detecting your location…</div>
        <div class="gs">Please allow location access in your browser</div>
      </div>`;
  }
  navigator.geolocation.getCurrentPosition(
    pos => onGPSSuccess(pos),
    err => {
      const m={1:'Location access denied',2:'Position unavailable',3:'Request timed out'};
      toast('❌ '+( m[err.code]||'GPS error'));
      loadCachedOrKolkata();
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

/* GPS success handler */
function onGPSSuccess(pos){
  const {latitude:la, longitude:lo, accuracy:ac} = pos.coords;
  // Cache coords + timestamp
  localStorage.setItem('wxLat', la);
  localStorage.setItem('wxLon', lo);
  localStorage.setItem('wxLocT', Date.now());
  document.getElementById('sinput').value = `${la.toFixed(4)}, ${lo.toFixed(4)}`;
  loadCoords(la, lo, null, true, Math.round(ac));
}

/* Manual 📍 button in header */
function manualGPS(){
  const btn=document.getElementById('lbtn');
  btn.innerHTML='⏳'; btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.innerHTML='✅'; btn.disabled=false;
      setTimeout(()=>{btn.innerHTML='📍';},2000);
      const {latitude:la,longitude:lo,accuracy:ac}=pos.coords;
      localStorage.setItem('wxLat',la); localStorage.setItem('wxLon',lo); localStorage.setItem('wxLocT',Date.now());
      document.getElementById('sinput').value=`${la.toFixed(4)}, ${lo.toFixed(4)}`;
      loadCoords(la,lo,null,true,Math.round(ac));
      toast(`📍 Location updated (±${Math.round(ac)}m)`);
    },
    err => {
      btn.innerHTML='📍'; btn.disabled=false;
      const m={1:'Location denied — enable in browser settings',2:'Position unavailable',3:'Timed out'};
      toast('❌ '+(m[err.code]||'GPS error'));
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

/* Use cached GPS coords (< 30 min old) or fall back to Kolkata */
function loadCachedOrKolkata(){
  const la=localStorage.getItem('wxLat');
  const lo=localStorage.getItem('wxLon');
  const t=localStorage.getItem('wxLocT');
  if(la&&lo&&t&&(Date.now()-t)<30*60*1000){
    document.getElementById('sinput').value=`${(+la).toFixed(4)}, ${(+lo).toFixed(4)}`;
    loadCoords(+la,+lo,null,false);
    toast('📍 Using recent location');
  } else {
    loadKolkata();
  }
}

function loadKolkata(){
  document.getElementById('sinput').value='Kolkata';
  doSearch();
}

/* Show / hide GPS banner */
function showGPSBanner(loc,la,lo,acc){
  const b=document.getElementById('gpsBanner');
  b.style.display='block';
  const ns=lo>=0?'E':'W';
  b.innerHTML=`<div class="gps-banner">
    <div class="gdot"></div>
    <div style="flex:1"><strong>Live GPS</strong> — ${loc.name}${loc.admin?', '+loc.admin:''}
     · ${(+la).toFixed(3)}°N ${Math.abs(lo).toFixed(3)}°${ns}${acc?` ±${acc}m`:''}</div>
    <button class="gdx" onclick="document.getElementById('gpsBanner').style.display='none'" title="Dismiss">✕</button>
  </div>`;
}

/* ════ GEOCODE ════ */
async function geocode(q){
  const m=q.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if(m) return{lat:+m[1],lon:+m[2],name:`${(+m[1]).toFixed(2)}, ${(+m[2]).toFixed(2)}`,country:'',admin:''};
  const j=await(await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`)).json();
  if(!j.results?.length) throw new Error('City not found');
  const c=j.results[0];
  return{lat:c.latitude,lon:c.longitude,name:c.name,country:c.country||'',admin:c.admin1||''};
}

/* ════ SEARCH (by city name) ════ */
async function doSearch(silent=false){
  const q=document.getElementById('sinput').value.trim();
  if(!q){toast('Enter a city name');return;}
  if(!silent) showLoading();
  try{ const loc=await geocode(q); await loadCoords(loc.lat,loc.lon,loc,false,null,silent); }
  catch(e){ toast('❌ '+e.message); document.getElementById('wx').innerHTML=''; }
}

/* ════ LOAD WEATHER BY COORDS ════ */
async function loadCoords(lat,lon,loc=null,fromGPS=false,acc=null,silent=false){
  if(!silent) showLoading();
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      +`&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,`
      +`weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure,`
      +`uv_index,is_day,visibility,cloud_cover`
      +`&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m`
      +`&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,`
      +`precipitation_sum,uv_index_max,wind_speed_10m_max`
      +`&timezone=auto&forecast_days=7`;

    const d=await(await fetch(url)).json();

    // Reverse-geocode if no loc provided
    if(!loc){
      try{
        const rv=await(await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)).json();
        loc={lat,lon,
          name:rv.address?.city||rv.address?.town||rv.address?.village||rv.address?.county||'My Location',
          country:rv.address?.country||'',admin:rv.address?.state||''};
      }catch{
        loc={lat,lon,name:'My Location',country:'',admin:''};
      }
    }

    wxData={...d,loc,fetchedAt:new Date(),fromGPS,acc};
    curCity=loc.name;
    renderFavs();
    render(wxData);
    startRBar();
    document.getElementById('actrow').style.display='flex';
    if(fromGPS) showGPSBanner(loc,lat,lon,acc);
    else document.getElementById('gpsBanner').style.display='none';

  }catch(e){
    toast('❌ Could not load weather data');
    document.getElementById('wx').innerHTML='';
  }
}

function showLoading(){
  document.getElementById('wx').innerHTML=`<div class="loading"><div class="spinner"></div><div class="ltxt">Fetching weather…</div></div>`;
}

/* ════ SHARE + NOTIFY ════ */
function shareWx(){
  if(!wxData)return;

  if(navigator.share){navigator.share({title:`Weather in ${l.name}`,text,url:location.href}).catch(()=>{});}

function toggleNotify(){

/* ════ HELPERS ════ */
const WEM=c=>({0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'}[c]||'🌡️');
const WDS=c=>({0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Rain showers',81:'Moderate showers',82:'Violent showers',95:'Thunderstorm',96:'T-storm + hail',99:'Heavy T-storm'}[c]||'Unknown');
const DIRS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const wDir=d=>DIRS[Math.round(d/22.5)%16];
function aqiEst(h,p){return Math.max(10,Math.min(200,Math.round(22+h*.55+(1013-p)*.28)));}
function aqiInfo(v){if(v<=50)return{l:'Good',c:'#22c55e'};if(v<=100)return{l:'Moderate',c:'#eab308'};if(v<=150)return{l:'Unhealthy*',c:'#f97316'};return{l:'Unhealthy',c:'#ef4444'};}
function hCol(v){return v<30?'#22c55e':v<60?'#eab308':'#ef4444';}
function hLbl(v){return v<30?'Low':v<60?'Moderate':'High';}

/* Moon phase */
function moonPhase(date){
  const base=new Date('2000-01-06T18:14:00Z');
  const syn=29.53058867;
  const phase=(((date-base)/(864e5)%syn)+syn)%syn;
  const illum=Math.round((1-Math.cos(2*Math.PI*phase/syn))/2*100);
  const name=phase<1.85?'New Moon':phase<7.38?'Waxing Crescent':phase<9.22?'First Quarter':phase<14.77?'Waxing Gibbous':phase<16.61?'Full Moon':phase<22.15?'Waning Gibbous':phase<23.99?'Last Quarter':'Waning Crescent';
  const em=['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'][['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'].indexOf(name)];
  return{name,em,illum,age:Math.round(phase)};
}

/* Trend chart */
function switchTrend(m){ tMode=m; document.getElementById('tt0').classList.toggle('on',m==='temp'); document.getElementById('tt1').classList.toggle('on',m==='rain'); if(wxData)drawTrend(wxData); }
function drawTrend(d){
  const hi=new Date().getHours();
  const labs=[],vals=[];
  for(let i=hi;i<hi+24&&i<d.hourly.time.length;i+=2){
    const h=new Date(d.hourly.time[i]).getHours();
    labs.push(h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p');
    vals.push(tMode==='temp'?Math.round(d.hourly.temperature_2m[i]):d.hourly.precipitation_probability[i]);
  }
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=60,P=6;
  const pts=vals.map((v,i)=>`${P+i/(vals.length-1||1)*(W-P*2)},${H-P-((v-mn)/rng)*(H-P*2)}`);
  const col=tMode==='temp'?'var(--a)':'var(--a2)';
  const wrap=document.getElementById('tsvgw');
  if(!wrap)return;
  wrap.innerHTML=`<svg class="tsvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="M${pts[0]} ${pts.slice(1).map(p=>'L'+p).join(' ')} L${W-P},${H} L${P},${H} Z" fill="url(#tg)"/>
    <path d="M${pts[0]} ${pts.slice(1).map(p=>'L'+p).join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>{const[x,y]=p.split(',');const lbl=tMode==='temp'?dT(vals[i]):`${vals[i]}%`;return`<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>${i%2===0?`<text x="${x}" y="${+y-6}" text-anchor="middle" fill="${col}" font-size="7" font-family="DM Mono,monospace">${lbl}</text>`:''}`}).join('')}
  </svg>`;
  document.getElementById('tlbls').innerHTML=labs.map((l,i)=>`<span class="tlbl" style="${i===0||i===labs.length-1?'':'opacity:.6'}">${l}</span>`).join('');
}

/* Activity scores */
function actScores(temp,hum,wind,rain,uv){
  const sc=(b,pen=[])=>Math.max(0,Math.min(100,Math.round(b-pen.reduce((a,x)=>a+x,0))));
  return[
    {n:'Running',e:'🏃',s:sc(90,[rain>50?30:0,temp>35?20:temp<5?25:0,hum>85?10:0])},
    {n:'Cycling',e:'🚴',s:sc(90,[rain>40?35:0,wind>30?20:0,temp<5?20:0])},
    {n:'Hiking', e:'🥾',s:sc(85,[rain>60?40:0,temp>38?20:0,uv>8?15:0])},
    {n:'Picnic', e:'🧺',s:sc(95,[rain>30?50:0,wind>25?10:0])},
    {n:'Swimming',e:'🏊',s:sc(80,[temp<25?30:0,rain>50?20:0])},
    {n:'Golf',   e:'⛳',s:sc(85,[rain>40?40:0,wind>25?20:0,temp<10?15:0])},
  ];
}

/* Clothing */
function clothing(temp,rain,wind,uv){
  const i=[];
  if(temp<10)i.push({e:'🧥',l:'Heavy Coat'});else if(temp<18)i.push({e:'🧣',l:'Light Jacket'});else i.push({e:'👕',l:temp>28?'T-Shirt':'Long Sleeve'});
  if(rain>50)i.push({e:'☂️',l:'Umbrella'});if(rain>30)i.push({e:'🌂',l:'Raincoat'});
  if(wind>25)i.push({e:'🌬️',l:'Windbreaker'});if(uv>5)i.push({e:'🕶️',l:'Sunglasses'},{e:'🧴',l:'Sunscreen'});
  if(temp>28)i.push({e:'🧢',l:'Sun Hat'});if(temp<15)i.push({e:'🧤',l:'Gloves'});
  i.push({e:'👟',l:rain>40?'Rain Boots':'Sneakers'});
  const tip=temp>32?'Stay hydrated — it\'s very hot!':temp<10?'Bundle up, it\'s cold!':rain>60?'Heavy rain likely. Waterproof everything!':'Good conditions outside today!';
  return{i,tip};
}

/* Health index */
function healthIdx(temp,hum,wind,uv){
  return{
    Pollen:Math.min(100,Math.round(20+(temp>20?20:0)+(hum>60?15:0)+(wind<15?10:0))),
    'Mold':Math.min(100,Math.round(10+(hum>70?40:hum>50?20:5)+(temp>15&&temp<30?15:0))),
    'Dust': Math.min(100,Math.round(10+(wind>20?40:wind>10?20:5)+(hum<40?20:0))),
    'Cold Risk':Math.min(100,Math.round(20+(temp<15?30:0)+(hum>70?15:0))),
  };
}

/* Compare cities */
async function addCompareCity(){
  const name=prompt('City to compare:');
  if(!name)return;
  try{
    const loc=await geocode(name);

}

/* ════ MAIN RENDER ════ */
function render(d){
  const c=d.current, loc=d.loc, now=new Date();
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr=`${DAYS[now.getDay()]}, ${MONS[now.getMonth()]} ${now.getDate()} · ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;

  /* hourly */
  const hi=now.getHours();
  const hrs=[];
  for(let i=hi;i<hi+24&&i<d.hourly.time.length;i++){
    const h=new Date(d.hourly.time[i]).getHours();
    const lbl=h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    hrs.push(`<div class="hcard${i===hi?' now':''}">
      <div class="htm${i===hi?' nl':''}">${i===hi?'NOW':lbl}</div>
      <span class="he">${WEM(d.hourly.weather_code[i])}</span>
      <div class="htp">${dT(d.hourly.temperature_2m[i])}</div>
      <div class="hr">💧${d.hourly.precipitation_probability[i]}%</div>
    </div>`);
  }

  /* 7-day */
  const fcast=d.daily.time.map((day,i)=>{
    const dt=new Date(day+'T12:00:00');
    const nm=i===0?'Today':i===1?'Tomorrow':DAYS[dt.getDay()];
    const hi2=d.daily.temperature_2m_max[i],lo2=d.daily.temperature_2m_min[i];
    const pct=Math.max(10,Math.min(100,Math.round(((hi2+10)/50)*100)));
    return `<div class="frow">
      <div><div class="fd">${nm}</div><div class="fdesc">${WDS(d.daily.weather_code[i])}</div></div>
      <div class="fe">${WEM(d.daily.weather_code[i])}</div>
      <div class="fbw"><div class="fb" style="width:${pct}%"></div></div>
      <div class="frang"><span class="fhi">${dT(hi2)}</span><span class="flo">${dT(lo2)}</span></div>
    </div>`;
  }).join('');

  /* UV / AQI */
  const uv=+(c.uv_index||d.daily.uv_index_max[0]||0);
  const uvPct=Math.min(100,uv/12*100);
  const uvLbl=uv<=2?'Low':uv<=5?'Moderate':uv<=7?'High':uv<=10?'Very High':'Extreme';
  const uvTip=uv<=2?'No protection needed':uv<=5?'Seek shade midday':uv<=7?'Apply SPF 30+':'Stay indoors 10am–4pm';
  const aqiV=aqiEst(c.relative_humidity_2m,c.surface_pressure);
  const ai=aqiInfo(aqiV);
  const aqiD=Math.min(340,aqiV/200*340);

  /* sun arc */
  const sr0=d.daily.sunrise[0],ss0=d.daily.sunset[0];
  const sr=sr0?new Date(sr0).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'--';
  const ss=ss0?new Date(ss0).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'--';
  const srMs=sr0?new Date(sr0).getTime():0, ssMs=ss0?new Date(ss0).getTime():0;
  const dayLen=ssMs-srMs;
  const prog=Math.max(0,Math.min(1,(Date.now()-srMs)/dayLen));
  const arcA=prog*180;
  const Rx=44,Ry=32,Cx=50,Cy=65;
  const ap=a=>{const r=(a-180)*Math.PI/180;return{x:Cx+Rx*Math.cos(r),y:Cy+Ry*Math.sin(r)};};
  const sp=ap(arcA);
  const dH=Math.round(dayLen/3600000),dM=Math.round((dayLen%3600000)/60000);

  /* precip bars */
  const pcols=[];
  for(let i=hi;i<hi+12&&i<d.hourly.time.length;i++){
    const p=d.hourly.precipitation_probability[i];
    const h2=new Date(d.hourly.time[i]).getHours();
    const lbl=h2===0?'12a':h2<12?h2+'a':h2===12?'12p':(h2-12)+'p';
    pcols.push(`<div class="pcol"><div class="pbg"><div class="pf" style="height:${p}%"></div></div><div class="phr">${lbl}</div></div>`);
  }

  /* alert */
  const maxR=Math.max(...d.hourly.precipitation_probability.slice(hi,hi+6));
  const alertH=maxR>=60?`<div class="alert"><span style="font-size:1.05rem;flex-shrink:0">⚠️</span><div><strong>Alert:</strong> ${maxR}% rain in next 6 hrs. Take an umbrella!</div></div>`:'';

  /* comfort */
  const humdx=c.apparent_temperature+(0.5555*(6.105*Math.exp(17.27*c.temperature_2m/(237.7+c.temperature_2m))*c.relative_humidity_2m/100-10));
  const comfort=[
    {e:'🌡️',l:'Heat Index',v:dT(Math.round(humdx)),t:humdx>40?'Danger':humdx>32?'Caution':'Comfortable'},
    {e:'💧',l:'Humidity',v:c.relative_humidity_2m+'%',t:c.relative_humidity_2m>70?'Very humid':c.relative_humidity_2m>50?'Humid':'OK'},
    {e:'🌬️',l:'Wind Chill',v:dT(c.apparent_temperature),t:c.apparent_temperature<0?'Very cold':'Mild'},
    {e:'👁️',l:'Visibility',v:`${c.visibility?(c.visibility/1000).toFixed(1):0}km`,t:c.visibility>8000?'Clear':'Reduced'},
  ];

  /* moon */
  const moon=moonPhase(now);

  /* health */
  const health=healthIdx(c.temperature_2m,c.relative_humidity_2m,c.wind_speed_10m,uv);

  /* activities */
  const acts=actScores(c.temperature_2m,c.relative_humidity_2m,c.wind_speed_10m,maxR,uv);

  /* clothing */
  const cl=clothing(c.temperature_2m,maxR,c.wind_speed_10m,uv);

  /* compare: always put current city first */
  if(!compareData.find(x=>x.name===loc.name)){
    compareData=[{name:loc.name,temp:c.temperature_2m,hum:c.relative_humidity_2m,code:c.weather_code,wind:c.wind_speed_10m},...compareData.filter(x=>x.name!==loc.name)];
  }

  const updAt=d.fetchedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  document.getElementById('wx').innerHTML=`
${alertH}
<div class="hero">
  <div class="htop">
    <div>
      <div class="hloc">📍 ${loc.name}${loc.admin?', '+loc.admin:''}${loc.country?', '+loc.country:''}</div>
      <div class="hcity">${loc.name}</div>
      <div class="hdate">${dateStr}</div>
    </div>
    <div class="hem">${WEM(c.weather_code)}</div>
  </div>
  <div class="htr">
    <div class="htemp">${dT(c.temperature_2m)}</div>
    <div class="hmeta">
      <div class="hfeel">Feels ${dT(c.apparent_temperature)}</div>
      <div class="hdesc">${WDS(c.weather_code)}</div>
    </div>
  </div>
  <div class="hpills">
    <div class="pill">💧 <strong>${c.relative_humidity_2m}%</strong>&nbsp;Humidity</div>
    <div class="pill">💨 <strong>${dW(c.wind_speed_10m)}</strong></div>
    <div class="pill">🌡️ <strong>${Math.round(c.surface_pressure)} hPa</strong></div>
    <div class="pill">👁️ <strong>${c.visibility?(c.visibility/1000).toFixed(1)+'km':'N/A'}</strong></div>
  </div>
  <div class="lupd"><div class="ldot"></div>Updated ${updAt} · Auto-refreshes every 10 min</div>
</div>

<div class="sgrid">
  <div class="sc"><div class="si">🌡️</div><div class="sl">High/Low</div><div class="sv">${dT(d.daily.temperature_2m_max[0])}</div><div class="ss">${dT(d.daily.temperature_2m_min[0])}</div></div>
  <div class="sc"><div class="si">🌧️</div><div class="sl">Rain</div><div class="sv">${d.daily.precipitation_sum[0].toFixed(1)}</div><div class="ss">mm today</div></div>
  <div class="sc"><div class="si">💨</div><div class="sl">Max Wind</div><div class="sv" style="font-size:.9rem">${dW(d.daily.wind_speed_10m_max[0])}</div><div class="ss">${wDir(c.wind_direction_10m)}</div></div>
  <div class="sc"><div class="si">☀️</div><div class="sl">UV Index</div><div class="sv">${uv.toFixed(1)}</div><div class="ss">${uvLbl}</div></div>
  <div class="sc"><div class="si">🌅</div><div class="sl">Sunrise</div><div class="sv" style="font-size:.85rem">${sr}</div><div class="ss">Set ${ss}</div></div>
  <div class="sc"><div class="si">📈</div><div class="sl">Pressure</div><div class="sv">${Math.round(c.surface_pressure)}</div><div class="ss">hPa</div></div>
</div>

<div class="hwrap"><div class="stitle">⏱ Hourly Forecast</div><div class="hscroll">${hrs.join('')}</div></div>

      <div class="aqim"><strong>${c.visibility?(c.visibility/1000).toFixed(0)+'k':'N/A'}</strong>Vis.</div>
    </div>
  </div>
</div>

<div class="moon" style="animation:fadeUp .5s .22s ease both">
  <div class="mvis">${moon.em}</div>
  <div>
    <div class="stitle" style="margin-bottom:4px">🌙 Moon Phase</div>
    <div class="mpn">${moon.name}</div>
    <div class="mpi">🔆 ${moon.illum}% illuminated · Day ${moon.age}</div>
    <div class="mpd"><span>Age: ${moon.age}d</span><span>Next new: ${29-moon.age}d</span></div>
  </div>
</div>

<div class="pc" style="animation:fadeUp .5s .24s ease both">
  <div class="stitle">🌿 Health & Pollen Index</div>
  <div class="hrow">${Object.entries(health).map(([k,v])=>`<div class="hitem">
    <div class="hlbl">${k}</div>
    <div class="hbw"><div class="hb" style="width:${v}%;background:${hCol(v)}"></div></div>
    <div class="hv" style="color:${hCol(v)}">${hLbl(v)}</div>
  </div>`).join('')}</div>
</div>

<div class="pc" style="animation:fadeUp .5s .26s ease both">
  <div class="stitle">🏅 Outdoor Activity Score</div>
  <div class="agrid">${acts.map(a=>{const col=a.s>70?'var(--g)':a.s>40?'var(--y)':'var(--r)';return`<div class="aitem"><div class="abadge" style="background:${col}"></div><div class="aico">${a.e}</div><div class="aname">${a.n}</div><div class="ascore" style="color:${col}">${a.s}</div></div>`;}).join('')}</div>
</div>

<div class="pc" style="animation:fadeUp .5s .28s ease both">
  <div class="stitle">👗 What to Wear</div>
  <div class="ctags">${cl.i.map(x=>`<div class="ctag">${x.e} ${x.l}</div>`).join('')}</div>
  <div class="ctip">"${cl.tip}"</div>
</div>

<div class="sunc" style="animation:fadeUp .5s .3s ease both">
  <div class="stitle">🌅 Sun Arc</div>
  <svg class="sunsvg" viewBox="0 0 100 68" preserveAspectRatio="none">
    <path d="M6,62 A44,32 0 0 1 94,62" fill="none" stroke="var(--gb)" stroke-width="1.5"/>
    <path d="M6,62 A44,32 0 0 1 ${sp.x},${sp.y}" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="${sp.x}" cy="${sp.y}" r="3.5" fill="#fbbf24"><animate attributeName="r" values="3.5;4.8;3.5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="${sp.x}" cy="${sp.y}" r="7" fill="rgba(251,191,36,.22)"/>
  </svg>
  <div class="suntm">
    <div class="stt">🌅 ${sr}<span>Sunrise</span></div>
    <div class="stt mid">⏱ ${dH}h ${dM}m<span>Day length</span></div>
    <div class="stt" style="text-align:right">🌇 ${ss}<span>Sunset</span></div>
  </div>
</div>

<div class="bpnl" style="animation:fadeUp .5s .32s ease both">
  <div class="wc">
    <div class="stitle" style="margin-bottom:0">💨 Wind</div>
    <div class="cpw">
      <div class="comp" style="--wd:${c.wind_direction_10m}deg">
        <div class="cn">N</div><div class="cs">S</div><div class="ce">E</div><div class="cw">W</div>
        <div class="cneedle"></div><div class="cdot"></div>
      </div>
      <div>
        <div class="wspd">${dW(c.wind_speed_10m).split(' ')[0]}</div>
        <div class="wunit">${wunit==='kmh'?'km/h':'mph'}</div>
        <div class="wdir">${wDir(c.wind_direction_10m)} · ${c.wind_direction_10m}°</div>
        <div class="wgust">↑ Gusts: ${dW(c.wind_gusts_10m)}</div>
      </div>
    </div>
  </div>
  <div class="pc2">
    <div class="stitle" style="margin-bottom:0">🌧️ Rain %</div>
    <div class="pbars">${pcols.join('')}</div>
  </div>
  <div class="rc">
    <div class="stitle" style="margin-bottom:0">📡 Radar</div>
    <div class="rbody">
      <div class="rgrid"></div>
      <div class="rp"></div><div class="rp rp2"></div>
      <div class="rdot"></div>
    </div>
    <div class="rlbl">Pulse radar · ${loc.name}</div>
  </div>
</div>

<div class="cmpcard" style="animation:fadeUp .5s .34s ease both">
  <div class="stitle">🆚 Compare Cities</div>
  <table class="cmptbl">
    <thead><tr><th>City</th><th>Temp</th><th>Humidity</th><th>Wind</th></tr></thead>
    <tbody id="cmptbody"></tbody>
  </table>
  <button class="cmpadd" onclick="addCompareCity()">＋ Add city to compare</button>
</div>`;

  drawTrend(d);
  renderCompare();
}

/* ════ BOOT ════ */
window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
