<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Pulse — Downtime Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* ─── THEME TOKENS ─── */
  :root {
    --bg:          #0d0d12;
    --surface:     #16161f;
    --surface2:    #1e1e2a;
    --border:      #2a2a38;
    --text:        #e8e8f0;
    --muted:       #6b6b88;
    --accent:      #00e5a0;
    --accent2:     #7c6fff;
    --danger:      #ff4d6d;
    --warn:        #ffb347;
    --ok:          #00e5a0;
    --radius:      14px;
    --radius-sm:   8px;
    --mono:        'Space Mono', monospace;
    --sans:        'Syne', sans-serif;
    --transition:  0.3s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] {
    --bg:       #f0f0f5;
    --surface:  #ffffff;
    --surface2: #e8e8f0;
    --border:   #d0d0e0;
    --text:     #12121a;
    --muted:    #7070a0;
    --accent:   #009e6e;
    --accent2:  #5b4fcc;
    --danger:   #d42b47;
    --warn:     #c87a00;
    --ok:       #009e6e;
  }
  [data-theme="oled"] {
    --bg:       #000000;
    --surface:  #080808;
    --surface2: #0f0f0f;
    --border:   #1a1a1a;
    --text:     #ffffff;
    --muted:    #555566;
    --accent:   #00ffb3;
    --accent2:  #9d8fff;
    --danger:   #ff3355;
    --warn:     #ffaa22;
    --ok:       #00ffb3;
  }

  /* ─── RESET ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* ─── GRID NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(0,229,160,.04) 0%, transparent 60%),
                      radial-gradient(circle at 80% 80%, rgba(124,111,255,.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── LAYOUT ─── */
  .wrapper {
    width: 100%;
    max-width: 680px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    position: relative;
    z-index: 1;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 8px;
    gap: 12px;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .brand-title {
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-sub {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ─── THEME TOGGLE ─── */
  .theme-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 4px;
    gap: 2px;
    flex-shrink: 0;
  }
  .theme-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 30px;
    padding: 6px 10px;
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--muted);
    transition: all var(--transition);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .theme-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ─── INPUT CARD ─── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
    transition: background var(--transition), border-color var(--transition);
  }
  .input-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color var(--transition), background var(--transition);
    min-width: 0;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus {
    border-color: var(--accent);
    background: var(--bg);
  }
  .check-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .check-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .check-btn:active { transform: translateY(0); }
  .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ─── DROPDOWN PRESET ─── */
  .dropdown-row {
    margin-top: 14px;
    position: relative;
  }
  .dropdown-search-wrap {
    position: relative;
  }
  .dropdown-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    pointer-events: none;
  }
  .dropdown-search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px 10px 34px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text);
    outline: none;
    transition: border-color var(--transition), background var(--transition);
    cursor: pointer;
  }
  .dropdown-search::placeholder { color: var(--muted); }
  .dropdown-search:focus {
    border-color: var(--accent);
    background: var(--bg);
  }
  .dropdown-list {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    animation: slideIn 0.18s ease;
  }
  .dropdown-list.open { display: block; }
  .dropdown-group-label {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    padding: 10px 14px 4px;
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--border);
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--surface2); }
  .dropdown-item-name {
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 600;
    flex: 1;
    color: var(--text);
  }
  .dropdown-item-url {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
  }
  .dropdown-flag {
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  .dropdown-list::-webkit-scrollbar { width: 4px; }
  .dropdown-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ─── RESULT CARD ─── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 14px;
    display: none;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
    transition: background var(--transition), border-color var(--transition);
  }
  .result-card.visible { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .status-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .status-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .status-dot.ok { background: var(--ok); }
  .status-dot.ok::after { background: var(--ok); opacity: 0.25; }
  .status-dot.error { background: var(--danger); }
  .status-dot.error::after { background: var(--danger); opacity: 0.25; }
  .status-dot.warn { background: var(--warn); }
  .status-dot.warn::after { background: var(--warn); opacity: 0.25; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.25; }
    50%       { transform: scale(2.2); opacity: 0; }
  }

  .status-text { flex: 1; }
  .status-title {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .status-url {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
    word-break: break-all;
  }

  /* ─── METRICS GRID ─── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 380px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
  .metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
    transition: background var(--transition);
  }
  .metric-value {
    font-family: var(--mono);
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
    letter-spacing: -0.03em;
  }
  .metric-label {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
    font-family: var(--mono);
  }

  /* ─── RESPONSE DETAIL ─── */
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .detail-val {
    font-family: var(--mono);
    font-size: 0.78rem;
    text-align: right;
    word-break: break-all;
    color: var(--text);
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 700;
  }
  .badge-ok   { background: rgba(0,229,160,.15); color: var(--ok); }
  .badge-err  { background: rgba(255,77,109,.15); color: var(--danger); }
  .badge-warn { background: rgba(255,179,71,.15); color: var(--warn); }

  /* ─── HISTORY ─── */
  .section-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color var(--transition);
  }
  .clear-btn:hover { color: var(--danger); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .history-item:hover {
    border-color: var(--accent);
    transform: translateX(3px);
  }
  .history-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .history-dot.ok    { background: var(--ok); }
  .history-dot.error { background: var(--danger); }
  .history-dot.warn  { background: var(--warn); }
  .history-url {
    font-family: var(--mono);
    font-size: 0.72rem;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .history-meta {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
    line-height: 1.5;
  }

  /* ─── LOADING SPINNER ─── */
  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .spinner.visible { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── CHECKING STATE ─── */
  .checking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    margin-top: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-direction: column;
    animation: slideIn 0.2s ease;
    transition: background var(--transition);
  }
  .checking-card.visible { display: flex; }
  .checking-text {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }
  .checking-url {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--accent);
    word-break: break-all;
    text-align: center;
    margin-top: -6px;
  }

  /* ─── AUTO REFRESH ─── */
  .auto-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: background var(--transition);
  }
  .auto-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    flex: 1;
    letter-spacing: 0.05em;
  }
  .auto-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 0.7rem;
    outline: none;
    cursor: pointer;
  }
  .countdown-badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--accent2);
    display: none;
    min-width: 50px;
    text-align: right;
  }

  /* ─── TOGGLE SWITCH ─── */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: background var(--transition);
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform var(--transition);
  }
  .toggle input:checked + .toggle-slider { background: var(--accent2); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

  /* ─── SPACER ─── */
  .spacer { flex: 1; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 28px 0 20px;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.8;
    letter-spacing: 0.06em;
  }
  footer span { color: var(--accent); }

  /* ─── EMPTY HISTORY ─── */
  .empty-history {
    text-align: center;
    padding: 20px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-title">UPTIME PULSE</div>
      <div class="brand-sub">Downtime Checker</div>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark',this)">Dark</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light',this)">Light</button>
      <button class="theme-btn" data-theme="oled" onclick="setTheme('oled',this)">OLED</button>
    </div>
  </header>

  <!-- INPUT -->
  <div class="input-card">
    <label class="input-label">Enter URL to check</label>
    <div class="input-row">
      <input class="url-input" id="urlInput" type="url"
        placeholder="https://example.com"
        inputmode="url"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false">
      <button class="check-btn" id="checkBtn" onclick="checkUrl()">Check</button>
    </div>
    <div class="dropdown-row">
      <div class="dropdown-search-wrap">
        <span class="dropdown-search-icon">⌕</span>
        <input class="dropdown-search" id="dropdownSearch"
          placeholder="Search 100+ popular sites…"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
          onfocus="openDropdown()" oninput="filterDropdown(this.value)" readonly
          onclick="this.removeAttribute('readonly'); openDropdown();">
        <div class="dropdown-list" id="dropdownList"></div>
      </div>
    </div>
  </div>

  <!-- AUTO REFRESH -->
  <div class="auto-row">
    <div class="auto-label">Auto-refresh</div>
    <span class="countdown-badge" id="countdownBadge"></span>
    <select class="auto-select" id="autoSelect" onchange="setupAutoRefresh()">
      <option value="0">Off</option>
      <option value="30">30s</option>
      <option value="60">1m</option>
      <option value="300">5m</option>
    </select>
    <label class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="autoToggle" onchange="setupAutoRefresh()">
        <span class="toggle-slider"></span>
      </label>
    </label>
  </div>

  <!-- CHECKING STATE -->
  <div class="checking-card" id="checkingCard">
    <div class="spinner visible"></div>
    <div class="checking-text">Sending probe request...</div>
    <div class="checking-url" id="checkingUrl"></div>
  </div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text">
        <div class="status-title" id="statusTitle"></div>
        <div class="status-url" id="statusUrl"></div>
      </div>
    </div>

    <div class="metrics" id="metricsGrid"></div>

    <div style="margin-top: 16px;" id="detailRows"></div>
  </div>

  <!-- HISTORY -->
  <div id="historySection">
    <div class="section-title">
      <span>Recent checks</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="spacer"></div>

  <!-- FOOTER -->
  <footer>
    &copy; Manik Roy <span id="footerYear"></span>. All Rights Reserved.<br>
    Built with ♥ · Uptime Pulse v1.0
  </footer>

</div>

<script>
  /* ─── THEME ─── */
  function setTheme(theme, btn) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('theme', theme);
  }

  // Restore theme
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.querySelectorAll('.theme-btn').forEach(b => {
    if (b.dataset.theme === savedTheme) b.classList.add('active');
    else b.classList.remove('active');
  });

  /* ─── FOOTER YEAR (auto-updating) ─── */
  document.getElementById('footerYear').textContent = new Date().getFullYear();

  /* ─── STATE ─── */
  let history = JSON.parse(localStorage.getItem('uptimeHistory') || '[]');
  let autoTimer = null;
  let countdownInterval = null;
  let lastCheckedUrl = '';

  /* ─── UTILS ─── */
  function normalizeUrl(url) {
    url = url.trim();
    if (!url) return '';
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    try { new URL(url); return url; } catch { return ''; }
  }

  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    return Math.floor(s/3600) + 'h ago';
  }

  function formatMs(ms) {
    if (ms < 1000) return ms + ' ms';
    return (ms/1000).toFixed(2) + ' s';
  }

  function statusLabel(code) {
    if (!code) return { text: 'Unreachable', cls: 'error' };
    if (code >= 200 && code < 300) return { text: 'Online', cls: 'ok' };
    if (code >= 300 && code < 400) return { text: 'Redirect', cls: 'warn' };
    if (code >= 400 && code < 500) return { text: 'Client Error', cls: 'error' };
    if (code >= 500) return { text: 'Server Error', cls: 'error' };
    return { text: 'Unknown', cls: 'warn' };
  }

  /* ─── MAIN CHECK ─── */
  async function checkUrl() {
    const raw = document.getElementById('urlInput').value;
    const url = normalizeUrl(raw);
    if (!url) {
      shake(document.getElementById('urlInput'));
      return;
    }
    lastCheckedUrl = url;
    await runCheck(url);
  }

  async function runCheck(url) {
    const btn = document.getElementById('checkBtn');
    btn.disabled = true;
    btn.textContent = 'Checking…';

    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('checkingCard').classList.add('visible');
    document.getElementById('checkingUrl').textContent = url;

    const start = performance.now();
    let result = { url, ts: Date.now(), code: null, ok: false, redirected: false, finalUrl: url, latency: 0 };

    try {
      // Use no-cors as fallback since CORS blocks most direct checks
      // We use a corsproxy approach with timing
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);

      let res;
      try {
        res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {
          signal: controller.signal,
          method: 'GET',
          headers: { 'User-Agent': 'UptimePulse/1.0' }
        });
        result.latency = Math.round(performance.now() - start);
        result.code = res.status;
        result.ok = res.ok;
        result.redirected = res.redirected;
        result.finalUrl = res.url || url;
        result.contentType = res.headers.get('content-type') || '—';
        result.server = res.headers.get('server') || '—';
        result.cacheControl = res.headers.get('cache-control') || '—';
      } catch(e2) {
        // Fallback: try image probe for connectivity
        clearTimeout(timeout);
        result.latency = Math.round(performance.now() - start);
        result.code = null;
        result.error = e2.name === 'AbortError' ? 'Timeout (>12s)' : 'Connection refused or DNS failure';
      }
      clearTimeout(timeout);
    } catch(e) {
      result.latency = Math.round(performance.now() - start);
      result.error = e.name === 'AbortError' ? 'Request timed out' : (e.message || 'Unknown error');
    }

    document.getElementById('checkingCard').classList.remove('visible');
    renderResult(result);
    addHistory(result);
    btn.disabled = false;
    btn.textContent = 'Check';
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shakeX 0.4s ease';
    el.style.borderColor = 'var(--danger)';
    setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 600);
  }

  /* ─── RENDER ─── */
  function renderResult(r) {
    const card = document.getElementById('resultCard');
    const dot = document.getElementById('statusDot');
    const s = r.code ? statusLabel(r.code) : { text: r.error || 'Unreachable', cls: 'error' };

    dot.className = 'status-dot ' + s.cls;
    document.getElementById('statusTitle').textContent = s.text;
    document.getElementById('statusUrl').textContent = r.url;

    // Metrics
    const responseClass = r.latency < 500 ? 'ok' : r.latency < 2000 ? 'warn' : 'error';
    document.getElementById('metricsGrid').innerHTML = `
      <div class="metric">
        <span class="metric-value" style="color:var(--${responseClass})">${formatMs(r.latency)}</span>
        <span class="metric-label">Response</span>
      </div>
      <div class="metric">
        <span class="metric-value" style="color:var(--${r.ok?'ok':'danger'})">${r.code || '—'}</span>
        <span class="metric-label">HTTP Code</span>
      </div>
      <div class="metric">
        <span class="metric-value" style="color:var(--accent2)">${new Date(r.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        <span class="metric-label">Checked At</span>
      </div>
    `;

    // Details
    const badgeCls = s.cls === 'ok' ? 'badge-ok' : s.cls === 'warn' ? 'badge-warn' : 'badge-err';
    const rows = [
      ['Status', `<span class="badge ${badgeCls}">${s.text}</span>`],
      ['Latency', formatMs(r.latency)],
      ['HTTP Code', r.code || '—'],
      ['Redirected', r.redirected ? 'Yes' : 'No'],
      ['Final URL', truncate(r.finalUrl || r.url, 48)],
      ['Content-Type', r.contentType || '—'],
      ['Server', r.server || '—'],
      ['Cache-Control', r.cacheControl || '—'],
    ];

    document.getElementById('detailRows').innerHTML = rows.map(([k,v]) => `
      <div class="detail-row">
        <span class="detail-key">${k}</span>
        <span class="detail-val">${v}</span>
      </div>
    `).join('');

    card.classList.add('visible');
  }

  function truncate(str, n) {
    if (!str) return '—';
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  /* ─── HISTORY ─── */
  function addHistory(r) {
    history.unshift(r);
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('uptimeHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="empty-history">No checks yet. Enter a URL above.</div>';
      return;
    }
    list.innerHTML = history.map((r, i) => {
      const s = r.code ? statusLabel(r.code) : { text: r.error || 'Error', cls: 'error' };
      return `
        <div class="history-item" onclick="recheck('${escHtml(r.url)}')">
          <div class="history-dot ${s.cls}"></div>
          <span class="history-url">${escHtml(r.url)}</span>
          <div class="history-meta">
            <div>${r.code || '—'}</div>
            <div>${timeAgo(r.ts)}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('uptimeHistory');
    renderHistory();
  }

  function recheck(url) {
    document.getElementById('urlInput').value = url;
    lastCheckedUrl = url;
    runCheck(url);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ─── DROPDOWN LOGIC ─── */
  function buildDropdown(filter) {
    const list = document.getElementById('dropdownList');
    const q = (filter || '').toLowerCase().trim();

    const filtered = q ? SITES.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q) ||
      s.g.toLowerCase().includes(q)
    ) : [...SITES];

    if (!filtered.length) {
      list.innerHTML = '<div style="padding:16px;text-align:center;font-family:var(--mono);font-size:0.72rem;color:var(--muted);">No results found</div>';
      return;
    }

    // Always sort A→Z by name
    filtered.sort((a, b) => a.name.localeCompare(b.name));

    if (q) {
      // Searching: flat sorted list
      list.innerHTML = filtered.map(s => `
        <div class="dropdown-item" onclick="usePreset('${s.url}','${s.name.replace(/'/g,"\\'")}')">
          <span class="dropdown-flag">${s.flag}</span>
          <span class="dropdown-item-name">${s.name}</span>
          <span class="dropdown-item-url">${s.url.replace('https://','')}</span>
        </div>
      `).join('');
    } else {
      // Full list: group by first letter A→Z
      const letterGroups = {};
      filtered.forEach(s => {
        const letter = s.name[0].toUpperCase();
        if (!letterGroups[letter]) letterGroups[letter] = [];
        letterGroups[letter].push(s);
      });

      list.innerHTML = Object.keys(letterGroups).sort().map(letter => `
        <div class="dropdown-group-label">${letter}</div>
        ${letterGroups[letter].map(s => `
          <div class="dropdown-item" onclick="usePreset('${s.url}','${s.name.replace(/'/g,"\\'")}')">
            <span class="dropdown-flag">${s.flag}</span>
            <span class="dropdown-item-name">${s.name}</span>
            <span class="dropdown-item-url">${s.url.replace('https://','')}</span>
          </div>
        `).join('')}
      `).join('');
    }
  }

  function openDropdown() {
    buildDropdown('');
    document.getElementById('dropdownList').classList.add('open');
    document.getElementById('dropdownSearch').removeAttribute('readonly');
  }

  function closeDropdown() {
    document.getElementById('dropdownList').classList.remove('open');
  }

  function filterDropdown(val) {
    buildDropdown(val);
    document.getElementById('dropdownList').classList.add('open');
  }

    if (!e.target.closest('.dropdown-row')) closeDropdown();
  });

  /* ─── AUTO REFRESH ─── */
  function setupAutoRefresh() {
    clearInterval(autoTimer);
    clearInterval(countdownInterval);
    const badge = document.getElementById('countdownBadge');
    badge.style.display = 'none';

    const enabled = document.getElementById('autoToggle').checked;
    const secs = parseInt(document.getElementById('autoSelect').value);
    if (!enabled || !secs || secs === 0) return;

    let remaining = secs;
    badge.style.display = 'block';
    badge.textContent = 'next: ' + remaining + 's';

    countdownInterval = setInterval(() => {
      remaining--;
      badge.textContent = 'next: ' + remaining + 's';
      if (remaining <= 0) remaining = secs;
    }, 1000);

    autoTimer = setInterval(() => {
      if (lastCheckedUrl) runCheck(lastCheckedUrl);
    }, secs * 1000);
  }
