<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolMax – Real-Time Volume Booster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --accent:#ff4d4d; --accent2:#ff8c00; --glow:rgba(255,77,77,0.35); --radius:18px; --trans:0.3s cubic-bezier(.4,0,.2,1); }
  [data-theme="dark"]  { --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:rgba(255,255,255,0.07); --text:#f0f0f5; --muted:#7a7d99; }
  [data-theme="light"] { --bg:#f0f0f8; --surface:#ffffff; --surface2:#eaeaf5; --border:rgba(0,0,0,0.08); --text:#1a1a2e; --muted:#6b6b8a; }
  [data-theme="oled"]  { --bg:#000000; --surface:#0a0a0a; --surface2:#111111; --border:rgba(255,255,255,0.05); --text:#ffffff; --muted:#555577; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:background var(--trans),color var(--trans);overflow-x:hidden}
  .orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(90px)}
  .orb1{width:400px;height:400px;background:var(--accent);opacity:.1;top:-100px;right:-100px}
  .orb2{width:300px;height:300px;background:var(--accent2);opacity:.08;bottom:0;left:-80px}

  header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 28px;position:relative;z-index:10}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .theme-toggle{display:flex;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:4px;transition:background var(--trans)}
  .theme-btn{border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:50px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .25s}
  .theme-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 15px var(--glow)}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:12px 20px;position:relative;z-index:5;width:100%;max-width:460px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);transition:background var(--trans),border-color var(--trans)}

  /* Status */
  .status-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:.72rem;font-weight:600;color:var(--muted);transition:all var(--trans)}
  .dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s,box-shadow .3s}
  .dot.green{background:#44ff88;box-shadow:0 0 8px #44ff88;animation:blink 1.5s ease-in-out infinite}
  .dot.red{background:#ff4444;box-shadow:0 0 8px #ff4444}
  .dot.yellow{background:#ffcc00;box-shadow:0 0 8px #ffcc00;animation:blink 1s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

  /* Canvas */
  .viz-wrap{width:100%;height:60px;border-radius:10px;overflow:hidden;background:var(--surface2)}
  canvas{display:block;width:100%;height:100%}

  /* Dial */
  .dial-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
  .dial-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
  .dial-track{fill:none;stroke:var(--surface2);stroke-width:10;stroke-linecap:round}
  .dial-arc{fill:none;stroke-width:10;stroke-linecap:round;stroke:url(#dg);stroke-dasharray:415;stroke-dashoffset:415;transition:stroke-dashoffset .1s ease;filter:drop-shadow(0 0 6px rgba(255,77,77,.5))}
  .dial-inner{position:absolute;inset:15px;background:var(--surface);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 12px rgba(0,0,0,.3);transition:background var(--trans)}
  .dial-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .dial-sub{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600}

  /* dB bar */
  .db-row{width:100%;display:grid;grid-template-columns:28px 1fr 52px;align-items:center;gap:8px}
  .db-lbl{font-size:.68rem;color:var(--muted);font-weight:600}
  .db-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
  .db-fill{height:100%;border-radius:4px;width:0%;transition:width .04s linear;background:linear-gradient(to right,#44ff88,#ffcc00,#ff4d4d)}
  .db-num{font-size:.68rem;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
  .clip-label{font-size:.66rem;color:var(--accent);font-weight:700;letter-spacing:1px;text-align:center;height:16px;transition:opacity .2s;opacity:0}
  .clip-label.on{opacity:1}

  /* Slider */
  .slider-wrap{width:100%;display:flex;flex-direction:column;gap:8px}
  .sl-hdr{display:flex;justify-content:space-between;font-size:.75rem;font-weight:500;color:var(--muted)}
  input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--surface2);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 10px var(--glow);cursor:pointer;transition:transform .2s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer}

  /* Buttons */
  .btn-row{display:flex;gap:9px;width:100%}
  .btn{flex:1;padding:11px 6px;border:1px solid var(--border);border-radius:11px;background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s}
  .btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .btn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 6px 20px var(--glow)}
  .btn.pri:hover{transform:translateY(-3px);box-shadow:0 10px 28px var(--glow);color:#fff}
  .btn.muted-on{border-color:var(--accent);color:var(--accent)}

  /* Source card */
  .src-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;width:100%;display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 40px rgba(0,0,0,.15);transition:background var(--trans),border-color var(--trans)}
  .src-card h3{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .src-btns{display:flex;gap:8px}
  .src-btn{flex:1;border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:10px;padding:10px 6px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
  .src-btn:hover,.src-btn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 12px var(--glow)}
  .file-hint{font-size:.72rem;color:var(--muted);text-align:center}
  .prog-row{display:flex;align-items:center;gap:8px;display:none}
  .prog-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;cursor:pointer}
  .prog-fill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--accent),var(--accent2));width:0%;transition:width .1s linear}
  .time-lbl{font-size:.68rem;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

  /* Presets */
  .presets{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.15);transition:background var(--trans),border-color var(--trans)}
  .presets h3{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:600}
  .pg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
  .pb{border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:9px;padding:8px 4px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
  .pb:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}

  footer{padding:16px 20px;font-size:.7rem;color:var(--muted);text-align:center;letter-spacing:.5px;position:relative;z-index:5;transition:color var(--trans)}
  #fileInput{display:none}
</style>
</head>
<body>
<div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<header>
  <div class="logo">VolMax</div>
  <div class="theme-toggle">
    <button class="theme-btn" data-t="light">Light</button>
    <button class="theme-btn active" data-t="dark">Dark</button>
    <button class="theme-btn" data-t="oled">OLED</button>
  </div>
</header>

<main>
  <!-- Status -->
  <div class="status-row"><div class="dot" id="dot"></div><span id="statusTxt">No Source — Load a file or mic</span></div>

  <!-- Main card -->
  <div class="card">
    <div class="viz-wrap"><canvas id="cv"></canvas></div>

    <div class="dial-wrap">
      <svg class="dial-svg" viewBox="0 0 160 160">
        <defs><linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#ff8c00"/></linearGradient></defs>
        <circle class="dial-track" cx="80" cy="80" r="66"/>
        <circle class="dial-arc" id="arc" cx="80" cy="80" r="66"/>
      </svg>
      <div class="dial-inner">
        <div class="dial-num" id="gainNum">100</div>
        <div class="dial-sub">Gain %</div>
      </div>
    </div>

    <div class="db-row">
      <div class="db-lbl">dB</div>
      <div class="db-track"><div class="db-fill" id="dbFill"></div></div>
      <div class="db-num" id="dbNum">−∞</div>
    </div>
    <div class="clip-label" id="clipLbl">⚠ CLIPPING</div>

    <div class="slider-wrap">
      <div class="sl-hdr"><span>0%</span><span id="slLbl">100%</span><span>600%</span></div>
      <input type="range" id="sl" min="0" max="600" value="100">
    </div>

    <div class="btn-row">
      <button class="btn" id="muteBtn" onclick="toggleMute()">Mute</button>
      <button class="btn pri" id="boostBtn" onclick="toggleBoost()">⚡ Boost</button>
      <button class="btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <!-- Source -->
  <div class="src-card">
    <h3>Audio Source</h3>
    <div class="src-btns">
      <button class="src-btn" id="btnMic" onclick="startMic()">🎙 Microphone</button>
      <button class="src-btn" id="btnFile" onclick="document.getElementById('fileInput').click()">🎵 Audio File</button>
      <button class="src-btn" id="btnStop" onclick="stopAll()">⏹ Stop</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*,video/*" onchange="loadFile(event)">
    <div class="prog-row" id="progRow">
      <span class="time-lbl" id="tCur">0:00</span>
      <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
      <span class="time-lbl" id="tTot">0:00</span>
    </div>
    <div class="file-hint" id="hint">Tap Microphone to capture live audio, or load any audio/video file</div>
  </div>

  <!-- Presets -->
  <div class="presets">
    <h3>Gain Presets</h3>
    <div class="pg">
      <button class="pb" onclick="setP(50)">50%</button>
      <button class="pb" onclick="setP(100)">Normal</button>
      <button class="pb" onclick="setP(200)">2×</button>
      <button class="pb" onclick="setP(400)">4×</button>
    </div>
  </div>
</main>

<footer>&copy; <span id="yr"></span> Manik Roy. All Rights Reserved.</footer>

<script>
// Year
document.getElementById('yr').textContent = new Date().getFullYear();

// Theme
document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => {
  document.documentElement.dataset.theme = b.dataset.t;
  document.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
}));

// ── Audio engine ──────────────────────────────────────────────
let ctx, gainNode, analyser, compressor, src;
let micStream = null;
let audioBuffer = null;
let bufSrc = null;
let muted = false, boosted = false;
let currentGainVal = 1.0;
let rafId = null;
let startTime = 0, pauseOffset = 0, isPlaying = false;
let clipTimer = null;

function boot() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = ctx.createGain();
  compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -1;
  compressor.knee.value = 0;
  compressor.ratio.value = 20;
  compressor.attack.value = 0.001;
  compressor.release.value = 0.1;
  analyser = ctx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;
  gainNode.connect(analyser);
  analyser.connect(compressor);
  compressor.connect(ctx.destination);
}

function setGain(pct) {
  currentGainVal = muted ? 0 : (boosted ? (pct / 100) * 2.5 : pct / 100);
  if (gainNode) gainNode.gain.setTargetAtTime(currentGainVal, ctx.currentTime, 0.02);
  updateDial(pct);
}

// ── Dial & slider ─────────────────────────────────────────────
const sl = document.getElementById('sl');
const arc = document.getElementById('arc');
const C = 2 * Math.PI * 66; // r=66

function updateDial(pct) {
  document.getElementById('gainNum').textContent = muted ? 0 : Math.round(pct);
  document.getElementById('slLbl').textContent = (muted ? 0 : Math.round(pct)) + '%';
  const frac = Math.min(pct / 600, 1) * 0.75;
  arc.style.strokeDashoffset = C - frac * C;
}

sl.addEventListener('input', () => setGain(+sl.value));
updateDial(100);

// ── Mic ───────────────────────────────────────────────────────
async function startMic() {
  try {
    stopAll(false);
    boot();
    if (ctx.state === 'suspended') await ctx.resume();
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
    src = ctx.createMediaStreamSource(micStream);
    src.connect(gainNode);
    setStatus('green', '🎙 Microphone Live');
    setActive('btnMic');
    startViz();
    document.getElementById('hint').textContent = 'Microphone is active — speak or play audio near it';
  } catch(e) {
    setStatus('red', 'Mic blocked: ' + e.message);
    document.getElementById('hint').textContent = '⚠ ' + (e.name === 'NotAllowedError' ? 'Permission denied — allow mic in browser settings' : e.message);
  }
}

// ── File loader ───────────────────────────────────────────────
async function loadFile(evt) {
  const file = evt.target.files[0];
  evt.target.value = '';
  if (!file) return;
  stopAll(false);
  boot();
  if (ctx.state === 'suspended') await ctx.resume();
  setStatus('yellow', 'Loading…');
  document.getElementById('hint').textContent = '⏳ Decoding: ' + file.name;
  try {
    const ab = await file.arrayBuffer();
    audioBuffer = await ctx.decodeAudioData(ab);
    pauseOffset = 0;
    playBuffer();
    setActive('btnFile');
    document.getElementById('progRow').style.display = 'flex';
    document.getElementById('hint').textContent = '🎵 ' + file.name;
  } catch(e) {
    setStatus('red', 'Decode error');
    document.getElementById('hint').textContent = '⚠ Could not decode: ' + e.message;
  }
}

function playBuffer() {
  if (!audioBuffer) return;
  if (bufSrc) { try { bufSrc.stop(); bufSrc.disconnect(); } catch(e){} }
  bufSrc = ctx.createBufferSource();
  bufSrc.buffer = audioBuffer;
  bufSrc.connect(gainNode);
  bufSrc.start(0, pauseOffset);
  startTime = ctx.currentTime - pauseOffset;
  isPlaying = true;
  bufSrc.onended = () => {
    if (isPlaying) { pauseOffset = 0; isPlaying = false; setStatus('green', 'Playback finished'); }
  };
  setStatus('green', 'Playing Audio');
  startViz();
  updateProgress();
}

function updateProgress() {
  if (!audioBuffer) return;
  const elapsed = isPlaying ? ctx.currentTime - startTime : pauseOffset;
  const dur = audioBuffer.duration;
  document.getElementById('progFill').style.width = Math.min(elapsed / dur * 100, 100) + '%';
  document.getElementById('tCur').textContent = fmt(elapsed);
  document.getElementById('tTot').textContent = fmt(dur);
  if (isPlaying) requestAnimationFrame(updateProgress);
}

document.getElementById('progTrack').addEventListener('click', e => {
  if (!audioBuffer) return;
  const r = e.currentTarget.getBoundingClientRect();
  const frac = (e.clientX - r.left) / r.width;
  pauseOffset = frac * audioBuffer.duration;
  if (isPlaying) playBuffer();
});

function fmt(s) {
  s = Math.max(0, s | 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// ── Stop ──────────────────────────────────────────────────────
function stopAll(resetUI = true) {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (bufSrc) { try { bufSrc.stop(); bufSrc.disconnect(); } catch(e){} bufSrc = null; }
  if (src) { try { src.disconnect(); } catch(e){} src = null; }
  isPlaying = false; audioBuffer = null; pauseOffset = 0;
  cancelAnimationFrame(rafId);
  clearViz();
  if (resetUI) {
    setStatus('', 'Stopped');
    document.getElementById('hint').textContent = 'Tap Microphone to capture live audio, or load any audio/video file';
    document.getElementById('progRow').style.display = 'none';
    document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('on'));
    document.getElementById('dbNum').textContent = '−∞';
    document.getElementById('dbFill').style.width = '0%';
  }
}

// ── Mute / Boost / Reset ─────────────────────────────────────
function toggleMute() {
  muted = !muted;
  const b = document.getElementById('muteBtn');
  b.textContent = muted ? 'Unmute' : 'Mute';
  b.classList.toggle('muted-on', muted);
  setGain(+sl.value);
}
function toggleBoost() {
  boosted = !boosted;
  const b = document.getElementById('boostBtn');
  b.textContent = boosted ? '⚡ Boosted!' : '⚡ Boost';
  b.style.background = boosted ? 'linear-gradient(135deg,#ff8c00,#ffd700)' : '';
  setGain(+sl.value);
}
function resetAll() {
  muted = false; boosted = false; sl.value = 100;
  document.getElementById('muteBtn').textContent = 'Mute';
  document.getElementById('muteBtn').classList.remove('muted-on');
  document.getElementById('boostBtn').textContent = '⚡ Boost';
  document.getElementById('boostBtn').style.background = '';
  setGain(100);
}
function setP(v) { sl.value = v; setGain(v); }

// ── Visualizer ────────────────────────────────────────────────
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const fData = new Uint8Array(512 / 2);
const tData = new Uint8Array(512);
const fFloat = new Float32Array(512 / 2);

function startViz() {
  cancelAnimationFrame(rafId);
  function frame() {
    rafId = requestAnimationFrame(frame);
    const W = cv.offsetWidth, H = cv.offsetHeight;
    cv.width = W; cv.height = H;
    analyser.getByteFrequencyData(fData);
    analyser.getByteTimeDomainData(tData);
    analyser.getFloatTimeDomainData(fFloat);

    // bg
    const th = document.documentElement.dataset.theme;
    cx.fillStyle = th === 'oled' ? '#111' : th === 'light' ? '#eaeaf5' : '#22263a';
    cx.fillRect(0, 0, W, H);

    // freq bars
    const bars = fData.length;
    const bW = W / bars * 2.2;
    for (let i = 0; i < bars; i++) {
      const v = fData[i] / 255;
      const bH = v * H;
      const grad = cx.createLinearGradient(0, H, 0, H - bH);
      grad.addColorStop(0, `rgba(255,${60 + v * 100},${20},0.9)`);
      grad.addColorStop(1, `rgba(255,${140 + v * 80},0,0.5)`);
      cx.fillStyle = grad;
      cx.beginPath();
      cx.roundRect(i * (bW + 1.5), H - bH, bW, bH, 2);
      cx.fill();
    }

    // waveform
    cx.beginPath();
    cx.strokeStyle = 'rgba(255,255,255,0.3)';
    cx.lineWidth = 1.5;
    const sw = W / tData.length;
    for (let i = 0; i < tData.length; i++) {
      const y = (tData[i] / 128) * H / 2;
      i === 0 ? cx.moveTo(0, y) : cx.lineTo(i * sw, y);
    }
    cx.stroke();

    // RMS dB meter
    let sum = 0;
    for (let i = 0; i < fFloat.length; i++) sum += fFloat[i] * fFloat[i];
    const rms = Math.sqrt(sum / fFloat.length);
    const db = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
    const dbPct = isFinite(db) ? Math.min(100, Math.max(0, (db + 60) / 60 * 100)) : 0;
    document.getElementById('dbFill').style.width = dbPct + '%';
    document.getElementById('dbNum').textContent = isFinite(db) ? db.toFixed(1) + ' dB' : '−∞';
    if (db > -1.5) {
      document.getElementById('clipLbl').classList.add('on');
      clearTimeout(clipTimer);
      clipTimer = setTimeout(() => document.getElementById('clipLbl').classList.remove('on'), 700);
    }
  }
  frame();
}

function clearViz() {
  const W = cv.offsetWidth, H = cv.offsetHeight;
  cv.width = W; cv.height = H;
  const th = document.documentElement.dataset.theme;
  cx.fillStyle = th === 'oled' ? '#111' : th === 'light' ? '#eaeaf5' : '#22263a';
  cx.fillRect(0, 0, W, H);
}

// ── Helpers ───────────────────────────────────────────────────
function setStatus(type, txt) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (type ? ' ' + type : '');
  document.getElementById('statusTxt').textContent = txt;
}
function setActive(id) {
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// Resume on any interaction (autoplay policy)
document.addEventListener('click', () => { if (ctx && ctx.state === 'suspended') ctx.resume(); }, { once: false });
</script>
</body>
