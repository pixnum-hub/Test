<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Pulse — Global Status Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --bg2:      #0e0e1a;
  --glass:    rgba(255,255,255,0.04);
  --glass2:   rgba(255,255,255,0.08);
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #eeeef8;
  --text2:    #9898b8;
  --text3:    #5a5a78;
  --accent:   #4fffb0;
  --accent2:  #7b6fff;
  --danger:   #ff4d72;
  --warn:     #ffb347;
  --ok:       #4fffb0;
  --mono:     'DM Mono', monospace;
  --display:  'Outfit', sans-serif;
  --r:        16px;
  --r2:       10px;
  --ease:     cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg:      #f4f4fa;
  --bg2:     #eaeaf5;
  --glass:   rgba(255,255,255,0.7);
  --glass2:  rgba(255,255,255,0.9);
  --border:  rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text:    #0e0e1a;
  --text2:   #4a4a6a;
  --text3:   #9898b8;
  --accent:  #00c97a;
  --accent2: #5b4fcc;
  --danger:  #e0284f;
  --warn:    #d4820a;
  --ok:      #00c97a;
}
[data-theme="oled"] {
  --bg:      #000000;
  --bg2:     #070707;
  --glass:   rgba(255,255,255,0.03);
  --glass2:  rgba(255,255,255,0.06);
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text:    #ffffff;
  --text2:   #888888;
  --text3:   #444444;
  --accent:  #00ffb0;
  --accent2: #9d8fff;
  --danger:  #ff2255;
  --warn:    #ffaa00;
  --ok:      #00ffb0;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background .3s var(--ease), color .3s var(--ease);
}

/* ── ANIMATED BACKGROUND ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(79,255,176,.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 90% 80%, rgba(123,111,255,.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,77,114,.03) 0%, transparent 70%);
}

/* ── LAYOUT ── */
.page { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 20px; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:24px 0 20px; gap:16px; flex-wrap:wrap;
}
.brand { display:flex; flex-direction:column; gap:4px; }
.brand-name {
  font-size: clamp(1.4rem,4vw,2rem);
  font-weight:700; letter-spacing:-0.04em; line-height:1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.brand-sub {
  font-family:var(--mono); font-size:.6rem; color:var(--text3);
  letter-spacing:.2em; text-transform:uppercase;
}

/* Theme toggle */
.theme-toggle {
  display:flex; background:var(--glass); border:1px solid var(--border);
  border-radius:40px; padding:4px; gap:2px; backdrop-filter:blur(12px);
}
.theme-btn {
  background:transparent; border:none; cursor:pointer;
  border-radius:30px; padding:6px 12px;
  font-size:.68rem; font-family:var(--mono); color:var(--text2);
  transition:all .25s var(--ease); white-space:nowrap;
}
.theme-btn.active { background:var(--accent); color:#000; font-weight:500; }

/* ── URL INPUT CARD ── */
.input-card {
  background:var(--glass); border:1px solid var(--border2);
  border-radius:var(--r); padding:20px; margin-bottom:14px;
  backdrop-filter:blur(16px);
  transition:background .3s, border-color .3s;
}
.input-label {
  font-family:var(--mono); font-size:.58rem; letter-spacing:.2em;
  text-transform:uppercase; color:var(--text3); margin-bottom:10px; display:block;
}
.input-row { display:flex; gap:10px; }
.url-input {
  flex:1; min-width:0;
  background:rgba(0,0,0,.25); border:1px solid var(--border2);
  border-radius:var(--r2); padding:13px 18px;
  font-family:var(--mono); font-size:.85rem; color:var(--text);
  outline:none; transition:border-color .2s, background .2s;
}
.url-input::placeholder { color:var(--text3); }
.url-input:focus { border-color:var(--accent); background:rgba(79,255,176,.04); }
.check-btn {
  background:var(--accent); color:#000; border:none;
  border-radius:var(--r2); padding:13px 22px;
  font-family:var(--display); font-weight:700; font-size:.85rem;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:opacity .2s, transform .2s, box-shadow .2s;
  box-shadow:0 0 20px rgba(79,255,176,.3);
}
.check-btn:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 30px rgba(79,255,176,.5); }
.check-btn:active { transform:translateY(0); }
.check-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

/* ── RESULT CARD ── */
.result-card {
  background:var(--glass); border:1px solid var(--border2);
  border-radius:var(--r); padding:20px; margin-bottom:14px;
  display:none; backdrop-filter:blur(16px);
  animation:slideUp .3s var(--ease);
}
.result-card.visible { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.result-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.result-favicon {
  width:44px; height:44px; border-radius:10px;
  background:var(--glass2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0; position:relative;
}
.result-favicon img { width:28px; height:28px; object-fit:contain; }
.result-favicon .fallback-icon { font-size:1.3rem; }
.status-ring {
  width:44px; height:44px; flex-shrink:0; position:relative;
}
.status-ring svg { width:44px; height:44px; transform:rotate(-90deg); }
.status-ring-bg { fill:none; stroke:var(--border2); stroke-width:3; }
.status-ring-fill { fill:none; stroke-width:3; stroke-linecap:round;
  stroke-dasharray:113; stroke-dashoffset:113; transition:stroke-dashoffset 1s var(--ease); }
.status-ring-fill.ok   { stroke:var(--ok); }
.status-ring-fill.warn { stroke:var(--warn); }
.status-ring-fill.error{ stroke:var(--danger); }
.status-ring-dot {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:8px; height:8px; border-radius:50%;
}
.status-ring-dot.ok    { background:var(--ok);     box-shadow:0 0 8px var(--ok); }
.status-ring-dot.warn  { background:var(--warn);   box-shadow:0 0 8px var(--warn); }
.status-ring-dot.error { background:var(--danger); box-shadow:0 0 8px var(--danger); }
.status-ring-dot.ok { animation:glowPulse 2s infinite; }
@keyframes glowPulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.result-info { flex:1; min-width:0; }
.result-status-text { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
.result-url { font-family:var(--mono); font-size:.65rem; color:var(--text3); margin-top:3px; word-break:break-all; }

.metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.metric-card {
  background:rgba(0,0,0,.2); border:1px solid var(--border);
  border-radius:var(--r2); padding:14px 12px; text-align:center;
}
.metric-val { font-family:var(--mono); font-size:1.1rem; font-weight:500; display:block; letter-spacing:-.02em; }
.metric-lbl { font-family:var(--mono); font-size:.55rem; color:var(--text3); letter-spacing:.12em; text-transform:uppercase; margin-top:4px; display:block; }

.detail-table { width:100%; border-collapse:collapse; }
.detail-table tr { border-bottom:1px solid var(--border); }
.detail-table tr:last-child { border-bottom:none; }
.detail-table td { padding:9px 2px; font-size:.75rem; vertical-align:top; }
.detail-table td:first-child { font-family:var(--mono); color:var(--text3); font-size:.65rem; letter-spacing:.06em; width:130px; padding-right:12px; padding-top:11px; }
.detail-table td:last-child { font-family:var(--mono); }

.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-family:var(--mono); font-size:.68rem; font-weight:500; }
.badge-ok   { background:rgba(79,255,176,.15); color:var(--ok); }
.badge-warn { background:rgba(255,179,71,.15);  color:var(--warn); }
.badge-err  { background:rgba(255,77,114,.15);  color:var(--danger); }

/* ── CHECKING CARD ── */
.checking-card {
  background:var(--glass); border:1px solid var(--border2);
  border-radius:var(--r); padding:30px 20px; margin-bottom:14px;
  display:none; flex-direction:column; align-items:center; gap:14px;
  backdrop-filter:blur(16px); text-align:center;
}
.checking-card.visible { display:flex; }
.scan-ring {
  width:56px; height:56px; border-radius:50%;
  border:3px solid var(--border2); border-top-color:var(--accent);
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.checking-label { font-family:var(--mono); font-size:.72rem; color:var(--text2); }
.checking-url-text { font-family:var(--mono); font-size:.7rem; color:var(--accent); word-break:break-all; }

/* ── AUTO REFRESH ── */
.auto-row {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
  background:var(--glass); border:1px solid var(--border);
  border-radius:var(--r2); padding:12px 16px; backdrop-filter:blur(8px);
  flex-wrap:wrap;
}
.auto-label { font-family:var(--mono); font-size:.68rem; color:var(--text2); flex:1; letter-spacing:.04em; }
.countdown-badge { font-family:var(--mono); font-size:.65rem; color:var(--accent2); display:none; }
.auto-select {
  background:rgba(0,0,0,.3); border:1px solid var(--border2); color:var(--text);
  border-radius:6px; padding:5px 10px; font-family:var(--mono); font-size:.68rem; outline:none; cursor:pointer;
}
.toggle { position:relative; width:36px; height:20px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position:absolute; inset:0; background:var(--border2); border-radius:20px; cursor:pointer;
  transition:background .25s;
}
.toggle-slider::before {
  content:''; position:absolute; left:3px; top:3px;
  width:14px; height:14px; background:#fff; border-radius:50%;
  transition:transform .25s;
}
.toggle input:checked + .toggle-slider { background:var(--accent2); }
.toggle input:checked + .toggle-slider::before { transform:translateX(16px); }

/* ── BULK CONTROLS ── */
.bulk-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px; flex-wrap:wrap; gap:12px;
}
.bulk-header-left { display:flex; flex-direction:column; gap:4px; }
.bulk-title { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
.bulk-subtitle { font-family:var(--mono); font-size:.6rem; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; }
.bulk-controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

.btn-check-all {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000; border:none; border-radius:var(--r2); padding:11px 20px;
  font-family:var(--display); font-weight:700; font-size:.82rem;
  cursor:pointer; white-space:nowrap;
  box-shadow:0 0 24px rgba(79,255,176,.25);
  transition:opacity .2s, transform .2s, box-shadow .2s;
}
.btn-check-all:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 6px 30px rgba(79,255,176,.4); }
.btn-check-all:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

.btn-stop {
  background:rgba(255,77,114,.15); color:var(--danger);
  border:1px solid rgba(255,77,114,.3); border-radius:var(--r2);
  padding:11px 20px; font-family:var(--display); font-weight:700;
  font-size:.82rem; cursor:pointer; display:none;
  transition:background .2s;
}
.btn-stop:hover { background:rgba(255,77,114,.25); }

/* Progress */
.progress-wrap { margin-bottom:14px; display:none; }
.progress-track { height:5px; background:var(--border); border-radius:10px; overflow:hidden; margin-bottom:6px; }
.progress-fill {
  height:100%; width:0%; border-radius:10px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .4s var(--ease);
  box-shadow:0 0 12px rgba(79,255,176,.5);
}
.progress-meta { display:flex; justify-content:space-between; align-items:center; }
.progress-text { font-family:var(--mono); font-size:.62rem; color:var(--text3); }
.progress-pct  { font-family:var(--mono); font-size:.62rem; color:var(--accent); font-weight:500; }

/* Summary stats */
.bulk-stats {
  display:none; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:16px;
}
.bulk-stats.visible { display:grid; }
.bstat {
  background:var(--glass); border:1px solid var(--border);
  border-radius:var(--r2); padding:14px 10px; text-align:center;
  backdrop-filter:blur(8px);
}
.bstat-num { font-family:var(--mono); font-size:1.3rem; font-weight:500; display:block; line-height:1; }
.bstat-lbl { font-family:var(--mono); font-size:.55rem; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-top:5px; display:block; }

/* Filter tabs */
.filter-bar {
  display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center;
}
.search-box {
  flex:1; min-width:160px;
  background:var(--glass); border:1px solid var(--border2);
  border-radius:var(--r2); padding:9px 14px;
  font-family:var(--mono); font-size:.75rem; color:var(--text);
  outline:none; backdrop-filter:blur(8px);
  transition:border-color .2s;
}
.search-box::placeholder { color:var(--text3); }
.search-box:focus { border-color:var(--accent); }
.ftab {
  background:var(--glass); border:1px solid var(--border);
  border-radius:20px; padding:6px 14px;
  font-family:var(--mono); font-size:.65rem; color:var(--text3);
  cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.ftab:hover { border-color:var(--border2); color:var(--text2); }
.ftab.f-all   { }
.ftab.active-all   { background:var(--glass2); border-color:var(--border2); color:var(--text); }
.ftab.active-ok    { background:rgba(79,255,176,.12); border-color:var(--ok);    color:var(--ok); }
.ftab.active-warn  { background:rgba(255,179,71,.12);  border-color:var(--warn);  color:var(--warn); }
.ftab.active-error { background:rgba(255,77,114,.12);  border-color:var(--danger);color:var(--danger); }

/* ── CATEGORY SECTIONS ── */
.cat-section { margin-bottom:28px; }
.cat-header {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
}
.cat-icon { font-size:1.1rem; line-height:1; }
.cat-name { font-size:.8rem; font-weight:600; letter-spacing:-.01em; }
.cat-count { font-family:var(--mono); font-size:.6rem; color:var(--text3); margin-left:auto; }

/* ── SITE CARDS ── */
.sites-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }

@media (max-width:480px) { .sites-grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; } }

.site-card {
  background:var(--glass); border:1px solid var(--border);
  border-radius:var(--r2); padding:14px 12px;
  cursor:pointer; transition:all .2s var(--ease);
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; gap:8px;
  backdrop-filter:blur(8px);
}
.site-card::before {
  content:''; position:absolute; inset:0; opacity:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  transition:opacity .2s; pointer-events:none;
}
.site-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.3); }
.site-card:hover::before { opacity:.04; }
.site-card:active { transform:translateY(0); }

/* Status state styles */
.site-card.s-ok    { border-left:2px solid var(--ok); }
.site-card.s-warn  { border-left:2px solid var(--warn); }
.site-card.s-error { border-left:2px solid var(--danger); }
.site-card.s-checking { border-left:2px solid var(--accent2); }
.site-card.s-ok::before    { background:linear-gradient(135deg,var(--ok),transparent); opacity:.04; }
.site-card.s-error::before { background:linear-gradient(135deg,var(--danger),transparent); opacity:.05; }

.card-top { display:flex; align-items:center; gap:9px; }
.card-favicon {
  width:32px; height:32px; border-radius:8px;
  background:var(--glass2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0; font-size:.9rem;
  position:relative;
}
.card-favicon img {
  width:20px; height:20px; object-fit:contain;
  border-radius:3px;
}
.card-favicon-fallback { font-size:1rem; line-height:1; }

.card-meta { flex:1; min-width:0; }
.card-name {
  font-size:.78rem; font-weight:600; letter-spacing:-.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:block;
}
.card-domain {
  font-family:var(--mono); font-size:.56rem; color:var(--text3);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:block; margin-top:2px;
}

.card-status-row { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.card-status-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background:var(--border2);
}
.s-ok    .card-status-dot { background:var(--ok);    box-shadow:0 0 6px var(--ok); }
.s-warn  .card-status-dot { background:var(--warn);  box-shadow:0 0 6px var(--warn); }
.s-error .card-status-dot { background:var(--danger);box-shadow:0 0 6px var(--danger); }
.s-checking .card-status-dot { background:var(--accent2); animation:blinkDot 1s infinite; }
@keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:.2} }

.card-status-text { font-family:var(--mono); font-size:.58rem; color:var(--text3); flex:1; }
.s-ok    .card-status-text { color:var(--ok); }
.s-warn  .card-status-text { color:var(--warn); }
.s-error .card-status-text { color:var(--danger); }
.s-checking .card-status-text { color:var(--accent2); }

.card-latency { font-family:var(--mono); font-size:.56rem; color:var(--text3); flex-shrink:0; }
.s-ok   .card-latency { color:var(--text2); }

/* Scan shimmer for checking state */
.site-card.s-checking::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(123,111,255,.08),transparent);
  animation:shimmer 1.2s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

/* ── HISTORY ── */
.history-section { margin-top:28px; }
.section-title {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.section-label { font-family:var(--mono); font-size:.6rem; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; }
.clear-btn {
  background:none; border:none; color:var(--text3); font-family:var(--mono);
  font-size:.6rem; cursor:pointer; letter-spacing:.06em;
  transition:color .2s;
}
.clear-btn:hover { color:var(--danger); }
.history-list { display:flex; flex-direction:column; gap:6px; }
.history-item {
  background:var(--glass); border:1px solid var(--border);
  border-radius:var(--r2); padding:12px 14px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer; transition:all .2s var(--ease);
  backdrop-filter:blur(8px);
}
.history-item:hover { border-color:var(--border2); transform:translateX(3px); }
.h-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.h-dot.ok    { background:var(--ok);    box-shadow:0 0 6px var(--ok); }
.h-dot.warn  { background:var(--warn);  box-shadow:0 0 6px var(--warn); }
.h-dot.error { background:var(--danger);box-shadow:0 0 6px var(--danger); }
.h-favicon {
  width:24px; height:24px; border-radius:5px;
  background:var(--glass2); display:flex; align-items:center;
  justify-content:center; overflow:hidden; flex-shrink:0; font-size:.75rem;
}
.h-favicon img { width:16px; height:16px; object-fit:contain; }

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

      <span class="progress-pct"  id="progressPct">0%</span>
    </div>
  </div>

/* ──────────────────────────────────────────────
   UTILS
────────────────────────────────────────────── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function normalizeUrl(u) {
  u = u.trim();
  if (!u) return '';
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  try { new URL(u); return u; } catch { return ''; }
}
function formatMs(ms) {
  if (ms == null) return '—';
  return ms < 1000 ? ms + ' ms' : (ms/1000).toFixed(2) + ' s';
}
function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 5)    return 'just now';
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
}
function getFaviconUrl(url) {
  try {
    const u = new URL(url);
    return 'https://www.google.com/s2/favicons?domain=' + u.hostname + '&sz=64';
  } catch { return ''; }
}
function statusLabel(code) {
  if (!code) return { text:'Unreachable', cls:'error', desc:'Cannot connect' };
  if (code===200) return { text:'Online', cls:'ok', desc:'Fully operational' };
  if (code>=200 && code<300) return { text:'Online ('+code+')', cls:'ok', desc:'2xx success' };
  if (code===301||code===302) return { text:'Redirecting', cls:'warn', desc:'Redirect '+code };
  if (code>=300 && code<400) return { text:'Redirect '+code, cls:'warn', desc:'3xx redirect' };
  if (code===401) return { text:'Auth Required', cls:'warn', desc:'Needs login — site is up' };
  if (code===403) return { text:'Forbidden', cls:'warn', desc:'Access denied — site is up' };
  if (code===404) return { text:'Not Found', cls:'error', desc:'Page missing' };
  if (code===429) return { text:'Rate Limited', cls:'warn', desc:'Too many requests' };
  if (code>=400 && code<500) return { text:'Client Error', cls:'error', desc:'4xx error' };
  if (code===500) return { text:'Server Error', cls:'error', desc:'Internal server error' };
  if (code===502) return { text:'Bad Gateway', cls:'error', desc:'Upstream failure' };
  if (code===503) return { text:'Unavailable', cls:'error', desc:'Service down' };
  if (code===504) return { text:'Timeout', cls:'error', desc:'Gateway timed out' };
  if (code>=500)  return { text:'Server Error '+code, cls:'error', desc:'5xx error' };
  return { text:'Unknown '+code, cls:'warn', desc:'Unexpected status' };
}

────────────────────────────────────────────── */
function faviconImg(url, size='20px') {
  const src = getFaviconUrl(url);
  const dom = getDomain(url);
  const letter = dom.charAt(0).toUpperCase();
  return `<img src="${esc(src)}" width="${size}" height="${size}"
    onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
    style="border-radius:3px">
  <span style="display:none;font-size:.9rem">${letter}</span>`;
}

/* ──────────────────────────────────────────────
   SINGLE CHECK
────────────────────────────────────────────── */
async function checkUrl() {
  const raw = document.getElementById('urlInput').value;
  const url = normalizeUrl(raw);
  if (!url) { shake(document.getElementById('urlInput')); return; }
  lastUrl = url;
  await runCheck(url);
}

async function runCheck(url) {
  if (isSingleCheck) return;
  isSingleCheck = true;
  const btn = document.getElementById('checkBtn');
  btn.disabled = true; btn.textContent = 'Checking…';
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('checkingCard').classList.add('visible');
  document.getElementById('checkingUrl').textContent = url;

  const r = await probeUrl(url);
  document.getElementById('checkingCard').classList.remove('visible');
  renderResult(r);
  addHistory(r);
  btn.disabled = false; btn.textContent = 'Check';
  isSingleCheck = false;
}

async function probeUrl(url) {
  const r = { url, ts:Date.now(), code:null, ok:false, redirected:false,
    finalUrl:url, latency:null, contentType:null, server:null, error:null, method:'—' };
  const t0 = performance.now();

  // ── Strategy 1: corsproxy.io (full HTTP status) ──
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 8000);
    const res  = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {
      signal:ctrl.signal, cache:'no-store'
    });
    clearTimeout(tid);
    // corsproxy itself returned — check it's not a proxy error page
    if (res.status !== 0) {
      r.latency     = Math.round(performance.now() - t0);
      r.code        = res.status;
      r.ok          = res.ok;
      r.redirected  = res.redirected;
      r.method      = 'Proxy';
      try { r.finalUrl = decodeURIComponent(res.url.replace(/^https:\/\/corsproxy\.io\/\?/,'')); } catch{}
      r.contentType = res.headers.get('content-type');
      r.server      = res.headers.get('server') || res.headers.get('x-powered-by');
      return r;
    }
  } catch(e1) { /* fall through */ }

  // ── Strategy 2: allorigins.win ──
  try {
    const ctrl2 = new AbortController();
    const tid2  = setTimeout(() => ctrl2.abort(), 7000);
    const res2  = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), {
      signal:ctrl2.signal, cache:'no-store'
    });
    clearTimeout(tid2);
    r.latency = Math.round(performance.now() - t0);
    if (res2.ok) {
      const j = await res2.json();
      r.code   = j.status?.http_code || 200;
      r.ok     = r.code >= 200 && r.code < 300;
      r.method = 'Proxy2';
      return r;
    }
  } catch(e2) { /* fall through */ }

  // ── Strategy 3: no-cors image/fetch probe (reachability only, no status code) ──
  try {
    await new Promise((resolve, reject) => {
      const img = new Image();
      const tid3 = setTimeout(() => { img.src=''; reject(new Error('timeout')); }, 6000);
      img.onload = () => { clearTimeout(tid3); resolve('load'); };
      img.onerror = () => { clearTimeout(tid3); resolve('error'); }; // error = server responded!
      img.src = url + '/favicon.ico?_nc=' + Date.now();
    });
    r.latency = Math.round(performance.now() - t0);
    // Got any response (even 404/error) = server is reachable
    r.ok     = true;
    r.code   = null; // can't read status from no-cors
    r.method = 'Probe';
    return r;
  } catch(e3) { /* fall through */ }

  // ── Strategy 4: script tag probe ──
  try {
    await new Promise((resolve, reject) => {
      const s   = document.createElement('script');
      const tid4 = setTimeout(() => { s.remove(); reject(new Error('timeout')); }, 5000);
      s.onload = s.onerror = () => { clearTimeout(tid4); s.remove(); resolve(); };
      s.src = url + '/robots.txt?_nc=' + Date.now();
      document.head.appendChild(s);
    });
    r.latency = Math.round(performance.now() - t0);
    r.ok     = true;
    r.code   = null;
    r.method = 'Probe2';
    return r;
  } catch(e4) { /* fall through */ }

  // ── Strategy 4: no-cors direct fetch ──
  try {
    const ctrl4 = new AbortController();
    const tid4  = setTimeout(() => ctrl4.abort(), 5000);
    await fetch(url, {mode:'no-cors', signal:ctrl4.signal, cache:'no-store'});
    clearTimeout(tid4);
    r.latency = Math.round(performance.now() - t0);
    r.ok     = true;
    r.code   = null;
    r.method = 'No-CORS';
    return r;
  } catch(e5) { /* fall through */ }

  // ── All strategies failed ──
  r.latency = Math.round(performance.now() - t0);
  r.error   = 'Unreachable — all probes failed';
  r.method  = '—';
  return r;
}

/* ──────────────────────────────────────────────
   RENDER RESULT
────────────────────────────────────────────── */
function renderResult(r) {
  const s = r.code
    ? statusLabel(r.code)
    : r.ok
      ? { text:'Reachable ✓', cls:'ok', desc:'Server responded — status hidden by CORS (site is UP)' }
      : { text:r.error||'Unreachable', cls:'error', desc:'All probes failed — site may be down or offline' };

  // Favicon
  const fav = document.getElementById('resultFavicon');
  fav.innerHTML = `<img src="${esc(getFaviconUrl(r.url))}" width="28" height="28" style="border-radius:4px"
    onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="fallback-icon" style="display:none">🌐</span>`;

  // Status ring
  const fill = document.getElementById('statusRingFill');
  const dot  = document.getElementById('statusRingDot');
  fill.className = 'status-ring-fill ' + s.cls;
  dot.className  = 'status-ring-dot '  + s.cls;
  requestAnimationFrame(() => {
    fill.style.strokeDashoffset = s.cls === 'ok' ? '0' : s.cls === 'warn' ? '40' : '80';
  });

  document.getElementById('resultStatusText').textContent = s.text;
  document.getElementById('resultUrl').textContent = r.url;

  const latCls = !r.latency ? 'text3' : r.latency < 500 ? 'ok' : r.latency < 2000 ? 'warn' : 'danger';
  const codeCls = !r.code ? 'text3' : r.ok ? 'ok' : s.cls === 'warn' ? 'warn' : 'danger';
  document.getElementById('metricsRow').innerHTML = `
    <div class="metric-card">
      <span class="metric-val" style="color:var(--${latCls})">${formatMs(r.latency)}</span>
      <span class="metric-lbl">Latency</span>
    </div>
    <div class="metric-card">
      <span class="metric-val" style="color:var(--${codeCls})">${r.code||'—'}</span>
      <span class="metric-lbl">HTTP Code</span>
    </div>
    <div class="metric-card">
      <span class="metric-val" style="font-size:.85rem;color:var(--accent2)">${new Date(r.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
      <span class="metric-lbl">Checked At</span>
    </div>`;

  const bcls = s.cls==='ok'?'badge-ok':s.cls==='warn'?'badge-warn':'badge-err';
  let cleanFinal = r.finalUrl||r.url;
  try { cleanFinal = decodeURIComponent(cleanFinal.replace(/^https:\/\/corsproxy\.io\/\?/,'')); } catch{}
  const rows = [
    ['Status',       `<span class="badge ${bcls}">${esc(s.text)}</span>`],
    ['Description',  esc(s.desc)],
    ['HTTP Code',    r.code ? String(r.code) : '—'],
    ['Latency',      formatMs(r.latency)],
    ['Redirected',   r.redirected ? 'Yes' : 'No'],
    ['Final URL',    esc(cleanFinal.length>52 ? cleanFinal.slice(0,52)+'…' : cleanFinal)],
    ['Content-Type', esc(r.contentType||'—')],
    ['Server',       esc(r.server||'—')],
    ['Checked',      new Date(r.ts).toLocaleString()],
  ];
  document.getElementById('detailTable').innerHTML =
    rows.map(([k,v]) => `<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('');

  document.getElementById('resultCard').classList.add('visible');
}

function shake(el) {
  el.style.animation='none'; void el.offsetHeight;
  el.style.animation='shakeX .4s ease';
  el.style.borderColor='var(--danger)';
  setTimeout(()=>{ el.style.borderColor=''; el.style.animation=''; },600);
}

/* ──────────────────────────────────────────────
   HISTORY
────────────────────────────────────────────── */
function addHistory(r) {
  siteHistory = siteHistory.filter(h => h.url !== r.url);
  siteHistory.unshift(r);
  if (siteHistory.length > 30) siteHistory = siteHistory.slice(0,30);
  try { localStorage.setItem('uphist', JSON.stringify(siteHistory)); } catch{}
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!siteHistory.length) {
    el.innerHTML = '<div class="empty-state">No checks yet</div>'; return;
  }
  el.innerHTML = siteHistory.map(r => {
    const s = r.code ? statusLabel(r.code) : r.ok ? {cls:'warn'} : {cls:'error'};
    const codeTxt = r.code || (r.ok ? '2xx' : '—');
    return `<div class="history-item" onclick="recheckHistory('${esc(r.url)}')">
      <div class="h-dot ${s.cls}"></div>
      <div class="h-favicon">${faviconImg(r.url,'16px')}</div>
      <span class="h-url" title="${esc(r.url)}">${esc(r.url)}</span>
      <div class="h-meta">
        <div class="h-code ${s.cls}">${codeTxt}</div>
        <div>${formatMs(r.latency)}</div>
        <div>${timeAgo(r.ts)}</div>
      </div>
    </div>`;
  }).join('');
}
function clearHistory() {
  siteHistory = [];
  try { localStorage.removeItem('uphist'); } catch{}
  renderHistory();
}
function recheckHistory(url) {
  const real = url.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'");
  document.getElementById('urlInput').value = real;
  lastUrl = real;
  runCheck(real);
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') checkUrl(); });

/* ──────────────────────────────────────────────
   AUTO REFRESH
────────────────────────────────────────────── */
function setupAutoRefresh() {
  clearInterval(autoTimer); clearInterval(countdownInt);
  autoTimer = countdownInt = null;
  const badge = document.getElementById('countdownBadge');
  badge.style.display = 'none';
  const enabled = document.getElementById('autoToggle').checked;
  const secs    = parseInt(document.getElementById('autoSelect').value)||0;
  if (!enabled || !secs) return;
  let rem = secs;
  const fmt = s => s<60 ? s+'s' : Math.floor(s/60)+'m '+(s%60)+'s';
  badge.style.display='block'; badge.textContent='next: '+fmt(rem);
  countdownInt = setInterval(()=>{ rem--; if(rem<=0)rem=secs; badge.textContent='next: '+fmt(rem); },1000);
  autoTimer    = setInterval(()=>{ if(lastUrl&&!isSingleCheck) runCheck(lastUrl); }, secs*1000);
}

/* ──────────────────────────────────────────────
   SITES GRID
────────────────────────────────────────────── */
function buildSitesGrid() {
  const container = document.getElementById('sitesContainer');
  const groups = {};
  SITES.forEach(s => {
    if (!groups[s.g]) groups[s.g] = [];
    groups[s.g].push(s);
  });
  Object.values(groups).forEach(arr => arr.sort((a,b)=>a.name.localeCompare(b.name)));

  const cats = [
    ...CATEGORY_ORDER.filter(c=>groups[c]),
    ...Object.keys(groups).filter(c=>!CATEGORY_ORDER.includes(c)).sort()
  ];

  container.innerHTML = cats.map(cat => {
    const sites = groups[cat];
    const icon  = CAT_ICONS[cat]||'🌍';
    const cards = sites.map(s => {
      const dom = getDomain(s.url);
      return `<div class="site-card" id="card-${btoa(s.url).replace(/[^a-z0-9]/gi,'_')}"
        data-siteurl="${esc(s.url)}" data-name="${esc(s.name)}" data-cat="${esc(cat)}">
        <div class="card-top">
          <div class="card-favicon">
            <img src="${esc(getFaviconUrl(s.url))}" width="20" height="20" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
              style="border-radius:3px">
            <span class="card-favicon-fallback" style="display:none">${icon}</span>
          </div>
          <div class="card-meta">
            <span class="card-name">${esc(s.name)}</span>
            <span class="card-domain">${esc(dom)}</span>
          </div>
        </div>
        <div class="card-status-row">
          <div class="card-status-dot"></div>
          <span class="card-status-text">—</span>
          <span class="card-latency"></span>
        </div>
      </div>`;
    }).join('');
    return `<div class="cat-section" data-cat="${esc(cat)}">
      <div class="cat-header">
        <span class="cat-icon">${icon}</span>
        <span class="cat-name">${esc(cat)}</span>
        <span class="cat-count">${sites.length} sites</span>
      </div>
      <div class="sites-grid">${cards}</div>
    </div>`;
  }).join('');

  // Click delegation
  container.addEventListener('click', e => {
    const card = e.target.closest('.site-card');
    if (card) {
      const url = card.getAttribute('data-siteurl');
      if (url) {
        document.getElementById('urlInput').value = url;
        lastUrl = url;
        window.scrollTo({top:0,behavior:'smooth'});
        runCheck(url);
      }
    }
  });
}

/* ──────────────────────────────────────────────
   SEARCH & STATUS FILTER
────────────────────────────────────────────── */
function applyFilters() {
  const q = (document.getElementById('searchBox').value||'').toLowerCase().trim();
  document.querySelectorAll('.site-card').forEach(card => {
    const name = (card.dataset.name||'').toLowerCase();
    const url  = (card.dataset.siteurl||'').toLowerCase();
    const cat  = (card.dataset.cat||'').toLowerCase();
    const matchSearch = !q || name.includes(q) || url.includes(q) || cat.includes(q);
    const r    = bulkResults[card.dataset.siteurl];
    const matchStatus = statusFilter==='all' || (r && r.cls===statusFilter);
    card.style.display = (matchSearch && matchStatus) ? '' : 'none';
  });
  document.querySelectorAll('.cat-section').forEach(sec => {
    const visible = Array.from(sec.querySelectorAll('.site-card')).some(c=>c.style.display!=='none');
    sec.style.display = visible ? '' : 'none';
  });
  // update count
  const visible = document.querySelectorAll('.site-card:not([style*="none"])').length;
  document.getElementById('sitesCountLabel').textContent = visible + ' sites shown';
}

function setStatusFilter(f) {
  statusFilter = f;
  ['all','ok','warn','error'].forEach(key => {
    const el = document.getElementById('ft'+key.charAt(0).toUpperCase()+key.slice(1));
    if (!el) return;
    el.className = 'ftab' + (key===f ? ' active-'+f : '');
  });
  applyFilters();
}

function getCardEl(url) {
  return document.querySelector(`.site-card[data-siteurl="${url.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"]`);
}
function setCardState(url, cls, statusText, latency) {
  const card = getCardEl(url);
  if (!card) return;
  card.className = 'site-card s-' + cls;
  const dot  = card.querySelector('.card-status-dot');
  const txt  = card.querySelector('.card-status-text');
  const lat  = card.querySelector('.card-latency');
  if (dot) dot.className = 'card-status-dot';
  if (txt) txt.textContent = statusText;
  if (lat) lat.textContent = latency != null ? latency+'ms' : '';
}
function setCardChecking(url) {
  const card = getCardEl(url);
  if (!card) return;
  card.className = 'site-card s-checking';
  const txt = card.querySelector('.card-status-text');
  if (txt) txt.textContent = 'Checking…';
}

async function startBulkCheck() {
  if (bulkRunning) return;
  bulkRunning = true; bulkStopped = false; bulkResults = {};
  statusFilter = 'all';

  document.getElementById('bulkStartBtn').disabled = true;
  document.getElementById('bulkStopBtn').style.display = 'inline-block';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('bulkStats').classList.remove('visible');
  document.querySelectorAll('.ftab').forEach(b => b.className='ftab');
  document.getElementById('ftAll').className = 'ftab active-all';

  // Reset all cards
  document.querySelectorAll('.site-card').forEach(c => {
    c.className = 'site-card';
    c.style.display = '';
    const txt = c.querySelector('.card-status-text');
    const lat = c.querySelector('.card-latency');
    if (txt) txt.textContent = '—';
    if (lat) lat.textContent = '';
  });
  document.querySelectorAll('.cat-section').forEach(s=>s.style.display='');

  const sites = SITES.slice();
  const total = sites.length;
  let done=0, nOk=0, nWarn=0, nErr=0;
  const latencies = [];

  function updateProgress() {
    const pct = Math.round((done/total)*100);
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = done+' / '+total+' sites checked';
    document.getElementById('progressPct').textContent  = pct+'%';
    document.getElementById('bsChecked').textContent = done;
    document.getElementById('bsOnline').textContent  = nOk;
    document.getElementById('bsWarn').textContent    = nWarn;
    document.getElementById('bsError').textContent   = nErr;
    const avg = latencies.length ? Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length) : 0;
    document.getElementById('bsAvg').textContent = latencies.length ? avg+'ms' : '—';
    document.getElementById('bulkStats').classList.add('visible');
  }

  async function checkOneSite(site) {
    if (bulkStopped) return;
    setCardChecking(site.url);
    const t0 = performance.now();
    let cls='error', code=null, lat=null, statusTxt='Down', resolved=false;

    // ── Strategy 1: corsproxy.io (real HTTP status) ──
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(()=>ctrl.abort(), 8000);
      const res  = await fetch('https://corsproxy.io/?'+encodeURIComponent(site.url),
        {signal:ctrl.signal, cache:'no-store'});
      clearTimeout(tid);
      lat = Math.round(performance.now()-t0);
      code = res.status;
      resolved = true;
      if      (code>=200&&code<300){ cls='ok';   nOk++;   statusTxt='Online'; }
      else if (code===401)         { cls='warn'; nWarn++; statusTxt='Auth Required'; }
      else if (code===403)         { cls='warn'; nWarn++; statusTxt='Restricted'; }
      else if (code===429)         { cls='warn'; nWarn++; statusTxt='Rate Limited'; }
      else if (code>=300&&code<400){ cls='warn'; nWarn++; statusTxt='Redirect '+code; }
      else                         { cls='error';nErr++;  statusTxt='Error '+code; }
      latencies.push(lat);
    } catch(e1){ /* next */ }

    // ── Strategy 2: allorigins.win ──
    if (!resolved && !bulkStopped) {
      try {
        const c2 = new AbortController();
        const t2 = setTimeout(()=>c2.abort(), 7000);
        const r2 = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(site.url),
          {signal:c2.signal, cache:'no-store'});
        clearTimeout(t2);
        lat = Math.round(performance.now()-t0);
        if (r2.ok) {
          const j = await r2.json();
          code = j.status?.http_code || 200;
          resolved = true;
          if      (code>=200&&code<300){ cls='ok';   nOk++;   statusTxt='Online'; }
          else if (code>=300&&code<500){ cls='warn'; nWarn++; statusTxt=''+code; }
          else                         { cls='error';nErr++;  statusTxt='Error '+code; }
          latencies.push(lat);
        }
      } catch(e2){ /* next */ }
    }

    // ── Strategy 3: no-cors image probe — any server response = reachable ──
    if (!resolved && !bulkStopped) {
      try {
        await new Promise((resolve, reject) => {
          const img = new Image();
          const tid = setTimeout(()=>{ img.src=''; reject(); }, 5000);
          img.onload  = ()=>{ clearTimeout(tid); resolve(); };
          img.onerror = ()=>{ clearTimeout(tid); resolve(); }; // 404 still means server is UP
          img.src = site.url + '/favicon.ico?_nc=' + Date.now();
        });
        lat = Math.round(performance.now()-t0);
        resolved = true;
        cls='warn'; nWarn++;
        statusTxt='Reachable';
        latencies.push(lat);
      } catch(e3){ /* next */ }
    }

    // ── Strategy 4: no-cors fetch probe ──
    if (!resolved && !bulkStopped) {
      try {
        const ctrl4 = new AbortController();
        const tid4  = setTimeout(()=>ctrl4.abort(), 5000);
        await fetch(site.url, {mode:'no-cors', signal:ctrl4.signal, cache:'no-store'});
        clearTimeout(tid4);
        lat = Math.round(performance.now()-t0);
        resolved = true;
        cls='warn'; nWarn++;
        statusTxt='Reachable';
        latencies.push(lat);
      } catch(e4){
        // AbortError or TypeError — distinguish timeout vs network
        lat = Math.round(performance.now()-t0);
        if (e4.name === 'AbortError') {
          cls='error'; nErr++; statusTxt='Timeout';
        } else {
          cls='error'; nErr++; statusTxt='Down';
        }
      }
    }

    if (!bulkStopped) {
      bulkResults[site.url] = {cls, code, latency:lat};
      setCardState(site.url, cls, statusTxt, lat);
      done++;
      updateProgress();
    }
  }

  async function runPool() {
    let idx=0;
    async function worker() {
      while (idx<sites.length && !bulkStopped) {
        const site=sites[idx++];
        await checkOneSite(site);
      }
    }
    const workers=[];
    for(let i=0;i<CONCURRENCY;i++) workers.push(worker());
    await Promise.all(workers);

    bulkRunning=false;
    document.getElementById('bulkStartBtn').disabled=false;
    document.getElementById('bulkStartBtn').textContent='⚡ Re-check All';
    document.getElementById('bulkStopBtn').style.display='none';
    document.getElementById('progressText').textContent =
      bulkStopped ? `Stopped at ${done}/${total}` : `✓ All ${total} sites checked!`;
    // Show status filter tabs
    document.querySelectorAll('.ftab').forEach(b=>b.style.display='');
  }
  runPool();
}

function stopBulkCheck() {
  bulkStopped=true; bulkRunning=false;
  document.getElementById('bulkStopBtn').style.display='none';
  document.getElementById('bulkStartBtn').disabled=false;
}

/* ──────────────────────────────────────────────
   INIT
────────────────────────────────────────────── */
buildSitesGrid();
renderHistory();

</script>
