<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Geopolitics AI Predictor</title>

<style>
:root{
--bg:#ffffff;
--text:#111;
--card:#f3f3f3;
--accent:#0066ff;
}
body.dark{
--bg:#121212;
--text:#fff;
--card:#1e1e1e;
--accent:#4da3ff;
}
body.oled{
--bg:#000;
--text:#fff;
--card:#000;
--accent:#00e5ff;
}
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
min-height:100vh;
}
.container{
flex:1;
max-width:600px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
justify-content:center;
}
.card{
background:var(--card);
padding:16px;
border-radius:12px;
}
select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}
button{
background:var(--accent);
color:white;
cursor:pointer;
}
.footer{
text-align:center;
padding:12px;
font-size:14px;
}
.toggle-group{
display:flex;
justify-content:space-between;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🌍 AI Geopolitics Predictor</h2>

<div class="card">

<label>Select Country:</label>
<select id="country"></select>

<label>Select Prediction Year:</label>
<select id="yearSelect"></select>

<button onclick="runPrediction()">Run AI Prediction</button>

<div id="output"></div>

<div class="toggle-group">
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('oled')">OLED</button>
</div>

</div>
</div>

<div class="footer">
© Manik Roy <span id="yearNow"></span>. All Rights Reserved.
</div>

<script>
const countries = ["United States","China","India","Russia","Germany","Japan","Brazil","United Kingdom","France","Canada","Australia","South Korea"];

const countrySelect = document.getElementById("country");
countries.forEach(c=>{
let option=document.createElement("option");
option.value=c;
option.textContent=c;
countrySelect.appendChild(option);
});

for(let y=new Date().getFullYear(); y<=2050; y++){
let option=document.createElement("option");
option.value=y;
option.textContent=y;
document.getElementById("yearSelect").appendChild(option);
}

async function runPrediction(){
let country = countrySelect.value;
let year = parseInt(document.getElementById("yearSelect").value);
let currentYear = new Date().getFullYear();
let delta = year - currentYear;

document.getElementById("output").innerHTML="Loading real data...";

try{

// REST Countries API
let restRes = await fetch(`https://restcountries.com/v3.1/name/${country}`);
let restData = await restRes.json();
let population = restData[0].population;
let region = restData[0].region;

// World Bank GDP
let gdpRes = await fetch(`https://api.worldbank.org/v2/country/${restData[0].cca2}/indicator/NY.GDP.MKTP.CD?format=json`);
let gdpData = await gdpRes.json();
let latestGDP = gdpData[1].find(d=>d.value!==null).value;

// World Bank Inflation
let infRes = await fetch(`https://api.worldbank.org/v2/country/${restData[0].cca2}/indicator/FP.CPI.TOTL.ZG?format=json`);
let infData = await infRes.json();
let inflation = infData[1].find(d=>d.value!==null)?.value || 3;

// AI Economic Strength Score
let economicScore = (latestGDP/1e12)*10 + (population/1e8);

// Inflation Penalty
let inflationPenalty = inflation * 0.5;

// Year multiplier growth
let growthFactor = 1 + (0.02 * delta);

// Regional Bonus
let regionalBonus = region === "Asia" ? 5 : region === "Europe" ? 3 : 2;

// Future AI Score
let futureScore = (economicScore * growthFactor) - inflationPenalty + regionalBonus;

futureScore = Math.max(0, Math.min(100, futureScore));

document.getElementById("output").innerHTML=`
<h3>${country} AI Forecast (${year})</h3>
<p><strong>Region:</strong> ${region}</p>
<p><strong>Population:</strong> ${population.toLocaleString()}</p>
<p><strong>GDP (USD):</strong> $${latestGDP.toLocaleString()}</p>
<p><strong>Inflation:</strong> ${inflation.toFixed(2)}%</p>
<hr>
<p><strong>AI Geopolitical Strength Score:</strong> ${futureScore.toFixed(2)} / 100</p>
<p><strong>Risk Level:</strong> ${futureScore<40?"High Risk":futureScore<70?"Moderate":"Strong Position"}</p>
`;

}catch(error){
document.getElementById("output").innerHTML="API Error or Country Not Supported.";
}
}

function setTheme(mode){
document.body.classList.remove("dark","oled");
if(mode==="dark")document.body.classList.add("dark");
if(mode==="oled")document.body.classList.add("oled");
}

document.getElementById("yearNow").textContent=new Date().getFullYear();
</script>

</body>
</html>
