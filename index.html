<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>4K Camera — Manik Roy</title>
<style>
  :root{
    --radius:18px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{--bg:#0B0C0E;--fg:#EDEDED;--fg-dim:#9AA0A6;--accent:#FF8A3D;--panel:rgba(255,255,255,.07);--border:rgba(255,255,255,.18);}
  [data-theme="light"]{--bg:#F5F3EF;--fg:#14161A;--fg-dim:#5B5F66;--accent:#C9601A;--panel:rgba(0,0,0,.05);--border:rgba(0,0,0,.16);}
  [data-theme="oled"]{--bg:#000000;--fg:#FFFFFF;--fg-dim:#8A8A8A;--accent:#FF8A3D;--panel:rgba(255,255,255,.05);--border:rgba(255,255,255,.14);}
  [data-theme="hc"]{--bg:#000000;--fg:#FFFFFF;--fg-dim:#FFEE00;--accent:#FFEE00;--panel:#000000;--border:#FFFFFF;}

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    transition:background .3s ease,color .3s ease;
  }
  .mono{font-family:"SFMono-Regular",Consolas,"Roboto Mono",monospace;}

  .viewfinder{
    position:relative; flex:1; overflow:hidden;
    background:#000; border-radius:0 0 var(--radius) var(--radius);
    margin:0; min-height:0;
  }
  video{
    width:100%; height:100%; object-fit:cover; display:block;
    transform:scaleX(var(--mirror,1));
  }

  .bracket{position:absolute; width:26px; height:26px; border-color:var(--accent); opacity:.9; pointer-events:none;}
  .tl{top:calc(14px + var(--safe-t)); left:14px; border-top:3px solid var(--accent); border-left:3px solid var(--accent);}
  .tr{top:calc(14px + var(--safe-t)); right:14px; border-top:3px solid var(--accent); border-right:3px solid var(--accent);}
  .bl{bottom:110px; left:14px; border-bottom:3px solid var(--accent); border-left:3px solid var(--accent);}
  .br{bottom:110px; right:14px; border-bottom:3px solid var(--accent); border-right:3px solid var(--accent);}

  .overlay-top{
    position:absolute; top:0; left:0; right:0;
    padding:calc(14px + var(--safe-t)) 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(rgba(0,0,0,.45),transparent);
  }
  #res{font-size:.78rem; letter-spacing:.06em; color:#fff; background:var(--panel); border:1px solid var(--border); padding:5px 10px; border-radius:999px;}

  .icon-group{display:flex; gap:8px;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border);
    background:var(--panel); color:#fff; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .icon-btn.active{background:var(--accent); border-color:var(--accent); color:#111;}

  .zoom-row{
    position:absolute; left:0; right:0; bottom:104px;
    display:flex; align-items:center; justify-content:center; gap:8px; padding:0 24px;
  }
  .zoom-row.hidden{display:none;}
  #zoomVal{font-size:.72rem; color:#fff; min-width:2.4em; text-align:center;}
  #zoomSlider{flex:1; max-width:260px; accent-color:var(--accent);}

  .focus-ring{
    position:absolute; width:64px; height:64px; margin:-32px 0 0 -32px;
    border:2px solid var(--accent); border-radius:50%; pointer-events:none;
    opacity:0; transform:scale(1.3);
  }
  .focus-ring.go{animation:focusPulse .6s ease-out;}
  @keyframes focusPulse{0%{opacity:1; transform:scale(1.3);}70%{opacity:1; transform:scale(1);}100%{opacity:0; transform:scale(1);}}

  #countdown{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-size:5rem; font-weight:700; color:#fff; background:rgba(0,0,0,.35); pointer-events:none;
  }
  #countdown.show{display:flex;}

  .overlay-bottom{
    position:absolute; left:0; right:0; bottom:0;
    padding:14px 20px calc(20px + var(--safe-b));
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(transparent,rgba(0,0,0,.55));
  }
  .side-btn{
    width:46px; height:46px; border-radius:50%; border:1px solid var(--border);
    background:var(--panel); color:#fff; font-size:1.2rem; cursor:pointer;
  }
  #captureBtn{
    width:76px; height:76px; border-radius:50%; background:#fff;
    border:5px solid var(--accent); cursor:pointer; box-shadow:0 0 0 3px rgba(255,255,255,.15);
    transition:transform .12s ease;
  }
  #captureBtn:active{transform:scale(.9);}
  .hidden{display:none;}

  #flash{
    position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;
  }
  #flash.go{animation:flash .35s ease-out;}
  @keyframes flash{0%{opacity:.85;}100%{opacity:0;}}

  #status{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; font-size:.9rem; color:var(--fg-dim); display:none;
  }
  #status.show{display:flex;}

  footer{
    text-align:center; padding:12px 16px calc(12px + var(--safe-b));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    font-size:.75rem; color:var(--fg-dim); border-top:1px solid var(--border);
  }
  footer strong{color:var(--fg); font-weight:600;}

  @media(min-width:720px){
    body{align-items:center;}
    .viewfinder{max-width:900px; width:100%; margin:16px auto 0; border-radius:var(--radius); aspect-ratio:16/9;}
    footer{max-width:900px;}
  }
</style>
</head>
<body>

  <section class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="overlay-top">
      <span id="res" class="mono">— × —</span>
      <div class="icon-group">
        <button id="flashBtn" class="icon-btn hidden" aria-label="Toggle flash">⚡</button>
        <button id="soundBtn" class="icon-btn" aria-label="Toggle shutter sound">🔊</button>
        <button id="themeBtn" class="icon-btn" aria-label="Toggle theme">◐</button>
      </div>
    </div>

    <div class="zoom-row hidden" id="zoomRow">
      <input type="range" id="zoomSlider" min="1" max="1" step="0.1" value="1">
      <span id="zoomVal" class="mono">1.0x</span>
    </div>

    <div class="overlay-bottom">
      <button id="switchBtn" class="side-btn" aria-label="Switch camera">⟲</button>
      <button id="captureBtn" aria-label="Capture photo"></button>
      <button id="timerBtn" class="side-btn mono" aria-label="Toggle self-timer">0s</button>
    </div>

    <div class="focus-ring" id="focusRing"></div>
    <div id="countdown" class="mono"></div>
    <div id="flash"></div>
    <div id="status"></div>
  </section>

  <footer>
    <p>© Manik Roy <span id="year"></span>. All Rights Reserved.</p>
  </footer>

  <canvas id="canvas" hidden></canvas>
  <a id="downloadLink" class="hidden" download></a>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const resEl = document.getElementById('res');
  const statusEl = document.getElementById('status');
  const themeBtn = document.getElementById('themeBtn');
  const switchBtn = document.getElementById('switchBtn');
  const captureBtn = document.getElementById('captureBtn');
  const flashEl = document.getElementById('flash');
  const downloadLink = document.getElementById('downloadLink');
  const flashBtn = document.getElementById('flashBtn');
  const soundBtn = document.getElementById('soundBtn');
  const timerBtn = document.getElementById('timerBtn');
  const zoomRow = document.getElementById('zoomRow');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomVal = document.getElementById('zoomVal');
  const focusRing = document.getElementById('focusRing');
  const countdownEl = document.getElementById('countdown');
  const viewfinder = document.querySelector('.viewfinder');

  document.getElementById('year').textContent = new Date().getFullYear();

  const themes = [
    {id:'dark', icon:'◐'},
    {id:'light', icon:'☀'},
    {id:'oled', icon:'●'},
    {id:'hc', icon:'◆'}
  ];
  let themeIdx = 0;
  themeBtn.addEventListener('click', () => {
    themeIdx = (themeIdx + 1) % themes.length;
    document.documentElement.dataset.theme = themes[themeIdx].id;
    themeBtn.textContent = themes[themeIdx].icon;
  });

  let stream = null;
  let facing = 'environment';
  let track = null;
  let torchOn = false;
  let soundOn = true;
  let timerSecs = 0;

  async function startCamera(mode){
    if(stream) stream.getTracks().forEach(t => t.stop());
    statusEl.classList.remove('show');
    const constraints = {
      audio:false,
      video:{
        facingMode:{ideal:mode},
        width:{ideal:3840},
        height:{ideal:2160}
      }
    };
    try{
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.style.setProperty('--mirror', mode === 'user' ? -1 : 1);
      track = stream.getVideoTracks()[0];
      video.onloadedmetadata = () => {
        resEl.textContent = video.videoWidth + ' × ' + video.videoHeight;
      };
      setupCapabilities();
    }catch(err){
      statusEl.textContent = 'Camera unavailable: ' + (err.message || err.name || 'permission denied. Please allow camera access.');
      statusEl.classList.add('show');
    }
  }

  function setupCapabilities(){
    torchOn = false;
    flashBtn.classList.add('hidden');
    flashBtn.classList.remove('active');
    zoomRow.classList.add('hidden');
    if(!track || !track.getCapabilities) return;
    const caps = track.getCapabilities();
    if(caps.torch){ flashBtn.classList.remove('hidden'); }
    if(caps.zoom){
      zoomRow.classList.remove('hidden');
      zoomSlider.min = caps.zoom.min;
      zoomSlider.max = caps.zoom.max;
      zoomSlider.step = caps.zoom.step || 0.1;
      zoomSlider.value = caps.zoom.min;
      zoomVal.textContent = Number(caps.zoom.min).toFixed(1) + 'x';
    }
  }

  function beep(){
    if(!soundOn) return;
    try{
      const ctxA = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(.25, ctxA.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, ctxA.currentTime + .15);
      osc.connect(gain).connect(ctxA.destination);
      osc.start();
      osc.stop(ctxA.currentTime + .15);
    }catch(e){}
  }

  flashBtn.addEventListener('click', async () => {
    if(!track) return;
    torchOn = !torchOn;
    try{ await track.applyConstraints({advanced:[{torch:torchOn}]}); }catch(e){}
    flashBtn.classList.toggle('active', torchOn);
  });

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    soundBtn.classList.toggle('active', !soundOn);
  });

  const timerOptions = [0, 3, 10];
  let timerIdx = 0;
  timerBtn.addEventListener('click', () => {
    timerIdx = (timerIdx + 1) % timerOptions.length;
    timerSecs = timerOptions[timerIdx];
    timerBtn.textContent = timerSecs + 's';
    timerBtn.classList.toggle('active', timerSecs > 0);
  });

  zoomSlider.addEventListener('input', async () => {
    zoomVal.textContent = Number(zoomSlider.value).toFixed(1) + 'x';
    if(!track) return;
    try{ await track.applyConstraints({advanced:[{zoom:Number(zoomSlider.value)}]}); }catch(e){}
  });

  viewfinder.addEventListener('click', async (e) => {
    if(e.target.closest('button, input')) return;
    const rect = viewfinder.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    focusRing.style.left = (e.clientX - rect.left) + 'px';
    focusRing.style.top = (e.clientY - rect.top) + 'px';
    focusRing.classList.remove('go'); void focusRing.offsetWidth; focusRing.classList.add('go');
    if(track && track.getCapabilities){
      const caps = track.getCapabilities();
      if(caps.focusMode && caps.focusMode.includes('manual')){
        try{
          await track.applyConstraints({advanced:[{focusMode:'manual', pointsOfInterest:[{x, y}]}]});
        }catch(err){}
      }
    }
  });

  switchBtn.addEventListener('click', () => {
    facing = facing === 'environment' ? 'user' : 'environment';
    startCamera(facing);
  });

  function takePhoto(){
    if(!video.videoWidth) return;
    beep();
    flashEl.classList.remove('go'); void flashEl.offsetWidth; flashEl.classList.add('go');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    if(facing === 'user'){
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      downloadLink.href = url;
      downloadLink.download = 'capture-' + Date.now() + '.png';
      downloadLink.click();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }, 'image/png', 1);
  }

  captureBtn.addEventListener('click', () => {
    if(!video.videoWidth || countdownEl.classList.contains('show')) return;
    if(timerSecs === 0){ takePhoto(); return; }
    let n = timerSecs;
    countdownEl.textContent = n;
    countdownEl.classList.add('show');
    const tick = setInterval(() => {
      n--;
      if(n <= 0){
        clearInterval(tick);
        countdownEl.classList.remove('show');
        takePhoto();
      }else{
        countdownEl.textContent = n;
      }
    }, 1000);
  });

  startCamera(facing);
</script>
</body>
</html>
