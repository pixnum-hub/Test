<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>বাংলা পঞ্জিকা</title>

<style>

:root{

--bg1:#667eea;
--bg2:#764ba2;
--text:#111;
--glass:rgba(255,255,255,0.25);
--border:rgba(255,255,255,0.3);

}

[data-theme="dark"]{

--bg1:#1e3c72;
--bg2:#2a5298;
--text:#fff;
--glass:rgba(0,0,0,0.35);
--border:rgba(255,255,255,0.1);

}

[data-theme="oled"]{

--bg1:#000;
--bg2:#000;
--text:#fff;
--glass:rgba(20,20,20,0.5);
--border:rgba(255,255,255,0.05);

}

body{

margin:0;
font-family:system-ui;

background:linear-gradient(135deg,var(--bg1),var(--bg2));

color:var(--text);

display:flex;
flex-direction:column;

align-items:center;

min-height:100vh;

}

/* header */

header{

font-size:28px;

padding:20px;

font-weight:bold;

text-align:center;

}

/* container */

.container{

width:95%;

max-width:520px;

}

/* glass card */

.card{

background:var(--glass);

backdrop-filter:blur(16px);

-webkit-backdrop-filter:blur(16px);

border:1px solid var(--border);

border-radius:16px;

padding:18px;

margin:12px 0;

box-shadow:0 8px 32px rgba(0,0,0,0.2);

}

/* controls */

button,select{

padding:10px;

border:none;

border-radius:8px;

margin:4px;

background:rgba(255,255,255,0.2);

color:var(--text);

cursor:pointer;

}

/* calendar */

.calendar{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:6px;

}

.day{

background:rgba(255,255,255,0.15);

border-radius:8px;

padding:8px;

text-align:center;

}

/* footer */

.footer{

margin-top:auto;

padding:20px;

font-size:14px;

text-align:center;

}

</style>
</head>

<body data-theme="dark">

<header>বাংলা পঞ্জিকা</header>

<div class="container">

<div class="card">

<label>পঞ্জিকা পদ্ধতি</label>

<select>

<option>সূর্য সিদ্ধান্ত</option>

<option>দৃক সিদ্ধান্ত</option>

<option>চন্দ্র সিদ্ধান্ত</option>

</select>

</div>

<div class="card">

<h3>আজকের পঞ্চাঙ্গ</h3>

<p>তারিখ: <span id="date"></span></p>

<p>তিথি: <span id="tithi"></span></p>

<p>নক্ষত্র: <span id="nakshatra"></span></p>

<p>যোগ: <span id="yoga"></span></p>

<p>করণ: <span id="karana"></span></p>

<p>সূর্যোদয়: <span id="sunrise"></span></p>

<p>সূর্যাস্ত: <span id="sunset"></span></p>

</div>

<div class="card">

<h3>বাংলা ক্যালেন্ডার</h3>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<h3>থিম</h3>

<button onclick="setTheme('light')">Light</button>

<button onclick="setTheme('dark')">Dark</button>

<button onclick="setTheme('oled')">OLED</button>

</div>

</div>

<footer class="footer">

© Manik Roy <span id="year"></span>. All Rights Reserved.

</footer>

<script>

/* Panchanga Data */

const tithi=[

"প্রতিপদ","দ্বিতীয়া","তৃতীয়া","চতুর্থী",

"পঞ্চমী","ষষ্ঠী","সপ্তমী","অষ্টমী",

"নবমী","দশমী","একাদশী","দ্বাদশী",

"ত্রয়োদশী","চতুর্দশী","পূর্ণিমা","অমাবস্যা"

]

const nakshatra=[

"অশ্বিনী","ভরণী","কৃত্তিকা","রোহিণী","মৃগশিরা",

"আর্দ্রা","পুনর্বসু","পুষ্যা","আশ্লেষা",

"মঘা","পূর্বা ফল্গুনী","উত্তরা ফল্গুনী",

"হস্ত","চিত্রা","স্বাতী","বিশাখা",

"অনুরাধা","জ্যেষ্ঠা","মূলা","পূর্বাষাঢ়া",

"উত্তরাষাঢ়া","শ্রবণা","ধনিষ্ঠা",

"শতভিষা","পূর্বভাদ্রপদ","উত্তরভাদ্রপদ","রেবতী"

]

const yoga=["বিষ্কম্ভ","প্রীতি","আয়ুষ্মান","সৌভাগ্য","শোভন"]

const karana=["বব","বালব","কৌলব","তৈতিল","গর","বণিজ","বিশ্টি"]

function loadPanchanga(){

let d=new Date()

document.getElementById("date").innerText=

d.toLocaleDateString("bn-IN")

document.getElementById("tithi").innerText=

tithi[Math.floor(Math.random()*tithi.length)]

document.getElementById("nakshatra").innerText=

nakshatra[Math.floor(Math.random()*nakshatra.length)]

document.getElementById("yoga").innerText=

yoga[Math.floor(Math.random()*yoga.length)]

document.getElementById("karana").innerText=

karana[Math.floor(Math.random()*karana.length)]

document.getElementById("sunrise").innerText="৫:৪৫"

document.getElementById("sunset").innerText="৫:৫৮"

}

/* Calendar */

function buildCalendar(){

let cal=document.getElementById("calendar")

for(let i=1;i<=30;i++){

let d=document.createElement("div")

d.className="day"

d.innerText=i

cal.appendChild(d)

}

}

/* Theme */

function setTheme(t){

document.body.setAttribute("data-theme",t)

}

/* Footer year */

document.getElementById("year").innerText=

new Date().getFullYear()

loadPanchanga()

buildCalendar()

</script>

</body>
</html>
