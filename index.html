<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedTest — Manik Roy</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --bg2:#171b26; --card:#1e2336;
  --border:rgba(255,255,255,0.07); --text:#e8eaf6; --muted:#7b82a8;
  --accent:#00e5ff; --accent2:#7c4dff;
  --ping:#69ff47; --up:#ff6d00; --down:#00e5ff;
  --track:rgba(255,255,255,0.06);
  --shadow:0 8px 40px rgba(0,0,0,0.45);
  --r:20px; --ease:.35s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f0f2fa; --bg2:#e4e8f5; --card:#fff;
  --border:rgba(0,0,0,0.08); --text:#1a1d2e; --muted:#6b74a0;
  --accent:#0076d4; --accent2:#6200ea;
  --ping:#2e7d32; --up:#e65100; --down:#0076d4;
  --track:rgba(0,0,0,0.07); --shadow:0 8px 40px rgba(0,0,0,0.12);
}
[data-theme="oled"]{
  --bg:#000; --bg2:#000; --card:#0a0a0a;
  --border:rgba(255,255,255,0.05); --text:#fff; --muted:#606060;
  --accent:#00e5ff; --accent2:#7c4dff;
  --ping:#69ff47; --up:#ff6d00; --down:#00e5ff;
  --track:rgba(255,255,255,0.04); --shadow:0 8px 40px rgba(0,229,255,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Rajdhani',sans-serif;transition:background var(--ease),color var(--ease)}
body{display:flex;flex-direction:column;min-height:100vh}

header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;transition:background var(--ease)}
.logo{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;
  letter-spacing:-.02em;color:var(--accent)}
.logo span{color:var(--text);font-weight:400}
.theme-toggle{display:flex;gap:5px;background:var(--track);
  border:1px solid var(--border);border-radius:50px;padding:4px}
.tbtn{border:none;background:transparent;color:var(--muted);
  font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;
  letter-spacing:.05em;cursor:pointer;padding:5px 10px;border-radius:50px;transition:.2s}
.tbtn.active{background:var(--accent);color:#000}

main{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:28px 16px 36px;gap:22px}

.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.gauge-container{position:relative;width:230px;height:230px}
.gauge-svg{width:100%;height:100%;transform:rotate(-90deg);transform-origin:center}
.g-track{fill:none;stroke:var(--track);stroke-width:13}
.g-fill{fill:none;stroke:var(--accent);stroke-width:13;stroke-linecap:round;
  stroke-dasharray:565.49;stroke-dashoffset:565.49;
  transition:stroke-dashoffset .07s linear,stroke .35s;
  filter:drop-shadow(0 0 8px var(--accent))}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px}
.spd-val{font-family:'Space Mono',monospace;font-size:2.9rem;font-weight:700;
  line-height:1;color:var(--text);letter-spacing:-.03em}
.spd-unit{font-size:.82rem;font-weight:600;color:var(--muted);letter-spacing:.1em}
.spd-lbl{font-size:.68rem;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--accent);margin-top:2px}

.status{font-family:'Space Mono',monospace;font-size:.72rem;padding:6px 18px;
  border-radius:50px;border:1px solid var(--border);background:var(--card);
  color:var(--muted);letter-spacing:.08em;transition:all .3s;
  min-width:180px;text-align:center}
.status.live{border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 16px rgba(0,229,255,.15)}
.status.done{border-color:var(--ping);color:var(--ping)}
.status.err{border-color:#ff5252;color:#ff5252}

.prog-wrap{width:100%;max-width:420px}
.prog-bg{height:4px;background:var(--track);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:4px;transition:width .25s linear}

.start-btn{width:100%;max-width:340px;padding:17px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;box-shadow:0 4px 24px rgba(0,229,255,.22);
  transition:transform .2s,opacity .2s;position:relative;overflow:hidden}
.start-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);
  opacity:0;transition:opacity .2s}
.start-btn:hover:not(:disabled)::after{opacity:1}
.start-btn:active:not(:disabled){transform:scale(.97)}
.start-btn:disabled{opacity:.55;cursor:not-allowed}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  width:100%;max-width:420px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;
  box-shadow:var(--shadow);transition:background var(--ease),border-color var(--ease)}
.sicon{width:32px;height:32px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:1.1rem}
.scard.dl .sicon{background:rgba(0,229,255,.12)}
.scard.ul .sicon{background:rgba(255,109,0,.12)}
.scard.pg .sicon{background:rgba(105,255,71,.12)}
.sval{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;line-height:1}
.scard.dl .sval{color:var(--down)}.scard.ul .sval{color:var(--up)}.scard.pg .sval{color:var(--ping)}
.sunit{font-size:.62rem;font-weight:600;color:var(--muted);letter-spacing:.08em}
.slbl{font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

.server-info{font-size:.7rem;color:var(--muted);text-align:center;
  font-family:'Space Mono',monospace;letter-spacing:.03em;max-width:380px}

.hist{width:100%;max-width:420px}
.hist-title{font-size:.72rem;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:4px}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hitem{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:11px 15px;display:flex;justify-content:space-between;align-items:center;
  font-size:.8rem;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.htime{color:var(--muted);font-family:'Space Mono',monospace;font-size:.68rem}
.hspeeds{display:flex;gap:10px}
.hdl{color:var(--down);font-family:'Space Mono',monospace;font-weight:700}
.hul{color:var(--up);font-family:'Space Mono',monospace;font-weight:700}
.hpg{color:var(--ping);font-family:'Space Mono',monospace;font-weight:700}

footer{text-align:center;padding:20px 16px;font-size:.76rem;color:var(--muted);
  border-top:1px solid var(--border);letter-spacing:.03em;background:var(--bg2);
  transition:background var(--ease),border-color var(--ease)}
footer strong{color:var(--text)}

@keyframes pulse{0%,100%{filter:drop-shadow(0 0 6px var(--accent))}
  50%{filter:drop-shadow(0 0 18px var(--accent))}}
.testing .g-fill{animation:pulse 1.2s ease-in-out infinite}

@media(min-width:480px){
  .gauge-container{width:260px;height:260px}
  .spd-val{font-size:3.4rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">SPEED<span>test</span></div>
  <div class="theme-toggle">
    <button class="tbtn" onclick="setTheme('light')">LIGHT</button>
    <button class="tbtn active" onclick="setTheme('dark')">DARK</button>
    <button class="tbtn" onclick="setTheme('oled')">OLED</button>
  </div>
</header>

<main>
  <div class="gauge-wrap">
    <div class="gauge-container" id="gc">
      <svg class="gauge-svg" viewBox="0 0 200 200">
        <circle class="g-track" cx="100" cy="100" r="90"/>
        <circle class="g-fill"  cx="100" cy="100" r="90" id="gf"/>
      </svg>
      <div class="gauge-center">
        <div class="spd-val"  id="sv">—</div>
        <div class="spd-unit" id="su">Mbps</div>
        <div class="spd-lbl"  id="sl">READY</div>
      </div>
    </div>
    <div class="status" id="sb">PRESS START TO TEST</div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="pf"></div></div>
  </div>

  <button class="start-btn" id="btn" onclick="runTest()">▶ START TEST</button>

  <div class="server-info" id="si"></div>

  <div class="stats">
    <div class="scard dl">
      <div class="sicon">↓</div>
      <div class="sval" id="dlv">—</div>
      <div class="sunit">Mbps</div>
      <div class="slbl">Download</div>
    </div>
    <div class="scard ul">
      <div class="sicon">↑</div>
      <div class="sval" id="ulv">—</div>
      <div class="sunit">Mbps</div>
      <div class="slbl">Upload</div>
    </div>
    <div class="scard pg">
      <div class="sicon">◎</div>
      <div class="sval" id="pgv">—</div>
      <div class="sunit">ms</div>
      <div class="slbl">Ping</div>
    </div>
  </div>

  <div class="hist" id="hist" style="display:none">
    <div class="hist-title">Recent Tests</div>
    <div class="hist-list" id="hl"></div>
  </div>
</main>

<footer>© <strong>Manik Roy</strong> <span id="yr"></span>. All Rights Reserved.</footer>

<script>
'use strict';

/* ── year ── */
document.getElementById('yr').textContent = new Date().getFullYear();

/* ── theme ── */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.tbtn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === t));
  localStorage.setItem('st_theme', t);
}
setTheme(localStorage.getItem('st_theme') || 'dark');

/* ── element refs ── */
const gf  = document.getElementById('gf');
const sv  = document.getElementById('sv');
const su  = document.getElementById('su');
const sl  = document.getElementById('sl');
const sb  = document.getElementById('sb');
const btn = document.getElementById('btn');
const pf  = document.getElementById('pf');
const gc  = document.getElementById('gc');
const si  = document.getElementById('si');
const dlv = document.getElementById('dlv');
const ulv = document.getElementById('ulv');
const pgv = document.getElementById('pgv');

/* ── gauge ── */
const CIRC = 565.49; // 2π × 90

function setGauge(v, max) {
  gf.style.strokeDashoffset = CIRC * (1 - Math.min(v / (max || 200), 1));
}
setGauge(0);

/* smooth needle */
let _cur = 0, _tgt = 0, _max = 200, _raf = null;

function needleTo(v, max) {
  _tgt = Math.max(0, v);
  if (max !== undefined) _max = Math.max(max, 1);
  if (_raf) return;
  (function tick() {
    const d = _tgt - _cur;
    _cur += d * 0.18;
    setGauge(_cur, _max);
    sv.textContent = _cur < 10 ? _cur.toFixed(2) : _cur.toFixed(1);
    if (Math.abs(d) < 0.04) { _cur = _tgt; setGauge(_cur, _max); _raf = null; }
    else _raf = requestAnimationFrame(tick);
  })();
}

function needleReset() {
  if (_raf) { cancelAnimationFrame(_raf); _raf = null; }
  _cur = 0; _tgt = 0;
  setGauge(0); sv.textContent = '0';
}

/* ── history ── */
const histData = [];
function addHistory(dl, ul, ping) {
  const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  histData.unshift({ dl, ul, ping, t });
  if (histData.length > 5) histData.pop();
  document.getElementById('hist').style.display = 'block';
  document.getElementById('hl').innerHTML = histData.map(h => `
    <div class="hitem">
      <span class="htime">${h.t}</span>
      <div class="hspeeds">
        <span class="hdl">↓${h.dl}</span>
        <span class="hul">↑${h.ul}</span>
        <span class="hpg">◎${h.ping}ms</span>
      </div>
    </div>`).join('');
}

/* ── utils ── */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const toMbps = (bytes, ms) => (bytes * 8) / (ms * 1000);

/* ════════════════════════════════════════════════════════════════════════
   REAL SPEED TEST  —  speed.cloudflare.com backend
   ════════════════════════════════════════════════════════════════════════

   Endpoints (public, CORS-open, no auth):
     GET  /cdn-cgi/trace           — server metadata
     GET  /__down?bytes=N          — download N bytes of random data
     POST /__up                    — discard-upload endpoint

   This file must be opened in a real browser with internet access.
   It will not work inside sandboxed preview environments that block
   outbound network requests (like Claude's artifact preview).
   ════════════════════════════════════════════════════════════════════════ */

const CF = 'https://speed.cloudflare.com';

// Payload ladder: 1 KB warmup, then 100 KB, 1 MB, 10 MB
const DL_BYTES = [1_000, 100_000, 1_000_000, 10_000_000];
const UL_BYTES = 1_000_000; // 1 MB per round
const UL_REPS  = 4;

let ctrl = null; // AbortController

/* ── server metadata ── */
async function fetchMeta() {
  try {
    const r = await fetch(`${CF}/cdn-cgi/trace`, { cache: 'no-store', signal: ctrl.signal });
    const txt = await r.text();
    const kv = {};
    txt.trim().split('\n').forEach(l => { const [k, v] = l.split('='); kv[k] = v; });
    return kv;
  } catch { return null; }
}

/* ── ping — 10 samples to /__down?bytes=0 ── */
async function measurePing() {
  const times = [];
  for (let i = 0; i < 10; i++) {
    if (ctrl.signal.aborted) break;
    try {
      const t0 = performance.now();
      await fetch(`${CF}/__down?bytes=0&_=${Date.now()}${i}`,
        { cache: 'no-store', signal: ctrl.signal });
      times.push(performance.now() - t0);
    } catch(e) { if (e.name === 'AbortError') throw e; }
    await sleep(25);
  }
  if (!times.length) throw new Error('Cannot reach speed.cloudflare.com — check your internet connection.');
  times.sort((a, b) => a - b);
  const trimmed = times.slice(0, Math.max(times.length - 3, 1)); // drop top 3
  return Math.round(trimmed[Math.floor(trimmed.length / 2)]);    // median
}

/* ── XHR with live onprogress ── */
function xhrGet(url, onChunk) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.responseType = 'arraybuffer';
    const t0 = performance.now();
    let lastBytes = 0, lastTime = t0;

    xhr.onprogress = e => {
      const now = performance.now();
      const db = e.loaded - lastBytes;
      const dt = now - lastTime;
      if (dt > 100 && db > 0) {
        onChunk && onChunk(db, dt, e.loaded, e.total || 0);
        lastBytes = e.loaded;
        lastTime  = now;
      }
    };

    xhr.onload  = () => resolve({ bytes: xhr.response.byteLength, ms: performance.now() - t0 });
    xhr.onerror = () => reject(new Error('Network request failed'));
    xhr.onabort = () => reject(Object.assign(new Error('Aborted'), { name: 'AbortError' }));
    ctrl.signal.addEventListener('abort', () => xhr.abort(), { once: true });
    xhr.send();
  });
}

/* ── download ── */
async function measureDownload(onLive) {
  const results = [];
  let gmax = 10;

  for (let i = 0; i < DL_BYTES.length; i++) {
    const isWarmup = (i === 0);
    const n = DL_BYTES[i];
    if (!isWarmup)
      sb.textContent = `DOWNLOADING ${n >= 1e6 ? (n/1e6).toFixed(0)+'MB' : (n/1e3).toFixed(0)+'KB'}… (${i}/${DL_BYTES.length - 1})`;

    const { bytes, ms } = await xhrGet(`${CF}/__down?bytes=${n}&_=${Date.now()}`,
      (db, dt) => {
        if (!isWarmup) {
          const live = toMbps(db, dt);
          gmax = Math.max(gmax, live * 1.4);
          onLive(live, gmax);
        }
      });

    if (!isWarmup && bytes > 0 && ms > 50) {
      const mbps = toMbps(bytes, ms);
      results.push(mbps);
      gmax = Math.max(gmax, mbps * 1.3);
      onLive(mbps, gmax);
    }
    await sleep(60);
  }

  if (!results.length) throw new Error('Download measurement failed — no data received from speed.cloudflare.com');

  // Weighted average: small file = TCP still ramping, large file = saturated link
  if (results.length === 1) return results[0];
  if (results.length === 2) return results[0] * 0.3 + results[1] * 0.7;
  return results[0] * 0.10 + results[1] * 0.30 + results[2] * 0.60;
}

/* ── upload ── */
async function measureUpload(dlMbps, onLive) {
  const data = new Uint8Array(UL_BYTES);
  crypto.getRandomValues(data);
  let gmax = Math.max(dlMbps * 0.6, 5);
  const speeds = [];

  for (let i = 0; i < UL_REPS; i++) {
    if (ctrl.signal.aborted) break;
    sb.textContent = `UPLOADING… (${i + 1}/${UL_REPS})`;
    try {
      const t0 = performance.now();
      const r = await fetch(`${CF}/__up?_=${Date.now()}`, {
        method: 'POST',
        body: data.buffer,
        headers: { 'Content-Type': 'application/octet-stream' },
        cache: 'no-store',
        signal: ctrl.signal
      });
      await r.arrayBuffer(); // drain response to capture full round-trip
      const ms  = performance.now() - t0;
      const mbps = toMbps(UL_BYTES, ms);
      speeds.push(mbps);
      gmax = Math.max(gmax, mbps * 1.4);
      onLive(speeds.reduce((a, b) => a + b) / speeds.length, gmax);
    } catch(e) { if (e.name === 'AbortError') throw e; }
    await sleep(60);
  }

  if (!speeds.length) throw new Error('Upload measurement failed');
  speeds.sort((a, b) => a - b);
  if (speeds.length > 2) speeds.pop(); // drop highest outlier
  return speeds.reduce((a, b) => a + b) / speeds.length;
}

/* ════════════════════════════════════════════════════════════════════════
   MAIN
   ════════════════════════════════════════════════════════════════════════ */
async function runTest() {
  if (btn.disabled) return;
  if (ctrl) ctrl.abort();
  ctrl = new AbortController();

  btn.disabled = true;
  gc.classList.add('testing');
  needleReset();
  gf.style.stroke = 'var(--accent)';
  sv.textContent = '—'; su.textContent = 'Mbps'; sl.textContent = 'STARTING';
  sb.textContent = 'CONNECTING…'; sb.className = 'status live';
  pf.style.width = '3%';
  dlv.textContent = ulv.textContent = pgv.textContent = '—';
  si.textContent = '';

  try {
    /* server info */
    const meta = await fetchMeta();
    if (meta && meta.colo) {
      si.textContent = `${meta.ip || ''} → Cloudflare ${meta.colo} (${meta.loc || ''})`;
    }

    /* PING */
    sb.textContent = 'MEASURING PING…'; sl.textContent = 'MS PING'; su.textContent = 'ms';
    const ping = await measurePing();
    pgv.textContent = ping;
    sv.textContent  = ping;
    sl.textContent  = 'PING';
    setGauge(ping, 150);
    sb.textContent  = `PING: ${ping} ms ✓`;
    pf.style.width  = '15%';
    await sleep(300);

    /* DOWNLOAD */
    gf.style.stroke = 'var(--down)';
    sb.textContent  = 'TESTING DOWNLOAD…';
    sl.textContent  = 'Mbps DOWN'; su.textContent = 'Mbps';
    needleReset(); needleTo(0, 50);
    let finalDL = 0;

    const dl = await measureDownload((mbps, gmax) => {
      finalDL = mbps;
      needleTo(mbps, gmax);
      pf.style.width = (15 + Math.min(finalDL * 0.8, 52)) + '%';
    });

    finalDL = dl;
    dlv.textContent = finalDL.toFixed(1);
    needleTo(finalDL, Math.max(finalDL * 1.3, 10));
    sb.textContent = `DOWNLOAD: ${finalDL.toFixed(1)} Mbps ✓`;
    pf.style.width = '68%';
    await sleep(350);

    /* UPLOAD */
    gf.style.stroke = 'var(--up)';
    sl.textContent  = 'Mbps UP';
    needleReset(); needleTo(0, Math.max(finalDL * 0.7, 10));
    let finalUL = 0;

    const ul = await measureUpload(finalDL, (mbps, gmax) => {
      finalUL = mbps;
      needleTo(mbps, gmax);
      pf.style.width = (68 + Math.min(finalUL * 0.5, 28)) + '%';
    });

    finalUL = ul;
    ulv.textContent = finalUL.toFixed(1);
    sb.textContent  = `UPLOAD: ${finalUL.toFixed(1)} Mbps ✓`;

    /* DONE */
    gc.classList.remove('testing');
    gf.style.stroke = 'var(--accent)';
    needleTo(finalDL, Math.max(finalDL * 1.3, 10));
    sl.textContent  = 'Mbps DOWN'; su.textContent = 'Mbps';
    sb.textContent  = '✓ TEST COMPLETE'; sb.className = 'status done';
    pf.style.width  = '100%';
    btn.disabled    = false; btn.textContent = '↺ RUN AGAIN';
    addHistory(finalDL.toFixed(1), finalUL.toFixed(1), ping);

  } catch(err) {
    gc.classList.remove('testing');
    if (err.name !== 'AbortError') {
      console.error(err);
      sb.textContent = '⚠ ' + err.message;
      sb.className   = 'status err';
      sv.textContent = '—'; sl.textContent = 'ERROR';
      si.innerHTML   = '<span style="color:#ff5252;font-size:.68rem">▶ Download this HTML file and open it in your browser for real results.</span>';
    }
    btn.disabled    = false;
    btn.textContent = '↺ RETRY';
  }
}
</script>
</body>
</html>
