<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Player · Manik Roy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --accent-glow: rgba(200,255,0,0.35);
    --radius: 20px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0e0e12;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --surface: #222230;
    --surface2: #2a2a3a;
    --text: #f0f0f8;
    --text2: #8888aa;
    --border: rgba(255,255,255,0.07);
    --shadow: 0 24px 64px rgba(0,0,0,0.6);
    --track-bg: #2a2a3a;
  }

  [data-theme="light"] {
    --bg: #f2f2f7;
    --bg2: #ffffff;
    --bg3: #e8e8f0;
    --surface: #ffffff;
    --surface2: #ebebf3;
    --text: #111118;
    --text2: #666680;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 24px 64px rgba(0,0,0,0.12);
    --track-bg: #dddde8;
  }

  [data-theme="oled"] {
    --bg: #000000;
    --bg2: #000000;
    --bg3: #0a0a0a;
    --surface: #0d0d0d;
    --surface2: #141414;
    --text: #ffffff;
    --text2: #666666;
    --border: rgba(255,255,255,0.05);
    --shadow: 0 24px 64px rgba(0,0,0,0.9);
    --track-bg: #1a1a1a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ─── Header ─── */
  header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    transition: background var(--transition), border-color var(--transition);
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity:1; }
    50% { transform: scale(1.3); opacity:0.7; }
  }

  /* ─── Theme Toggle ─── */
  .theme-switcher {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    transition: background var(--transition);
  }

  .theme-btn {
    border: none;
    background: transparent;
    border-radius: 50px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .theme-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .theme-btn:not(.active):hover { color: var(--text); }

  /* ─── Main Content ─── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  /* ─── Album Art ─── */
  .art-container {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1;
    position: relative;
  }

  .art-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--accent) var(--progress, 0%), var(--track-bg) var(--progress, 0%));
    transition: --progress 0.1s linear;
  }

  .art-ring::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: var(--bg);
    transition: background var(--transition);
  }

  .album-art {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.6s ease;
  }

  .album-art.spinning {
    animation: spin 8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .album-art svg {
    width: 60%;
    height: 60%;
    opacity: 0.15;
  }

  .album-art-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(200,255,0,0.25) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(100,80,255,0.2) 0%, transparent 60%);
  }

  .track-number-badge {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 50px;
    letter-spacing: 0.05em;
  }

  /* ─── Track Info ─── */
  .track-info {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .track-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 6px;
    transition: color var(--transition);
  }

  .track-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color var(--transition);
  }

  .track-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(200,255,0,0.2);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 50px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ─── Waveform Visualizer ─── */
  .waveform {
    width: 100%;
    max-width: 400px;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 3px;
    justify-content: center;
  }

  .wave-bar {
    width: 3px;
    border-radius: 3px;
    background: var(--accent);
    opacity: 0.35;
    transition: height 0.1s ease, opacity 0.3s ease;
  }

  .wave-bar.active { opacity: 1; }

  /* ─── Progress ─── */
  .progress-section {
    width: 100%;
    max-width: 400px;
  }

  .time-display {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text2);
    margin-bottom: 8px;
    transition: color var(--transition);
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--track-bg);
    border-radius: 4px;
    position: relative;
    cursor: pointer;
    transition: background var(--transition);
  }

  .progress-track:hover { height: 6px; }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent-glow);
    transition: transform 0.15s ease;
  }

  .progress-track:hover .progress-fill::after { transform: translateY(-50%) scale(1); }

  /* ─── Controls ─── */
  .controls {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .main-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .ctrl-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    padding: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.92); }

  .ctrl-btn.active { color: var(--accent); }

  .play-btn {
    width: 68px; height: 68px;
    background: var(--accent);
    color: #000 !important;
    border-radius: 50%;
    box-shadow: 0 0 30px var(--accent-glow);
    transition: all 0.25s ease !important;
  }

  .play-btn:hover {
    transform: scale(1.08) !important;
    box-shadow: 0 0 40px var(--accent-glow) !important;
  }

  .play-btn:active { transform: scale(0.95) !important; }

  /* ─── Volume & Extra Controls ─── */
  .bottom-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vol-icon { color: var(--text2); flex-shrink: 0; }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    background: var(--track-bg);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: background var(--transition);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  /* ─── Playlist ─── */
  .playlist-section {
    width: 100%;
    max-width: 400px;
  }

  .playlist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .playlist-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .playlist-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
  }

  .playlist {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    -webkit-tap-highlight-color: transparent;
  }

  .playlist-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  .playlist-item.active {
    background: var(--accent-dim);
    border-color: rgba(200,255,0,0.2);
  }

  .item-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
    transition: color var(--transition);
  }

  .playlist-item.active .item-num { color: var(--accent); }

  .item-info { flex: 1; overflow: hidden; }

  .item-name {
    font-size: 0.9rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--transition);
  }

  .playlist-item.active .item-name { color: var(--accent); }

  .item-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    margin-top: 2px;
    transition: color var(--transition);
  }

  .item-dur {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    flex-shrink: 0;
    transition: color var(--transition);
  }

  .mini-play {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .playlist-item:hover .mini-play,
  .playlist-item.active .mini-play { opacity: 1; }

  .playlist-item.active .mini-play { background: var(--accent); color: #000; }
  .playlist-item:not(.active):hover .mini-play { background: var(--surface2); color: var(--text); }

  /* ─── Equalizer bars (active track) ─── */
  .eq-bars {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .playlist-item.active.playing .eq-bars { opacity: 1; }
  .playlist-item.active.playing .mini-play { display: none; }

  .eq-bar {
    width: 2px;
    border-radius: 2px;
    background: var(--accent);
    animation: eq 0.8s ease-in-out infinite alternate;
  }

  .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { height: 14px; animation-delay: 0.05s; }
  .eq-bar:nth-child(4) { height: 8px; animation-delay: 0.2s; }

  @keyframes eq {
    from { transform: scaleY(0.3); }
    to { transform: scaleY(1); }
  }

  /* ─── Footer ─── */
  footer {
    padding: 20px;
    text-align: center;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    transition: background var(--transition), border-color var(--transition);
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    line-height: 1.7;
    transition: color var(--transition);
  }

  .footer-text strong {
    color: var(--text);
    font-weight: 700;
    transition: color var(--transition);
  }

  .footer-accent { color: var(--accent); }

  /* ─── Divider ─── */
  .divider {
    width: 100%;
    max-width: 400px;
    height: 1px;
    background: var(--border);
    transition: background var(--transition);
  }

  /* ─── Open Files Button ─── */
  .open-files-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .open-files-btn:hover { transform: scale(1.05); box-shadow: 0 0 16px var(--accent-glow); }
  .open-files-btn:active { transform: scale(0.96); }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 50px;
    padding: 7px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:hover { border-color: #ff4444; color: #ff4444; }

  /* ─── Drop Zone ─── */
  .drop-zone {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    transition: all 0.2s ease;
  }

  .drop-zone:hover .drop-zone-icon,
  .drop-zone.drag-over .drop-zone-icon {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .drop-zone-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text2);
    transition: color 0.2s;
  }

  .drop-zone:hover .drop-zone-label,
  .drop-zone.drag-over .drop-zone-label { color: var(--accent); }

  .drop-zone-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  /* ─── Toast notification ─── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 10px 18px;
    border-radius: 50px;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    LUMINA
  </div>
  <div class="theme-switcher">
    <button class="theme-btn" onclick="setTheme('light')">☀ LIGHT</button>
    <button class="theme-btn active" onclick="setTheme('dark')">◑ DARK</button>
    <button class="theme-btn" onclick="setTheme('oled')">● OLED</button>
  </div>
</header>

<!-- ─── Main ─── -->
<main>

  <!-- Album Art -->
  <div class="art-container">
    <div class="art-ring" id="artRing"></div>
    <div class="album-art" id="albumArt">
      <div class="album-art-gradient"></div>
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="2"/>
        <circle cx="50" cy="50" r="6" fill="currentColor"/>
        <path d="M30 50 A20 20 0 0 1 70 50" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M20 50 A30 30 0 0 1 80 50" stroke="currentColor" stroke-width="2" fill="none" opacity="0.5"/>
      </svg>
      <div class="track-number-badge" id="trackBadge">01 / 06</div>
    </div>
  </div>

  <!-- Track Info -->
  <div class="track-info">
    <div class="track-title" id="trackTitle">Midnight Circuit</div>
    <div class="track-artist" id="trackArtist">Synthwave Collective</div>
    <div class="track-tags">
      <span class="tag" id="trackGenre">Electronic</span>
      <span class="tag" id="trackYear">2026</span>
      <span class="tag">320 kbps</span>
    </div>
  </div>

  <!-- Waveform Visualizer -->
  <div class="waveform" id="waveform"></div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="time-display">
      <span id="currentTime">0:00</span>
      <span id="totalTime">3:42</span>
    </div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="main-controls">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><polyline points="16 21 21 21 21 16"/>
          <path d="M4 20 21 3"/><path d="M4 4l5 5"/><path d="M15 15l6 6"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" title="Play/Pause">
        <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="bottom-controls">
      <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
      <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.97z"/>
      </svg>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Playlist -->
  <div class="playlist-section">
    <div class="playlist-header">
      <span class="playlist-title">Queue</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="clear-btn" onclick="clearQueue()" title="Clear queue">✕ Clear</button>
        <button class="open-files-btn" id="openFilesBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V6h5.17l2 2H20v10z"/></svg>
          OPEN FILES
        </button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="audio/*,video/*" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      </div>
      <div class="drop-zone-label">Drop audio / video files here</div>
      <div class="drop-zone-sub">or tap to browse · MP3, AAC, FLAC, WAV, OGG, MP4, WEBM</div>
    </div>
    <div class="playlist" id="playlist"></div>
    <span class="playlist-count" id="playlistCount" style="display:block;text-align:right;margin-top:8px;">0 tracks</span>
  </div>

</main>

<!-- ─── Footer ─── -->
<footer>
  <div class="footer-text">
    <span class="footer-accent">◈</span> LUMINA PLAYER &nbsp;·&nbsp;
    © <strong id="footerYear"></strong> <strong>Manik Roy</strong>
    <br>All Rights Reserved.
  </div>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── Audio Engine ───
  const audio = new Audio();
  audio.volume = 0.8;
  audio.preload = 'auto';

  // ─── Data & State ───
  const tracks = [];
  let currentTrack = 0;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat  = false;
  let rafId     = null;
  let pendingPlay = false; // waiting for canplay before calling .play()

  // ─── Footer Year ───
  document.getElementById('footerYear').textContent = new Date().getFullYear();

  // ─── Waveform ───
  const waveformEl = document.getElementById('waveform');
  const BAR_COUNT = 48;
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.height = (8 + Math.sin(i * 0.4) * 12 + Math.random() * 16) + 'px';
    waveformEl.appendChild(b);
  }

  // ─── Helpers ───
  function fmtTime(sec) {
    if (!isFinite(sec) || sec < 0) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateCount() {
    document.getElementById('playlistCount').textContent =
      tracks.length + (tracks.length === 1 ? ' track' : ' tracks');
  }

  function toggleDropZone() {
    document.getElementById('dropZone').style.display = tracks.length === 0 ? 'flex' : 'none';
  }

  function resetDisplay() {
    document.getElementById('trackTitle').textContent   = 'No Track';
    document.getElementById('trackArtist').textContent  = 'Open files to begin';
    document.getElementById('trackGenre').textContent   = '—';
    document.getElementById('trackYear').textContent    = '—';
    document.getElementById('totalTime').textContent    = '0:00';
    document.getElementById('currentTime').textContent  = '0:00';
    document.getElementById('trackBadge').textContent   = '— / —';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('artRing').style.setProperty('--progress','0%');
    document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
    document.getElementById('albumArt').classList.remove('spinning');
    updatePlayIcon();
  }

  // ─── File Input (reset value so same file can be re-selected) ───
  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('click', () => { fileInput.value = ''; });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));

  // ─── Drop Zone (stop click bubbling to document) ───
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.value = '';
    fileInput.click();
  });

  // Prevent drop zone's onclick attr firing too — remove it
  dropZone.removeAttribute('onclick');

  document.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropZone.classList.remove('drag-over'); });
  document.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  // ─── Handle Files ───
  function handleFiles(files) {
    if (!files || !files.length) return;
    const SUPPORTED = /^(audio|video)\//;
    const arr = Array.from(files).filter(f => SUPPORTED.test(f.type));
    if (!arr.length) { showToast('No supported audio/video files'); return; }

    const firstNewIndex = tracks.length; // index of first newly added track
    let loaded = 0;

    arr.forEach(file => {
      const base   = file.name.replace(/\.[^/.]+$/, '');
      const parts  = base.split(' - ');
      const title  = parts.length >= 2 ? parts.slice(1).join(' - ').trim() : base;
      const artist = parts.length >= 2 ? parts[0].trim() : 'Unknown Artist';
      const ext    = file.name.split('.').pop().toUpperCase();

      const track = {
        title, artist,
        genre: ext,
        year: String(new Date().getFullYear()),
        duration: '—', durationSec: 0,
        url: null, file
      };
      tracks.push(track);

      // Read file as base64 data URL — works in all sandbox/browser contexts
      const reader = new FileReader();
      reader.onload = e => {
        track.url = e.target.result;

        // Probe duration using the data URL
        const tmp = new Audio();
        tmp.preload = 'metadata';
        tmp.addEventListener('loadedmetadata', () => {
          if (isFinite(tmp.duration) && tmp.duration > 0) {
            track.duration    = fmtTime(tmp.duration);
            track.durationSec = tmp.duration;
          }
          tmp.src = '';
          loaded++;
          renderPlaylist();
          updateCount();
        }, { once: true });
        tmp.addEventListener('error', () => { loaded++; }, { once: true });
        tmp.src = track.url;

        // Auto-load the first new track into the player once its URL is ready
        if (tracks.indexOf(track) === firstNewIndex && !audio.src) {
          loadTrack(firstNewIndex, false);
        }
      };
      reader.onerror = () => { loaded++; };
      reader.readAsDataURL(file);
    });

    toggleDropZone();
    renderPlaylist();
    updateCount();
    showToast(arr.length === 1 ? '1 file added' : arr.length + ' files added');

    // Auto-load the first newly added track (don't auto-play — wait for user)
    if (firstNewIndex === 0 || !audio.src) {
      loadTrack(firstNewIndex, false);
    }
  }

  // ─── Render Playlist ───
  const playlistEl = document.getElementById('playlist');
  function renderPlaylist() {
    playlistEl.innerHTML = '';
    tracks.forEach((t, i) => {
      const active = i === currentTrack;
      const div = document.createElement('div');
      div.className = 'playlist-item' + (active ? ' active' + (isPlaying ? ' playing' : '') : '');

      div.addEventListener('click', () => selectTrack(i));
      div.addEventListener('contextmenu', e => { e.preventDefault(); removeTrack(i); });

      div.innerHTML = `
        <span class="item-num">${String(i+1).padStart(2,'0')}</span>
        <div class="item-info">
          <div class="item-name">${escHtml(t.title)}</div>
          <div class="item-meta">${escHtml(t.artist)}</div>
        </div>
        <div class="eq-bars">
          <div class="eq-bar"></div><div class="eq-bar"></div>
          <div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
        <div class="mini-play">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            ${active && isPlaying
              ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
              : '<path d="M8 5v14l11-7z"/>'}
          </svg>
        </div>
        <span class="item-dur">${escHtml(t.duration)}</span>`;
      playlistEl.appendChild(div);
    });
  }

  // ─── Load Track ───
  function loadTrack(index, autoPlay = false) {
    if (!tracks.length) return;
    currentTrack = index;
    const t = tracks[index];

    // Stop current playback cleanly
    pendingPlay = false;
    audio.pause();
    cancelAnimationFrame(rafId);
    isPlaying = false;

    // Update UI immediately
    document.getElementById('trackTitle').textContent   = t.title;
    document.getElementById('trackArtist').textContent  = t.artist;
    document.getElementById('trackGenre').textContent   = t.genre;
    document.getElementById('trackYear').textContent    = t.year;
    document.getElementById('totalTime').textContent    = t.duration;
    document.getElementById('currentTime').textContent  = '0:00';
    document.getElementById('trackBadge').textContent   =
      String(index+1).padStart(2,'0') + ' / ' + String(tracks.length).padStart(2,'0');
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('artRing').style.setProperty('--progress','0%');
    document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
    document.getElementById('albumArt').classList.remove('spinning');
    updatePlayIcon();
    renderPlaylist();

    // If FileReader hasn't finished yet, wait for it
    if (!t.url) {
      if (autoPlay) pendingPlay = true; // will be picked up once url is set
      return;
    }

    audio.src = t.url;

    if (autoPlay) {
      pendingPlay = true;
      audio.addEventListener('canplay', function onCanPlay() {
        audio.removeEventListener('canplay', onCanPlay);
        if (!pendingPlay) return;
        pendingPlay = false;
        audio.play().then(() => {
          isPlaying = true;
          startRAF();
          updatePlayIcon();
          renderPlaylist();
        }).catch(err => {
          console.warn('play() failed:', err);
          isPlaying = false;
          updatePlayIcon();
          renderPlaylist();
        });
      });
    }
  }

  // ─── RAF Progress Loop ───
  function startRAF() {
    cancelAnimationFrame(rafId);
    function tick() {
      if (isFinite(audio.duration) && audio.duration > 0) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('artRing').style.setProperty('--progress', pct + '%');
        document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
        // Back-fill duration if probe was slow
        const cur = tracks[currentTrack];
        if (cur && cur.durationSec === 0) {
          cur.durationSec = audio.duration;
          cur.duration    = fmtTime(audio.duration);
          document.getElementById('totalTime').textContent = cur.duration;
          renderPlaylist();
        }
        const activeBars = Math.floor((pct / 100) * BAR_COUNT);
        document.querySelectorAll('.wave-bar').forEach((b, i) =>
          b.classList.toggle('active', i < activeBars));
      }
      if (isPlaying) rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  // ─── Audio Events ───
  audio.addEventListener('play', () => {
    isPlaying = true;
    document.getElementById('albumArt').classList.add('spinning');
    updatePlayIcon(); renderPlaylist(); startRAF();
  });

  audio.addEventListener('pause', () => {
    isPlaying = false;
    document.getElementById('albumArt').classList.remove('spinning');
    updatePlayIcon(); renderPlaylist();
  });

  audio.addEventListener('ended', () => {
    isPlaying = false;
    cancelAnimationFrame(rafId);
    if (isRepeat) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    } else if (isShuffle) {
      loadTrack(Math.floor(Math.random() * tracks.length), true);
    } else if (currentTrack < tracks.length - 1) {
      loadTrack(currentTrack + 1, true);
    } else {
      // End of queue
      document.getElementById('albumArt').classList.remove('spinning');
      updatePlayIcon(); renderPlaylist();
    }
  });

  audio.addEventListener('error', () => {
    isPlaying = false; pendingPlay = false;
    showToast('Error loading file');
    updatePlayIcon(); renderPlaylist();
  });

  // ─── Play / Pause ───
  function togglePlay() {
    if (!tracks.length) { showToast('Open files to play'); return; }

    if (!audio.src || audio.src === window.location.href) {
      // Nothing loaded yet — load current and play
      loadTrack(currentTrack, true);
      return;
    }

    if (audio.paused) {
      pendingPlay = true;
      audio.play().then(() => { pendingPlay = false; }).catch(err => {
        pendingPlay = false;
        console.warn('play() failed:', err);
      });
    } else {
      pendingPlay = false;
      audio.pause();
    }
  }

  function updatePlayIcon() {
    document.getElementById('playIcon').innerHTML = isPlaying
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  // ─── Navigation ───
  function selectTrack(i) {
    loadTrack(i, isPlaying || true); // clicking a track always starts playing
  }

  function prevTrack() {
    if (!tracks.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    loadTrack((currentTrack - 1 + tracks.length) % tracks.length, isPlaying);
  }

  function nextTrack() {
    if (!tracks.length) return;
    const i = isShuffle
      ? Math.floor(Math.random() * tracks.length)
      : (currentTrack + 1) % tracks.length;
    loadTrack(i, isPlaying);
  }

  // ─── Remove / Clear ───
  function removeTrack(i) {
    const wasActive = i === currentTrack;
    tracks.splice(i, 1);
    if (!tracks.length) {
      pendingPlay = false;
      audio.pause(); audio.src = '';
      isPlaying = false; cancelAnimationFrame(rafId);
      resetDisplay(); toggleDropZone(); updateCount();
      showToast('Queue empty');
      return;
    }
    if (wasActive) {
      currentTrack = Math.min(i, tracks.length - 1);
      loadTrack(currentTrack, isPlaying);
    } else if (i < currentTrack) {
      currentTrack--;
    }
    renderPlaylist(); updateCount();
    showToast('Removed');
  }

  function clearQueue() {
    if (!tracks.length) return;
    pendingPlay = false;
    audio.pause(); audio.src = '';
    isPlaying = false; cancelAnimationFrame(rafId);
    tracks.forEach(t => { t.url = null; });
    tracks.length = 0;
    currentTrack  = 0;
    resetDisplay(); renderPlaylist(); updateCount(); toggleDropZone();
    showToast('Queue cleared');
  }

  // ─── Shuffle / Repeat ───
  function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
    showToast(isShuffle ? 'Shuffle On' : 'Shuffle Off');
  }

  function toggleRepeat() {
    isRepeat = !isRepeat;
    audio.loop = false; // we manage repeat manually via 'ended'
    document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
    showToast(isRepeat ? 'Repeat On' : 'Repeat Off');
  }

  // ─── Volume ───
  function setVolume(v) { audio.volume = v / 100; }

  // ─── Seek ───
  document.getElementById('progressTrack').addEventListener('click', function(e) {
    if (!tracks.length || !isFinite(audio.duration)) return;
    const rect = this.getBoundingClientRect();
    audio.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * audio.duration;
  });

  // ─── Theme ───
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.theme-btn').forEach(b =>
      b.classList.toggle('active', b.textContent.toLowerCase().includes(theme)));
    showToast(theme === 'oled' ? 'OLED True Black' : theme.charAt(0).toUpperCase() + theme.slice(1) + ' Mode');
  }

  // ─── Toast ───
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Init ───
  document.getElementById('openFilesBtn').addEventListener('click', () => {
    fileInput.value = '';
    fileInput.click();
  });
  resetDisplay();
  renderPlaylist();
  toggleDropZone();
  updateCount();
</script>
</body>
</html>
