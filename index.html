<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Weather UI</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  text-align:center;
}
.temp{
  font-size:120px;
  font-weight:300;
}
.icon{
  font-size:80px;
  margin-top:10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="temp" id="temp">--°C</div>
  <div class="icon" id="icon">⛅</div>
</div>

<script>
function getWeatherIcon(code){
  if(code===0)return"☀️";
  if(code<=3)return"⛅";
  if(code<=48)return"🌫";
  if(code<=67)return"🌧";
  if(code<=77)return"🌨";
  if(code<=82)return"🌦";
  if(code<=99)return"⛈";
  return"🌍";
}

async function loadWeather(){
  let lat=22.57, lon=88.36;
  let data=await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)).json();

  let temp=data.current_weather.temperature;
  let code=data.current_weather.weathercode;

  document.getElementById("temp").innerText=temp.toFixed(1)+"°C";
  document.getElementById("icon").innerText=getWeatherIcon(code);
}

loadWeather();
</script>
</body>
</html>
