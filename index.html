<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>LensCraft — Camera</title>
<style>
:root{
  --bg:#0d0f12; --panel:#15181c; --panel2:#1b1f24; --text:#f0f2f4; --sub:#8a929c;
  --accent:#4da3ff; --danger:#ff5252; --border:#252a30; --shutter:#ffffff;
}
[data-theme="light"]{
  --bg:#f4f5f7; --panel:#ffffff; --panel2:#eceef1; --text:#14171a; --sub:#5b6570;
  --accent:#2f7de1; --danger:#e0342b; --border:#dde1e6; --shutter:#14171a;
}
[data-theme="oled"]{
  --bg:#000000; --panel:#000000; --panel2:#0a0a0a; --text:#ffffff; --sub:#7d7d7d;
  --accent:#4da3ff; --danger:#ff5252; --border:#1a1a1a; --shutter:#ffffff;
}
[data-theme="hc"]{
  --bg:#000000; --panel:#000000; --panel2:#000000; --text:#ffffff; --sub:#ffffff;
  --accent:#ffe600; --danger:#ff3b3b; --border:#ffffff; --shutter:#ffe600;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:#000;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text); font-variant-numeric:tabular-nums;
  display:flex; justify-content:center; background:var(--bg);
}
.app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:6px;background:var(--panel);border-bottom:1px solid var(--border);z-index:5;}
.topbar h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.3px;}
.iconbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
.iconbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.theme-row{display:flex;gap:5px;}
.theme-row button{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;}
.theme-row button.on{border-color:var(--accent);}
.t-dark{background:#111}.t-light{background:#f4f5f7}.t-oled{background:#000}.t-hc{background:#000;box-shadow:inset 0 0 0 2px #ffe600;}

/* Viewfinder */
.viewport{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;}
video{width:100%;height:100%;object-fit:cover;}
video.mirror{transform:scaleX(-1);}
canvas.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
.grid{position:absolute;inset:0;pointer-events:none;display:none;}
.grid.on{display:block;}
.grid::before,.grid::after{content:"";position:absolute;background:rgba(255,255,255,.4);}
.grid-v1{position:absolute;left:33.33%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.4);}
.grid-v2{position:absolute;left:66.66%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.4);}
.grid-h1{position:absolute;top:33.33%;left:0;right:0;height:1px;background:rgba(255,255,255,.4);}
.grid-h2{position:absolute;top:66.66%;left:0;right:0;height:1px;background:rgba(255,255,255,.4);}
.timerNum{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:88px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6);}
.timerNum.show{display:flex;}
.reticle{position:absolute;width:64px;height:64px;margin:-32px 0 0 -32px;border:2px solid #fff;border-radius:6px;opacity:0;pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,0);}
.reticle.show{animation:focusPulse .7s ease-out;}
@keyframes focusPulse{0%{opacity:1;transform:scale(1.3);border-color:#ffe600;}60%{opacity:1;transform:scale(1);border-color:#fff;}100%{opacity:0;transform:scale(1);}}
.placeholder{color:var(--sub);font-size:14px;text-align:center;padding:0 20px;}
.sliderWrap{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:70%;display:none;align-items:center;gap:8px;background:rgba(0,0,0,.4);padding:6px 12px;border-radius:20px;}
.sliderWrap.on{display:flex;}
.sliderWrap input{flex:1;accent-color:var(--accent);}
.sliderWrap span{font-size:11px;color:#fff;min-width:30px;text-align:right;}
.recBadge{position:absolute;top:12px;left:14px;display:none;align-items:center;gap:6px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:5px 10px;border-radius:12px;}
.recBadge.on{display:flex;}
.recDot{width:9px;height:9px;border-radius:50%;background:#ff3b3b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.modeToggle{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
.modeToggle button{background:var(--panel2);border:1px solid var(--border);color:var(--sub);border-radius:14px;padding:6px 16px;font-size:12px;cursor:pointer;}
.modeToggle button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.shutterBtn.recording{border-color:var(--danger);}
.shutterBtn.recording::after{border-radius:6px;background:var(--danger);width:30px;height:30px;}
.modal video{max-width:92%;max-height:74%;border-radius:8px;}

/* Filter strip */
.filters{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:var(--panel);border-top:1px solid var(--border);}
.filters::-webkit-scrollbar{display:none;}
.fchip{flex:0 0 auto;padding:7px 13px;border-radius:16px;background:var(--panel2);border:1px solid var(--border);color:var(--sub);font-size:12px;cursor:pointer;white-space:nowrap;}
.fchip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Controls */
.controls{background:var(--panel);padding:14px 16px 10px;border-top:1px solid var(--border);}
.rowbtns{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.pill{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:7px 12px;font-size:11.5px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.shutterRow{display:flex;align-items:center;justify-content:space-between;padding:0 10px;}
.thumb{width:48px;height:48px;border-radius:10px;border:2px solid var(--border);background:var(--panel2) center/cover no-repeat;cursor:pointer;flex-shrink:0;}
.shutterBtn{width:74px;height:74px;border-radius:50%;background:transparent;border:4px solid var(--shutter);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.shutterBtn::after{content:"";width:58px;height:58px;border-radius:50%;background:var(--shutter);}
.shutterBtn:active::after{width:48px;height:48px;}
.switchBtn{width:48px;height:48px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

/* Gallery modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;}
.modal.on{display:flex;}
.modal img{max-width:92%;max-height:74%;border-radius:8px;object-fit:contain;}
.modalBar{display:flex;gap:12px;margin-top:16px;}
.modalBar button{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 18px;font-size:13px;cursor:pointer;}
.modalBar button.close{background:var(--danger);color:#fff;border-color:var(--danger);}
.count{position:absolute;top:12px;right:14px;color:#fff;font-size:12px;background:rgba(0,0,0,.5);padding:4px 9px;border-radius:10px;}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:10px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;}
.toast.show{opacity:1;}

footer{text-align:center;padding:10px 8px 14px;font-size:11px;color:var(--sub);background:var(--panel);line-height:1.5;}
</style>
</head>
<body>
<div class="app" data-theme="dark" id="app">

  <div class="topbar">
    <h1>📷 LensCraft</h1>
    <div class="theme-row" id="themeRow">
      <button class="t-dark on" data-th="dark" title="Dark"></button>
      <button class="t-light" data-th="light" title="Light"></button>
      <button class="t-oled" data-th="oled" title="OLED"></button>
      <button class="t-hc" data-th="hc" title="High Contrast"></button>
    </div>
  </div>

  <div class="viewport" id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <div class="placeholder" id="placeholder">Tap "Start Camera" below to begin. Camera access needed — works fully offline, no keys or accounts required.</div>
    <div class="grid" id="grid"><div class="grid-v1"></div><div class="grid-v2"></div><div class="grid-h1"></div><div class="grid-h2"></div></div>
    <div class="timerNum" id="timerNum"></div>
    <div class="reticle" id="reticle"></div>
    <canvas class="flash" id="flashCanvas"></canvas>
    <div class="count" id="shotCount" style="display:none">0 shots</div>
    <div class="recBadge" id="recBadge"><div class="recDot"></div><span id="recTime">00:00</span></div>
    <div class="sliderWrap" id="zoomWrap">
      <span>1.0×</span><input type="range" id="zoomRange" min="1" max="5" step="0.1" value="1"><span id="zoomVal">1.0×</span>
    </div>
    <div class="sliderWrap" id="expWrap">
      <span>☀</span><input type="range" id="expRange" min="-3" max="3" step="0.5" value="0"><span id="expVal">0</span>
    </div>
  </div>

  <div class="filters" id="filters">
    <div class="fchip on" data-f="none">Normal</div>
    <div class="fchip" data-f="grayscale(1)">B&W</div>
    <div class="fchip" data-f="sepia(.8)">Sepia</div>
    <div class="fchip" data-f="contrast(1.3) saturate(1.4)">Vivid</div>
    <div class="fchip" data-f="brightness(1.15) contrast(.95) saturate(.85)">Soft</div>
    <div class="fchip" data-f="invert(1)">Invert</div>
    <div class="fchip" data-f="grayscale(.3) contrast(1.2) brightness(.9)">Noir</div>
    <div class="fchip" data-f="hue-rotate(200deg) saturate(1.5)">Cool</div>
    <div class="fchip" data-f="hue-rotate(-25deg) saturate(1.3) brightness(1.05)">Warm</div>
    <div class="fchip" data-f="contrast(1.1) brightness(1.05) saturate(1.2) drop-shadow(0 0 0 transparent)">Film</div>
  </div>

  <div class="controls">
    <div class="modeToggle" id="modeToggle">
      <button class="on" data-mode="photo">📷 Photo</button>
      <button data-mode="video">🎥 Video</button>
    </div>
    <div class="rowbtns">
      <button class="pill" id="startBtn">▶ Start Camera</button>
      <button class="pill" id="gridBtn">▦ Grid</button>
      <button class="pill" id="flashBtn">⚡ Flash</button>
      <button class="pill" id="timerBtn">⏱ Off</button>
      <button class="pill" id="zoomBtn">🔍 Zoom</button>
      <button class="pill" id="ratioBtn">16:9</button>
      <button class="pill" id="expBtn">☀ Exposure</button>
      <button class="pill" id="geoBtn">📍 Geotag</button>
    </div>
    <div class="shutterRow">
      <div class="thumb" id="thumb"></div>
      <div class="shutterBtn" id="shutterBtn"></div>
      <div class="switchBtn" id="switchBtn">⟲</div>
    </div>
  </div>

  <footer>© Manik Roy <span id="year"></span>. All Rights Reserved.</footer>

  <div class="modal" id="modal">
    <img id="modalImg" src="" alt="Captured photo">
    <video id="modalVideo" controls playsinline style="display:none"></video>
    <div class="modalBar">
      <button id="dlBtn">⬇ Download</button>
      <button id="shareBtn">↗ Share</button>
      <button class="close" id="closeModal">Close</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// ---------- Theme ----------
const app = document.getElementById('app');
document.getElementById('themeRow').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  const th = b.dataset.th;
  app.setAttribute('data-theme', th);
  document.querySelectorAll('.theme-row button').forEach(x=>x.classList.toggle('on', x===b));
  localStorage.setItem('lc_theme', th);
});
(function(){
  const saved = localStorage.getItem('lc_theme');
  if(saved){ app.setAttribute('data-theme', saved);
    document.querySelectorAll('.theme-row button').forEach(x=>x.classList.toggle('on', x.dataset.th===saved)); }
})();

// ---------- State ----------
let stream=null, currentFacing='environment', track=null, capabilities=null;
let currentFilter='none', gridOn=false, timerSec=0, mirrored=false, shots=0;
let geotagOn=false, lastCoords=null, mode='photo', mediaRecorder=null, recChunks=[], recStart=0, recInterval=null;
let lastMedia=null, lastMediaType='image';
const video=document.getElementById('video'), placeholder=document.getElementById('placeholder');
const toastEl=document.getElementById('toast');
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),1800); }

// ---------- Camera start/stop ----------
async function startCamera(facing){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast('Camera API not supported on this browser'); return;
  }
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    const constraints = { video:{ facingMode:{ideal:facing}, width:{ideal:1920}, height:{ideal:1080}, focusMode:{ideal:'continuous'} }, audio:false };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];
    capabilities = track.getCapabilities ? track.getCapabilities() : {};
    currentFacing = facing;
    mirrored = facing==='user';
    video.classList.toggle('mirror', mirrored);
    placeholder.style.display='none';
    document.getElementById('startBtn').textContent='⏹ Stop';
    document.getElementById('shotCount').style.display='block';
    await enableContinuousFocus();
    setupZoom();
    setupExposure();
    setupFlashAvailability();
  }catch(err){
    toast('Camera access denied or unavailable');
  }
}
function stopCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; video.srcObject=null;
  placeholder.style.display='flex';
  document.getElementById('startBtn').textContent='▶ Start Camera';
}
document.getElementById('startBtn').addEventListener('click', ()=>{
  if(stream) stopCamera(); else startCamera(currentFacing);
});
document.getElementById('switchBtn').addEventListener('click', ()=>{
  if(!stream){ toast('Start the camera first'); return; }
  startCamera(currentFacing==='environment' ? 'user' : 'environment');
});

// ---------- Autofocus ----------
async function enableContinuousFocus(){
  if(!track || !capabilities || !capabilities.focusMode) return;
  if(capabilities.focusMode.includes('continuous')){
    try{ await track.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){}
  }
}
async function focusAt(xRatio, yRatio){
  if(!track || !capabilities) return;
  try{
    if(capabilities.focusMode && capabilities.focusMode.includes('single-shot') && capabilities.pointsOfInterest){
      await track.applyConstraints({advanced:[{pointsOfInterest:[{x:xRatio,y:yRatio}], focusMode:'single-shot'}]});
      setTimeout(enableContinuousFocus, 1800);
    } else if(capabilities.focusMode && capabilities.focusMode.includes('continuous')){
      await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
    }
  }catch(e){}
}
const viewport=document.getElementById('viewport'), reticle=document.getElementById('reticle');
viewport.addEventListener('click', e=>{
  if(!stream || e.target.closest('.sliderWrap')) return;
  const rect=viewport.getBoundingClientRect();
  const xr=(e.clientX-rect.left)/rect.width, yr=(e.clientY-rect.top)/rect.height;
  reticle.style.left=(e.clientX-rect.left)+'px'; reticle.style.top=(e.clientY-rect.top)+'px';
  reticle.classList.remove('show'); void reticle.offsetWidth; reticle.classList.add('show');
  focusAt(xr, yr);
});

// ---------- Pinch to zoom ----------
let pinchStartDist=0, pinchStartZoom=1;
viewport.addEventListener('touchstart', e=>{
  if(e.touches.length===2 && capabilities && capabilities.zoom){
    pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchStartZoom=parseFloat(document.getElementById('zoomRange').value)||1;
  }
}, {passive:true});
viewport.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && capabilities && capabilities.zoom && pinchStartDist>0){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const zc=capabilities.zoom;
    let z=pinchStartZoom*(dist/pinchStartDist);
    z=Math.min(zc.max, Math.max(zc.min, z));
    const range=document.getElementById('zoomRange');
    range.min=zc.min; range.max=zc.max; range.step=zc.step||0.1; range.value=z;
    document.getElementById('zoomVal').textContent=z.toFixed(1)+'×';
    track.applyConstraints({advanced:[{zoom:z}]}).catch(()=>{});
  }
}, {passive:true});
viewport.addEventListener('touchend', e=>{ if(e.touches.length<2) pinchStartDist=0; }, {passive:true});

// ---------- Grid ----------
document.getElementById('gridBtn').addEventListener('click', function(){
  gridOn=!gridOn;
  document.getElementById('grid').classList.toggle('on', gridOn);
  this.classList.toggle('active', gridOn);
});

// ---------- Flash / torch ----------
function setupFlashAvailability(){
  const flashBtn=document.getElementById('flashBtn');
  if(capabilities && capabilities.torch){ flashBtn.style.opacity=1; }
  else{ flashBtn.style.opacity=.5; }
}
let torchOn=false;
document.getElementById('flashBtn').addEventListener('click', async function(){
  if(!track || !capabilities || !capabilities.torch){ toast('Torch not supported on this device'); return; }
  torchOn=!torchOn;
  try{ await track.applyConstraints({advanced:[{torch:torchOn}]}); this.classList.toggle('active', torchOn); }
  catch(e){ toast('Could not toggle torch'); }
});

// ---------- Timer ----------
const timerOpts=[0,3,10]; let timerIdx=0;
document.getElementById('timerBtn').addEventListener('click', function(){
  timerIdx=(timerIdx+1)%timerOpts.length; timerSec=timerOpts[timerIdx];
  this.textContent = timerSec===0 ? '⏱ Off' : '⏱ '+timerSec+'s';
  this.classList.toggle('active', timerSec!==0);
});

// ---------- Zoom ----------
function setupZoom(){
  const zoomBtn=document.getElementById('zoomBtn');
  if(capabilities && capabilities.zoom){ zoomBtn.style.opacity=1; }
  else{ zoomBtn.style.opacity=.5; }
}
document.getElementById('zoomBtn').addEventListener('click', function(){
  const wrap=document.getElementById('zoomWrap');
  if(!capabilities || !capabilities.zoom){ toast('Zoom not supported on this device'); return; }
  document.getElementById('expWrap').classList.remove('on');
  document.getElementById('expBtn').classList.remove('active');
  wrap.classList.toggle('on');
  this.classList.toggle('active', wrap.classList.contains('on'));
  const range=document.getElementById('zoomRange');
  range.min=capabilities.zoom.min; range.max=capabilities.zoom.max; range.step=capabilities.zoom.step||0.1;
});
document.getElementById('zoomRange').addEventListener('input', async function(){
  document.getElementById('zoomVal').textContent=parseFloat(this.value).toFixed(1)+'×';
  if(track) try{ await track.applyConstraints({advanced:[{zoom:parseFloat(this.value)}]}); }catch(e){}
});

// ---------- Exposure ----------
function setupExposure(){
  const expBtn=document.getElementById('expBtn');
  expBtn.style.opacity = (capabilities && capabilities.exposureCompensation) ? 1 : .5;
}
document.getElementById('expBtn').addEventListener('click', function(){
  const wrap=document.getElementById('expWrap');
  if(!capabilities || !capabilities.exposureCompensation){ toast('Manual exposure not supported on this device'); return; }
  document.getElementById('zoomWrap').classList.remove('on');
  document.getElementById('zoomBtn').classList.remove('active');
  wrap.classList.toggle('on');
  this.classList.toggle('active', wrap.classList.contains('on'));
  const range=document.getElementById('expRange'), ec=capabilities.exposureCompensation;
  range.min=ec.min; range.max=ec.max; range.step=ec.step||0.5;
});
document.getElementById('expRange').addEventListener('input', async function(){
  document.getElementById('expVal').textContent=parseFloat(this.value).toFixed(1);
  if(track) try{ await track.applyConstraints({advanced:[{exposureCompensation:parseFloat(this.value)}]}); }catch(e){}
});

// ---------- Geotag ----------
document.getElementById('geoBtn').addEventListener('click', function(){
  geotagOn=!geotagOn;
  this.classList.toggle('active', geotagOn);
  if(geotagOn && navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{ lastCoords={lat:pos.coords.latitude, lon:pos.coords.longitude}; toast('Location acquired for stamping'); },
      ()=>{ lastCoords=null; toast('Location unavailable — stamping date/time only'); },
      {timeout:8000}
    );
  } else if(!geotagOn){ lastCoords=null; }
});

// ---------- Aspect ratio ----------
const ratios=['16:9','1:1','4:3']; let ratioIdx=0;
document.getElementById('ratioBtn').addEventListener('click', function(){
  ratioIdx=(ratioIdx+1)%ratios.length;
  this.textContent=ratios[ratioIdx];
  const vp=document.getElementById('viewport');
  vp.style.aspectRatio = ratios[ratioIdx]==='16:9' ? '' : ratios[ratioIdx].replace(':','/');
});

// ---------- Filters ----------
document.getElementById('filters').addEventListener('click', e=>{
  const c=e.target.closest('.fchip'); if(!c) return;
  document.querySelectorAll('.fchip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  currentFilter = c.dataset.f;
  video.style.filter = currentFilter==='none' ? '' : currentFilter;
});

// ---------- Capture ----------
let lastPhoto=null;
async function doCapture(){
  if(!stream){ toast('Start the camera first'); return; }
  const w=video.videoWidth, h=video.videoHeight;
  const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.filter = currentFilter==='none' ? 'none' : currentFilter;
  if(mirrored){ ctx.translate(w,0); ctx.scale(-1,1); }
  ctx.drawImage(video,0,0,w,h);
  ctx.setTransform(1,0,0,1,0,0); ctx.filter='none';
  if(geotagOn){
    const stampLines=[ new Date().toLocaleString() ];
    stampLines.push(lastCoords ? `${lastCoords.lat.toFixed(5)}, ${lastCoords.lon.toFixed(5)}` : 'Location unavailable');
    const fs=Math.max(16, Math.round(w*0.018));
    ctx.font=`600 ${fs}px -apple-system,Arial,sans-serif`;
    ctx.textBaseline='bottom';
    const padding=fs*0.7, lh=fs*1.3;
    const boxH=lh*stampLines.length+padding;
    ctx.fillStyle='rgba(0,0,0,.45)';
    ctx.fillRect(0,h-boxH,w,boxH);
    ctx.fillStyle='#fff';
    stampLines.forEach((line,i)=>{ ctx.fillText(line, padding*0.7, h-padding*0.5-(stampLines.length-1-i)*lh); });
  }
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);
  lastPhoto=dataUrl; lastMedia=dataUrl; lastMediaType='image';
  shots++; document.getElementById('shotCount').textContent=shots+' shot'+(shots===1?'':'s');
  const thumbEl=document.getElementById('thumb');
  thumbEl.style.backgroundImage=`url(${dataUrl})`; thumbEl.textContent='';
  flashEffect();
}
function flashEffect(){
  const fc=document.getElementById('flashCanvas');
  fc.style.transition='none'; fc.style.opacity=1;
  requestAnimationFrame(()=>{ fc.style.transition='opacity .3s'; fc.style.opacity=0; });
}
document.getElementById('shutterBtn').addEventListener('click', async ()=>{
  if(mode==='video'){ toggleRecording(); return; }
  if(timerSec>0){
    const tEl=document.getElementById('timerNum'); tEl.classList.add('show');
    for(let i=timerSec;i>0;i--){ tEl.textContent=i; await new Promise(r=>setTimeout(r,1000)); }
    tEl.classList.remove('show');
  }
  doCapture();
});

// ---------- Mode toggle ----------
document.getElementById('modeToggle').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  mode=b.dataset.mode;
  document.querySelectorAll('#modeToggle button').forEach(x=>x.classList.toggle('on', x===b));
  if(mediaRecorder && mediaRecorder.state==='recording') toggleRecording();
});

// ---------- Video recording ----------
function toggleRecording(){
  if(!stream){ toast('Start the camera first'); return; }
  if(mediaRecorder && mediaRecorder.state==='recording'){ mediaRecorder.stop(); return; }
  if(!window.MediaRecorder){ toast('Video recording not supported on this browser'); return; }
  recChunks=[];
  let mime='video/webm';
  if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) mime='video/webm;codecs=vp9';
  else if(MediaRecorder.isTypeSupported('video/mp4')) mime='video/mp4';
  try{
    mediaRecorder = new MediaRecorder(stream, {mimeType:mime});
  }catch(e){ toast('Could not start recording'); return; }
  mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = ()=>{
    const blob=new Blob(recChunks, {type: mime.split(';')[0]});
    lastMedia=URL.createObjectURL(blob); lastMediaType='video';
    document.getElementById('shutterBtn').classList.remove('recording');
    document.getElementById('recBadge').classList.remove('on');
    clearInterval(recInterval);
    document.getElementById('thumb').style.backgroundImage='';
    document.getElementById('thumb').textContent='🎬';
    document.getElementById('thumb').style.display='flex';
    document.getElementById('thumb').style.alignItems='center';
    document.getElementById('thumb').style.justifyContent='center';
    toast('Video recorded — tap thumbnail to view');
  };
  mediaRecorder.start();
  document.getElementById('shutterBtn').classList.add('recording');
  document.getElementById('recBadge').classList.add('on');
  recStart=Date.now();
  recInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-recStart)/1000);
    document.getElementById('recTime').textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },250);
}

// ---------- Gallery modal ----------
document.getElementById('thumb').addEventListener('click', ()=>{
  if(!lastMedia){ toast('No photo or video captured yet'); return; }
  const img=document.getElementById('modalImg'), vid=document.getElementById('modalVideo');
  if(lastMediaType==='video'){
    vid.src=lastMedia; vid.style.display='block'; img.style.display='none';
  } else {
    img.src=lastMedia; img.style.display='block'; vid.style.display='none'; vid.pause();
  }
  document.getElementById('modal').classList.add('on');
});
document.getElementById('closeModal').addEventListener('click', ()=>{
  document.getElementById('modal').classList.remove('on');
  document.getElementById('modalVideo').pause();
});
document.getElementById('dlBtn').addEventListener('click', ()=>{
  const a=document.createElement('a'); a.href=lastMedia;
  a.download = 'lenscraft_'+Date.now()+(lastMediaType==='video' ? '.webm' : '.jpg');
  a.click();
  toast((lastMediaType==='video'?'Video':'Photo')+' saved');
});
document.getElementById('shareBtn').addEventListener('click', async ()=>{
  try{
    const res=await fetch(lastMedia); const blob=await res.blob();
    const ext = lastMediaType==='video' ? 'webm' : 'jpg', type = lastMediaType==='video' ? 'video/webm' : 'image/jpeg';
    const file=new File([blob],'lenscraft.'+ext,{type});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'LensCraft'});
    } else { toast('Sharing not supported — use Download instead'); }
  }catch(e){ toast('Share failed'); }
});

// ---------- Keyboard (desktop testing) ----------
document.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); document.getElementById('shutterBtn').click(); } });

// ---------- Service worker guard (skip in sandboxed preview) ----------
if('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent.com') && window.top===window){
  window.addEventListener('load', ()=>{
    const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{});`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
