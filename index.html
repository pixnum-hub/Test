<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastu Compass Android</title>
<style>
:root {
  --bg-color:#121212; --text-color:#fff; --accent-color:#00ffcc; --highlight-color:#ffcc00;
}
[data-theme="light"]{ --bg-color:#f0f0f0; --text-color:#121212; --accent-color:#0077cc; --highlight-color:#ff6600; }
[data-theme="oled"]{ --bg-color:#000; --text-color:#00ffcc; --accent-color:#00ffcc; --highlight-color:#ffcc00; }

html,body{ margin:0; padding:0; height:100%; font-family:Arial,sans-serif; background:var(--bg-color); color:var(--text-color); display:flex; flex-direction:column; justify-content:center; align-items:center;}
.compass-container{ display:flex; flex-direction:column; align-items:center; text-align:center;}
.compass{ width:280px; height:280px; border:4px solid var(--accent-color); border-radius:50%; position:relative; display:flex; justify-content:center; align-items:center; margin-bottom:15px;}
.zone-label{ position:absolute; font-size:0.8rem; font-weight:bold; color:var(--text-color); transform:translate(-50%,-50%);}
.needle{ width:4px; height:120px; background:red; position:absolute; top:50%; transform-origin:bottom center; transition:transform 0.3s ease-out;}
.direction{ font-size:1.5rem; font-weight:bold; margin-bottom:5px;}
.vastu-suggestion{ font-size:1rem; margin-bottom:15px; max-width:250px;}
.theme-toggle{ margin:10px; display:flex; gap:10px;}
.theme-toggle button{ padding:8px 15px; border:none; border-radius:5px; cursor:pointer; background:var(--accent-color); color:var(--bg-color); font-weight:bold;}
footer{ margin-top:auto; padding:15px; font-size:0.9rem;}
@media(max-width:500px){ .compass{ width:180px; height:180px; } .needle{ height:90px; } }
</style>
</head>
<body>

<div class="compass-container">
  <div class="direction" id="direction">N</div>
  <div class="vastu-suggestion" id="suggestion">Align your home according to Vastu.</div>
  <div class="compass" id="compass">
    <div class="needle" id="needle"></div>
    <div class="zone-label" style="top:10%; left:50%;">N</div>
    <div class="zone-label" style="top:30%; left:80%;">NE</div>
    <div class="zone-label" style="top:50%; left:90%;">E</div>
    <div class="zone-label" style="top:70%; left:80%;">SE</div>
    <div class="zone-label" style="top:90%; left:50%;">S</div>
    <div class="zone-label" style="top:70%; left:20%;">SW</div>
    <div class="zone-label" style="top:50%; left:10%;">W</div>
    <div class="zone-label" style="top:30%; left:20%;">NW</div>
  </div>

  <div class="theme-toggle">
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('oled')">OLED</button>
  </div>
</div>

<footer>© Manik Roy <span id="year"></span>. All Rights Reserved.</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
function setTheme(theme){ document.documentElement.setAttribute('data-theme',theme); }

const needle=document.getElementById('needle');
const directionText=document.getElementById('direction');
const suggestionText=document.getElementById('suggestion');
const compass=document.getElementById('compass');

const vastuZones=[
  {dir:'N', text:'Wealth, Career – Safe, study, cash locker', start:337.5, end:22.5},
  {dir:'NE', text:'Puja / Meditation / Spiritual activities', start:22.5, end:67.5},
  {dir:'E', text:'Living room, windows, social interactions', start:67.5, end:112.5},
  {dir:'SE', text:'Kitchen / Fire-related items', start:112.5, end:157.5},
  {dir:'S', text:'Stability, master bedroom', start:157.5, end:202.5},
  {dir:'SW', text:'Heavy furniture, bedroom for elders', start:202.5, end:247.5},
  {dir:'W', text:'Children’s room, study, entertainment', start:247.5, end:292.5},
  {dir:'NW', text:'Guest room, storage', start:292.5, end:337.5}
];

function getZone(angle){
  for(let z of vastuZones){
    if(z.start>z.end){ if(angle>=z.start || angle<z.end) return z;}
    else{ if(angle>=z.start && angle<z.end) return z;}
  }
  return vastuZones[0];
}

function updateCompass(angle){
  angle=angle%360; if(angle<0) angle+=360;
  needle.style.transform=`rotate(${angle}deg)`;
  const zone=getZone(angle);
  directionText.textContent=zone.dir;
  suggestionText.textContent=zone.text;

  let gradient='';
  for(let z of vastuZones){
    gradient += (z===zone? 'var(--highlight-color)':'#222')+` ${z.start}deg ${z.end}deg,`;
  }
  gradient=gradient.slice(0,-1);
  compass.style.background=`conic-gradient(${gradient})`;
}

// Android sensor
if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation',event=>{
    if(event.alpha!==null){
      const heading=360-event.alpha; // rotate so top=North
      updateCompass(heading);
    }
  },true);
}else{
  alert("Device orientation not supported on this browser.");
}
</script>

</body>
</html>
