<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Geopolitics AI Prediction</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --card: #f2f2f2;
  --accent: #0077ff;
}

body.dark {
  --bg: #121212;
  --text: #fff;
  --card: #1e1e1e;
  --accent: #4da3ff;
}

body.oled {
  --bg: #000;
  --text: #fff;
  --card: #000;
  --accent: #00e5ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 16px;
  max-width: 650px;
  margin: auto;
}

h1 { text-align: center; }

.card {
  background: var(--card);
  padding: 16px;
  border-radius: 14px;
  margin-top: 12px;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

button {
  background: var(--accent);
  color: white;
  cursor: pointer;
}

.toggle-group {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.footer {
  text-align: center;
  padding: 12px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌍 AI Geopolitics Prediction</h1>

  <div class="card">
    <label>Select Country:</label>
    <select id="countrySelect"></select>

    <label>Select Target Year:</label>
    <select id="yearSelect"></select>

    <button onclick="generatePrediction()">Generate AI Forecast</button>

    <div id="results"></div>

    <div class="toggle-group">
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('oled')">OLED</button>
    </div>
  </div>
</div>

<div class="footer">
  © Manik Roy <span id="year"></span>. All Rights Reserved.
</div>

<script>
const countries = [
"United States","China","India","Russia","United Kingdom","Germany","France",
"Japan","Brazil","Canada","Australia","South Korea","Indonesia","Saudi Arabia",
"South Africa","Italy","Mexico","Turkey","Iran","Pakistan",
"Bangladesh","Nigeria","Argentina","Egypt","Ukraine","Spain",
"Netherlands","Switzerland","Sweden","Norway","Poland","Israel",
"UAE","Qatar","Singapore","Malaysia","Thailand","Vietnam",
"Philippines","Nepal","Sri Lanka","Afghanistan","Iraq","Syria",
"North Korea","Ethiopia","Kenya","Colombia","Peru","Chile"
];

const features = [
"Political Stability","Military Strength","Economic Growth","Inflation Rate",
"Foreign Relations","Trade Balance","Cyber Security","Energy Security",
"Climate Risk","Defense Budget","Technological Advancement","AI Readiness",
"Population Growth","Demographic Stability","Internal Conflict Risk",
"Border Tensions","Global Influence","Nuclear Capability","Space Program",
"Water Security","Food Security","Healthcare Strength","Education Level",
"Infrastructure Quality","Natural Resources","Debt Ratio","Sanctions Risk",
"Global Alliances","Diplomatic Relations","Naval Power","Air Force Capability",
"Ground Forces","Civil Unrest Probability","Terrorism Risk","Regional Dominance",
"Currency Stability","Stock Market Outlook","Foreign Investment",
"Strategic Partnerships","Migration Pressure","Energy Exports",
"Energy Imports","Cyber Warfare Risk","Intelligence Capability",
"Propaganda Influence","Internet Freedom","Surveillance Level",
"Technology Exports","Climate Policy","Human Rights Index",
"Trade Agreements","Defense Alliances","Geopolitical Risk Index",
"Conflict Probability","Peace Prospects","Future Superpower Potential",
"Global Ranking Projection","Regional Influence Forecast",
"Economic Projection 2030","Military Projection 2035"
];

const countrySelect = document.getElementById("countrySelect");
const yearSelect = document.getElementById("yearSelect");

// Populate countries
countries.forEach(c => {
  let option = document.createElement("option");
  option.value = c;
  option.textContent = c;
  countrySelect.appendChild(option);
});

// Populate years 2025–2050
for(let y = 2025; y <= 2050; y++){
  let option = document.createElement("option");
  option.value = y;
  option.textContent = y;
  yearSelect.appendChild(option);
}

// AI Predictive Scoring Model
function aiModel(baseScore, yearsAhead) {
  let trendFactor = (Math.random() * 4 - 2); 
  let growthCurve = yearsAhead * (Math.random() * 0.8);
  let volatility = Math.sin(yearsAhead) * 3;

  let prediction = baseScore + growthCurve + trendFactor + volatility;

  if(prediction > 100) prediction = 100;
  if(prediction < 0) prediction = 0;

  return Math.round(prediction);
}

function generatePrediction(){
  const country = countrySelect.value;
  const targetYear = parseInt(yearSelect.value);
  const currentYear = new Date().getFullYear();
  const yearsAhead = targetYear - currentYear;

  let output = `<h3>${country} Forecast for ${targetYear}</h3>`;

  features.forEach(feature => {
    let currentScore = Math.floor(Math.random() * 100);
    let futureScore = aiModel(currentScore, yearsAhead);

    output += `<p><strong>${feature}</strong>: Current ${currentScore}/100 → ${futureScore}/100</p>`;
  });

  document.getElementById("results").innerHTML = output;
}

function setTheme(mode){
  document.body.classList.remove("dark","oled");
  if(mode === "dark") document.body.classList.add("dark");
  if(mode === "oled") document.body.classList.add("oled");
}

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
