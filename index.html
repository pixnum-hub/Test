<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1219;
    --panel: #111820;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #00ff9d;
    --warn: #ffaa00;
    --text: #c9d8e8;
    --text-dim: #4a6278;
    --text-bright: #e8f4ff;
    --font-mono: 'DM Mono', monospace;
    --font-head: 'DM Sans', sans-serif;
    --glow: 0 0 12px rgba(0,229,255,0.35);
    --glow-red: 0 0 12px rgba(255,61,113,0.4);
    --glow-green: 0 0 12px rgba(0,255,157,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }



  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
    box-shadow: var(--glow);
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.6; }
  }

  .logo h1 {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo h1 span { color: var(--accent); }

  .logo small {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .header-meta {
    text-align: right;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .header-meta .live {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--accent3);
    font-size: 11px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: blink 1.2s step-start infinite;
    box-shadow: var(--glow-green);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Add URL bar — redesigned ── */
  .add-bar {
    margin-bottom: 28px;
    position: relative;
  }

  .add-bar-inner {
    display: flex;
    align-items: center;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 6px 6px 6px 20px;
    gap: 10px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .add-bar-inner:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08), var(--glow);
  }

  .add-bar-prefix {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
  }

  .add-bar input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 0;
    color: var(--text-bright);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    min-width: 0;
  }

  .add-bar input::placeholder {
    color: var(--text-dim);
    font-weight: 400;
  }

  .add-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #F97316;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 11px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(249,115,22,0.35);
  }

  .add-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  .add-btn:hover {
    background: #FB923C;
    box-shadow: 0 6px 24px rgba(249,115,22,0.5);
    transform: translateY(-1px);
  }

  .add-btn:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 1px 6px rgba(249,115,22,0.3);
  }

  .add-btn-icon {
    width: 18px;
    height: 18px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .add-btn:hover .add-btn-icon {
    transform: rotate(90deg);
  }

  .btn-sm {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .btn-sm:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,61,113,0.05); }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
  }

  .stat-card.ok::before { background: var(--accent3); }
  .stat-card.down::before { background: var(--accent2); }
  .stat-card.warn::before { background: var(--warn); }
  .stat-card.total::before { background: var(--accent); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.ok .stat-value { color: var(--accent3); }
  .stat-card.down .stat-value { color: var(--accent2); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .stat-card.total .stat-value { color: var(--accent); }

  /* ── Monitor list ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .monitors {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .monitor-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 88px auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card-pattern-wrap {
    width: 80px;
    height: 48px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-pattern {
    display: block;
    width: 80px;
    height: 48px;
  }

  /* Glitch flicker for down state pattern */
  .pat-down {
    animation: pat-glitch 0.4s steps(1) infinite;
  }

  @keyframes pat-glitch {
    0%   { filter: none; }
    15%  { filter: hue-rotate(90deg) saturate(2); }
    30%  { filter: none; }
    60%  { filter: brightness(1.4) hue-rotate(-30deg); }
    80%  { filter: none; }
    95%  { filter: saturate(0) brightness(0.6); }
    100% { filter: none; }
  }

  .pat-checking {
    opacity: 0.95;
  }

  .monitor-card:hover { border-color: #2e4558; }

  .monitor-card.status-down {
    border-color: rgba(255,61,113,0.3);
    background: rgba(255,61,113,0.04);
    animation: flash-red 2s ease-in-out infinite;
  }

  @keyframes flash-red {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 18px rgba(255,61,113,0.15); }
  }

  .status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-up { background: var(--accent3); box-shadow: var(--glow-green); animation: pulse-green 2.5s ease-in-out infinite; }
  .status-down { background: var(--accent2); box-shadow: var(--glow-red); animation: pulse-red 1s ease-in-out infinite; }
  .status-checking { background: var(--warn); box-shadow: 0 0 8px rgba(255,170,0,0.4); animation: pulse-yellow 1s ease-in-out infinite; }
  .status-unknown { background: var(--text-dim); }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 4px rgba(0,255,157,0.3); }
    50% { box-shadow: 0 0 14px rgba(0,255,157,0.7); }
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 4px rgba(255,61,113,0.4); }
    50% { box-shadow: 0 0 16px rgba(255,61,113,0.9); }
  }

  @keyframes pulse-yellow {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .monitor-info { min-width: 0; }

  .monitor-name {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    color: var(--text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .monitor-url {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'DM Mono', monospace;
  }

  .monitor-meta {
    text-align: right;
    min-width: 100px;
  }

  .monitor-status-text {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .text-up { color: var(--accent3); }
  .text-down { color: var(--accent2); }
  .text-checking { color: var(--warn); }
  .text-unknown { color: var(--text-dim); }

  .monitor-time {
    font-size: 10px;
    color: var(--text-dim);
  }

  .monitor-ping {
    font-size: 11px;
    color: var(--accent);
    margin-top: 2px;
  }

  /* History sparkline */
  .history-bar {
    display: flex;
    gap: 2px;
    align-items: center;
    margin-top: 6px;
  }

  .history-bar span {
    width: 6px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Log panel ── */
  .log-panel {
    margin-top: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .log-title {
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .log-entries {
    max-height: 200px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-entries::-webkit-scrollbar { width: 4px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 12px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border-bottom: 1px solid rgba(30,45,61,0.4);
    animation: slide-in 0.3s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-time { color: var(--text-dim); }
  .log-msg-ok { color: var(--accent3); }
  .log-msg-down { color: var(--accent2); }
  .log-msg-info { color: var(--accent); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.7;
  }

  /* ── Interval control ── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .control-group select {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    outline: none;
    cursor: pointer;
  }

  .uptime-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .cat-tag {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
    font-family: var(--font-mono);
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
    vertical-align: middle;
    margin-left: 6px;
  }

  .badge-up { background: rgba(0,255,157,0.15); color: var(--accent3); }
  .badge-down { background: rgba(255,61,113,0.15); color: var(--accent2); }
  .badge-warn { background: rgba(255,170,0,0.15); color: var(--warn); }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .monitor-card { grid-template-columns: auto 1fr auto; }
    .monitor-meta { display: none; }
    .card-pattern-wrap { display: none; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <h1>Down<span>y</span></h1>
        <small>Real-time uptime monitor</small>
      </div>
    </div>
    <div class="header-meta">
      <div class="live"><span class="live-dot"></span>MONITORING ACTIVE</div>
      <div id="clock">--:--:-- UTC</div>
      <div id="check-count">0 checks run</div>
    </div>
  </header>

  <!-- Add URL -->
  <div class="add-bar">
    <div class="add-bar-inner">
      <span class="add-bar-prefix">https://</span>
      <input type="text" id="url-input" placeholder="example.com — enter a URL to monitor" />
      <button class="add-btn" onclick="addMonitor()">
        <span class="add-btn-icon">+</span>
        Add Monitor
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card ok">
      <div class="stat-label">Online</div>
      <div class="stat-value" id="stat-up">0</div>
    </div>
    <div class="stat-card down">
      <div class="stat-label">Down</div>
      <div class="stat-value" id="stat-down">0</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Checking</div>
      <div class="stat-value" id="stat-checking">0</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="control-group">
      <span>CATEGORY:</span>
      <select id="cat-filter" onchange="renderAll()">
        <option value="All">All</option>
      </select>
    </div>
    <button class="btn-sm" onclick="checkAll()">↻ RE-CHECK ALL</button>
    <button class="btn-sm" onclick="clearAll()">✕ CLEAR ALL</button>
  </div>

  <!-- Monitor list -->
  <div class="section-header">
    <span class="section-title">Monitors</span>
    <span class="section-title" id="monitor-count">0 endpoints</span>
  </div>

  <div class="monitors" id="monitors-list">
    <div class="empty-state">
      <div class="empty-icon">◉</div>
      <p>No monitors yet.<br>Add a URL above to start tracking uptime.</p>
    </div>
  </div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">Event Log</span>
      <button class="btn-sm" onclick="clearLog()">CLEAR</button>
    </div>
    <div class="log-entries" id="log-entries">
      <div class="log-entry">
        <span class="log-time" id="start-time">--</span>
        <span class="log-msg-info">▶ Downtime Detector initialized. Add URLs to begin monitoring.</span>
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ──
  const monitors = {};
  let totalChecks = 0;

  // 100 prime & essential websites, organised by category
  const defaultSites = [
    // Search & Navigation
    { url: 'https://google.com',       cat: 'Search' },
    { url: 'https://bing.com',         cat: 'Search' },
    { url: 'https://duckduckgo.com',   cat: 'Search' },
    { url: 'https://yahoo.com',        cat: 'Search' },
    { url: 'https://baidu.com',        cat: 'Search' },
    // Social Media
    { url: 'https://facebook.com',     cat: 'Social' },
    { url: 'https://instagram.com',    cat: 'Social' },
    { url: 'https://twitter.com',      cat: 'Social' },
    { url: 'https://linkedin.com',     cat: 'Social' },
    { url: 'https://reddit.com',       cat: 'Social' },
    { url: 'https://tiktok.com',       cat: 'Social' },
    { url: 'https://pinterest.com',    cat: 'Social' },
    { url: 'https://snapchat.com',     cat: 'Social' },
    { url: 'https://tumblr.com',       cat: 'Social' },
    { url: 'https://discord.com',      cat: 'Social' },
    // Video & Streaming
    { url: 'https://youtube.com',      cat: 'Streaming' },
    { url: 'https://netflix.com',      cat: 'Streaming' },
    { url: 'https://twitch.tv',        cat: 'Streaming' },
    { url: 'https://disneyplus.com',   cat: 'Streaming' },
    { url: 'https://hulu.com',         cat: 'Streaming' },
    { url: 'https://primevideo.com',   cat: 'Streaming' },
    { url: 'https://vimeo.com',        cat: 'Streaming' },
    { url: 'https://dailymotion.com',  cat: 'Streaming' },
    // E-Commerce & Shopping
    { url: 'https://amazon.com',       cat: 'Shopping' },
    { url: 'https://ebay.com',         cat: 'Shopping' },
    { url: 'https://walmart.com',      cat: 'Shopping' },
    { url: 'https://etsy.com',         cat: 'Shopping' },
    { url: 'https://shopify.com',      cat: 'Shopping' },
    { url: 'https://aliexpress.com',   cat: 'Shopping' },
    { url: 'https://flipkart.com',     cat: 'Shopping' },
    // Tech & Developer
    { url: 'https://github.com',       cat: 'Tech' },
    { url: 'https://stackoverflow.com',cat: 'Tech' },
    { url: 'https://anthropic.com',    cat: 'Tech' },
    { url: 'https://openai.com',       cat: 'Tech' },
    { url: 'https://cloudflare.com',   cat: 'Tech' },
    { url: 'https://aws.amazon.com',   cat: 'Tech' },
    { url: 'https://azure.microsoft.com', cat: 'Tech' },
    { url: 'https://cloud.google.com', cat: 'Tech' },

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toUTCString().slice(17, 25) + ' UTC';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Helpers ──
  function ts() {
    return new Date().toISOString().replace('T',' ').slice(0,19);
  }

  function normalizeUrl(url) {
    url = url.trim();
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    return url;
  }

  function domainOf(url) {
    try { return new URL(url).hostname; } catch { return url; }
  }

  // ── Log ──
  function log(msg, type = 'info') {
    const el = document.getElementById('log-entries');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const cls = type === 'ok' ? 'log-msg-ok' : type === 'down' ? 'log-msg-down' : 'log-msg-info';
    entry.innerHTML = `<span class="log-time">${ts()}</span><span class="${cls}">${msg}</span>`;
    el.insertBefore(entry, el.firstChild);
    while (el.children.length > 60) el.removeChild(el.lastChild);
  }

  // Set start time
  document.getElementById('start-time').textContent = ts();

  // ── Check a single URL via fetch (no-cors for status) ──
  async function checkUrl(id) {
    const m = monitors[id];
    if (!m) return;
    m.status = 'checking';
    renderCard(id);
    updateStats();

    const start = performance.now();
    let status = 'unknown';
    let ping = null;
    let httpCode = null;

    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(m.url, {
        method: 'HEAD',
        mode: 'no-cors',
        signal: ctrl.signal,
        cache: 'no-store'
      });
      clearTimeout(timer);
      ping = Math.round(performance.now() - start);
      // no-cors gives opaque response — if we get here without throw, it's reachable
      httpCode = res.status || '(opaque)';
      status = 'up';
    } catch (e) {
      ping = Math.round(performance.now() - start);
      if (e.name === 'AbortError') {
        status = 'down';
        httpCode = 'TIMEOUT';
      } else if (e.message && e.message.toLowerCase().includes('cors')) {
        // CORS block usually means server is up but blocks us
        status = 'up';
        httpCode = 'CORS';
      } else {
        status = 'down';
        httpCode = 'NET_ERR';
      }
    }

    const prevStatus = m.status;
    m.status = status;
    m.ping = ping;
    m.httpCode = httpCode;
    m.lastChecked = new Date();
    m.history.push(status);
    if (m.history.length > 20) m.history.shift();
    if (status === 'up') m.upCount++; else if (status === 'down') m.downCount++;

    if (prevStatus !== 'checking' && prevStatus !== status) {
      if (status === 'up') log(`✔ ${domainOf(m.url)} is back ONLINE (${ping}ms)`, 'ok');
      else log(`✖ ${domainOf(m.url)} went DOWN — ${httpCode}`, 'down');
    } else if (prevStatus === 'checking') {
      if (status === 'up') log(`✔ ${domainOf(m.url)} — ONLINE (${ping}ms)`, 'ok');
      else log(`✖ ${domainOf(m.url)} — DOWN (${httpCode})`, 'down');
    }

    totalChecks++;
    document.getElementById('check-count').textContent = `${totalChecks} checks run`;
    renderCard(id);
    updateStats();
  }

  // ── Add Monitor ──
  function addMonitor(url, cat) {
    url = url || document.getElementById('url-input').value;
    if (!url.trim()) return;
    url = normalizeUrl(url);
    const id = 'mon_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    monitors[id] = {
      id, url,
      cat: cat || 'Custom',
      status: 'unknown',
      ping: null,
      httpCode: null,
      lastChecked: null,
      history: [],
      upCount: 0,
      downCount: 0,
    };
    if (!cat) document.getElementById('url-input').value = '';
    log(`+ Added monitor: ${domainOf(url)}`, 'info');
    renderAll();
    updateStats();
    checkUrl(id);
  }

  // ── Remove ──
  function removeMonitor(id) {
    const m = monitors[id];
    if (m) log(`- Removed monitor: ${domainOf(m.url)}`, 'info');
    delete monitors[id];
    renderAll();
    updateStats();
  }

  // ── Render single card ──
  function renderCard(id) {
    const el = document.getElementById('card-' + id);
    if (!el) { renderAll(); return; }
    const m = monitors[id];
    el.className = `monitor-card ${m.status === 'down' ? 'status-down' : ''}`;
    el.innerHTML = cardHTML(m);
  }

  function historyBar(history) {
    if (!history.length) return '';
    const colors = { up: 'var(--accent3)', down: 'var(--accent2)', checking: 'var(--warn)', unknown: 'var(--text-dim)' };
    return '<div class="history-bar">' +
      history.map(s => `<span style="background:${colors[s] || 'var(--text-dim)'}"></span>`).join('') +
      '</div>';
  }

  function uptimePct(m) {
    const total = m.upCount + m.downCount;
    if (!total) return null;
    return Math.round((m.upCount / total) * 1000) / 10;
  }

  // ── Deterministic hash from string → 0..1 float ──
  function hashStr(s) {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
    return (h >>> 0) / 4294967295;
  }

  // ── Generate a unique animated SVG pattern canvas for a monitor ──
  function statusPattern(m) {
    const seed = hashStr(domainOf(m.url));
    const id = 'pat_' + m.id;
    const W = 80, H = 48;

    // Derive unique visual params from domain hash
    const hue1 = Math.floor(seed * 360);
    const hue2 = (hue1 + 60 + Math.floor(hashStr(m.url+'x') * 120)) % 360;
    const freq = 0.8 + seed * 2.4;           // wave frequency
    const amp  = 8 + hashStr(m.url+'a') * 12; // wave amplitude
    const phase= hashStr(m.url+'p') * 6.28;
    const cols = 4 + Math.floor(hashStr(m.url+'c') * 5); // grid cols
    const rows = 3 + Math.floor(hashStr(m.url+'r') * 3);

    if (m.status === 'up') {
      // ── ONLINE: flowing sine waves with glowing orb ──
      const dur1 = (1.8 + seed * 1.4).toFixed(2);
      const dur2 = (2.2 + hashStr(m.url+'d') * 1.2).toFixed(2);
      const pts1 = Array.from({length:20},(_,i)=>{
        const x = i*(W/19);
        const y = H/2 + Math.sin(i*freq*0.4 + phase)*amp;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const pts2 = Array.from({length:20},(_,i)=>{
        const x = i*(W/19);
        const y = H/2 + Math.sin(i*freq*0.4 + phase + 1.2)*amp*0.6;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="status-pattern pat-up">
        <defs>
          <linearGradient id="wg1_${id}" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="hsl(${hue1},100%,60%)" stop-opacity="0"/>
            <stop offset="50%" stop-color="hsl(${hue1},100%,60%)" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="hsl(${hue2},100%,60%)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="wg2_${id}" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="hsl(${hue2},100%,70%)" stop-opacity="0"/>
            <stop offset="50%" stop-color="hsl(${hue2},100%,70%)" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="hsl(${hue1},100%,70%)" stop-opacity="0"/>
          </linearGradient>
          <filter id="glow_${id}"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="${W}" height="${H}" fill="rgba(0,0,0,0.0)"/>
        <polyline points="${pts2}" fill="none" stroke="url(#wg2_${id})" stroke-width="1.5" filter="url(#glow_${id})">
          <animateTransform attributeName="transform" type="translate" from="${-W} 0" to="0 0" dur="${dur2}s" repeatCount="indefinite"/>
        </polyline>
        <polyline points="${pts1}" fill="none" stroke="url(#wg1_${id})" stroke-width="2.5" filter="url(#glow_${id})">
          <animateTransform attributeName="transform" type="translate" from="${-W} 0" to="0 0" dur="${dur1}s" repeatCount="indefinite"/>
        </polyline>
        <circle cx="${W/2}" cy="${H/2}" r="4" fill="hsl(${hue1},100%,70%)" opacity="0.9" filter="url(#glow_${id})">
          <animate attributeName="r" values="3;5;3" dur="${dur1}s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="${dur1}s" repeatCount="indefinite"/>
        </circle>
      </svg>`;
    }

    if (m.status === 'down') {
      // ── OFFLINE: glitchy static noise bars + broken signal ──
      const noiseLines = Array.from({length:12},(_,i)=>{
        const y = 4 + i*(H/12);
        const w = 10 + hashStr(m.url+i)*50;
        const x = hashStr(m.url+i+'x')*( W - w);
        const op = (0.3 + hashStr(m.url+i+'o')*0.6).toFixed(2);
        const dur = (0.15 + hashStr(m.url+i+'d')*0.3).toFixed(2);
        return `<rect x="${x.toFixed(1)}" y="${(y-1).toFixed(1)}" width="${w.toFixed(1)}" height="2.5" 
          fill="hsl(${hue1},90%,55%)" opacity="${op}">
          <animate attributeName="opacity" values="${op};0;${op}" dur="${dur}s" repeatCount="indefinite" begin="${(i*0.07).toFixed(2)}s"/>
          <animate attributeName="x" values="${x.toFixed(1)};${(x+hashStr(m.url+i+'v')*8-4).toFixed(1)};${x.toFixed(1)}" dur="${(dur*2).toFixed(2)}s" repeatCount="indefinite"/>
        </rect>`;
      }).join('');
      const dur = (0.8 + seed*0.4).toFixed(2);
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="status-pattern pat-down">
        <defs>
          <filter id="gd_${id}"><feGaussianBlur stdDeviation="0.8"/></filter>
        </defs>
        ${noiseLines}
        <line x1="0" y1="${H/2}" x2="${W*0.3}" y2="${H/2}" stroke="hsl(${hue1},100%,60%)" stroke-width="1.5" opacity="0.8"/>
        <line x1="${W*0.4}" y1="${H/2-3}" x2="${W*0.55}" y2="${H/2+5}" stroke="hsl(${hue1},100%,60%)" stroke-width="1.5" opacity="0.8"/>
        <line x1="${W*0.65}" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="hsl(${hue1},100%,60%)" stroke-width="1.5" opacity="0.8"/>
        <line x1="0" y1="0" x2="${W}" y2="${H}" stroke="hsl(${hue1},90%,50%)" stroke-width="1" opacity="0.3">
          <animate attributeName="opacity" values="0.3;0;0.3" dur="${dur}s" repeatCount="indefinite"/>
        </line>
      </svg>`;
    }

    if (m.status === 'checking') {
      // ── CHECKING: radar sweep with pinging rings ──
      const cx = W/2, cy = H/2;
      const maxR = Math.min(W,H)/2 - 2;
      const dur = (1.5 + seed*1).toFixed(2);
      const rings = [0.35,0.6,0.85].map((f,i) => {
        const r = maxR*f;
        return `<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="none" 
          stroke="hsl(${hue1},80%,55%)" stroke-width="0.7" opacity="${(0.15+i*0.1).toFixed(2)}"/>`;
      }).join('');
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="status-pattern pat-checking">
        <defs>
          <filter id="gc_${id}"><feGaussianBlur stdDeviation="1.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <clipPath id="cc_${id}"><circle cx="${cx}" cy="${cy}" r="${maxR}"/></clipPath>
        </defs>
        ${rings}
        <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy - maxR}" stroke="hsl(${hue1},100%,65%)" stroke-width="1.5" opacity="0.9" filter="url(#gc_${id})">
          <animateTransform attributeName="transform" type="rotate" from="0 ${cx} ${cy}" to="360 ${cx} ${cy}" dur="${dur}s" repeatCount="indefinite"/>
        </line>
        <path d="M${cx},${cy} L${cx},${cy-maxR} A${maxR},${maxR} 0 0,1 ${(cx+maxR*Math.sin(0.8)).toFixed(2)},${(cy-maxR*Math.cos(0.8)).toFixed(2)} Z"
          fill="hsl(${hue1},100%,55%)" opacity="0.12" clip-path="url(#cc_${id})">
          <animateTransform attributeName="transform" type="rotate" from="0 ${cx} ${cy}" to="360 ${cx} ${cy}" dur="${dur}s" repeatCount="indefinite"/>
        </path>
        <circle cx="${cx}" cy="${cy}" r="2.5" fill="hsl(${hue1},100%,70%)" filter="url(#gc_${id})">
          <animate attributeName="r" values="2;3.5;2" dur="${(parseFloat(dur)*0.5).toFixed(2)}s" repeatCount="indefinite"/>
        </circle>
      </svg>`;
    }

    // ── UNKNOWN/PENDING: dormant dot grid ──
    const dotGrid = Array.from({length:rows},(_,r)=>
      Array.from({length:cols},(_,c)=>{
        const x = (c+0.5)*(W/cols);
        const y = (r+0.5)*(H/rows);
        const h2 = hashStr(m.url+r+c);
        const op = (0.1 + h2*0.25).toFixed(2);
        const r2 = (1+h2*1.5).toFixed(1);
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r2}" fill="hsl(${hue1},30%,50%)" opacity="${op}"/>`;
      }).join('')
    ).join('');
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="status-pattern pat-unknown">
      ${dotGrid}
    </svg>`;
  }

  function cardHTML(m) {
    const statusClass = {
      up: 'status-up', down: 'status-down',
      checking: 'status-checking', unknown: 'status-unknown'
    }[m.status] || 'status-unknown';

    const textClass = {
      up: 'text-up', down: 'text-down',
      checking: 'text-checking', unknown: 'text-unknown'
    }[m.status] || 'text-unknown';

    const statusLabel = {
      up: '● ONLINE', down: '● OFFLINE',
      checking: '● CHECKING', unknown: '○ PENDING'
    }[m.status] || '○ UNKNOWN';

    const pct = uptimePct(m);
    const badgeClass = pct === null ? '' : pct >= 99 ? 'badge-up' : pct >= 90 ? 'badge-warn' : 'badge-down';
    const badgeLabel = pct !== null ? `${pct}% up` : '';

    const lastCheck = m.lastChecked
      ? m.lastChecked.toLocaleTimeString()
      : 'Never';

    return `
      <div class="card-pattern-wrap">${statusPattern(m)}</div>
      <div class="status-indicator ${statusClass}"></div>
      <div class="monitor-info">
        <div class="monitor-name">${domainOf(m.url)} <span class="cat-tag">${m.cat || ''}</span></div>
        <div class="monitor-url">${m.url}</div>
        ${historyBar(m.history)}
      </div>
      <div class="monitor-meta">
        <div class="monitor-status-text ${textClass}">${statusLabel}</div>
        <div class="monitor-time">Last: ${lastCheck}</div>
        ${m.ping !== null ? `<div class="monitor-ping">${m.ping}ms</div>` : ''}
        ${badgeLabel ? `<span class="uptime-badge ${badgeClass}">${badgeLabel}</span>` : ''}
      </div>
      <div>
        <button class="btn-sm" onclick="checkUrl('${m.id}')" title="Check now">↻</button>
        <br><br>
        <button class="btn-sm" onclick="removeMonitor('${m.id}')" title="Remove">✕</button>
      </div>
    `;
  }

  // ── Render all ──
  function renderAll() {
    const container = document.getElementById('monitors-list');
    const allIds = Object.keys(monitors);
    document.getElementById('monitor-count').textContent = `${allIds.length} endpoint${allIds.length !== 1 ? 's' : ''}`;
    rebuildCategoryFilter();

    const activeCat = document.getElementById('cat-filter') ? document.getElementById('cat-filter').value : 'All';
    const ids = activeCat === 'All' ? allIds : allIds.filter(id => monitors[id].cat === activeCat);

    if (!allIds.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">◉</div>
        <p>No monitors yet.<br>Add a URL above to start tracking uptime.</p>
      </div>`;
      return;
    }

    if (!ids.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">◉</div><p>No monitors in this category.</p></div>`;
      return;
    }

    container.innerHTML = ids.map(id => {
      const m = monitors[id];
      return `<div class="monitor-card ${m.status === 'down' ? 'status-down' : ''}" id="card-${id}">${cardHTML(m)}</div>`;
    }).join('');
  }

  function rebuildCategoryFilter() {
    const sel = document.getElementById('cat-filter');
    if (!sel) return;
    const current = sel.value;
    const cats = ['All', ...new Set(Object.values(monitors).map(m => m.cat).filter(Boolean))].sort((a,b) => a === 'All' ? -1 : a.localeCompare(b));
    sel.innerHTML = cats.map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`).join('');
  }

  // ── Stats ──
  function updateStats() {
    const ms = Object.values(monitors);
    document.getElementById('stat-total').textContent = ms.length;
    document.getElementById('stat-up').textContent = ms.filter(m => m.status === 'up').length;
    document.getElementById('stat-down').textContent = ms.filter(m => m.status === 'down').length;
    document.getElementById('stat-checking').textContent = ms.filter(m => m.status === 'checking').length;
  }

  // ── Re-check all (manual, one-shot, staggered) ──
  async function checkAll() {
    const ids = Object.keys(monitors);
    if (!ids.length) return;
    log(`↻ Manual re-check of ${ids.length} monitors…`, 'info');
    const batchSize = 5;
    for (let i = 0; i < ids.length; i += batchSize) {
      ids.slice(i, i + batchSize).forEach(id => checkUrl(id));
      if (i + batchSize < ids.length) await new Promise(r => setTimeout(r, 400));
    }
  }

  // ── Clear all ──
  function clearAll() {
    if (!Object.keys(monitors).length) return;
    if (confirm('Remove all monitors?')) {
      Object.keys(monitors).forEach(id => delete monitors[id]);
      log('✕ All monitors cleared.', 'info');
      renderAll();
      updateStats();
    }
  }

  // ── Clear log ──
  function clearLog() {
    document.getElementById('log-entries').innerHTML = '';
    log('Log cleared.', 'info');
  }

  // ── Enter key ──
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMonitor();
  });

  // ── Init — stagger 100 sites, check once, then stop ──
  async function initDefaults() {
    for (const site of defaultSites) {
      const url = normalizeUrl(site.url);
      const id = 'mon_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      monitors[id] = {
        id, url,
        cat: site.cat || 'Other',
        status: 'unknown',
        ping: null,
        httpCode: null,
        lastChecked: null,
        history: [],
        upCount: 0,
        downCount: 0,
      };
      await new Promise(r => setTimeout(r, 5));
    }
    log(`▶ Loaded ${defaultSites.length} sites across ${new Set(defaultSites.map(s=>s.cat)).size} categories. Running one-time check…`, 'info');
    renderAll();
    updateStats();

    // Stagger checks: 5 at a time, 400ms apart — runs once, then stops
    const ids = Object.keys(monitors);
    const batchSize = 5;
    for (let i = 0; i < ids.length; i += batchSize) {
      const batch = ids.slice(i, i + batchSize);
      batch.forEach(id => checkUrl(id));
      if (i + batchSize < ids.length) await new Promise(r => setTimeout(r, 400));
    }
  }

  initDefaults();
</script>
</body>
</html>
