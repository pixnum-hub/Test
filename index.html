<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atmos — Weather & Air Quality</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0a0f1e;
    --mid: #0d1b3e;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #38bdf8;
    --accent2: #818cf8;
    --good: #34d399;
    --moderate: #fbbf24;
    --unhealthy-s: #f97316;
    --unhealthy: #ef4444;
    --very-unhealthy: #a855f7;
    --hazardous: #7f1d1d;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--sky);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(56,189,248,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,140,248,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(13,27,62,0.8) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span { font-weight: 400; opacity: 0.6; }

  /* Search */
  .search-bar {
    display: flex;
    gap: 0.5rem;
    flex: 1;
    max-width: 420px;
  }

  .search-bar input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-bar button, .locate-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .search-bar button:hover, .locate-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* Status */
  .status-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 4rem 0;
    display: none;
  }

  .status-msg.visible { display: block; }

  .loader {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Main content */
  #app { display: none; }
  #app.visible { display: block; animation: fadeUp 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hero row */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 700px) { .hero { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  /* Current weather */
  .location-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .location-time {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .temp-row {
    display: flex;
    align-items: flex-end;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .temp-big {
    font-family: 'Syne', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .weather-icon { font-size: 3rem; line-height: 1; }

  .weather-desc {
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.25rem;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .meta-item {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
  }

  .meta-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-value { font-size: 0.95rem; font-weight: 500; margin-top: 0.1rem; }

  /* AQI card */
  .aqi-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
  }

  .aqi-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .aqi-value {
    font-family: 'Syne', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .aqi-label {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    display: inline-block;
    margin-top: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.7rem;
  }

  /* AQI bar */
  .aqi-bar-wrap { margin: 1.25rem 0; }
  .aqi-bar-track {
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, #34d399, #fbbf24, #f97316, #ef4444, #a855f7, #7f1d1d);
    position: relative;
    margin-bottom: 0.4rem;
  }
  .aqi-bar-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
    transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .aqi-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--muted);
  }

  /* Pollutants */
  .poll-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .poll-item {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
  }

  .poll-name { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .poll-val { font-size: 0.9rem; font-weight: 500; margin-top: 0.1rem; }
  .poll-bar-mini {
    height: 3px;
    border-radius: 2px;
    margin-top: 0.4rem;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .poll-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s ease;
  }

  /* Forecast */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .forecast-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 700px) { .forecast-row { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 450px) { .forecast-row { grid-template-columns: repeat(3, 1fr); } }

  .forecast-day {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 0.5rem;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s, transform 0.2s;
  }

  .forecast-day:hover { border-color: rgba(56,189,248,0.4); transform: translateY(-3px); }
  .forecast-day.today { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.06); }

  .fc-day { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .fc-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
  .fc-hi { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .fc-lo { font-size: 0.75rem; color: var(--muted); }
  .fc-aqi-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin: 0.4rem auto 0;
  }

  /* Hourly */
  .hourly-scroll {
    display: flex;
    gap: 0.75rem;
    overflow-x: auto;
    padding-bottom: 0.75rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    margin-bottom: 1.5rem;
  }

  .hourly-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    text-align: center;
    flex-shrink: 0;
    min-width: 70px;
    backdrop-filter: blur(8px);
  }

  .hr-time { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem; }
  .hr-icon { font-size: 1.3rem; margin-bottom: 0.3rem; }
  .hr-temp { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; }
  .hr-precip { font-size: 0.65rem; color: #38bdf8; margin-top: 0.2rem; }

  /* Footer */
  .foot { text-align: center; color: var(--muted); font-size: 0.7rem; margin-top: 2rem; opacity: 0.6; }

  /* Error */
  .error { color: #ef4444; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Atmos<span>.weather</span></div>
    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button onclick="searchCity()">→</button>
      <button class="locate-btn" onclick="getLocation()" title="Use my location">⌖</button>
    </div>
  </header>

  <div class="status-msg visible" id="statusMsg">
    <span id="statusText">Enter a city or use location to get started.</span>
  </div>

  <div id="app">
    <div class="hero">
      <!-- Current Weather -->
      <div class="card">
        <div class="location-name" id="locName">—</div>
        <div class="location-time" id="locTime">—</div>
        <div class="temp-row">
          <div class="temp-big" id="tempBig">—</div>
          <div class="weather-icon" id="wIcon">🌤</div>
        </div>
        <div class="weather-desc" id="wDesc">—</div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">Feels Like</div><div class="meta-value" id="feelsLike">—</div></div>
          <div class="meta-item"><div class="meta-label">Humidity</div><div class="meta-value" id="humidity">—</div></div>
          <div class="meta-item"><div class="meta-label">Wind</div><div class="meta-value" id="wind">—</div></div>
          <div class="meta-item"><div class="meta-label">UV Index</div><div class="meta-value" id="uv">—</div></div>
        </div>
      </div>

      <!-- AQI Card -->
      <div class="card">
        <div class="aqi-title">Air Quality Index</div>
        <div class="aqi-header">
          <div>
            <div class="aqi-value" id="aqiVal">—</div>
            <div class="aqi-label" id="aqiLabel">—</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:0.7rem;color:var(--muted);">US AQI</div>
            <div style="font-size:0.7rem;color:var(--muted);margin-top:0.25rem;" id="aqiHealthMsg">—</div>
          </div>
        </div>

        <div class="aqi-bar-wrap">
          <div class="aqi-bar-track">
            <div class="aqi-bar-thumb" id="aqiThumb" style="left:0%"></div>
          </div>
          <div class="aqi-bar-labels">
            <span>Good</span><span>Moderate</span><span>Unhealthy</span><span>Hazardous</span>
          </div>
        </div>

        <div class="poll-grid" id="pollGrid">
          <!-- pollutants injected here -->
        </div>
      </div>
    </div>

    <!-- 7-Day Forecast -->
    <div class="section-title">7-Day Forecast</div>
    <div class="forecast-row" id="forecastRow"></div>

    <!-- Hourly -->
    <div class="section-title">24-Hour Outlook</div>
    <div class="hourly-scroll" id="hourlyRow"></div>

    <div class="foot">Powered by Open-Meteo · Open-Meteo Air Quality API</div>
  </div>
</div>

<script>
const WMO = {
  0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',
  85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',
  96:'Thunderstorm w/ hail',99:'Thunderstorm w/ heavy hail'
};

const WMO_ICON = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'❄️',75:'❄️',77:'❄️',80:'🌦',81:'🌧',82:'⛈',
  85:'🌨',86:'❄️',95:'⛈',96:'⛈',99:'⛈'
};

const AQI_INFO = [
  { max: 50,  label:'Good',             color:'#34d399', health:'Air quality is satisfactory.' },
  { max: 100, label:'Moderate',         color:'#fbbf24', health:'Acceptable; some pollutants may be a concern.' },
  { max: 150, label:'Unhealthy for Some',color:'#f97316',health:'Sensitive groups should limit prolonged outdoor activity.' },
  { max: 200, label:'Unhealthy',        color:'#ef4444', health:'Everyone may begin to experience health effects.' },
  { max: 300, label:'Very Unhealthy',   color:'#a855f7', health:'Health alert: everyone may experience serious effects.' },
  { max: 500, label:'Hazardous',        color:'#7f1d1d', health:'Emergency conditions. Entire population is at risk.' },
];

function getAQIInfo(aqi) {
  return AQI_INFO.find(a => aqi <= a.max) || AQI_INFO[AQI_INFO.length-1];
}

function aqiFromPM25(pm25) {
  // Standard EPA breakpoints
  const bp = [
    [0,12,0,50],[12.1,35.4,51,100],[35.5,55.4,101,150],
    [55.5,150.4,151,200],[150.5,250.4,201,300],[250.5,350.4,301,400],[350.5,500.4,401,500]
  ];
  for (const [lo,hi,ilo,ihi] of bp) {
    if (pm25 >= lo && pm25 <= hi) {
      return Math.round(((ihi-ilo)/(hi-lo))*(pm25-lo)+ilo);
    }
  }
  return 500;
}

let currentLat, currentLon;

// Demo data used as fallback when API unreachable (e.g. sandboxed preview)
const DEMO = {
  w: {
    current: { temperature_2m: 28, apparent_temperature: 31, relative_humidity_2m: 72,
      wind_speed_10m: 18, weathercode: 2, uv_index: 6.4 },
    hourly: {
      time: Array.from({length:48}, (_,i) => { const d = new Date(); d.setMinutes(0,0,0); d.setHours(d.getHours()+i); return d.toISOString().slice(0,16); }),
      temperature_2m: [28,27,26,25,25,24,24,25,27,29,31,32,33,33,32,31,30,29,28,27,27,26,26,25,24,24,23,23,24,26,28,30,32,33,33,32,31,30,29,28,27,27,26,25,24,24,23,23],
      weathercode:    [2,2,1,1,0,0,0,1,2,2,3,3,2,2,2,1,1,2,2,1,1,0,0,0,0,0,1,1,2,2,3,80,80,2,2,2,1,1,2,2,1,0,0,0,0,0,0,1],
      precipitation_probability: [10,5,5,0,0,0,0,5,10,15,20,30,35,30,25,15,10,15,20,10,5,0,0,0,0,0,5,10,20,30,50,70,65,40,30,20,15,10,10,15,10,5,0,0,0,0,0,5]
    },
    daily: {
      time: Array.from({length:7}, (_,i) => { const d = new Date(); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); }),
      weathercode: [2, 3, 80, 61, 2, 1, 0],
      temperature_2m_max: [33, 31, 29, 27, 30, 32, 34],
      temperature_2m_min: [24, 23, 22, 21, 22, 23, 24],
      precipitation_probability_max: [20, 40, 70, 85, 30, 10, 5]
    }
  },
  aq: {
    current: { pm2_5: 42.3, pm10: 68.1, nitrogen_dioxide: 28.4, ozone: 61.2, sulphur_dioxide: 8.1, carbon_monoxide: 520 }
  }
};

function showDemoBanner() {
  let b = document.getElementById('demoBanner');
  if (!b) {
    b = document.createElement('div');
    b.id = 'demoBanner';
    b.style.cssText = 'background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:0.6rem 1rem;font-size:0.75rem;color:#fbbf24;text-align:center;margin-bottom:1.25rem;';
    b.textContent = 'Live API unreachable in this preview - showing demo data. Download the file and open locally for real weather data.';
    document.getElementById('app').insertAdjacentElement('afterbegin', b);
  }
}

async function fetchWeather(lat, lon, cityLabel) {
  setStatus('<span class="loader"></span> Fetching weather data...', true);

  try {
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000));

    const [wRes, aqRes] = await Promise.race([
      Promise.all([
        fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode,uv_index&hourly=temperature_2m,weathercode,precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7&wind_speed_unit=kmh"),
        fetch("https://air-quality-api.open-meteo.com/v1/air-quality?latitude=" + lat + "&longitude=" + lon + "&current=pm2_5,pm10,carbon_monoxide,nitrogen_dioxide,ozone,sulphur_dioxide&hourly=pm2_5&timezone=auto")
      ]),
      timeout
    ]);

    const [wData, aqData] = await Promise.all([wRes.json(), aqRes.json()]);
    if (wData.error) throw new Error(wData.reason || 'API error');

    renderApp(wData, aqData, cityLabel);
    hideStatus();
  } catch(e) {
    console.warn('API unreachable, using demo data:', e.message);
    renderApp(DEMO.w, DEMO.aq, cityLabel);
    hideStatus();
    showDemoBanner();
  }
}

function renderApp(w, aq, label) {
  const c = w.current;
  const d = w.daily;
  const h = w.hourly;

  // Location + time
  document.getElementById('locName').textContent = label;
  document.getElementById('locTime').textContent = new Date().toLocaleString('en-US', { weekday:'long', hour:'numeric', minute:'2-digit', hour12: true });

  // Temp
  document.getElementById('tempBig').textContent = Math.round(c.temperature_2m) + '°C';
  document.getElementById('wIcon').textContent = WMO_ICON[c.weathercode] || '🌤';
  document.getElementById('wDesc').textContent = WMO[c.weathercode] || '—';
  document.getElementById('feelsLike').textContent = Math.round(c.apparent_temperature) + '°C';
  document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
  document.getElementById('wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
  document.getElementById('uv').textContent = c.uv_index?.toFixed(1) ?? '—';

  // AQI
  const pm25 = aq.current?.pm2_5 ?? 0;
  const aqi = aqiFromPM25(pm25);
  const info = getAQIInfo(aqi);

  document.getElementById('aqiVal').textContent = aqi;
  document.getElementById('aqiVal').style.color = info.color;
  const lbl = document.getElementById('aqiLabel');
  lbl.textContent = info.label;
  lbl.style.background = info.color + '22';
  lbl.style.color = info.color;
  document.getElementById('aqiHealthMsg').textContent = info.health;

  // thumb position (AQI 0-500 → 0-100%)
  const pct = Math.min((aqi / 500) * 100, 98);
  setTimeout(() => {
    document.getElementById('aqiThumb').style.left = pct + '%';
  }, 100);

  // Pollutants
  const polls = [
    { name:'PM2.5', val: aq.current?.pm2_5, unit:'μg/m³', max:150 },
    { name:'PM10',  val: aq.current?.pm10,  unit:'μg/m³', max:300 },
    { name:'NO₂',   val: aq.current?.nitrogen_dioxide, unit:'μg/m³', max:200 },
    { name:'O₃',    val: aq.current?.ozone, unit:'μg/m³', max:240 },
    { name:'SO₂',   val: aq.current?.sulphur_dioxide, unit:'μg/m³', max:500 },
    { name:'CO',    val: aq.current?.carbon_monoxide ? aq.current.carbon_monoxide/1000 : null, unit:'mg/m³', max:30 },
  ];

  document.getElementById('pollGrid').innerHTML = polls.map(p => {
    const v = p.val != null ? p.val.toFixed(1) : '—';
    const pct = p.val != null ? Math.min((p.val/p.max)*100, 100) : 0;
    return `<div class="poll-item">
      <div class="poll-name">${p.name}</div>
      <div class="poll-val">${v} <span style="font-size:0.6rem;color:var(--muted)">${p.unit}</span></div>
      <div class="poll-bar-mini"><div class="poll-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // 7-Day forecast
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('forecastRow').innerHTML = d.time.map((dt, i) => {
    const date = new Date(dt + 'T00:00:00');
    const dayName = i === 0 ? 'Today' : days[date.getDay()];
    const icon = WMO_ICON[d.weathercode[i]] || '🌤';
    // fake daily AQI dot color based on pm25 variation
    const dotColor = info.color;
    return `<div class="forecast-day ${i===0?'today':''}">
      <div class="fc-day">${dayName}</div>
      <div class="fc-icon">${icon}</div>
      <div class="fc-hi">${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fc-lo">${Math.round(d.temperature_2m_min[i])}°</div>
      <div class="fc-aqi-dot" style="background:${dotColor}" title="AQI today: ${aqi}"></div>
    </div>`;
  }).join('');

  // Hourly (next 24 hours)
  const now = new Date();
  const nowHour = now.getHours();
  const startIdx = h.time.findIndex(t => {
    const hr = new Date(t).getHours();
    return new Date(t).toDateString() === now.toDateString() && hr >= nowHour;
  });
  const slice = h.time.slice(startIdx, startIdx + 24);

  document.getElementById('hourlyRow').innerHTML = slice.map((t, i) => {
    const idx = startIdx + i;
    const hr = new Date(t);
    const timeStr = i === 0 ? 'Now' : hr.toLocaleTimeString('en-US', { hour:'numeric', hour12: true });
    const icon = WMO_ICON[h.weathercode[idx]] || '🌤';
    const temp = Math.round(h.temperature_2m[idx]);
    const precip = h.precipitation_probability[idx];
    return `<div class="hourly-item">
      <div class="hr-time">${timeStr}</div>
      <div class="hr-icon">${icon}</div>
      <div class="hr-temp">${temp}°</div>
      ${precip > 10 ? `<div class="hr-precip">💧${precip}%</div>` : '<div class="hr-precip" style="opacity:0">-</div>'}
    </div>`;
  }).join('');

  document.getElementById('app').classList.add('visible');
}

function setStatus(html, spinner) {
  const el = document.getElementById('statusMsg');
  el.classList.add('visible');
  document.getElementById('statusText').innerHTML = html;
  document.getElementById('app').classList.remove('visible');
}

function hideStatus() {
  document.getElementById('statusMsg').classList.remove('visible');
  document.getElementById('app').classList.add('visible');
}

async function searchCity() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;
  setStatus(`<span class="loader"></span> Searching for "${city}"…`, true);

  try {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const data = await res.json();
    if (!data.results?.length) {
      setStatus(`<span class="error">⚠ City not found. Try a different name.</span>`, false);
      return;
    }
    const r = data.results[0];
    const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}, ${r.country}`;
    fetchWeather(r.latitude, r.longitude, label);
  } catch(e) {
    setStatus(`<span class="error">⚠ Geocoding failed. Try again.</span>`, false);
  }
}

function getLocation() {
  if (!navigator.geolocation) {
    setStatus('<span class="error">⚠ Geolocation not supported.</span>', false);
    return;
  }
  setStatus('<span class="loader"></span> Getting your location…', true);
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    // reverse geocode
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const data = await res.json();
      const label = data.address?.city || data.address?.town || data.address?.village || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      fetchWeather(lat, lon, label + ', ' + (data.address?.country || ''));
    } catch {
      fetchWeather(lat, lon, `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`);
    }
  }, () => {
    setStatus('<span class="error">⚠ Location access denied.</span>', false);
  });
}

// Enter key
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCity();
});

// Auto-load with a default city
fetchWeather(22.5726, 88.3639, 'Kolkata, West Bengal, India');
