<title>Titler — Blog Title Generator</title>
<style>  :root{--paper:#FAF7F0; --ink:#1A1A1A; --ink-soft:#5A5650; --accent:#C0392B; --card:#FFFFFF; --card-line:#E4DFD2; --warn:#B5541B; --shadow:0 1px 0 rgba(0,0,0,.06);}
  [data-theme="dark"]{--paper:#1C1E22; --ink:#F3F1EC; --ink-soft:#A9A6A0; --accent:#E8A33D; --card:#24262B; --card-line:#34363C; --warn:#E8A33D; --shadow:0 1px 0 rgba(0,0,0,.4);}
  [data-theme="oled"]{--paper:#000000; --ink:#F5F5F5; --ink-soft:#8C8C8C; --accent:#4FD1C5; --card:#0A0A0A; --card-line:#1F1F1F; --warn:#4FD1C5; --shadow:none;}
  [data-theme="hc"]{--paper:#000000; --ink:#FFFFFF; --ink-soft:#FFFFFF; --accent:#FFD400; --card:#000000; --card-line:#FFFFFF; --warn:#FFD400; --shadow:none;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; transition:background .2s,color .2s;}
  .wrap{max-width:640px; margin:0 auto; width:100%; padding:0 18px; flex:1; display:flex; flex-direction:column;}
  header{padding:22px 0 10px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .brand{display:flex; flex-direction:column;}
  .kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:700; margin-top:2px;}
  h1{margin:2px 0 0; font-size:26px; line-height:1.15; letter-spacing:-.01em;}
  .sub{margin-top:6px; color:var(--ink-soft); font-size:14px; max-width:46ch;}
  .themebar{display:flex; gap:6px; flex-shrink:0;}
  .theme-btn{width:30px; height:30px; border-radius:50%; border:1px solid var(--card-line); cursor:pointer; padding:0;}
  .theme-btn[data-t="light"]{background:#FAF7F0;}
  .theme-btn[data-t="dark"]{background:#1C1E22;}
  .theme-btn[data-t="oled"]{background:#000;}
  .theme-btn[data-t="hc"]{background:#000; box-shadow:inset 0 0 0 2px #FFD400;}
  .theme-btn.active{outline:2px solid var(--accent); outline-offset:2px;}
  .desk{background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:16px; margin-top:14px; box-shadow:var(--shadow);}
  label{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:700;}
  .row{display:flex; gap:8px; margin-top:8px;}
  .filters{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
  .filters.single{grid-template-columns:1fr;}
  .field{display:flex; flex-direction:column; gap:4px;}
  .field label{font-size:10px;}
  .field-inline{display:flex; flex-direction:column; gap:4px; flex-shrink:0;}
  .field-inline label{font-size:10px; white-space:nowrap;}
  .check-wrap{display:flex; align-items:center; gap:6px; font-size:13px; text-transform:none; color:var(--ink); font-weight:500; padding:12px 0 0;}
  .check-wrap input{width:16px; height:16px;}
  input[type="text"]{flex:1; min-width:0; width:100%; background:transparent; border:1px solid var(--card-line); border-radius:8px; padding:12px; font-size:16px; color:var(--ink); font-family:inherit;}
  input[type="text"]:focus{outline:2px solid var(--accent); outline-offset:1px;}
  select{width:100%; background:var(--card); color:var(--ink); border:1px solid var(--card-line); border-radius:8px; padding:12px 10px; font-size:14px; font-family:inherit;}
  .actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  button{font-family:inherit; cursor:pointer; border-radius:8px; font-weight:700;}
  .btn-primary{flex:1; min-width:140px; background:var(--accent); color:#111; border:none; padding:13px 14px; font-size:15px;}
  [data-theme="hc"] .btn-primary{color:#000;}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:.5;}
  .btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--card-line); padding:13px 14px; font-size:14px;}
  .btn-ghost.small{padding:9px 12px; font-size:13px; font-weight:600;}
  .status{font-size:12px; color:var(--ink-soft); margin-top:8px; min-height:16px;}
  .feed{margin:18px 0 8px; display:flex; flex-direction:column; gap:10px;}
  .card{background:var(--card); border:1px solid var(--card-line); border-radius:10px; padding:14px; box-shadow:var(--shadow); position:relative;}
  .card-top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .eyebrow{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); font-weight:700;}
  .chars{color:var(--ink-soft); text-transform:none; letter-spacing:0; font-weight:600;}
  .chars.warn{color:var(--warn);}
  .star{background:transparent; border:none; font-size:19px; color:var(--ink-soft); cursor:pointer; padding:0 2px; line-height:1;}
  .star.active{color:var(--accent);}
  .card-icons{display:flex; gap:2px; align-items:center;}
  .icon-btn{background:transparent; border:none; font-size:17px; color:var(--ink-soft); cursor:pointer; padding:0 3px; line-height:1;}
  .card p{margin:8px 0 10px; font-size:16.5px; line-height:1.35; font-weight:600;}
  .card p.meta{font-size:12.5px; font-weight:400; font-style:italic; color:var(--ink-soft); margin:-4px 0 10px;}
  .copy{background:transparent; border:1px solid var(--card-line); color:var(--ink-soft); font-size:12px; padding:6px 10px; border-radius:6px;}
  .copy.copied{color:var(--accent); border-color:var(--accent);}
  .empty{color:var(--ink-soft); font-size:14px; text-align:center; padding:30px 10px;}
  .manual{position:fixed; left:12px; right:12px; bottom:12px; max-width:616px; margin:0 auto; background:var(--card); border:1px solid var(--card-line); border-radius:10px; padding:12px; box-shadow:0 4px 24px rgba(0,0,0,.35); z-index:50;}
  .manual textarea{width:100%; min-height:64px; background:transparent; color:var(--ink); border:1px solid var(--card-line); border-radius:8px; padding:8px; font-family:inherit; font-size:14px; resize:vertical;}
  .manual-actions{display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:12px; color:var(--ink-soft);}
  .manual-actions button{background:transparent; border:1px solid var(--card-line); color:var(--ink); padding:6px 10px; border-radius:6px; font-size:12px; font-weight:600;}
  .saved{margin:4px 0 24px;}
  .saved-head{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:700; margin-bottom:8px;}
  .saved-item{display:flex; justify-content:space-between; align-items:center; gap:8px; background:var(--card); border:1px solid var(--card-line); border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:14px;}
  .saved-item span{flex:1;}
  .saved-item button{background:transparent; border:none; color:var(--ink-soft); font-size:13px; cursor:pointer; white-space:nowrap;}
  footer{text-align:center; padding:16px 18px 22px; color:var(--ink-soft); font-size:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border-top:1px solid var(--card-line);}
  @media (max-width:380px){ h1{font-size:22px;} .kicker{font-size:10px;} }</style>
</head>

    <div class="filters">
      <div class="field">
        <label for="style">Style</label>

      </div>
      <div class="field">
        <label for="length">Length</label>
        <select id="length" title="Length"><option value="any">Any length</option><option value="brief">Brief (30–40)</option><option value="compact">Compact (40–50)</option><option value="descriptive">Descriptive (95–110)</option><option value="detailed">Detailed (110–130)</option><option value="extended">Extended (80–95)</option><option value="long">Long (&gt;50)</option><option value="maximal">Maximal (150+)</option><option value="medium">Medium (50–65)</option><option value="short">Short (&le;50)</option><option value="standard">Standard (65–80)</option><option value="ultrashort">Ultra Short (&lt;30)</option><option value="verylong">Very Long (130–150)</option></select>
      </div>
    </div>
    <div class="filters">
      <div class="field">
        <label for="tone">Tone</label>
        <select id="tone" title="Tone"><option value="any">Any tone</option><option value="academic">Academic</option><option value="authoritative">Authoritative</option><option value="bold">Bold</option><option value="casual">Casual</option><option value="empathetic">Empathetic</option><option value="friendly">Friendly</option><option value="humorous">Humorous</option><option value="inspirational">Inspirational</option><option value="minimalist">Minimalist</option><option value="playful">Playful</option><option value="professional">Professional</option><option value="skeptical">Skeptical</option><option value="storytelling">Storytelling</option><option value="urgent">Urgent</option></select>
      </div>
      <div class="field">
        <label for="category">Category</label>
        <select id="category" title="Category"></select>
      </div>
    </div>
    <div class="filters">
      <div class="field">
        <label for="exclude">Exclude words</label>
        <input id="exclude" type="text" placeholder="comma separated" autocomplete="off">
      </div>
      <div class="field">
        <label for="metaToggle">Meta description</label>
        <label class="check-wrap"><input type="checkbox" id="metaToggle"> Add SEO blurb</label>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" onclick="generate()">Generate headlines</button>
      <button class="btn-ghost" onclick="copyAll()">Copy all</button>
      <button class="btn-ghost" onclick="resetAll()">Reset</button>
    </div>
    <div class="actions">
      <button class="btn-ghost small" onclick="exportTxt()">Export .txt</button>
      <button class="btn-ghost small" onclick="exportCsv()">Export .csv</button>
    </div>
    <div class="status" id="status">&nbsp;</div>
  </div>
  <div class="feed" id="feed">
    <div class="empty">Your generated headlines will land here.</div>
  </div>
  <div class="saved" id="savedSection" style="display:none;">
    <div class="saved-head">Saved (<span id="savedCount">0</span>)</div>
    <div id="savedList"></div>
  </div>
</div>
<footer>
  <div>© <span id="year"></span> Manik Roy. All Rights Reserved.</div>
</footer>
<div class="manual" id="manualBox" style="display:none;">
  <textarea id="manualArea" readonly></textarea>
  <div class="manual-actions">
    <span id="manualHint">Clipboard blocked — text selected</span>
    <button onclick="closeManual()">Close</button>
  </div>
</div>

function populateCategories(){
  const sel = document.getElementById('category');
  const keys = Object.keys(CATEGORIES).sort((a,b)=> CATEGORIES[a].label.localeCompare(CATEGORIES[b].label));
  sel.innerHTML = keys.map(k => `<option value="${k}">${CATEGORIES[k].label}</option>`).join('');
  sel.value = 'general';
}

  humorous:["{Topic}: Because Adulting Is Hard Enough","{N} {Topic} Fails That'll Make You Laugh","{Topic} 101: A Slightly Ridiculous Guide"],
  urgent:["Act Now: {N} {Topic} Moves You Can't Delay","Why {Topic} Can't Wait Any Longer","{Topic}: The Clock Is Ticking"],
  empathetic:["It's Okay to Struggle With {Topic} — Here's Help","A Gentle Guide to {Topic}","You're Not Alone in Your {Topic} Journey"],
  bold:["{Topic} Isn't Optional Anymore","Stop Playing It Safe With {Topic}","{Topic}: Go Big or Go Home"],
  minimalist:["{Topic}, Simplified","Less Noise, More {Topic}","{Topic}: Just the Essentials"],
  storytelling:["The Untold Story of {Topic}","Once Upon a {Topic}: {N} Lessons Learned","A Tale of {Topic} and {Word}"],
  skeptical:["Is {Topic} Really as Good as They Say?","{Topic}: Separating Hype From Reality","{N} Questions to Ask Before Trusting {Topic}"],
  authoritative:["The Definitive Guide to {Topic}","{Topic}: What the Experts Actually Say","{N} Rules of {Topic} You Shouldn't Ignore"],
  friendly:["Hey, Let's Chat About {Topic}","A Friendly Intro to {Topic}","{Topic} Made Easy — No Pressure"]
};
const META_TEMPLATES = [
"Discover practical insights on {Topic} and learn how to apply them today.","A closer look at {Topic}: key ideas, tips, and what to expect in {Year}.","Explore {Topic} through simple, actionable guidance anyone can follow.","Everything you need to know about {Topic}, explained clearly and concisely.",
"A quick, practical guide to {Topic} for readers who want real results.","Learn what matters most about {Topic} without the fluff.","An easy breakdown of {Topic} for beginners and pros alike.","Get the essential facts on {Topic}, backed by clear, useful examples."
];
function buildMeta(topic){
  const Topic = titleCase(topic.trim());
  const year = new Date().getFullYear();
  const tpl = META_TEMPLATES[Math.floor(Math.random()*META_TEMPLATES.length)];
  return tpl.replace(/{Topic}/g, Topic).replace(/{Year}/g, year);
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
async function fetchRelatedWords(topic, category){
  const q = category !== 'general' ? topic + ' ' + category : topic;
  try{
    const res = await fetch('https://api.datamuse.com/words?ml=' + encodeURIComponent(q) + '&max=10');
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const words = data.map(d=>d.word).filter(w => /^[a-zA-Z]+$/.test(w) && w.length >= 3 && w.length <= 12);
    const bank = (CATEGORIES[category] || CATEGORIES.general).words;
    const merged = Array.from(new Set([...words, ...bank]));
    return merged.length ? merged : CATEGORIES.general.words;
  }catch(e){
    return (CATEGORIES[category] || CATEGORIES.general).words;
  }
}
const LENGTH_RANGES = {
  any:[0,9999], ultrashort:[0,30], brief:[30,40], short:[0,50], compact:[40,50],
  medium:[50,65], standard:[65,80], long:[51,9999], extended:[80,95],
  descriptive:[95,110], detailed:[110,130], verylong:[130,150], maximal:[150,9999]
};
function genOne(topic, words, opts, used){
  const Topic = titleCase(topic.trim());
  const year = new Date().getFullYear();
  const nums = [3,5,7,9,10,12];
  let pool;
  if(opts.tone !== 'any' && opts.style === 'any'){
    pool = TONE_TEMPLATES[opts.tone].map(t=>[t,'t']).concat(TEMPLATES);
  } else {
    pool = opts.style === 'any' ? TEMPLATES.slice() : TEMPLATES.filter(x=>x[1]===opts.style);
  }
  if(!pool.length) pool = TEMPLATES.slice();
  pool = shuffle(pool);
  const range = LENGTH_RANGES[opts.length] || LENGTH_RANGES.any;
  for(let i=0;i<pool.length;i++){
    const tpl = pool[i][0];
    const word = titleCase(words[Math.floor(Math.random()*words.length)]);
    const n = nums[Math.floor(Math.random()*nums.length)];
    const title = tpl.replace(/{Topic}/g, Topic).replace(/{Word}/g, word).replace(/{N}/g, n).replace(/{Year}/g, year);
    if(used.has(title)) continue;
    if(title.length < range[0] || title.length > range[1]) continue;
    const lower = title.toLowerCase();
    if(opts.exclude.some(w => w && lower.includes(w))) continue;
    return title;
  }
  return null;
}
let currentTitles = [];
let favorites = [];
let cardTopics = [];
let cardMeta = [];
let lastOpts = {style:'any', length:'any', exclude:[], tone:'any'};
let lastWordsByTopic = {};
function charBadge(t){
  const n = t.length;
  return n > 60 ? `<span class="chars warn">${n} chars — trim for SEO</span>` : `<span class="chars">${n} chars</span>`;
}
function renderTitles(titles){
  const feed = document.getElementById('feed');
  if(!titles.length){
    feed.innerHTML = '<div class="empty">No headlines yet. Try different filters.</div>';
    return;
  }
  feed.innerHTML = titles.map((t,idx) => `
    <div class="card">
      <div class="card-top">
        <div class="eyebrow">Headline · ${charBadge(t)}</div>
        <div class="card-icons">
          <button class="icon-btn" onclick="regenerateOne(${idx})" title="Regenerate this one">⟳</button>
          <button class="star ${favorites.includes(t)?'active':''}" onclick="toggleFavorite(${idx})" title="Save">${favorites.includes(t)?'★':'☆'}</button>
        </div>
      </div>
      <p>${escapeHtml(t)}</p>
      ${cardMeta[idx] ? `<p class="meta">${escapeHtml(cardMeta[idx])}</p>` : ''}
      <button class="copy" onclick="copyOne(this, ${idx})">Copy</button>
    </div>
  `).join('');
}
function regenerateOne(idx){
  const topic = cardTopics[idx];
  const words = lastWordsByTopic[topic];
  const status = document.getElementById('status');
  if(!words){ status.textContent = 'Generate a batch first.'; return; }
  const used = new Set(currentTitles);
  const fresh = genOne(topic, words, lastOpts, used);
  if(!fresh){ status.textContent = 'No fresh variant found — adjust filters and try again.'; return; }
  currentTitles[idx] = fresh;
  if(document.getElementById('metaToggle').checked) cardMeta[idx] = buildMeta(topic);
  renderTitles(currentTitles);
}
function renderSaved(){
  const section = document.getElementById('savedSection');
  const list = document.getElementById('savedList');
  document.getElementById('savedCount').textContent = favorites.length;
  if(!favorites.length){ section.style.display='none'; return; }
  section.style.display='block';
  list.innerHTML = favorites.map((t,i) => `
    <div class="saved-item">
      <span>${escapeHtml(t)}</span>
      <button onclick="copySaved(${i})">Copy</button>
      <button onclick="removeSaved(${i})">✕</button>
    </div>
  `).join('');
}
function toggleFavorite(idx){
  const t = currentTitles[idx];
  const i = favorites.indexOf(t);
  if(i === -1) favorites.push(t); else favorites.splice(i,1);
  renderTitles(currentTitles);
  renderSaved();
}
function removeSaved(i){ favorites.splice(i,1); renderTitles(currentTitles); renderSaved(); }
function copySaved(i){ copyText(favorites[i]).catch(()=> showManualCopy(favorites[i])); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve, reject)=>{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{
      const ok = document.execCommand('copy');
      ok ? resolve() : reject(new Error('copy failed'));
    }catch(err){ reject(err); }
    finally{ document.body.removeChild(ta); }
  });
}
function showManualCopy(text){
  const box = document.getElementById('manualBox');
  const area = document.getElementById('manualArea');
  const hint = document.getElementById('manualHint');
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  hint.textContent = isTouch ? 'Clipboard blocked — tap the text, then tap Copy' : 'Clipboard blocked — text selected, press Ctrl/Cmd+C';
  area.value = text;
  box.style.display = 'block';
  area.focus(); area.select();
  if(isTouch && area.setSelectionRange) area.setSelectionRange(0, text.length);
}
function closeManual(){ document.getElementById('manualBox').style.display = 'none'; }
function copyOne(btn, idx){
  const text = currentTitles[idx];
  copyText(text).then(()=>{
    btn.textContent='Copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); }, 1400);
  }).catch(()=>{
    showManualCopy(text);
    btn.textContent='Selected';
    setTimeout(()=>{ btn.textContent='Copy'; }, 1400);
  });
}
function copyAll(){
  const status = document.getElementById('status');
  if(!currentTitles.length){ status.textContent='Generate headlines first.'; return; }
  const text = currentTitles.join('\n');
  copyText(text).then(()=>{
    status.textContent='All headlines copied to clipboard.';
    setTimeout(()=>{ status.textContent='\u00A0'; }, 2000);
  }).catch(()=>{
    showManualCopy(text);
    status.textContent='Clipboard blocked — copy manually from the box below.';
  });
}
function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function exportTxt(){
  const status = document.getElementById('status');
  if(!currentTitles.length){ status.textContent='Generate headlines first.'; return; }
  const lines = currentTitles.map((t,i) => cardMeta[i] ? t + '\n' + cardMeta[i] : t);
  downloadBlob(lines.join('\n\n'), 'titler-headlines.txt', 'text/plain');
}
function exportCsv(){
  const status = document.getElementById('status');
  if(!currentTitles.length){ status.textContent='Generate headlines first.'; return; }
  const hasMeta = cardMeta.some(m=>m);
  const header = hasMeta ? 'Title,Meta Description' : 'Title';
  const rows = currentTitles.map((t,i) => hasMeta
    ? `"${t.replace(/"/g,'""')}","${(cardMeta[i]||'').replace(/"/g,'""')}"`
    : `"${t.replace(/"/g,'""')}"`);
  downloadBlob(header + '\n' + rows.join('\n'), 'titler-headlines.csv', 'text/csv');
}
function resetAll(){
  document.getElementById('topic').value = '';
  document.getElementById('count').value = '8';
  document.getElementById('style').value = 'any';
  document.getElementById('length').value = 'any';
  document.getElementById('category').value = 'general';
  document.getElementById('tone').value = 'any';
  document.getElementById('metaToggle').checked = false;
  document.getElementById('exclude').value = '';
  document.getElementById('status').innerHTML = '&nbsp;';
  currentTitles = []; cardTopics = []; cardMeta = [];
  renderTitles([]);
  document.getElementById('topic').focus();
}
async function generate(){
  const topicInput = document.getElementById('topic');
  const raw = topicInput.value.trim();
  const count = parseInt(document.getElementById('count').value, 10);
  const style = document.getElementById('style').value;
  const length = document.getElementById('length').value;
  const category = document.getElementById('category').value;
  const tone = document.getElementById('tone').value;
  const includeMeta = document.getElementById('metaToggle').checked;
  const exclude = document.getElementById('exclude').value.toLowerCase().split(',').map(s=>s.trim()).filter(Boolean);
  const status = document.getElementById('status');
  const topics = raw.split(',').map(s=>s.trim()).filter(Boolean);
  if(!topics.length){ status.textContent = 'Enter a topic first, e.g. "home gardening".'; topicInput.focus(); return; }
  status.textContent = topics.length > 1 ? `Pulling related words for ${topics.length} topics...` : 'Pulling related words from the press...';
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  const wordsByTopic = {};
  for(const t of topics){ wordsByTopic[t] = await fetchRelatedWords(t, category); }
  lastOpts = {style, length, exclude, tone};
  lastWordsByTopic = wordsByTopic;
  currentTitles = []; cardTopics = []; cardMeta = [];
  const used = new Set();
  let ti = 0, attempts = 0;
  while(currentTitles.length < count && attempts < count * topics.length * 4){
    const topic = topics[ti % topics.length]; ti++; attempts++;
    const fresh = genOne(topic, wordsByTopic[topic], lastOpts, used);
    if(fresh){
      used.add(fresh);
      currentTitles.push(fresh);
      cardTopics.push(topic);
      cardMeta.push(includeMeta ? buildMeta(topic) : null);
    }
  }
  renderTitles(currentTitles);
  status.textContent = currentTitles.length < count
    ? currentTitles.length + ' headlines ready (try loosening filters for more).'
    : currentTitles.length + ' headlines ready.';
  btn.disabled = false;
}
document.getElementById('topic').addEventListener('keydown', e=>{ if(e.key === 'Enter') generate(); });
</script>
