<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Media Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --surface: #1f2433;
    --surface2: #252b3b;
    --border: rgba(255,255,255,0.07);
    --accent: #5b8af5;
    --accent2: #a78bfa;
    --accent-glow: rgba(91,138,245,0.25);
    --text: #e8ecf7;
    --text2: #8892aa;
    --text3: #4e5770;
    --track: #2a2f42;
    --thumb: #5b8af5;
    --waveform: rgba(91,138,245,0.4);
    --progress-glow: rgba(91,138,245,0.5);
    --badge-bg: rgba(91,138,245,0.15);
    --badge-border: rgba(91,138,245,0.3);
    --btn-bg: rgba(255,255,255,0.06);
    --btn-hover: rgba(255,255,255,0.12);
    --glass: rgba(13,15,20,0.7);
  }

  [data-theme="light"] {
    --bg: #f0f2f8;
    --bg2: #e8ebf5;
    --bg3: #dde2f0;
    --surface: #ffffff;
    --surface2: #f5f7ff;
    --border: rgba(0,0,0,0.08);
    --accent: #3b6be8;
    --accent2: #7c5ce8;
    --accent-glow: rgba(59,107,232,0.2);
    --text: #1a1e2e;
    --text2: #5a6280;
    --text3: #9aa0b8;
    --track: #d8dce8;
    --thumb: #3b6be8;
    --waveform: rgba(59,107,232,0.35);
    --progress-glow: rgba(59,107,232,0.4);
    --badge-bg: rgba(59,107,232,0.08);
    --badge-border: rgba(59,107,232,0.2);
    --btn-bg: rgba(0,0,0,0.05);
    --btn-hover: rgba(0,0,0,0.1);
    --glass: rgba(240,242,248,0.85);
  }

  [data-theme="oled"] {
    --bg: #000000;
    --bg2: #020202;
    --bg3: #060608;
    --surface: #0a0a0c;
    --surface2: #0f0f12;
    --border: rgba(255,255,255,0.05);
    --accent: #00e5ff;
    --accent2: #b400ff;
    --accent-glow: rgba(0,229,255,0.2);
    --text: #f0f0f0;
    --text2: #666680;
    --text3: #333340;
    --track: #111116;
    --thumb: #00e5ff;
    --waveform: rgba(0,229,255,0.3);
    --progress-glow: rgba(0,229,255,0.5);
    --badge-bg: rgba(0,229,255,0.08);
    --badge-border: rgba(0,229,255,0.2);
    --btn-bg: rgba(255,255,255,0.04);
    --btn-hover: rgba(255,255,255,0.09);
    --glass: rgba(0,0,0,0.9);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; scroll-behavior: smooth; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 16px 0;
    transition: background var(--transition), color var(--transition);
    position: relative;
    overflow-x: hidden;
  }

  /* Background orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
    transition: all var(--transition);
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--accent-glow);
    top: -150px; right: -100px;
    opacity: 0.5;
  }
  body::after {
    width: 400px; height: 400px;
    background: rgba(167,139,250,0.15);
    bottom: 50px; left: -100px;
    opacity: 0.4;
  }
  [data-theme="oled"] body::before { opacity: 0.25; }
  [data-theme="oled"] body::after { opacity: 0.2; }
  [data-theme="light"] body::before { opacity: 0.35; }

  .page-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .theme-toggle-group {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }

  .theme-btn {
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 0.9rem;
    width: 32px; height: 28px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .theme-btn:hover { background: var(--btn-hover); color: var(--text); }
  .theme-btn.active {
    background: var(--accent);
    color: #fff;
  }
  [data-theme="oled"] .theme-btn.active { color: #000; }

  /* ── Player Card ── */
  .player-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
    transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
  }
  [data-theme="light"] .player-card {
    box-shadow: 0 12px 40px rgba(0,0,0,0.1), 0 0 0 1px var(--border);
  }
  [data-theme="oled"] .player-card {
    box-shadow: 0 0 0 1px var(--border), 0 0 60px rgba(0,229,255,0.03);
  }

  /* ── Drop Zone / Video Area ── */
  .media-area {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: background var(--transition);
  }

  .media-area.drag-over {
    background: var(--badge-bg);
    border-color: var(--accent);
  }

  video#videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    background: #000;
  }
  video#videoEl.active { display: block; }

  .drop-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px;
    text-align: center;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .drop-hint.hidden { opacity: 0; }

  .drop-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--badge-bg);
    border: 1px solid var(--badge-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
  }

  .drop-hint h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
  }
  .drop-hint p {
    font-size: 0.72rem;
    color: var(--text2);
    line-height: 1.5;
  }

  .type-badges {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .badge {
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--badge-bg);
    border: 1px solid var(--badge-border);
    color: var(--accent);
  }

  /* Audio visualizer canvas */
  #visualizerCanvas {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #visualizerCanvas.visible { opacity: 1; }

  /* Audio art background */
  .audio-art {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .audio-art.visible { opacity: 1; }
  .audio-art-icon {
    font-size: 3rem;
    animation: pulse-icon 2s ease-in-out infinite;
  }
  .audio-filename {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text);
    max-width: 80%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @keyframes pulse-icon {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* Video overlay controls (tap to show) */
  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    transition: background 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .video-overlay.show { opacity: 1; pointer-events: all; background: rgba(0,0,0,0.3); }
  .overlay-play-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }
  .overlay-play-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }

  /* ── Controls Panel ── */
  .controls-panel {
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Track info */
  .track-info {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .track-meta { flex: 1; min-width: 0; }
  .track-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
  }
  .track-type {
    font-size: 0.68rem;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .track-duration {
    font-size: 0.75rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    padding-top: 2px;
  }

  /* Seek bar */
  .seek-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .seek-wrap {
    position: relative;
    height: 20px;
    display: flex;
    align-items: center;
    cursor: pointer;
  }
  .seek-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: var(--track);
    border-radius: 4px;
    overflow: hidden;
    transition: height 0.2s;
  }
  .seek-wrap:hover .seek-track { height: 6px; }
  .seek-buffer {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: var(--text3);
    border-radius: 4px;
    width: 0%;
    transition: width 0.5s;
  }
  .seek-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 0%;
    transition: width 0.05s;
    box-shadow: 0 0 8px var(--progress-glow);
  }
  input[type="range"].seek-input {
    position: absolute;
    width: 100%; height: 20px;
    opacity: 0;
    cursor: pointer;
    margin: 0;
    -webkit-appearance: none;
  }
  .seek-time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 0 2px;
  }

  /* Main transport controls */
  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn {
    border: none;
    background: var(--btn-bg);
    color: var(--text2);
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    font-size: 1rem;
  }
  .ctrl-btn:hover {
    background: var(--btn-hover);
    color: var(--text);
    border-color: var(--border);
  }
  .ctrl-btn:active { transform: scale(0.93); }

  .ctrl-btn.sm { width: 36px; height: 36px; font-size: 0.85rem; }
  .ctrl-btn.md { width: 42px; height: 42px; font-size: 1rem; }
  .ctrl-btn.lg {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-radius: 16px;
    font-size: 1.2rem;
    box-shadow: 0 4px 20px var(--accent-glow);
    border: none;
  }
  .ctrl-btn.lg:hover { transform: scale(1.06); box-shadow: 0 6px 28px var(--accent-glow); }
  [data-theme="oled"] .ctrl-btn.lg { color: #000; }

  .ctrl-btn.active { color: var(--accent) !important; }

  /* Volume row */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-icon {
    font-size: 0.9rem;
    color: var(--text3);
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }
  .range-wrap {
    flex: 1;
    height: 20px;
    display: flex;
    align-items: center;
    position: relative;
  }
  .range-track {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: var(--track);
    border-radius: 4px;
    overflow: hidden;
  }
  .range-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 80%;
    transition: width 0.05s;
  }
  input[type="range"].vol-input {
    position: absolute;
    width: 100%;
    opacity: 0;
    cursor: pointer;
    height: 20px;
    -webkit-appearance: none;
    margin: 0;
  }
  .vol-val {
    font-size: 0.65rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    width: 28px;
    text-align: right;
  }

  /* Speed selector */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .speed-label {
    font-size: 0.65rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .speed-btns {
    display: flex;
    gap: 4px;
    flex: 1;
    flex-wrap: wrap;
  }
  .speed-opt {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 7px;
    background: var(--btn-bg);
    border: 1px solid transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .speed-opt:hover { background: var(--btn-hover); color: var(--text); }
  .speed-opt.active {
    background: var(--badge-bg);
    border-color: var(--badge-border);
    color: var(--accent);
  }

  /* File chooser row */
  .file-row {
    display: flex;
    gap: 8px;
  }
  .file-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px dashed var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .file-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--badge-bg);
  }
  .file-btn span { font-size: 1rem; }
  input[type="file"] { display: none; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 -20px;
  }

  /* ── Footer ── */
  .footer {
    width: 100%;
    max-width: 520px;
    padding: 16px 4px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .footer-copy {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.05em;
  }
  .footer-rights {
    font-size: 0.6rem;
    color: var(--text3);
    opacity: 0.6;
    letter-spacing: 0.04em;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Responsive tweaks ── */
  @media (max-width: 360px) {
    .transport { gap: 5px; }
    .ctrl-btn.sm { width: 32px; height: 32px; font-size: 0.8rem; }
    .ctrl-btn.md { width: 38px; height: 38px; }
    .ctrl-btn.lg { width: 48px; height: 48px; font-size: 1.1rem; }
    .speed-opt { padding: 3px 6px; font-size: 0.6rem; }
  }

  @media (min-width: 480px) {
    body { padding: 24px 24px 0; }
  }

  /* Toaster */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- Header -->
  <header class="header">
    <div class="logo">NOVA</div>
    <div class="theme-toggle-group" role="group" aria-label="Theme selector">
      <button class="theme-btn" data-theme-val="dark" title="Dark" aria-pressed="true">🌑</button>
      <button class="theme-btn" data-theme-val="light" title="Light" aria-pressed="false">☀️</button>
      <button class="theme-btn" data-theme-val="oled" title="OLED True Black" aria-pressed="false">⬛</button>
    </div>
  </header>

  <!-- Player Card -->
  <div class="player-card">

    <!-- Media Area / Drop Zone -->
    <div class="media-area" id="mediaArea" role="button" tabindex="0" aria-label="Drop media file here or click to open">
      <video id="videoEl" playsinline></video>
      <canvas id="visualizerCanvas"></canvas>

      <div class="audio-art" id="audioArt">
        <div class="audio-art-icon">🎵</div>
        <div class="audio-filename" id="audioArtName">—</div>
      </div>

      <div class="drop-hint" id="dropHint">
        <div class="drop-icon">📂</div>
        <h3>Drop a file or tap to browse</h3>
        <p>Audio &amp; Video supported<br>Drag &amp; drop enabled</p>
        <div class="type-badges">
          <span class="badge">MP3</span>
          <span class="badge">MP4</span>
          <span class="badge">WAV</span>
          <span class="badge">OGG</span>
          <span class="badge">WEBM</span>
          <span class="badge">M4A</span>
          <span class="badge">FLAC</span>
          <span class="badge">MKV</span>
        </div>
      </div>

      <div class="video-overlay" id="videoOverlay">
        <button class="overlay-play-btn" id="overlayPlayBtn" aria-label="Play/Pause">▶</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">

      <!-- Track info -->
      <div class="track-info">
        <div class="track-meta">
          <div class="track-name" id="trackName">No file loaded</div>
          <div class="track-type" id="trackType">—</div>
        </div>
        <div class="track-duration" id="totalDuration">0:00</div>
      </div>

      <!-- Seek bar -->
      <div class="seek-row">
        <div class="seek-wrap" id="seekWrap">
          <div class="seek-track">
            <div class="seek-buffer" id="seekBuffer"></div>
            <div class="seek-fill" id="seekFill"></div>
          </div>
          <input type="range" class="seek-input" id="seekInput" min="0" max="1000" value="0" step="1" aria-label="Seek">
        </div>
        <div class="seek-time-row">
          <span id="currentTime">0:00</span>
          <span id="remainTime">-0:00</span>
        </div>
      </div>

      <!-- Transport -->
      <div class="transport">
        <button class="ctrl-btn sm" id="btnRewind" title="Rewind 10s" aria-label="Rewind 10 seconds">⏮</button>
        <button class="ctrl-btn md" id="btnSkipBack" title="Skip -5s" aria-label="Skip back 5 seconds">↩</button>
        <button class="ctrl-btn lg" id="btnPlayPause" title="Play / Pause" aria-label="Play or Pause">▶</button>
        <button class="ctrl-btn md" id="btnSkipFwd" title="Skip +5s" aria-label="Skip forward 5 seconds">↪</button>
        <button class="ctrl-btn sm" id="btnEnd" title="Jump to end" aria-label="Jump to end">⏭</button>
        <button class="ctrl-btn sm" id="btnLoop" title="Loop" aria-label="Toggle loop">🔁</button>
        <button class="ctrl-btn sm" id="btnMute" title="Mute" aria-label="Toggle mute">🔊</button>
      </div>

      <!-- Volume -->
      <div class="vol-row">
        <span class="vol-icon" id="volIcon">🔊</span>
        <div class="range-wrap">
          <div class="range-track"><div class="range-fill" id="volFill"></div></div>
          <input type="range" class="vol-input" id="volInput" min="0" max="100" value="80" aria-label="Volume">
        </div>
        <span class="vol-val" id="volVal">80</span>
      </div>

      <div class="divider"></div>

      <!-- Playback speed -->
      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <div class="speed-btns" id="speedBtns">
          <button class="speed-opt" data-speed="0.5">0.5×</button>
          <button class="speed-opt" data-speed="0.75">0.75×</button>
          <button class="speed-opt active" data-speed="1">1×</button>
          <button class="speed-opt" data-speed="1.25">1.25×</button>
          <button class="speed-opt" data-speed="1.5">1.5×</button>
          <button class="speed-opt" data-speed="2">2×</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- File choosers -->
      <div class="file-row">
        <label class="file-btn" for="audioInput" aria-label="Load audio file">
          <span>🎵</span>Audio
        </label>
        <input type="file" id="audioInput" accept="audio/*">

        <label class="file-btn" for="videoInput" aria-label="Load video file">
          <span>🎬</span>Video
        </label>
        <input type="file" id="videoInput" accept="video/*">
      </div>

    </div>
  </div>

</div>

<!-- Footer -->
<footer class="footer">
  <div class="footer-copy">© Manik Roy <span id="footerYear"></span></div>
  <div class="footer-rights">All Rights Reserved</div>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden audio element -->
<audio id="audioEl"></audio>

<script>
(function () {
  'use strict';

  // ── Elements ──
  const html = document.documentElement;
  const audioEl = document.getElementById('audioEl');
  const videoEl = document.getElementById('videoEl');
  const mediaArea = document.getElementById('mediaArea');
  const dropHint = document.getElementById('dropHint');
  const audioArt = document.getElementById('audioArt');
  const audioArtName = document.getElementById('audioArtName');
  const visualizerCanvas = document.getElementById('visualizerCanvas');
  const videoOverlay = document.getElementById('videoOverlay');
  const overlayPlayBtn = document.getElementById('overlayPlayBtn');

  const trackName = document.getElementById('trackName');
  const trackType = document.getElementById('trackType');
  const totalDuration = document.getElementById('totalDuration');
  const currentTimeEl = document.getElementById('currentTime');
  const remainTimeEl = document.getElementById('remainTime');
  const seekInput = document.getElementById('seekInput');
  const seekFill = document.getElementById('seekFill');
  const seekBuffer = document.getElementById('seekBuffer');

  const btnPlayPause = document.getElementById('btnPlayPause');
  const btnRewind = document.getElementById('btnRewind');
  const btnEnd = document.getElementById('btnEnd');
  const btnSkipBack = document.getElementById('btnSkipBack');
  const btnSkipFwd = document.getElementById('btnSkipFwd');
  const btnLoop = document.getElementById('btnLoop');
  const btnMute = document.getElementById('btnMute');

  const volInput = document.getElementById('volInput');
  const volFill = document.getElementById('volFill');
  const volVal = document.getElementById('volVal');
  const volIcon = document.getElementById('volIcon');

  const speedBtns = document.getElementById('speedBtns');
  const audioInput = document.getElementById('audioInput');
  const videoInput = document.getElementById('videoInput');
  const toast = document.getElementById('toast');
  const footerYear = document.getElementById('footerYear');

  // ── Footer year ──
  footerYear.textContent = new Date().getFullYear();

  // ── State ──
  let currentMedia = null; // 'audio' | 'video'
  let isLooping = false;
  let overlayTimeout = null;
  let audioCtx = null, analyser = null, source = null, animId = null;

  // ── Theme ──
  const themeBtns = document.querySelectorAll('.theme-btn');
  themeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.themeVal;
      html.setAttribute('data-theme', val);
      themeBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.themeVal === val);
        b.setAttribute('aria-pressed', b.dataset.themeVal === val ? 'true' : 'false');
      });
      showToast(val === 'oled' ? 'OLED True Black' : val.charAt(0).toUpperCase() + val.slice(1) + ' mode');
    });
  });
  // Default active
  themeBtns[0].classList.add('active');

  // ── Toast ──
  let toastTimeout;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Time formatting ──
  function fmtTime(s) {
    if (isNaN(s) || s < 0) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // ── Active media element ──
  function getMedia() {
    if (currentMedia === 'audio') return audioEl;
    if (currentMedia === 'video') return videoEl;
    return null;
  }

  // ── Load file ──
  function loadFile(file, type) {
    if (!file) return;
    const url = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/, '');
    const ext = file.name.split('.').pop().toUpperCase();

    currentMedia = type;

    if (type === 'audio') {
      // Teardown video
      videoEl.pause();
      videoEl.src = '';
      videoEl.classList.remove('active');
      videoOverlay.classList.remove('show');

      audioEl.src = url;
      audioEl.load();

      dropHint.classList.add('hidden');
      audioArt.classList.add('visible');
      visualizerCanvas.classList.add('visible');
      audioArtName.textContent = name;
      setupVisualizer();
    } else {
      // Teardown audio
      audioEl.pause();
      audioEl.src = '';
      audioArt.classList.remove('visible');
      visualizerCanvas.classList.remove('visible');
      if (animId) cancelAnimationFrame(animId);

      videoEl.src = url;
      videoEl.load();
      videoEl.classList.add('active');
      dropHint.classList.add('hidden');
    }

    trackName.textContent = name;
    trackType.textContent = `${ext} · ${type}`;
    seekFill.style.width = '0%';
    seekInput.value = 0;
    currentTimeEl.textContent = '0:00';
    remainTimeEl.textContent = '-0:00';
    totalDuration.textContent = '0:00';
    btnPlayPause.textContent = '▶';
    overlayPlayBtn.textContent = '▶';
    showToast(`Loaded: ${name}`);
  }

  // ── File inputs ──
  audioInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0], 'audio');
  });
  videoInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0], 'video');
  });

  // ── Drag & drop ──
  mediaArea.addEventListener('dragover', e => {
    e.preventDefault();
    mediaArea.classList.add('drag-over');
  });
  mediaArea.addEventListener('dragleave', () => mediaArea.classList.remove('drag-over'));
  mediaArea.addEventListener('drop', e => {
    e.preventDefault();
    mediaArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (file.type.startsWith('audio/')) loadFile(file, 'audio');
    else if (file.type.startsWith('video/')) loadFile(file, 'video');
    else showToast('Unsupported file type');
  });

  // Click on drop area (when no video loaded) → open audio picker
  mediaArea.addEventListener('click', () => {
    if (currentMedia === 'video') {
      toggleVideoOverlay();
    } else if (!currentMedia) {
      audioInput.click();
    }
  });

  // Video overlay
  function toggleVideoOverlay() {
    clearTimeout(overlayTimeout);
    videoOverlay.classList.add('show');
    overlayTimeout = setTimeout(() => videoOverlay.classList.remove('show'), 2500);
  }
  overlayPlayBtn.addEventListener('click', e => {
    e.stopPropagation();
    togglePlay();
  });

  // ── Media events ──
  [audioEl, videoEl].forEach(el => {
    el.addEventListener('timeupdate', updateProgress);
    el.addEventListener('loadedmetadata', onMetadata);
    el.addEventListener('ended', onEnded);
    el.addEventListener('progress', updateBuffer);
    el.addEventListener('play', () => {
      btnPlayPause.textContent = '⏸';
      overlayPlayBtn.textContent = '⏸';
    });
    el.addEventListener('pause', () => {
      btnPlayPause.textContent = '▶';
      overlayPlayBtn.textContent = '▶';
    });
  });

  function onMetadata() {
    const m = getMedia();
    if (!m) return;
    totalDuration.textContent = fmtTime(m.duration);
    remainTimeEl.textContent = '-' + fmtTime(m.duration);
  }

  function updateProgress() {
    const m = getMedia();
    if (!m || !m.duration) return;
    const pct = (m.currentTime / m.duration) * 100;
    seekFill.style.width = pct + '%';
    seekInput.value = (pct / 100) * 1000;
    currentTimeEl.textContent = fmtTime(m.currentTime);
    remainTimeEl.textContent = '-' + fmtTime(m.duration - m.currentTime);
  }

  function updateBuffer() {
    const m = getMedia();
    if (!m || !m.buffered.length || !m.duration) return;
    const end = m.buffered.end(m.buffered.length - 1);
    seekBuffer.style.width = ((end / m.duration) * 100) + '%';
  }

  function onEnded() {
    if (isLooping) {
      const m = getMedia();
      if (m) { m.currentTime = 0; m.play(); }
    } else {
      btnPlayPause.textContent = '▶';
      overlayPlayBtn.textContent = '▶';
    }
  }

  // ── Seek ──
  seekInput.addEventListener('input', () => {
    const m = getMedia();
    if (!m || !m.duration) return;
    const t = (seekInput.value / 1000) * m.duration;
    m.currentTime = t;
    seekFill.style.width = (seekInput.value / 10) + '%';
  });

  // ── Play / Pause ──
  function togglePlay() {
    const m = getMedia();
    if (!m || !m.src) { showToast('Load a file first'); return; }
    if (m.paused) {
      m.play().catch(() => showToast('Playback error'));
    } else {
      m.pause();
    }
  }
  btnPlayPause.addEventListener('click', togglePlay);

  // ── Skip / Rewind ──
  btnRewind.addEventListener('click', () => {
    const m = getMedia();
    if (m) { m.currentTime = 0; showToast('Rewind'); }
  });
  btnEnd.addEventListener('click', () => {
    const m = getMedia();
    if (m && m.duration) { m.currentTime = m.duration - 0.1; showToast('End'); }
  });
  btnSkipBack.addEventListener('click', () => {
    const m = getMedia();
    if (m) { m.currentTime = Math.max(0, m.currentTime - 5); showToast('−5s'); }
  });
  btnSkipFwd.addEventListener('click', () => {
    const m = getMedia();
    if (m && m.duration) { m.currentTime = Math.min(m.duration, m.currentTime + 5); showToast('+5s'); }
  });

  // ── Loop ──
  btnLoop.addEventListener('click', () => {
    isLooping = !isLooping;
    btnLoop.classList.toggle('active', isLooping);
    showToast(isLooping ? 'Loop on' : 'Loop off');
  });

  // ── Mute ──
  btnMute.addEventListener('click', () => {
    const m = getMedia();
    if (!m) return;
    m.muted = !m.muted;
    btnMute.textContent = m.muted ? '🔇' : '🔊';
    volIcon.textContent = m.muted ? '🔇' : '🔊';
    showToast(m.muted ? 'Muted' : 'Unmuted');
  });

  // ── Volume ──
  volInput.addEventListener('input', () => {
    const v = parseInt(volInput.value);
    volFill.style.width = v + '%';
    volVal.textContent = v;
    [audioEl, videoEl].forEach(el => el.volume = v / 100);
    volIcon.textContent = v === 0 ? '🔇' : v < 50 ? '🔉' : '🔊';
  });
  // Init volume
  [audioEl, videoEl].forEach(el => el.volume = 0.8);
  volFill.style.width = '80%';

  // ── Playback speed ──
  speedBtns.querySelectorAll('.speed-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const speed = parseFloat(btn.dataset.speed);
      [audioEl, videoEl].forEach(el => el.playbackRate = speed);
      speedBtns.querySelectorAll('.speed-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showToast(`Speed: ${speed}×`);
    });
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName.toLowerCase();
    if (tag === 'input' || tag === 'button') return;
    switch (e.code) {
      case 'Space': e.preventDefault(); togglePlay(); break;
      case 'ArrowLeft': e.preventDefault(); btnSkipBack.click(); break;
      case 'ArrowRight': e.preventDefault(); btnSkipFwd.click(); break;
      case 'ArrowUp': e.preventDefault(); volInput.value = Math.min(100, parseInt(volInput.value) + 5); volInput.dispatchEvent(new Event('input')); break;
      case 'ArrowDown': e.preventDefault(); volInput.value = Math.max(0, parseInt(volInput.value) - 5); volInput.dispatchEvent(new Event('input')); break;
      case 'KeyM': btnMute.click(); break;
      case 'KeyL': btnLoop.click(); break;
      case 'Home': btnRewind.click(); break;
      case 'End': btnEnd.click(); break;
    }
  });

  // ── Audio Visualizer ──
  function setupVisualizer() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (source) { try { source.disconnect(); } catch (e) {} }
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    if (animId) cancelAnimationFrame(animId);
    drawVisualizer();
  }

  function drawVisualizer() {
    animId = requestAnimationFrame(drawVisualizer);
    if (!analyser) return;
    const canvas = visualizerCanvas;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    const H = canvas.height = canvas.offsetHeight * window.devicePixelRatio;

    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const grad = ctx.createLinearGradient(0, H, 0, 0);
    const theme = html.getAttribute('data-theme');
    if (theme === 'oled') {
      grad.addColorStop(0, 'rgba(0,229,255,0.6)');
      grad.addColorStop(0.5, 'rgba(180,0,255,0.4)');
      grad.addColorStop(1, 'rgba(0,229,255,0.0)');
    } else if (theme === 'light') {
      grad.addColorStop(0, 'rgba(59,107,232,0.5)');
      grad.addColorStop(0.5, 'rgba(124,92,232,0.3)');
      grad.addColorStop(1, 'rgba(59,107,232,0.0)');
    } else {
      grad.addColorStop(0, 'rgba(91,138,245,0.6)');
      grad.addColorStop(0.5, 'rgba(167,139,250,0.4)');
      grad.addColorStop(1, 'rgba(91,138,245,0.0)');
    }

    const barW = W / bufLen * 1.8;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const barH = (data[i] / 255) * H * 0.85;
      ctx.fillStyle = grad;
      const radius = Math.min(barW / 2, 4 * window.devicePixelRatio);
      ctx.beginPath();
      ctx.roundRect(x, H - barH, barW - 1, barH, [radius, radius, 0, 0]);
      ctx.fill();
      x += barW;
    }
  }

  // Resume AudioContext on first interaction
  document.addEventListener('click', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: false });

})();
</script>
</body>
