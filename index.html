<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Weather App (No API Key)</title>
<style>
:root{
  --bg: rgba(255,255,255,0.15);
  --text:#000;
  --card: rgba(255,255,255,0.25);
}
body.dark{ --bg: rgba(0,0,0,0.4); --text:#fff; --card: rgba(0,0,0,0.4);} 
body.oled{ --bg:#000; --text:#0f0; --card:#000;} body{ margin:0; font-family:sans-serif; background:linear-gradient(135deg,#74ebd5,#ACB6E5); color:var(--text); display:flex; flex-direction:column; min-height:100vh; transition:0.3s; }

header{ display:flex; justify-content:space-between; align-items:center; padding:10px; }

button{ padding:8px 10px; border:none; border-radius:10px; cursor:pointer; }

.container{ flex:1; padding:15px; }

.glass{ background:var(--card); backdrop-filter:blur(15px); border-radius:20px; padding:15px; margin-bottom:15px; }

input{ width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:10px; }

.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; }

footer{ text-align:center; padding:10px; } </style>

</head>
<body>
<header>
  <h3>Weather Pro</h3>
  <div>
    <button onclick="setTheme('light')">☀️</button>
    <button onclick="setTheme('dark')">🌙</button>
    <button onclick="setTheme('oled')">⬛</button>
  </div>
</header><div class="container">  <div class="glass">
    <input id="city" placeholder="Enter city (e.g. Kolkata)">
    <button onclick="searchCity()">Search</button>
    <button onclick="useGPS()">📍 Use My Location</button>
  </div>  <div id="current" class="glass"></div>
  <div id="details" class="glass grid"></div>
  <div id="forecast" class="glass"></div></div><footer>
  © Manik Roy <span id="year"></span>. All Rights Reserved.
</footer><script>
document.getElementById('year').textContent=new Date().getFullYear();

function setTheme(mode){
  document.body.className=mode;
}

// --- GEO LOCATION ---
function useGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;
    loadWeather(lat,lon);
  });
}

// --- CITY SEARCH (via wttr.in fallback) ---
async function searchCity(){
  const city=document.getElementById('city').value;

  try{
    const res=await fetch(`https://wttr.in/${city}?format=j1`);
    const data=await res.json();

    renderWTTR(data, city);
  }catch(e){
    alert("Failed to fetch weather");
  }
}

// --- OPEN-METEO ---
async function loadWeather(lat,lon){
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,apparent_temperature,precipitation_probability,windspeed_10m`);
    const data=await res.json();

    renderMeteo(data);
  }catch(e){
    alert("Error loading weather");
  }
}

// --- RENDER METEO ---
function renderMeteo(data){
  const c=data.current_weather;

  document.getElementById('current').innerHTML=`
    <h2>Current Weather</h2>
    <p>${c.temperature}°C</p>
    <p>Wind: ${c.windspeed} km/h</p>
  `;

  document.getElementById('details').innerHTML=`
    <div>Feels Like: ${data.hourly.apparent_temperature[0]}°C</div>
    <div>Humidity: ${data.hourly.relativehumidity_2m[0]}%</div>
    <div>Rain Chance: ${data.hourly.precipitation_probability[0]}%</div>
  `;

  let html="<h3>Next Hours</h3>";
  for(let i=0;i<6;i++){
    html+=`<p>${data.hourly.time[i]} - ${data.hourly.temperature_2m[i]}°C</p>`;
  }
  document.getElementById('forecast').innerHTML=html;
}

// --- RENDER WTTR ---
function renderWTTR(data, city){
  const c=data.current_condition[0];

  document.getElementById('current').innerHTML=`
    <h2>${city}</h2>
    <p>${c.temp_C}°C</p>
    <p>${c.weatherDesc[0].value}</p>
  `;

  document.getElementById('details').innerHTML=`
    <div>Feels Like: ${c.FeelsLikeC}°C</div>
    <div>Humidity: ${c.humidity}%</div>
    <div>Wind: ${c.windspeedKmph} km/h</div>
  `;

  let html="<h3>3-Day Forecast</h3>";
  data.weather.forEach(d=>{
    html+=`<p>${d.date} - Max: ${d.maxtempC}°C / Min: ${d.mintempC}°C</p>`;
  });

  document.getElementById('forecast').innerHTML=html;
}
</script></body>
</html>
