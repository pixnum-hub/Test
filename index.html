<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vastu Compass · Manik Roy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ─── CSS VARIABLES ─────────────────────────────────────── */
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #8a6f2e;
  --accent: #e05c3a;
  --accent2: #3a9e8a;

  /* DARK (default) */
  --bg: #0f0e0d;
  --bg2: #1a1814;
  --bg3: #252218;
  --surface: #1e1c16;
  --surface2: #2a2720;
  --border: rgba(201,168,76,0.18);
  --text-primary: #f0e8d0;
  --text-secondary: #a09070;
  --text-dim: #6a5f45;
  --shadow: rgba(0,0,0,0.7);
  --compass-rim: #2a2418;
  --needle-n: #e05c3a;
  --needle-s: #8a6f2e;
  --ring-glow: rgba(201,168,76,0.12);
  --tick-color: rgba(201,168,76,0.5);
}

[data-theme="light"] {
  --bg: #f5f0e8;
  --bg2: #ede5d4;
  --bg3: #e0d8c5;
  --surface: #faf6ee;
  --surface2: #ede5d4;
  --border: rgba(140,100,30,0.2);
  --text-primary: #2a2010;
  --text-secondary: #7a6040;
  --text-dim: #b09060;
  --shadow: rgba(100,70,10,0.18);
  --compass-rim: #d4c89a;
  --ring-glow: rgba(180,130,30,0.10);
  --tick-color: rgba(140,100,30,0.35);
}

[data-theme="oled"] {
  --bg: #000000;
  --bg2: #000000;
  --bg3: #070707;
  --surface: #0a0a0a;
  --surface2: #111111;
  --border: rgba(201,168,76,0.22);
  --text-primary: #ffe8b0;
  --text-secondary: #9a7a40;
  --text-dim: #5a4820;
  --shadow: rgba(0,0,0,0.95);
  --compass-rim: #111100;
  --ring-glow: rgba(201,168,76,0.08);
  --tick-color: rgba(201,168,76,0.4);
}

[data-theme="hc"] {
  --bg: #ffffff;
  --bg2: #ffffff;
  --bg3: #f0f0f0;
  --surface: #ffffff;
  --surface2: #eeeeee;
  --border: #000000;
  --text-primary: #000000;
  --text-secondary: #000000;
  --text-dim: #333333;
  --gold: #000000;
  --gold-light: #222222;
  --gold-dim: #444444;
  --accent: #cc0000;
  --accent2: #006600;
  --shadow: rgba(0,0,0,0.25);
  --compass-rim: #cccccc;
  --needle-n: #cc0000;
  --needle-s: #000000;
  --ring-glow: rgba(0,0,0,0.08);
  --tick-color: rgba(0,0,0,0.5);
}

/* ─── RESET ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.35s, color 0.35s;
  overflow-x: hidden;
}

/* ─── NOISE OVERLAY ──────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  pointer-events: none; z-index: 0; opacity: 0.5;
}
[data-theme="hc"] body::before { display: none; }

/* ─── WRAPPER ────────────────────────────────────────────── */
.app-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 0 0 0 0;
}

/* ─── HEADER ─────────────────────────────────────────────── */
header {
  width: 100%;
  padding: 20px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%);
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.app-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.25rem, 5vw, 1.6rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 20px rgba(201,168,76,0.3);
}
.app-subtitle {
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: 'Crimson Pro', serif;
  font-style: italic;
}

/* ─── THEME TOGGLE BAR ───────────────────────────────────── */
.theme-bar {
  display: flex; gap: 6px; align-items: center;
}
.theme-btn {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  font-family: 'Cinzel', serif;
  font-weight: 600;
  cursor: pointer;
  background: var(--surface);
  color: var(--text-secondary);
  transition: all 0.2s;
  white-space: nowrap;
}
.theme-btn:hover { border-color: var(--gold); color: var(--gold); }
.theme-btn.active {
  background: var(--gold);
  color: #0f0e0d;
  border-color: var(--gold);
}
[data-theme="hc"] .theme-btn.active { color: #fff; background: #000; border-color: #000; }

/* ─── COMPASS SECTION ────────────────────────────────────── */
.compass-section {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px 16px;
  gap: 18px;
  flex: 1;
}

/* ─── DIRECTION BADGE ────────────────────────────────────── */
.direction-badge {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.direction-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 9vw, 3rem);
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  letter-spacing: 0.06em;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  transition: color 0.3s;
}
.degree-label {
  font-size: clamp(0.9rem, 3.5vw, 1.1rem);
  color: var(--text-secondary);
  letter-spacing: 0.12em;
  font-weight: 300;
}
.vastu-direction {
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent2);
  font-style: italic;
}

/* ─── COMPASS DIAL ───────────────────────────────────────── */
.compass-container {
  position: relative;
  width: min(72vw, 320px);
  height: min(72vw, 320px);
  flex-shrink: 0;
}

/* outer decorative ring */
.compass-outer-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--compass-rim) 0%,
    var(--bg3) 25%,
    var(--compass-rim) 50%,
    var(--bg3) 75%,
    var(--compass-rim) 100%
  );
  box-shadow:
    0 0 0 2px var(--border),
    0 0 30px var(--ring-glow),
    inset 0 0 20px var(--shadow);
}

/* tick marks ring */
.ticks-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

/* main compass face */
.compass-face {
  position: absolute;
  inset: 10%;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, var(--bg3) 0%, var(--bg2) 60%, var(--bg) 100%);
  border: 1px solid var(--border);
  box-shadow: inset 0 2px 12px var(--shadow), inset 0 0 40px rgba(0,0,0,0.3);
  overflow: hidden;
}
.compass-face::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 30%, rgba(255,255,255,0.04) 0%, transparent 60%);
}

/* rotating rose */
.compass-rose {
  position: absolute; inset: 0;
  transition: transform 0.15s ease-out;
  will-change: transform;
}
.rose-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

/* fixed needle */
.needle-wrap {
  position: absolute; inset: 0;
  pointer-events: none;
}
.needle-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
}

/* center jewel */
.center-jewel {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold-dim));
  box-shadow: 0 0 8px var(--gold), 0 0 2px #000;
  z-index: 10;
}

/* ─── STATUS BAR ─────────────────────────────────────────── */
.status-bar {
  width: 100%;
  display: flex; justify-content: center; gap: 10px;
  padding: 4px 0;
}
.status-pill {
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  font-family: 'Cinzel', serif;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim);
  animation: pulse-dot 2s infinite;
}
.status-dot.active { background: var(--accent2); }
.status-dot.error  { background: var(--accent); animation: none; }
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.5; transform:scale(0.8); }
}

/* ─── VASTU GRID ─────────────────────────────────────────── */
.vastu-grid {
  width: 100%;
  padding: 0 16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.vastu-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.vastu-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--card-accent, var(--gold)), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}
.vastu-card.active {
  border-color: var(--gold);
  background: var(--surface2);
  box-shadow: 0 0 16px var(--ring-glow);
}
.vastu-card.active::before { opacity: 1; }
.vastu-card .dir-symbol {
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
}
.vastu-card .dir-name {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin: 2px 0;
}
.vastu-card .dir-lord {
  font-size: 0.68rem;
  color: var(--text-secondary);
  font-style: italic;
  display: block;
}
.vastu-card .dir-element {
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
  background: var(--bg2);
  color: var(--text-dim);
}

/* element colors */
.el-fire  { color: #e05c3a !important; }
.el-earth { color: #c9a84c !important; }
.el-water { color: #3a9ee0 !important; }
.el-air   { color: #9ecf8a !important; }
.el-space { color: #b07ae0 !important; }

/* ─── CALIBRATE BTN ──────────────────────────────────────── */
.calibrate-btn {
  margin: 14px 16px 6px;
  width: calc(100% - 32px);
  padding: 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #0f0e0d;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.calibrate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(201,168,76,0.35); }
.calibrate-btn:active { transform: translateY(0); }
[data-theme="hc"] .calibrate-btn { color: #ffffff; background: #000000; border: 2px solid #000000; }

/* ─── INFO STRIP ─────────────────────────────────────────── */
.info-strip {
  width: 100%;
  padding: 10px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.info-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.info-val {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}
.info-lbl {
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.divider-v {
  width: 1px; height: 28px;
  background: var(--border);
}

/* ─── FOOTER ─────────────────────────────────────────────── */
footer {
  width: 100%;
  padding: 14px 20px;
  text-align: center;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.footer-copy {
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: 'Cinzel', serif;
  line-height: 1.8;
}
.footer-copy .gold { color: var(--gold); }

/* ─── PERMISSION OVERLAY ─────────────────────────────────── */
.perm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.perm-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  max-width: 320px; width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.perm-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
.perm-title {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  color: var(--gold);
  margin-bottom: 10px;
}
.perm-text {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 22px;
}
.perm-btn {
  padding: 12px 28px;
  border-radius: 12px;
  background: var(--gold);
  color: #0f0e0d;
  font-family: 'Cinzel', serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  border: none; cursor: pointer;
  margin: 4px;
  transition: all 0.2s;
}
.perm-btn:hover { background: var(--gold-light); }
.perm-btn.secondary {
  background: var(--surface2);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.compass-section { animation: fadeIn 0.6s ease both; }
.vastu-grid { animation: fadeIn 0.6s 0.15s ease both; }

/* ─── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ─── RESP ───────────────────────────────────────────────── */
@media (max-height: 700px) {
  .vastu-grid { grid-template-columns: repeat(4, 1fr); }
  .compass-container { width: min(55vw, 240px); height: min(55vw, 240px); }
}
</style>
</head>
<body data-theme="dark">

<!-- Permission Overlay -->
<div class="perm-overlay" id="permOverlay">
  <div class="perm-card">
    <span class="perm-icon">🧭</span>
    <div class="perm-title">Compass Access</div>

    <button class="perm-btn" id="grantBtn">Allow Compass</button>

  </div>
</div>

<div class="app-wrapper">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="app-title">Vastu Compass</div>

    <!-- Compass Dial -->
    <div class="compass-container">
      <div class="compass-outer-ring">
        <!-- tick marks -->
        <svg class="ticks-svg" viewBox="0 0 320 320">
          <g id="tickGroup"></g>
        </svg>

      <div class="compass-face">

        <div class="compass-rose" id="compassRose">

          <svg class="needle-svg" viewBox="0 0 280 280">

            <!-- S needle -->

</div>

const VASTU_DIRS = [

  { sym:'SW', name:'Southwest', range:[202.5,247.5],                  lord:'Niriti',  element:'Earth', color:'#c9a84c', benefit:'Strength & Longevity' },
  { sym:'W',  name:'West',      range:[247.5,292.5],                  lord:'Varuna',  element:'Water', color:'#3a9ee0', benefit:'Gains & Learning' },
  { sym:'NW', name:'Northwest', range:[292.5,337.5],                  lord:'Vayu',    element:'Air',   color:'#9ecf8a', benefit:'Friends & Support' },
];

function getVastuDir(deg) {
  const d = ((deg % 360) + 360) % 360;
  for (const v of VASTU_DIRS) {
    if (v.range2) {
      if (d >= v.range[0] || d < v.range2[1]) return v;
    } else {
      if (d >= v.range[0] && d < v.range[1]) return v;
    }
  }
  return VASTU_DIRS[0];
}

// ── BUILD VASTU GRID ────────────────────────────────────────
const grid = document.getElementById('vastuGrid');
VASTU_DIRS.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'vastu-card';
  card.id = `vcard-${v.sym}`;
  card.style.setProperty('--card-accent', v.color);
  const elClass = { Fire:'el-fire', Earth:'el-earth', Water:'el-water', Air:'el-air', Space:'el-space' }[v.element] || '';
  card.innerHTML = `
    <span class="dir-symbol">${v.sym}</span>
    <span class="dir-name">${v.name}</span>
    <span class="dir-lord">${v.lord}</span>
    <span class="dir-element ${elClass}">${v.element}</span>
  `;
  grid.appendChild(card);
});

// ── BUILD COMPASS ROSE SVG ──────────────────────────────────
function buildRose() {
  const svg = document.getElementById('roseSvg');
  const cx = 140, cy = 140, r = 115;
  const cardinals = ['N','NE','E','SE','S','SW','W','NW'];
  const degs      = [0,45,90,135,180,225,270,315];
  const isCard    = [true,false,true,false,true,false,true,false];

  // cardinal petals
  const petalDirs = [0,90,180,270];
  const petalColors = ['#e05c3a','#c9a84c','#8a6f2e','#c9a84c'];
  petalDirs.forEach((angle, i) => {
    const rad = (angle - 90) * Math.PI / 180;
    const len = i === 0 ? 88 : 75;
    const tip = { x: cx + Math.cos(rad)*len, y: cy + Math.sin(rad)*len };
    const l = { x: cx + Math.cos(rad + Math.PI*0.18)*32, y: cy + Math.sin(rad + Math.PI*0.18)*32 };
    const rr = { x: cx + Math.cos(rad - Math.PI*0.18)*32, y: cy + Math.sin(rad - Math.PI*0.18)*32 };
    const p = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points', `${tip.x},${tip.y} ${l.x},${l.y} ${cx},${cy} ${rr.x},${rr.y}`);
    p.setAttribute('fill', i === 0 ? 'url(#nGrad)' : (i === 2 ? 'url(#sGrad)' : '#c9a84c'));
    p.setAttribute('opacity', i === 0 ? '0.92' : '0.75');
    svg.appendChild(p);
  });

  // intercardinal petals
  [45,135,225,315].forEach(angle => {
    const rad = (angle - 90) * Math.PI / 180;
    const tip = { x: cx + Math.cos(rad)*58, y: cy + Math.sin(rad)*58 };
    const l = { x: cx + Math.cos(rad + Math.PI*0.22)*24, y: cy + Math.sin(rad + Math.PI*0.22)*24 };
    const rr = { x: cx + Math.cos(rad - Math.PI*0.22)*24, y: cy + Math.sin(rad - Math.PI*0.22)*24 };
    const p = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points', `${tip.x},${tip.y} ${l.x},${l.y} ${cx},${cy} ${rr.x},${rr.y}`);
    p.setAttribute('fill', '#8a6f2e');
    p.setAttribute('opacity', '0.6');
    svg.appendChild(p);
  });

  // degree rings
  [50,80,108].forEach(rr => {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', rr);
    c.setAttribute('fill', 'none');
    c.setAttribute('stroke', 'rgba(201,168,76,0.15)');
    c.setAttribute('stroke-width', '0.8');
    svg.appendChild(c);
  });

  // direction labels
  cardinals.forEach((label, i) => {
    const angle = degs[i];
    const rad = (angle - 90) * Math.PI / 180;
    const dist = isCard[i] ? 100 : 98;
    const x = cx + Math.cos(rad) * dist;
    const y = cy + Math.sin(rad) * dist;
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-family',"'Cinzel', serif");
    t.setAttribute('font-size', isCard[i] ? '11' : '7.5');
    t.setAttribute('font-weight', isCard[i] ? '700' : '500');
    t.setAttribute('fill', label === 'N' ? '#ff7a5a' : isCard[i] ? '#c9a84c' : '#8a6f2e');
    t.textContent = label;
    svg.appendChild(t);
  });
}
buildRose();

// ── BUILD TICK MARKS ────────────────────────────────────────
function buildTicks() {
  const g = document.getElementById('tickGroup');
  const cx = 160, cy = 160;
  for (let i = 0; i < 360; i += 5) {
    const rad = (i - 90) * Math.PI / 180;
    const isMajor = i % 45 === 0;
    const isMed   = i % 15 === 0;
    const r1 = isMajor ? 148 : isMed ? 150 : 151;
    const r2 = isMajor ? 158 : isMed ? 156 : 154;
    const x1 = cx + Math.cos(rad)*r1, y1 = cy + Math.sin(rad)*r1;
    const x2 = cx + Math.cos(rad)*r2, y2 = cy + Math.sin(rad)*r2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', isMajor ? 'rgba(201,168,76,0.7)' : 'rgba(201,168,76,0.3)');
    line.setAttribute('stroke-width', isMajor ? '2' : '1');
    g.appendChild(line);
  }
}
buildTicks();

// ── STATE ───────────────────────────────────────────────────
let currentDeg = 0, targetDeg = 0, raf = null;
let isDemo = false, accuracy = '—';

// ── SMOOTH ROTATION ─────────────────────────────────────────
function lerp(a, b, t) {
  let diff = b - a;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return a + diff * t;
}
function animateRose() {
  currentDeg = lerp(currentDeg, targetDeg, 0.12);
  document.getElementById('compassRose').style.transform = `rotate(${-currentDeg}deg)`;
  updateUI(currentDeg);
  raf = requestAnimationFrame(animateRose);
}

function updateUI(deg) {
  const d = ((deg % 360) + 360) % 360;
  const v = getVastuDir(d);
  document.getElementById('dirLabel').textContent = v.sym;
  document.getElementById('degLabel').textContent = d.toFixed(1);
  document.getElementById('vastuLabel').textContent = `${v.lord} — ${v.benefit}`;
  document.getElementById('infoMag').textContent = d.toFixed(0) + '°';

  // highlight active card
  VASTU_DIRS.forEach(dir => {
    const card = document.getElementById(`vcard-${dir.sym}`);
    card.classList.toggle('active', dir.sym === v.sym);
  });
}

// ── COMPASS SENSOR ──────────────────────────────────────────
// Track which event source is providing data to avoid double-firing
let usingAbsolute = false;
let sensorActive = false;

function setSensorUI(mode) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.classList.remove('error');
  dot.classList.add('active');
  txt.textContent = mode;
  document.getElementById('infoMode').textContent = mode;
  document.getElementById('infoAcc').textContent = 'Good';
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('infoZone').textContent = tz.split('/').pop().replace('_',' ');
  } catch(e) {}
}

// Handler for deviceorientationabsolute (Android Chrome — true North)
function onAbsolute(e) {
  if (e.alpha === null) return;
  usingAbsolute = true;
  sensorActive = true;
  // absolute=true means alpha=0 is North; heading = (360 - alpha) % 360
  let heading = (360 - e.alpha) % 360;
  targetDeg = heading;
  document.getElementById('infoAcc').textContent = 'Abs';
}

// Handler for deviceorientation (iOS webkit + Android fallback)
function onOrientation(e) {
  // If we already have absolute data, ignore the relative fallback
  if (usingAbsolute) return;
  sensorActive = true;

  let heading = null;

  // iOS Safari provides webkitCompassHeading directly (true North, degrees clockwise)
  if (e.webkitCompassHeading != null && e.webkitCompassHeading !== undefined) {
    heading = e.webkitCompassHeading;
    const acc = e.webkitCompassAccuracy;
    document.getElementById('infoAcc').textContent =
      (acc != null && acc > 0) ? acc.toFixed(0) + '°' : 'Good';
  }
  // Android without absolute: alpha is relative to device boot orientation — unreliable,
  // but still better than nothing. Use only if webkitCompassHeading unavailable.
  else if (e.alpha != null) {
    heading = (360 - e.alpha + 360) % 360;
    document.getElementById('infoAcc').textContent = 'Rel';
  }

  if (heading !== null) targetDeg = heading;
}

function attachSensor() {
  // Listen for absolute first (Android Chrome gives true North)
  window.addEventListener('deviceorientationabsolute', onAbsolute, true);
  // Also listen for standard event (iOS, other browsers)
  window.addEventListener('deviceorientation', onOrientation, true);

  setSensorUI('Live');

  // After 2s, if no real data received, fall back to demo
  setTimeout(() => {
    if (!sensorActive) startDemo();
  }, 2000);
}

function startSensor() {
  // NOTE: On iOS 13+ requestPermission MUST be called synchronously
  // inside a user gesture handler — this function IS called from a click handler
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') attachSensor();
        else startDemo();
      })
      .catch(() => startDemo());
  } else if (window.DeviceOrientationEvent) {
    // Android / desktop
    attachSensor();
  } else {
    startDemo();
  }
}

let demoInterval = null;
function startDemo() {
  isDemo = true;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.classList.remove('active');
  dot.classList.add('error');
  txt.textContent = 'Demo';
  document.getElementById('infoMode').textContent = 'Demo';
  document.getElementById('infoAcc').textContent = 'Sim';
  document.getElementById('infoZone').textContent = 'Demo';

  // smooth demo sweep
  let t = 0;
  demoInterval = setInterval(() => {
    t += 0.008;
    targetDeg = ((Math.sin(t)*180 + Math.sin(t*0.37)*90 + 360) % 360);
  }, 50);
}

function stopDemo() {
  if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
}

// ── CALIBRATE ───────────────────────────────────────────────
document.getElementById('calibrateBtn').addEventListener('click', () => {
  const btn = document.getElementById('calibrateBtn');
  btn.style.opacity = '0.6';
  btn.textContent = '⟳  Calibrating…';
  currentDeg = targetDeg;
  setTimeout(() => {
    btn.style.opacity = '1';
    btn.innerHTML = '⟳ &nbsp;Calibrate Compass';
  }, 1200);
});

// ── PERMISSION OVERLAY ──────────────────────────────────────
document.getElementById('grantBtn').addEventListener('click', () => {
  document.getElementById('permOverlay').style.display = 'none';
  animateRose();
  // startSensor() MUST be called directly here — iOS requires requestPermission
  // to fire synchronously within a user gesture (this click handler)
  startSensor();
});
document.getElementById('demoBtn').addEventListener('click', () => {
  document.getElementById('permOverlay').style.display = 'none';
  animateRose();
  startDemo();
});

// Desktop: DeviceOrientationEvent likely undefined — skip overlay, start demo
if (typeof DeviceOrientationEvent === 'undefined' ||
    !('ontouchstart' in window)) {
  document.getElementById('permOverlay').style.display = 'none';
  animateRose();
  startDemo();
}

// ── THEME TOGGLE ────────────────────────────────────────────
const themeBtns = document.querySelectorAll('.theme-btn');
themeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.t;
    document.body.dataset.theme = t;
    themeBtns.forEach(b => b.classList.toggle('active', b.dataset.t === t));
  });
});
// set dark active by default
document.querySelector('[data-t="dark"]').classList.add('active');

// ── FOOTER YEAR ─────────────────────────────────────────────
document.getElementById('footerYear').textContent = new Date().getFullYear();

// ── TIMEZONE ────────────────────────────────────────────────
try {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById('infoZone').textContent = tz.split('/').pop().replace('_',' ');
} catch(e) {}
</script>
