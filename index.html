<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Ultra Pro</title>

<style>
:root {
  --bg:#f5f5f5;
  --text:#111;
  --card:rgba(255,255,255,0.7);
}

body.dark { --bg:#121212; --text:#fff; --card:rgba(255,255,255,0.05); }
body.oled { --bg:#000; --text:#fff; --card:rgba(255,255,255,0.03); }
body.hc { --bg:#000; --text:#0f0; --card:#000; }

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
}

#bgCanvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

.container{
  width:100%;
  max-width:420px;
  padding:12px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(15px);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

.hourly,.daily{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.small{
  min-width:65px;
  text-align:center;
}

button,input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:4px;
}

footer{
  margin-top:auto;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">

<h2>Weather Ultra Pro</h2>

<input id="city" placeholder="Enter city">
<button onclick="search()">Search</button>

<div class="card">
  <div id="loc">Loading...</div>
  <div id="temp" style="font-size:40px"></div>
  <div id="desc"></div>
</div>

<div class="card">
  <h3>🤖 AI Insights</h3>
  <div id="insights"></div>
</div>

<div class="card">
  <h3>📊 Temperature Chart</h3>
  <canvas id="chart" height="150"></canvas>
</div>

<div class="card">
  <h3>Hourly</h3>
  <div class="hourly" id="hourly"></div>
</div>

<div class="card">
  <h3>7-Day</h3>
  <div class="daily" id="daily"></div>
</div>

<div class="card">
  <h3>🗺️ Radar</h3>
  <iframe src="https://www.rainviewer.com/map.html?loc=22.57,88.36,6"
    width="100%" height="250" style="border:none;border-radius:12px"></iframe>
</div>

<button onclick="setTheme('')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('oled')">OLED</button>
<button onclick="setTheme('hc')">HC</button>

</div>

<footer>
© Manik Roy <span id="year"></span>. All Rights Reserved.
</footer>

<script>
// Year
year.textContent=new Date().getFullYear();

// Theme
function setTheme(t){ document.body.className=t; }

// Canvas Animation
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let rain=[];

function rainAnim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(200,200,255,0.5)";
  rain.forEach(p=>{
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x,p.y+10);
    ctx.stroke();
    p.y+=8;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(rainAnim);
}

function setBG(code){
  if(code<3){
    canvas.style.background="linear-gradient(#4facfe,#00f2fe)";
  }else if(code<60){
    canvas.style.background="#888";
  }else{
    rain=Array.from({length:100},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height}));
    rainAnim();
  }
}

// AI Insights
function insights(data){
  let t=data.hourly.temperature_2m.slice(0,24);
  let r=data.hourly.precipitation||[];
  let w=data.hourly.windspeed_10m||[];
  let out=[];

  for(let i=0;i<r.length;i++){
    if(r[i]>0.5){ out.push("🌧️ Rain likely in "+i+"h"); break;}
  }

  let diff=t[t.length-1]-t[0];
  if(diff>3) out.push("🔥 Warming trend");
  if(diff<-3) out.push("❄️ Cooling trend");

  for(let i=0;i<w.length;i++){
    if(w[i]>30){ out.push("🌬️ Wind alert in "+i+"h"); break;}
  }

  if(out.length==0) out.push("☀️ Stable weather");

  document.getElementById("insights").innerHTML=out.join("<br>");
}

// Chart
function chart(data){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");
  let t=data.hourly.temperature_2m.slice(0,24);

  let max=Math.max(...t),min=Math.min(...t);

  ctx.clearRect(0,0,c.width,c.height);
  ctx.beginPath();

  t.forEach((v,i)=>{
    let x=i*(c.width/24);
    let y=c.height-((v-min)/(max-min))*c.height;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.stroke();
}

// Alerts
function alerts(data){
  if(data.current_weather.windspeed>50){
    alert("⚠️ High wind!");
  }
}

// Weather load
async function load(lat,lon,name="Location"){
  const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&current_weather=true&timezone=auto`);
  const d=await res.json();

  loc.innerText=name;
  temp.innerText=d.current_weather.temperature+"°C";
  desc.innerText="Wind "+d.current_weather.windspeed;

  setBG(d.current_weather.weathercode);
  insights(d);
  chart(d);
  alerts(d);

  // hourly
  hourly.innerHTML=d.hourly.temperature_2m.slice(0,24).map((t,i)=>
    `<div class="small">${i}h<br>${t}°</div>`).join("");

  // daily
  daily.innerHTML=d.daily.temperature_2m_max.map((t,i)=>
    `<div class="small">D${i+1}<br>${t}/${d.daily.temperature_2m_min[i]}</div>`).join("");
}

// Search
async function search(){
  let city=document.getElementById("city").value;
  let g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
  let d=await g.json();
  if(d.results){
    let p=d.results[0];
    load(p.latitude,p.longitude,p.name);
  }
}

// Location
navigator.geolocation.getCurrentPosition(p=>{
  load(p.coords.latitude,p.coords.longitude,"Your Location");
});
</script>

</body>
</html>
