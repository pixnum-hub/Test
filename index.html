<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SkyTrace — Live Flight Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
  :root{
    --bg:#0b1220; --panel:#121a2b; --border:#1f2b42; --text:#e6edf5;
    --muted:#93a4bf; --accent:#ffb020; --accent2:#35c46b; --danger:#ff5d5d;
    --radius:14px; --focus:2px solid var(--accent);
  }
  [data-theme="light"]{
    --bg:#f3f5f8; --panel:#ffffff; --border:#d8dee8; --text:#16202c;
    --muted:#5b6b82; --accent:#b45f00; --accent2:#1f8f4e; --danger:#c62828;
  }
  [data-theme="oled"]{
    --bg:#000000; --panel:#0a0a0a; --border:#1a1a1a; --text:#f2f2f2;
    --muted:#8a8a8a; --accent:#ffb020; --accent2:#35c46b; --danger:#ff5d5d;
  }
  [data-theme="hc"]{
    --bg:#000000; --panel:#000000; --border:#ffffff; --text:#ffffff;
    --muted:#ffffff; --accent:#ffe400; --accent2:#00e5ff; --danger:#ff5d5d;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono',monospace;
    display:flex; flex-direction:column; min-height:100vh;
    transition:background .2s,color .2s;
  }
  h1,h2,.brand{font-family:'Space Grotesk',sans-serif;}
  a{color:var(--accent);}
  button,input,select{font-family:inherit;}
  :focus-visible{outline:var(--focus); outline-offset:2px;}

  header{
    padding:14px 16px; border-bottom:1px solid var(--border);
    display:flex; flex-direction:column; gap:10px;
    position:sticky; top:0; background:var(--bg); z-index:20;
  }
  .brandrow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .brand{font-size:1.25rem; font-weight:700; display:flex; align-items:center; gap:10px;}
  .radar{
    width:22px; height:22px; border-radius:50%;
    border:1px solid var(--accent2); position:relative; overflow:hidden;
    flex:none;
  }
  .radar::before{
    content:""; position:absolute; inset:0;
    background:conic-gradient(from 0deg, var(--accent2), transparent 35%);
    animation:sweep 2.4s linear infinite;
  }
  @media (prefers-reduced-motion:reduce){ .radar::before{animation:none;} }
  @keyframes sweep{ to{ transform:rotate(360deg); } }

  .themes{display:flex; gap:6px; flex-wrap:wrap;}
  .themes button{
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:999px; padding:6px 10px; font-size:.72rem; cursor:pointer;
    letter-spacing:.03em;
  }
  .themes button[aria-pressed="true"]{border-color:var(--accent); color:var(--accent);}

  .searchrow{display:flex; gap:6px; flex-wrap:wrap;}
  .searchrow select, .searchrow input{
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:7px 8px; font-size:.78rem;
  }
  .searchrow input{flex:1; min-width:120px;}
  .searchrow button{
    background:var(--accent); color:var(--bg); border:none; border-radius:8px;
    padding:7px 12px; font-size:.78rem; font-weight:600; cursor:pointer;
  }
  .searchrow .ghost{
    background:transparent; color:var(--text); border:1px solid var(--border); font-weight:400;
  }

  .statusbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    font-size:.78rem; color:var(--muted); flex-wrap:wrap;
  }
  .statusbar strong{color:var(--text);}
  .btnrow{display:flex; gap:6px;}
  #refreshBtn, #sortBtn{
    background:transparent; border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:6px 10px; cursor:pointer; font-size:.75rem;
  }

  main{flex:1; display:flex; flex-direction:column;}
  #map{ height:44vh; min-height:260px; width:100%; border-bottom:1px solid var(--border); background:var(--panel); }
  .leaflet-container{ background:var(--panel); font-family:'JetBrains Mono',monospace; }

  #list{
    flex:1; padding:12px; display:grid; gap:10px;
    grid-template-columns:1fr;
  }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 14px; cursor:pointer; transition:border-color .15s;
  }
  .card:hover, .card:focus-visible{ border-color:var(--accent); }
  .card.selected{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .card .row1{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .callsign{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.02rem;}
  .country{color:var(--muted); font-size:.75rem;}
  .metrics{display:flex; gap:14px; margin-top:8px; font-size:.78rem; flex-wrap:wrap;}
  .metrics span b{color:var(--accent); font-weight:600;}
  .ground{color:var(--accent2);}
  .details{margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:.75rem; color:var(--muted); display:grid; gap:4px;}
  .details b{color:var(--text);}
  .live-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent2); margin-right:5px; animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.25;}}
  @media (prefers-reduced-motion:reduce){ .live-dot{animation:none;} }
  .empty, .error{padding:24px; text-align:center; color:var(--muted); font-size:.85rem;}
  .error{color:var(--danger);}
  code{background:var(--bg); padding:1px 5px; border-radius:4px;}

  .plane-icon{ font-size:18px; line-height:1; filter:drop-shadow(0 0 2px rgba(0,0,0,.6)); }

  footer{
    border-top:1px solid var(--border); padding:16px 12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:4px; font-size:.75rem; color:var(--muted);
  }
  footer strong{color:var(--text);}

  @media (min-width:768px){
    main{flex-direction:row;}
    #map{ height:auto; min-height:100%; flex:1.4; border-bottom:none; border-right:1px solid var(--border); }
    #list{ flex:1; max-height:calc(100vh - 128px); overflow-y:auto; }
  }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="brandrow">
    <div class="brand"><span class="radar" aria-hidden="true"></span> SkyTrace</div>
    <div class="themes" role="group" aria-label="Theme">
      <button data-theme-btn="dark" aria-pressed="true">Dark</button>
      <button data-theme-btn="light" aria-pressed="false">Light</button>
      <button data-theme-btn="oled" aria-pressed="false">OLED</button>
      <button data-theme-btn="hc" aria-pressed="false">HC</button>
    </div>
  </div>

  <form class="searchrow" id="searchForm">
    <select id="searchMode" aria-label="Search type">
      <option value="callsign">Callsign</option>
      <option value="reg">Registration</option>
      <option value="hex">ICAO24 hex</option>
      <option value="airport">Airport code</option>
    </select>
    <input id="searchInput" type="text" placeholder="e.g. BAW123, G-EUPT, LHR" autocomplete="off">
    <button type="submit">Search</button>
    <button type="button" class="ghost" id="clearBtn">Nearby</button>
  </form>

  <div class="statusbar">
    <span id="status">Locating you…</span>
    <div class="btnrow">
      <button id="sortBtn" type="button">Sort: Alt ↓</button>
      <button id="refreshBtn" type="button">↻ Refresh</button>
    </div>
  </div>
</header>

<main>
  <div id="map" role="application" aria-label="Live flight map"></div>
  <div id="list" aria-live="polite"><div class="empty">Waiting for flight data…</div></div>
</main>

<footer>
  <div><strong>© Manik Roy <span id="yearRange"></span>.</strong> All Rights Reserved.</div>
  <div>Live positions via airplanes.live — no key, no signup.</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
(function(){
  "use strict";

  var MAP_READY = (typeof L !== 'undefined');

  /* ---------- Footer year ---------- */
  var startYear = 2026, nowYear = new Date().getFullYear();
  document.getElementById('yearRange').textContent = nowYear > startYear ? (startYear + '–' + nowYear) : String(startYear);

  /* ---------- Theme ---------- */
  var THEME_KEY = 'skytrace-theme';
  function applyTheme(t){
    document.body.setAttribute('data-theme', t);
    document.querySelectorAll('[data-theme-btn]').forEach(function(b){
      b.setAttribute('aria-pressed', String(b.dataset.themeBtn === t));
    });
    try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  }
  document.querySelectorAll('[data-theme-btn]').forEach(function(b){
    b.addEventListener('click', function(){ applyTheme(b.dataset.themeBtn); });
  });
  var savedTheme = null;
  try{ savedTheme = localStorage.getItem(THEME_KEY); }catch(e){}
  applyTheme(savedTheme || 'dark');

  /* ---------- A small built-in airport lookup (no key needed, no external DB) ---------- */
  var AIRPORTS = {
    LHR:{lat:51.4700,lon:-0.4543}, LGW:{lat:51.1481,lon:-0.1903}, JFK:{lat:40.6413,lon:-73.7781},
    LAX:{lat:33.9416,lon:-118.4085}, ORD:{lat:41.9742,lon:-87.9073}, ATL:{lat:33.6407,lon:-84.4277},
    DFW:{lat:32.8998,lon:-97.0403}, SFO:{lat:37.6213,lon:-122.3790}, SEA:{lat:47.4502,lon:-122.3088},
    MIA:{lat:25.7959,lon:-80.2870}, DXB:{lat:25.2532,lon:55.3657}, DOH:{lat:25.2609,lon:51.6138},
    HND:{lat:35.5494,lon:139.7798}, NRT:{lat:35.7720,lon:140.3929}, ICN:{lat:37.4602,lon:126.4407},
    PEK:{lat:40.0801,lon:116.5846}, PVG:{lat:31.1443,lon:121.8083}, HKG:{lat:22.3080,lon:113.9185},
    SIN:{lat:1.3644,lon:103.9915}, BKK:{lat:13.6900,lon:100.7501}, KUL:{lat:2.7456,lon:101.7099},
    DEL:{lat:28.5562,lon:77.1000}, BOM:{lat:19.0896,lon:72.8656}, SYD:{lat:-33.9399,lon:151.1753},
    MEL:{lat:-37.6690,lon:144.8410}, CDG:{lat:49.0097,lon:2.5479}, AMS:{lat:52.3105,lon:4.7683},
    FRA:{lat:50.0379,lon:8.5622}, MUC:{lat:48.3538,lon:11.7861}, MAD:{lat:40.4936,lon:-3.5668},
    BCN:{lat:41.2974,lon:2.0833}, FCO:{lat:41.8003,lon:12.2389}, ZRH:{lat:47.4647,lon:8.5492},
    VIE:{lat:48.1103,lon:16.5697}, IST:{lat:41.2753,lon:28.7519}, CPH:{lat:55.6180,lon:12.6560},
    ARN:{lat:59.6519,lon:17.9186}, DUB:{lat:53.4213,lon:-6.2701}, LIS:{lat:38.7813,lon:-9.1359},
    WAW:{lat:52.1657,lon:20.9671}, YYZ:{lat:43.6777,lon:-79.6248}, YVR:{lat:49.1939,lon:-123.1844},
    GRU:{lat:-23.4356,lon:-46.4731}, EZE:{lat:-34.8222,lon:-58.5358}, JNB:{lat:-26.1392,lon:28.2460},
    CAI:{lat:30.1219,lon:31.4056}, MEX:{lat:19.4363,lon:-99.0721}
  };

  /* ---------- Map (guarded: theme toggle above still works even if this fails) ---------- */
  try{
  if(!MAP_READY) throw new Error('Map library failed to load from the CDN.');
  var DEFAULT_CENTER = [51.4700, -0.4543]; // Heathrow, used if geolocation is unavailable
  var map = L.map('map', { zoomControl:true }).setView(DEFAULT_CENTER, 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors', maxZoom:12
  }).addTo(map);

  var markersLayer = L.layerGroup().addTo(map);
  var trailLine = L.polyline([], { color:'#35c46b', weight:2, opacity:.8 }).addTo(map);
  var statusEl = document.getElementById('status');
  var listEl = document.getElementById('list');
  var homePoint = null;          // {lat,lon} from geolocation, for the "Nearby" button
  var activeRequest = null;      // describes what fetchActive() should repeat on refresh/interval
  var trailHistory = {};         // hex -> [[lat,lon], ...] recent trail points
  var sortMode = 'alt';          // 'alt' or 'speed'
  var selectedHex = null;        // hex of the flight currently expanded/tracked
  var lastAircraftData = [];     // most recently fetched aircraft list, for instant re-render on selection
  var routeCache = {};           // callsign -> {status:'pending'|'done'|'none', airline, origin, destination}
  var MAX_TRAIL_POINTS = 15;

  function planeDivIcon(track, onGround){
    var rot = onGround ? 0 : (track || 0);
    var color = onGround ? 'var(--muted)' : 'var(--accent)';
    var html = '<div class="plane-icon" style="transform:rotate('+rot+'deg); color:'+color+';">✈</div>';
    return L.divIcon({ html:html, className:'', iconSize:[22,22], iconAnchor:[11,11] });
  }

  /* ---------- Fetching ---------- */
  function fetchActive(){
    if(!activeRequest) return;
    statusEl.textContent = 'Fetching live traffic…';
    var url = activeRequest.url;
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(data){
      render((data && data.ac) || [], activeRequest.emptyMsg);
    }).catch(function(err){ showFetchError(err); });
  }

  function showFetchError(err){
    statusEl.textContent = 'Could not load flights. See note below.';
    var isFileOrigin = location.protocol === 'file:';
    listEl.innerHTML = '<div class="error">'+ escapeHtml(err.message) +
      (isFileOrigin
        ? ' — this page was opened as a local file (file://), and browsers block API requests from that origin. '+
          'Serve it from a real address instead: run <code>python3 -m http.server</code> or drop this file onto a free host like Netlify Drop.'
        : ' — check your connection and try refresh. If this keeps happening, the airplanes.live API '+
          'may be briefly unavailable (no key needed, but it has no uptime guarantee).') +
      '</div>';
  }

  function setNearby(lat, lon, label){
    map.setView([lat, lon], 8);
    activeRequest = { url:'https://api.airplanes.live/v2/point/'+lat+'/'+lon+'/100', emptyMsg:'No aircraft currently reporting in this area.' };
    if(label) statusEl.textContent = label;
    fetchActive();
  }

  function setAirportSearch(code){
    var ap = AIRPORTS[code];
    if(!ap){
      statusEl.textContent = 'Unknown airport code.';
      listEl.innerHTML = '<div class="error">Try a major ICAO/IATA code like LHR, JFK, DXB or SIN. This looks at aircraft currently near that airport — not a flight schedule.</div>';
      return;
    }
    map.setView([ap.lat, ap.lon], 10);
    activeRequest = { url:'https://api.airplanes.live/v2/point/'+ap.lat+'/'+ap.lon+'/20', emptyMsg:'No aircraft currently near '+code+'.' };
    fetchActive();
  }

  function setLookup(mode, query){
    var path = mode === 'callsign' ? 'callsign/'+encodeURIComponent(query)
      : mode === 'reg' ? 'reg/'+encodeURIComponent(query)
      : 'hex/'+encodeURIComponent(query.toLowerCase());
    activeRequest = { url:'https://api.airplanes.live/v2/'+path, emptyMsg:'No aircraft currently transmitting under that '+mode+'.' };
    fetchActive();
  }

  /* ---------- Render ---------- */
  function fetchRoute(callsign){
    if(!callsign || routeCache[callsign]) return; // already looked up or in flight
    routeCache[callsign] = { status:'pending' };
    fetch('https://api.adsbdb.com/v0/callsign/'+encodeURIComponent(callsign))
      .then(function(r){ if(!r.ok) throw new Error('not found'); return r.json(); })
      .then(function(data){
        var fr = data && data.response && data.response.flightroute;
        if(!fr){ routeCache[callsign] = { status:'none' }; return; }
        routeCache[callsign] = {
          status:'done',
          airline: fr.airline ? fr.airline.name : null,
          origin: fr.origin ? (fr.origin.iata_code || fr.origin.icao_code) + ' ' + fr.origin.municipality : null,
          destination: fr.destination ? (fr.destination.iata_code || fr.destination.icao_code) + ' ' + fr.destination.municipality : null
        };
      })
      .catch(function(){ routeCache[callsign] = { status:'none' }; })
      .then(function(){ if(selectedHex) render(lastAircraftData, undefined, true); });
  }

  function render(aircraft, emptyMsg, skipTrailUpdate){
    markersLayer.clearLayers();
    listEl.innerHTML = '';
    aircraft = aircraft.filter(function(a){ return a.lat != null && a.lon != null; });
    lastAircraftData = aircraft;

    if(!skipTrailUpdate){
      aircraft.forEach(function(a){
        if(!a.hex) return;
        var pts = trailHistory[a.hex] || [];
        pts.push([a.lat, a.lon]);
        if(pts.length > MAX_TRAIL_POINTS) pts.shift();
        trailHistory[a.hex] = pts;
      });
    }

    if(!aircraft.length){
      statusEl.textContent = emptyMsg || 'No aircraft found.';
      listEl.innerHTML = '<div class="empty">'+escapeHtml(emptyMsg || 'No flights found. Try refreshing in a moment.')+'</div>';
      return;
    }
    statusEl.innerHTML = '<strong>'+aircraft.length+'</strong> aircraft tracked';

    var cmp = sortMode === 'speed'
      ? function(a,b){ return (b.gs||0) - (a.gs||0); }
      : function(a,b){ return (typeof b.alt_baro==='number'?b.alt_baro:-1) - (typeof a.alt_baro==='number'?a.alt_baro:-1); };
    aircraft.sort(cmp).forEach(function(a){ addFlight(a); });

    if(selectedHex && trailHistory[selectedHex]){
      trailLine.setLatLngs(trailHistory[selectedHex]);
    }
  }

  function addFlight(a){
    var callsign = (a.flight||'').trim() || (a.r||'').trim() || a.hex.toUpperCase();
    var detail = a.t || a.r || a.hex;
    var lat = a.lat, lon = a.lon;
    var onGround = a.alt_baro === 'ground';
    var alt = (!onGround && typeof a.alt_baro === 'number') ? Math.round(a.alt_baro) : null;
    var speed = a.gs != null ? Math.round(a.gs) : null;
    var track = a.track;
    var vrate = a.baro_rate;
    var isSelected = (a.hex === selectedHex);

    var marker = L.marker([lat, lon], { icon: planeDivIcon(track, onGround) });
    marker.addTo(markersLayer);

    var card = document.createElement('div');
    card.className = 'card' + (isSelected ? ' selected' : ''); card.tabIndex = 0;
    var detailsHtml = '';
    if(isSelected){
      var vrateTxt = vrate == null ? '—' : (vrate > 50 ? '↑ climbing' : vrate < -50 ? '↓ descending' : 'level');
      var csKey = (a.flight||'').trim();
      var routeLine = '<div>Route: <b>No callsign broadcast</b></div>';
      if(csKey){
        fetchRoute(csKey);
        var rc = routeCache[csKey];
        if(!rc || rc.status === 'pending'){
          routeLine = '<div>Route: <b>Looking up airline &amp; destination…</b></div>';
        } else if(rc.status === 'none'){
          routeLine = '<div>Route: <b>Not available for this flight</b></div>';
        } else {
          routeLine =
            '<div>Airline: <b>'+escapeHtml(rc.airline || 'Unknown')+'</b></div>'+
            '<div>Route: <b>'+escapeHtml(rc.origin || '?')+' → '+escapeHtml(rc.destination || '?')+'</b></div>';
        }
      }
      detailsHtml =
        '<div class="details">'+
          '<div><span class="live-dot" aria-hidden="true"></span><b>Live position</b></div>'+
          routeLine +
          '<div>Lat/Lon: <b>'+lat.toFixed(4)+', '+lon.toFixed(4)+'</b></div>'+
          '<div>Vertical: <b>'+vrateTxt+'</b></div>'+
          '<div>ICAO24: <b>'+escapeHtml(a.hex)+'</b>'+(a.r?' · Reg: <b>'+escapeHtml(a.r)+'</b>':'')+'</div>'+
        '</div>';
    }
    card.innerHTML =
      '<div class="row1"><span class="callsign">'+escapeHtml(callsign)+'</span>'+
      '<span class="country">'+escapeHtml(detail)+'</span></div>'+
      '<div class="metrics">'+
        '<span>Alt <b>'+(alt!=null? alt.toLocaleString()+' ft':'—')+'</b></span>'+
        '<span>Spd <b>'+(speed!=null? speed+' kt':'—')+'</b></span>'+
        (onGround ? '<span class="ground">● On ground</span>' : '<span>Hdg <b>'+(track!=null? Math.round(track)+'°':'—')+'</b></span>')+
      '</div>' + detailsHtml;

    function selectFlight(){
      selectedHex = isSelected ? null : a.hex;
      map.flyTo([lat, lon], 10);
      trailLine.setLatLngs(trailHistory[a.hex] || []);
      if(window.matchMedia('(max-width:767px)').matches){
        document.getElementById('map').scrollIntoView({ behavior:'smooth', block:'start' });
      }
      render(lastAircraftData, undefined, true); // redraw immediately with the new selection, no duplicate trail point
    }
    card.addEventListener('click', selectFlight);
    card.addEventListener('keydown', function(e){ if(e.key==='Enter') selectFlight(); });
    marker.on('click', selectFlight);
    listEl.appendChild(card);
  }

  function escapeHtml(str){
    return String(str==null?'':str).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  /* ---------- Search form ---------- */
  document.getElementById('searchForm').addEventListener('submit', function(e){
    e.preventDefault();
    var mode = document.getElementById('searchMode').value;
    var q = document.getElementById('searchInput').value.trim();
    if(!q) return;
    trailLine.setLatLngs([]);
    selectedHex = null;
    if(mode === 'airport'){ setAirportSearch(q.toUpperCase()); }
    else { setLookup(mode, q); }
  });
  document.getElementById('clearBtn').addEventListener('click', function(){
    document.getElementById('searchInput').value = '';
    trailLine.setLatLngs([]);
    selectedHex = null;
    if(homePoint) setNearby(homePoint.lat, homePoint.lon);
  });

  /* ---------- Sort toggle ---------- */
  document.getElementById('sortBtn').addEventListener('click', function(){
    sortMode = sortMode === 'alt' ? 'speed' : 'alt';
    this.textContent = sortMode === 'alt' ? 'Sort: Alt ↓' : 'Sort: Speed ↓';
    fetchActive();
  });

  /* ---------- Locate + boot ---------- */
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        homePoint = { lat:pos.coords.latitude, lon:pos.coords.longitude };
        setNearby(homePoint.lat, homePoint.lon);
      },
      function(){
        homePoint = { lat:DEFAULT_CENTER[0], lon:DEFAULT_CENTER[1] };
        setNearby(homePoint.lat, homePoint.lon, 'Location unavailable — showing London Heathrow area.');
      },
      { timeout:6000 }
    );
  } else {
    homePoint = { lat:DEFAULT_CENTER[0], lon:DEFAULT_CENTER[1] };
    setNearby(homePoint.lat, homePoint.lon);
  }

  document.getElementById('refreshBtn').addEventListener('click', fetchActive);
  setInterval(fetchActive, 15000);
  }catch(mapErr){
    document.getElementById('status').textContent = 'Map/data features unavailable.';
    document.getElementById('list').innerHTML = '<div class="error">'+ String(mapErr.message||mapErr) +
      ' — theme switching still works above, but live tracking needs Leaflet (from cdnjs.cloudflare.com) and network access to load.</div>';
  }
})();
</script>
</body>
</html>
