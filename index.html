<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1B2A" id="themeColorMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Summit Watch — Mountaineer's Field Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#0E1B2A; --bg2:#152537; --card:#182B40; --line:#2B4058;
  --text:#F2F5F8; --sub:#9FB2C4; --accent:#6FA8C9; --warn:#E8783E;
  --good:#6FBE8E; --shadow:0 8px 24px rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#EEF2F5; --bg2:#E4EAEE; --card:#FFFFFF; --line:#D3DCE3;
  --text:#12212F; --sub:#516575; --accent:#1F6E96; --warn:#C4551E;
  --good:#227A52; --shadow:0 6px 18px rgba(20,40,60,.08);
}
html[data-theme="oled"]{
  --bg:#000000; --bg2:#050505; --card:#0B0B0B; --line:#232323;
  --text:#F2F5F8; --sub:#8C8C8C; --accent:#5FC2E8; --warn:#FF8A4C;
  --good:#63E29A; --shadow:none;
}
html[data-theme="hc"]{
  --bg:#000000; --bg2:#000000; --card:#000000; --line:#FFFFFF;
  --text:#FFFFFF; --sub:#FFFF00; --accent:#00FFFF; --warn:#FF3B3B;
  --good:#33FF33; --shadow:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
body{
  margin:0; min-height:100vh; min-height:100dvh; background:var(--bg); color:var(--text);
  font-family:'Inter',sans-serif; overflow-x:hidden; width:100%;
  background-image:
    radial-gradient(circle at 20% 0%, var(--bg2), transparent 60%),
    repeating-radial-gradient(circle at 50% -20%, transparent 0 60px, var(--line) 61px, transparent 62px);
  background-attachment:fixed;
  display:flex; flex-direction:column; min-height:100vh;
  transition:background-color .25s,color .25s;
}
header{
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
  padding:calc(14px + env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 14px max(16px, env(safe-area-inset-left));
  border-bottom:1px solid var(--line); gap:10px; position:sticky; top:0; background:var(--bg); z-index:10;
}
.brand{display:flex; align-items:center; gap:10px; min-width:0;}
.brand svg{width:24px;height:24px;flex:none;}
.brand h1{
  font-family:'Inter',sans-serif; font-size:clamp(15px,4.2vw,19px); letter-spacing:.05em;
  text-transform:uppercase; margin:0; font-weight:600; white-space:nowrap;
}
.themes{display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end;}
.themes button{
  width:38px;height:38px;border-radius:9px;border:1px solid var(--line);
  background:var(--card); color:var(--text); cursor:pointer; font-size:15px;
  display:flex;align-items:center;justify-content:center; touch-action:manipulation;
}
.themes button[aria-pressed="true"]{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent) inset;}
#unitBtn{width:auto; min-width:38px; padding:0 10px; font-family:'Inter',sans-serif; font-weight:600; font-size:12px;}

.wind-row{display:flex; align-items:center; gap:10px;}
.compass{width:34px; height:34px; flex:none;}
.compass .arrow{transform-origin:50% 50%; transition:transform .2s;}
.wind-txt .val{font-size:24px;}
.wind-txt .sub2{margin-top:0;}

main{flex:1; width:100%; max-width:640px; margin:0 auto;
  padding:16px max(16px, env(safe-area-inset-right)) 8px max(16px, env(safe-area-inset-left));}

.search{display:flex; gap:8px; margin-bottom:16px;}
.search input{
  flex:1; min-width:0; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
  background:var(--card); color:var(--text); font-size:16px; font-family:'Inter',sans-serif;
  min-height:44px;
}
.search button{
  border:1px solid var(--line); background:var(--accent); color:#0E1B2A; font-weight:600;
  border-radius:10px; padding:0 14px; cursor:pointer; font-size:14px; min-height:44px; min-width:44px;
  touch-action:manipulation; flex:none;
}
.search .locbtn{background:var(--card); color:var(--text);}
#suggest{list-style:none; margin:-10px 0 16px; padding:0; display:flex; flex-direction:column; gap:6px;}
#suggest li{
  padding:12px; border:1px solid var(--line); border-radius:8px; cursor:pointer;
  background:var(--card); font-size:14px; color:var(--sub); min-height:44px; display:flex; align-items:center;
}

.peaks{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.peaks::-webkit-scrollbar{display:none;}
.peak-chip{
  flex:0 0 auto; padding:10px 13px; border-radius:20px; border:1px solid var(--line);
  background:var(--card); font-size:12.5px; color:var(--text); cursor:pointer; white-space:nowrap;
  min-height:40px; touch-action:manipulation;
}
.peak-chip:hover, .peak-chip:focus{border-color:var(--accent);}
.peak-chip .m{color:var(--sub); margin-left:4px;}

.cache-banner{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--card); border:1px dashed var(--line); border-radius:10px;
  padding:8px 12px; font-size:12px; color:var(--sub); margin-bottom:12px;
}
.cache-banner button{
  border:1px solid var(--line); background:transparent; color:var(--accent);
  border-radius:7px; padding:4px 8px; font-size:12px; cursor:pointer;
}

.alerts{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
.alert{
  background:var(--card); border:1px solid var(--warn); color:var(--warn);
  border-radius:10px; padding:9px 12px; font-size:13px; font-weight:500;
  display:flex; gap:8px; align-items:center;
}

.hero{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:20px; text-align:center; box-shadow:var(--shadow); margin-bottom:16px;
}
.hero .place{font-family:'Inter',sans-serif; text-transform:uppercase; letter-spacing:.06em; font-size:16px; color:var(--sub);}
.hero .alt{
  font-family:'Inter',sans-serif; font-weight:700; font-size:clamp(38px,13vw,56px); line-height:1;
  margin:10px 0 2px; color:var(--accent);
}
.hero .alt span{font-size:18px; color:var(--sub); font-weight:500;}
.hero .coords{font-family:'Inter',sans-serif; font-size:12px; color:var(--sub);}
.hero .updated{font-size:11px; color:var(--sub); margin-top:8px;}

.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px;}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;
  box-shadow:var(--shadow); min-width:0;
}
.card .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--sub); font-family:'Inter',sans-serif;}
.card .val{font-family:'Inter',sans-serif; font-size:clamp(18px,5.5vw,24px); font-weight:700; margin-top:4px; word-break:break-word;}
.card .val small{font-size:13px; color:var(--sub); font-weight:400;}
.card .sub2{font-size:11px; color:var(--sub); margin-top:3px;}
.trend{font-size:15px; margin-left:4px;}
.trend.up{color:var(--warn);} .trend.down{color:var(--good);} .trend.flat{color:var(--sub);}

.forecast{
  background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;
  margin-bottom:20px; box-shadow:var(--shadow);
}
.forecast h2{font-family:'Inter',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:.07em; color:var(--sub); margin:0 0 10px;}
.days{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.days::-webkit-scrollbar{display:none;}
.day{
  flex:0 0 auto; min-width:64px; text-align:center; padding:10px 6px; border-radius:10px;
  border:1px solid var(--line);
}
.day .d{font-size:11px; color:var(--sub); font-family:'Inter',sans-serif; text-transform:uppercase;}
.day .ic{font-size:20px; margin:6px 0;}
.day .hi{font-family:'Inter',sans-serif; font-size:13px;}
.day .lo{font-family:'Inter',sans-serif; font-size:12px; color:var(--sub);}

.msg{text-align:center; color:var(--sub); font-size:14px; padding:30px 10px;}

footer{
  border-top:1px solid var(--line); padding:16px 10px calc(22px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:4px; color:var(--sub); font-size:12px;
}
footer .sig{font-family:'Inter',sans-serif; letter-spacing:.03em;}

.wind-row{flex-wrap:wrap;}

@media (min-width:520px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
@media (max-width:359px){
  .grid{grid-template-columns:1fr 1fr; gap:8px;}
  .card{padding:12px;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
      <path d="M2 19h20L15.5 7 12 12.5 9.5 9 2 19z"/>
      <path d="M9.5 9l1 1.4M15.5 7l1.3 1.9"/>
    </svg>
    <h1>Summit&nbsp;Watch</h1>
  </div>
  <div class="themes" id="themes">
    <button data-t="light" title="Light">☀</button>
    <button data-t="dark" title="Dark">☾</button>
    <button data-t="oled" title="OLED true black">●</button>
    <button data-t="hc" title="High contrast">◐</button>
    <button id="unitBtn" title="Toggle units">°C</button>
  </div>
</header>

<main>
  <div class="search">
    <input id="q" type="text" placeholder="Search a peak, town, or region…" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false" inputmode="search" enterkeyhint="search">
    <button class="locbtn" id="locBtn" title="Use my location">📍</button>
    <button id="goBtn">Go</button>
  </div>
  <ul id="suggest"></ul>
  <div class="peaks" id="peaks"></div>
  <div id="cacheBanner"></div>

  <div id="content">
    <div class="msg">Search a location or tap 📍 to load conditions for your position.</div>
  </div>
</main>

<footer>
  <div class="sig">SUMMIT WATCH — FIELD CONSOLE</div>
  <div>© Manik Roy <span id="year"></span>. All Rights Reserved.</div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// ---------- Theme handling ----------
const themeBtns = document.querySelectorAll('#themes button');
const THEME_COLORS = {dark:'#0E1B2A', light:'#EEF2F5', oled:'#000000', hc:'#000000'};
const themeColorMeta = document.getElementById('themeColorMeta');
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('sw-theme', t);
  themeBtns.forEach(b => b.setAttribute('aria-pressed', b.dataset.t === t));
  themeColorMeta.setAttribute('content', THEME_COLORS[t] || '#0E1B2A');
}
themeBtns.forEach(b => b.addEventListener('click', () => setTheme(b.dataset.t)));
setTheme(localStorage.getItem('sw-theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));

// ---------- Weather code -> icon/text ----------
const WMO = {
  0:['☀️','Clear sky'],1:['🌤️','Mainly clear'],2:['⛅','Partly cloudy'],3:['☁️','Overcast'],
  45:['🌫️','Fog'],48:['🌫️','Rime fog'],51:['🌦️','Light drizzle'],53:['🌦️','Drizzle'],55:['🌧️','Dense drizzle'],
  61:['🌧️','Light rain'],63:['🌧️','Rain'],65:['🌧️','Heavy rain'],66:['🌧️','Freezing rain'],67:['🌧️','Freezing rain'],
  71:['🌨️','Light snow'],73:['🌨️','Snow'],75:['❄️','Heavy snow'],77:['❄️','Snow grains'],
  80:['🌦️','Rain showers'],81:['🌧️','Rain showers'],82:['⛈️','Violent showers'],
  85:['🌨️','Snow showers'],86:['❄️','Heavy snow showers'],
  95:['⛈️','Thunderstorm'],96:['⛈️','Thunder + hail'],99:['⛈️','Severe thunder + hail']
};
const wmo = c => WMO[c] || ['❔','Unknown'];
const isStormCode = c => [65,66,67,75,82,86,95,96,99].includes(c);

// ---------- Units (metric / imperial) ----------
let units = localStorage.getItem('sw-units') || 'metric';
const unitBtn = document.getElementById('unitBtn');
function applyUnitLabel(){ unitBtn.textContent = units === 'metric' ? '°C' : '°F'; unitBtn.setAttribute('aria-pressed', 'true'); }
applyUnitLabel();
const fmt = {
  temp:  v => units==='metric' ? Math.round(v)+'°C' : Math.round(v*9/5+32)+'°F',
  speed: v => units==='metric' ? Math.round(v)+' km/h' : Math.round(v*0.621371)+' mph',
  dist:  v => units==='metric' ? Math.round(v)+' m' : Math.round(v*3.28084)+' ft',
  km:    v => units==='metric' ? v.toFixed(1)+' km' : (v*0.621371).toFixed(1)+' mi',
  precip:v => units==='metric' ? v.toFixed(1)+'mm' : (v/25.4).toFixed(2)+'in',
  press: v => units==='metric' ? Math.round(v)+' hPa' : (v*0.02953).toFixed(2)+' inHg'
};
unitBtn.addEventListener('click', ()=>{
  units = units === 'metric' ? 'imperial' : 'metric';
  localStorage.setItem('sw-units', units);
  applyUnitLabel();
  if(lastWx) render(lastLabel, lastWx, lastAq, lastFromCache, lastTs);
});

// ---------- Compass ----------
const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const degToCompass = d => COMPASS[Math.round(d/22.5) % 16];

// ---------- Moon phase (computed locally, no API) ----------
function moonInfo(date, sunrise, sunset){
  const synodic = 29.530588853;
  const knownNewMoon = Date.UTC(2000,0,6,18,14) / 86400000;
  let age = (date.getTime()/86400000 - knownNewMoon) % synodic;
  if(age < 0) age += synodic;
  const illum = Math.round((1 - Math.cos(2*Math.PI*age/synodic)) / 2 * 100);
  const phases = [
    [1.84566,'New Moon','🌑'],[5.53699,'Waxing Crescent','🌒'],[9.22831,'First Quarter','🌓'],
    [12.91963,'Waxing Gibbous','🌔'],[16.61096,'Full Moon','🌕'],[20.30228,'Waning Gibbous','🌖'],
    [23.99361,'Last Quarter','🌗'],[27.68493,'Waning Crescent','🌘'],[Infinity,'New Moon','🌑']
  ];
  const [, name, icon] = phases.find(p => age < p[0]);
  const offsetMin = (age/synodic) * 24 * 60;
  const rise = new Date(sunrise.getTime() + offsetMin*60000);
  const set  = new Date(sunset.getTime()  + offsetMin*60000);
  const fmt = d => d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return { name, icon, illum, rise: fmt(rise), set: fmt(set) };
}

// ---------- Local caching (offline support) ----------
function saveCache(lat, lon, label, wx, aq){
  try{ localStorage.setItem('sw-cache', JSON.stringify({lat,lon,label,wx,aq,ts:Date.now()})); }catch(e){}
}
function loadCache(){
  try{ return JSON.parse(localStorage.getItem('sw-cache')); }catch(e){ return null; }
}
function timeAgo(ts){
  const min = Math.round((Date.now()-ts)/60000);
  if(min < 1) return 'just now';
  if(min < 60) return min+' min ago';
  return Math.round(min/60)+' hr ago';
}

// ---------- Quick-select summits ----------
const PEAKS = [
  {n:'Everest',      c:'Nepal / China',  lat:27.9881,  lon:86.9250,   m:8849},
  {n:'K2',           c:'Pakistan',       lat:35.8825,  lon:76.5133,   m:8611},
  {n:'Kangchenjunga',c:'Nepal / India',  lat:27.7025,  lon:88.1475,   m:8586},
  {n:'Annapurna I',  c:'Nepal',          lat:28.5959,  lon:83.8203,   m:8091},
  {n:'Nanga Parbat', c:'Pakistan',       lat:35.2426,  lon:74.5892,   m:8126},
  {n:'Denali',       c:'USA',            lat:63.0692,  lon:-151.0070, m:6190},
  {n:'Aconcagua',    c:'Argentina',      lat:-32.6532, lon:-70.0109,  m:6961},
  {n:'Elbrus',       c:'Russia',         lat:43.3499,  lon:42.4453,   m:5642},
  {n:'Vinson Massif',c:'Antarctica',     lat:-78.5254, lon:-85.6172,  m:4892},
  {n:'Puncak Jaya',  c:'Indonesia',      lat:-4.0784,  lon:137.1585,  m:4884},
  {n:'Kilimanjaro',  c:'Tanzania',       lat:-3.0674,  lon:37.3556,   m:5895},
  {n:'Mount Kenya',  c:'Kenya',          lat:-0.1521,  lon:37.3084,   m:5199},
  {n:'Mont Blanc',   c:'France / Italy', lat:45.8326,  lon:6.8652,    m:4808},
  {n:'Matterhorn',   c:'Switz. / Italy', lat:45.9763,  lon:7.6586,    m:4478},
  {n:'Mount Fuji',   c:'Japan',          lat:35.3606,  lon:138.7274,  m:3776}
];
const peaksEl = document.getElementById('peaks');
peaksEl.innerHTML = PEAKS.map((p,i)=>
  `<button class="peak-chip" data-i="${i}">${p.n}<span class="m">${p.m}m</span></button>`
).join('');
peaksEl.addEventListener('click', e=>{
  const btn = e.target.closest('.peak-chip'); if(!btn) return;
  const p = PEAKS[btn.dataset.i];
  qInput.value = p.n; suggestEl.innerHTML = '';
  loadConditions(p.lat, p.lon, `${p.n}, ${p.c}`);
});

// ---------- Geocoding ----------
const qInput = document.getElementById('q');
const suggestEl = document.getElementById('suggest');
let lastResults = [];

async function search(name){
  if(!name || name.trim().length < 2){ suggestEl.innerHTML=''; return; }
  try{
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=6&language=en&format=json`);
    const d = await r.json();
    lastResults = d.results || [];
    suggestEl.innerHTML = lastResults.map((p,i)=>
      `<li data-i="${i}">${p.name}${p.admin1 ? ', '+p.admin1 : ''}, ${p.country} <span style="color:var(--accent)">· ${Math.round(p.elevation)}m</span></li>`
    ).join('');
  }catch(e){ suggestEl.innerHTML = '<li>Couldn\'t reach the geocoding service.</li>'; }
}
let debounce;
qInput.addEventListener('input', ()=>{ clearTimeout(debounce); debounce = setTimeout(()=>search(qInput.value), 350); });
suggestEl.addEventListener('click', e=>{
  const li = e.target.closest('li'); if(!li || li.dataset.i===undefined) return;
  const p = lastResults[li.dataset.i];
  suggestEl.innerHTML=''; qInput.value = p.name;
  loadConditions(p.latitude, p.longitude, `${p.name}${p.admin1 ? ', '+p.admin1 : ''}, ${p.country}`);
});
document.getElementById('goBtn').addEventListener('click', ()=>{
  if(lastResults[0]) loadConditions(lastResults[0].latitude, lastResults[0].longitude,
    `${lastResults[0].name}, ${lastResults[0].country}`);
  else search(qInput.value).then(()=>{ if(lastResults[0]) loadConditions(lastResults[0].latitude, lastResults[0].longitude, `${lastResults[0].name}, ${lastResults[0].country}`); });
});

document.getElementById('locBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){ alert('Geolocation not supported by this browser.'); return; }
  content.innerHTML = '<div class="msg">Locating…</div>';
  navigator.geolocation.getCurrentPosition(
    pos => loadConditions(pos.coords.latitude, pos.coords.longitude, 'Your location'),
    ()  => content.innerHTML = '<div class="msg">Location access denied. Try searching instead.</div>'
  );
});

// ---------- Main data load ----------
const content = document.getElementById('content');
const cacheBanner = document.getElementById('cacheBanner');
let lastWx=null, lastAq=null, lastLabel='', lastFromCache=false, lastTs=null;

async function loadConditions(lat, lon, label){
  content.innerHTML = '<div class="msg">Reading instruments…</div>';
  cacheBanner.innerHTML = '';
  try{
    const [wx, aq] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,dew_point_2m,cloud_cover,wind_speed_10m,wind_gusts_10m,wind_direction_10m,weather_code,surface_pressure,uv_index&hourly=precipitation_probability,precipitation,surface_pressure,freezing_level_height,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&past_hours=3&timezone=auto`).then(r=>r.json()),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`).then(r=>r.json()).catch(()=>null)
    ]);
    if(wx.error) throw new Error(wx.reason || 'bad request');
    saveCache(lat, lon, label, wx, aq);
    render(label, wx, aq, false);
  }catch(e){
    const c = loadCache();
    if(c){
      render(c.label, c.wx, c.aq, true, c.ts);
    }else{
      content.innerHTML = '<div class="msg">Couldn\'t fetch conditions and no saved reading is available. Check your connection and try again.</div>';
    }
  }
}

function render(label, wx, aq, fromCache, ts){
  lastWx=wx; lastAq=aq; lastLabel=label; lastFromCache=fromCache; lastTs=ts;
  const c = wx.current;
  const [icon, desc] = wmo(c.weather_code);
  const sunriseD = new Date(wx.daily.sunrise[0]);
  const sunsetD  = new Date(wx.daily.sunset[0]);
  const sunrise = sunriseD.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const sunset  = sunsetD.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const aqi = aq && aq.current ? aq.current.us_aqi : null;
  const moon = moonInfo(new Date(), sunriseD, sunsetD);

  // locate current hour index in hourly arrays
  let idx = wx.hourly.time.indexOf(c.time);
  if(idx === -1) idx = 3; // fallback: past_hours=3 means index 3 is "now"
  const pastIdx = Math.max(0, idx - 3);
  const pTrendDelta = c.surface_pressure - wx.hourly.surface_pressure[pastIdx];
  const trendClass = pTrendDelta > 1 ? 'up' : pTrendDelta < -1 ? 'down' : 'flat';
  const trendArrow = pTrendDelta > 1 ? '↑' : pTrendDelta < -1 ? '↓' : '→';

  const precipChance = wx.hourly.precipitation_probability[idx] ?? 0;
  let precip6h = 0;
  for(let i=idx; i<Math.min(idx+6, wx.hourly.precipitation.length); i++) precip6h += wx.hourly.precipitation[i];
  const freezeLvl = Math.round(wx.hourly.freezing_level_height[idx]);
  const freezeDelta = freezeLvl - wx.elevation;
  const visKm = (wx.hourly.visibility[idx] ?? 10000) / 1000;
  const cloudBase = Math.round(Math.max(0, c.temperature_2m - c.dew_point_2m) * 125);
  const windDeg = c.wind_direction_10m;

  // ---- severe condition alerts ----
  const alerts = [];
  if(isStormCode(c.weather_code) && c.weather_code >= 95) alerts.push('⚡ Thunderstorm risk in the forecast');
  if(c.wind_gusts_10m >= 60) alerts.push(`💨 Dangerous gusts up to ${Math.round(c.wind_gusts_10m)} km/h`);
  if(c.uv_index >= 8) alerts.push('🔆 Extreme UV — cover up and use eye protection');
  if(Math.abs(freezeDelta) <= 300) alerts.push('🥶 Freezing line is close to your elevation — expect ice underfoot');
  if(c.apparent_temperature <= -15) alerts.push(`🥶 Extreme cold, feels like ${Math.round(c.apparent_temperature)}°C — frostbite risk`);
  if(precipChance >= 70) alerts.push(`🌧️ High chance of precipitation (${precipChance}%) in the next hour`);

  cacheBanner.innerHTML = fromCache
    ? `<div class="cache-banner"><span>📴 Showing last saved reading from ${timeAgo(ts)}. Live data unavailable.</span></div>`
    : '';

  const days = wx.daily.time.map((t,i)=>{
    const [ic] = wmo(wx.daily.weather_code[i]);
    const dName = new Date(t).toLocaleDateString([], {weekday:'short'});
    return `<div class="day"><div class="d">${dName}</div><div class="ic">${ic}</div>
      <div class="hi">${Math.round(wx.daily.temperature_2m_max[i])}°</div>
      <div class="lo">${Math.round(wx.daily.temperature_2m_min[i])}°</div></div>`;
  }).join('');

  content.innerHTML = `
    ${alerts.length ? `<div class="alerts">${alerts.map(a=>`<div class="alert">${a}</div>`).join('')}</div>` : ''}
    <div class="hero">
      <div class="place">${label}</div>
      <div class="alt">${units==='metric'?Math.round(wx.elevation):Math.round(wx.elevation*3.28084)}<span> ${units==='metric'?'m':'ft'} elev</span></div>
      <div class="coords">${wx.latitude.toFixed(4)}°, ${wx.longitude.toFixed(4)}° &nbsp;·&nbsp; ${icon} ${desc}</div>
      <div class="updated">Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <div class="grid">
      <div class="card"><div class="lbl">Temp</div><div class="val">${fmt.temp(c.temperature_2m)}</div></div>
      <div class="card"><div class="lbl">Feels like</div><div class="val">${fmt.temp(c.apparent_temperature)}</div></div>
      <div class="card">
        <div class="lbl">Wind</div>
        <div class="wind-row">
          <svg class="compass" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8">
            <circle cx="12" cy="12" r="10" stroke="var(--line)"/>
            <g class="arrow" style="transform:rotate(${windDeg}deg)"><path d="M12 4v14M12 4l-3.2 4M12 4l3.2 4" stroke-linecap="round" stroke-linejoin="round"/></g>
          </svg>
          <div class="wind-txt"><div class="val">${fmt.speed(c.wind_speed_10m)}</div><div class="sub2">from ${degToCompass(windDeg)} (${Math.round(windDeg)}°)</div></div>
        </div>
      </div>
      <div class="card"><div class="lbl">Gusts</div><div class="val">${fmt.speed(c.wind_gusts_10m)}</div></div>
      <div class="card"><div class="lbl">Humidity</div><div class="val">${c.relative_humidity_2m}<small>%</small></div></div>
      <div class="card"><div class="lbl">Pressure</div><div class="val">${fmt.press(c.surface_pressure)}<span class="trend ${trendClass}">${trendArrow}</span></div><div class="sub2">3h trend</div></div>
      <div class="card"><div class="lbl">Freezing Level</div><div class="val">${fmt.dist(freezeLvl)}</div><div class="sub2">${freezeDelta>=0?'+':''}${fmt.dist(Math.abs(freezeDelta))} vs your elevation</div></div>
      <div class="card"><div class="lbl">Precipitation</div><div class="val">${precipChance}<small>% now</small></div><div class="sub2">${fmt.precip(precip6h)} next 6h</div></div>
      <div class="card"><div class="lbl">Visibility</div><div class="val">${fmt.km(visKm)}</div><div class="sub2">cloud base ≈ ${fmt.dist(cloudBase)} · ${c.cloud_cover}% cover</div></div>
      <div class="card"><div class="lbl">UV Index</div><div class="val">${c.uv_index.toFixed(1)}</div></div>
      <div class="card"><div class="lbl">Air Quality</div><div class="val">${aqi !== null ? aqi : '—'}<small>${aqi !== null ? 'AQI':''}</small></div></div>
      <div class="card"><div class="lbl">Sunrise / Sunset</div><div class="val" style="font-size:16px">${sunrise}<br>${sunset}</div></div>
      <div class="card"><div class="lbl">Moon Phase</div><div class="val" style="font-size:16px">${moon.icon} ${moon.name}</div><div class="sub2">${moon.illum}% lit · rise ${moon.rise} · set ${moon.set} (approx)</div></div>
    </div>
    <div class="forecast">
      <h2>7-Day Outlook</h2>
      <div class="days">${days}</div>
    </div>
  `;
}
</script>
</body>
</html>
