<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VolMax</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--a:#ff4d4d;--a2:#ff8c00;--glow:rgba(255,77,77,0.3);--r:16px;--tr:.3s cubic-bezier(.4,0,.2,1)}
[data-theme=dark] {--bg:#0f1117;--surf:#1a1d27;--surf2:#22263a;--bdr:rgba(255,255,255,0.07);--tx:#f0f0f5;--sub:#7a7d99}
[data-theme=light]{--bg:#eeeef6;--surf:#ffffff;--surf2:#e4e4f0;--bdr:rgba(0,0,0,0.08);--tx:#1a1a2e;--sub:#6b6b8a}
[data-theme=oled] {--bg:#000000;--surf:#080808;--surf2:#101010;--bdr:rgba(255,255,255,0.05);--tx:#ffffff;--sub:#555577}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{min-height:100%;display:flex;flex-direction:column;align-items:center;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;transition:background var(--tr),color var(--tr);overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}

/* Glow orbs */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px)}
.o1{width:320px;height:320px;background:var(--a);opacity:.1;top:-80px;right:-80px}
.o2{width:260px;height:260px;background:var(--a2);opacity:.07;bottom:-60px;left:-60px}

/* Header */
header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;position:relative;z-index:10;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.toggle{display:flex;gap:4px;background:var(--surf);border:1px solid var(--bdr);border-radius:50px;padding:4px;transition:background var(--tr)}
.tbtn{border:none;background:transparent;color:var(--sub);cursor:pointer;border-radius:50px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;touch-action:manipulation}
.tbtn.on{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 3px 12px var(--glow)}

/* Main scroll area */
main{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 16px 20px;position:relative;z-index:5;width:100%;max-width:440px}

/* Status */
.status{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:50px;padding:7px 16px;font-size:.72rem;font-weight:600;color:var(--sub);width:100%;transition:all var(--tr)}
.dot{width:9px;height:9px;border-radius:50%;background:#2a2a2a;flex-shrink:0;transition:background .3s,box-shadow .3s}
.dot.green{background:#44ff88;box-shadow:0 0 8px #44ff88;animation:blink 1.4s ease-in-out infinite}
.dot.red{background:#ff4444;box-shadow:0 0 8px #ff4444}
.dot.yellow{background:#ffcc00;box-shadow:0 0 8px #ffcc00;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Card */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:22px 18px;width:100%;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 16px 50px rgba(0,0,0,.25);transition:background var(--tr),border-color var(--tr)}

/* Canvas viz */
.viz{width:100%;height:54px;border-radius:10px;overflow:hidden;background:var(--surf2)}
canvas{display:block;width:100%;height:100%}

/* Dial */
.dial-wrap{position:relative;width:170px;height:170px;display:flex;align-items:center;justify-content:center}
.dsv{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.dt{fill:none;stroke:var(--surf2);stroke-width:10;stroke-linecap:round}
.da{fill:none;stroke-width:10;stroke-linecap:round;stroke:url(#dg);stroke-dasharray:392;stroke-dashoffset:392;transition:stroke-dashoffset .1s ease;filter:drop-shadow(0 0 5px rgba(255,77,77,.5))}
.dial-in{position:absolute;inset:14px;background:var(--surf);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 10px rgba(0,0,0,.3);transition:background var(--tr)}
.dnum{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dsub{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--sub);font-weight:600}

/* dB row */
.dbrow{width:100%;display:grid;grid-template-columns:24px 1fr 50px;align-items:center;gap:8px}
.dblbl{font-size:.65rem;color:var(--sub);font-weight:700}
.dbtr{height:7px;background:var(--surf2);border-radius:4px;overflow:hidden}
.dbfill{height:100%;border-radius:4px;width:0%;transition:width .04s linear;background:linear-gradient(to right,#44ff88,#ffcc00,#ff4d4d)}
.dbval{font-size:.65rem;color:var(--sub);font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.clip{font-size:.63rem;color:var(--a);font-weight:700;letter-spacing:1px;text-align:center;height:14px;opacity:0;transition:opacity .2s}
.clip.on{opacity:1}

/* Slider */
.slwrap{width:100%;display:flex;flex-direction:column;gap:8px}
.slhdr{display:flex;justify-content:space-between;font-size:.72rem;font-weight:500;color:var(--sub)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--surf2);outline:none;cursor:pointer;touch-action:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));box-shadow:0 0 12px var(--glow);cursor:pointer}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));box-shadow:0 0 12px var(--glow)}

/* Buttons */
.btns{display:flex;gap:8px;width:100%}
.btn{flex:1;padding:14px 6px;border:1px solid var(--bdr);border-radius:12px;background:var(--surf2);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;touch-action:manipulation;-webkit-appearance:none}
.btn:active{transform:scale(.96)}
.btn.pri{background:linear-gradient(135deg,var(--a),var(--a2));border-color:transparent;color:#fff;box-shadow:0 6px 20px var(--glow)}
.btn.mton{border-color:var(--a);color:var(--a)}

/* Source card */
.srcc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;width:100%;display:flex;flex-direction:column;gap:12px;box-shadow:0 10px 35px rgba(0,0,0,.15);transition:background var(--tr),border-color var(--tr)}
.srcc h3{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--sub);font-weight:700}
.sbtns{display:flex;gap:8px}
.sbtn{flex:1;border:1px solid var(--bdr);background:var(--surf2);color:var(--sub);border-radius:10px;padding:13px 4px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;touch-action:manipulation;-webkit-appearance:none;line-height:1.3}
.sbtn:active{transform:scale(.96)}
.sbtn.on{background:linear-gradient(135deg,var(--a),var(--a2));border-color:transparent;color:#fff;box-shadow:0 4px 12px var(--glow)}
.hint{font-size:.7rem;color:var(--sub);text-align:center;line-height:1.5;padding:0 4px}

/* Progress */
.prow{display:none;align-items:center;gap:8px}
.ptr{flex:1;height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;cursor:pointer;padding:10px 0;margin:-10px 0;-webkit-tap-highlight-color:transparent}
.pfi{height:6px;border-radius:3px;background:linear-gradient(to right,var(--a),var(--a2));width:0%;transition:width .1s linear}
.tlbl{font-size:.65rem;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}

/* Presets */
.presets{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 18px;width:100%;box-shadow:0 10px 35px rgba(0,0,0,.15);transition:background var(--tr),border-color var(--tr)}
.presets h3{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:10px;font-weight:700}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.pb{border:1px solid var(--bdr);background:var(--surf2);color:var(--sub);border-radius:9px;padding:11px 4px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .2s;touch-action:manipulation;-webkit-appearance:none}
.pb:active{transform:scale(.95)}
.pb.flash{background:linear-gradient(135deg,var(--a),var(--a2));border-color:transparent;color:#fff}

footer{padding:14px 16px;font-size:.68rem;color:var(--sub);text-align:center;letter-spacing:.5px;position:relative;z-index:5;flex-shrink:0;transition:color var(--tr)}
#filein{display:none}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<header>
  <div class="logo">VolMax</div>
  <div class="toggle">
    <button class="tbtn" data-t="light">Light</button>
    <button class="tbtn on" data-t="dark">Dark</button>
    <button class="tbtn" data-t="oled">OLED</button>
  </div>
</header>

<main>
  <div class="status"><div class="dot" id="dot"></div><span id="stxt">No source — tap Mic or load a file</span></div>

  <div class="card">
    <div class="viz"><canvas id="cv"></canvas></div>

    <div class="dial-wrap">
      <svg class="dsv" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff4d4d"/>
            <stop offset="100%" stop-color="#ff8c00"/>
          </linearGradient>
        </defs>
        <circle class="dt" cx="80" cy="80" r="62"/>
        <circle class="da" id="arc" cx="80" cy="80" r="62"/>
      </svg>
      <div class="dial-in">
        <div class="dnum" id="dnum">100</div>
        <div class="dsub">Gain %</div>
      </div>
    </div>

    <div class="dbrow">
      <div class="dblbl">dB</div>
      <div class="dbtr"><div class="dbfill" id="dbf"></div></div>
      <div class="dbval" id="dbv">−∞</div>
    </div>
    <div class="clip" id="clip">⚠ CLIPPING</div>

    <div class="slwrap">
      <div class="slhdr"><span>0%</span><span id="slv">100%</span><span>1000%</span></div>
      <input type="range" id="sl" min="0" max="1000" value="100">
    </div>

    <div class="btns">
      <button class="btn" id="mb" ontouchstart="" onclick="toggleMute()">Mute</button>
      <button class="btn pri" id="bb" ontouchstart="" onclick="toggleBoost()">⚡ Boost</button>
      <button class="btn" ontouchstart="" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <div class="srcc">
    <h3>Audio Source</h3>
    <div class="sbtns">
      <button class="sbtn" id="bmic" ontouchstart="" onclick="startMic()">🎙<br>Mic</button>
      <button class="sbtn" id="bfile" ontouchstart="" onclick="pickFile()">🎵<br>File</button>
      <button class="sbtn" id="bstop" ontouchstart="" onclick="stopAll()">⏹<br>Stop</button>
    </div>
    <input type="file" id="filein" accept="audio/*,video/*">
    <div class="prow" id="prow">
      <span class="tlbl" id="tc">0:00</span>
      <div class="ptr" id="ptr"><div class="pfi" id="pfi"></div></div>
      <span class="tlbl" id="tt">0:00</span>
    </div>
    <div class="hint" id="hint">Tap <strong>Mic</strong> to boost microphone audio live,<br>or <strong>File</strong> to load and boost any audio file</div>
  </div>

  <div class="presets">
    <h3>Gain Presets</h3>
    <div class="pg">
      <button class="pb" ontouchstart="" onclick="setP(50,this)">50%</button>
      <button class="pb" ontouchstart="" onclick="setP(100,this)">Normal</button>
      <button class="pb" ontouchstart="" onclick="setP(300,this)">3×</button>
      <button class="pb" ontouchstart="" onclick="setP(1000,this)">MAX</button>
    </div>
  </div>
</main>

<footer>&copy; <span id="yr"></span> Manik Roy. All Rights Reserved.</footer>

<script>
/* ── Year ─────────────────────────────────────────── */
document.getElementById('yr').textContent = new Date().getFullYear();

/* ── Theme ────────────────────────────────────────── */
document.querySelectorAll('.tbtn').forEach(b => b.addEventListener('click', () => {
  document.documentElement.dataset.theme = b.dataset.t;
  document.querySelectorAll('.tbtn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
}));

/* ── State ────────────────────────────────────────── */
let ACX = null, gainNode = null, analyser = null, compressor = null;
let micStream = null, micSrc = null;
let audioBuf = null, bufSrc = null;
let muted = false, boosted = false;
let isPlaying = false, startedAt = 0, pausedAt = 0;
let rafId = null, progId = null, clipTmr = null;

/* ── Boot AudioContext (must be inside user gesture) ─ */
function boot() {
  if (ACX) return;
  ACX = new (window.AudioContext || window.webkitAudioContext)();
  gainNode  = ACX.createGain();
  gainNode.gain.value = 1;
  compressor = ACX.createDynamicsCompressor();
  compressor.threshold.value = -2;
  compressor.knee.value      = 0;
  compressor.ratio.value     = 20;
  compressor.attack.value    = 0.001;
  compressor.release.value   = 0.15;
  analyser = ACX.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.75;
  gainNode.connect(analyser);
  analyser.connect(compressor);
  compressor.connect(ACX.destination);
}

async function resumeCtx() {
  if (ACX && ACX.state === 'suspended') await ACX.resume();
}

/* ── Gain ─────────────────────────────────────────── */
const sl    = document.getElementById('sl');
const dnum  = document.getElementById('dnum');
const slv   = document.getElementById('slv');
const arc   = document.getElementById('arc');
const C     = 2 * Math.PI * 62; // circumference r=62

function applyGain(pct) {
  const raw = muted ? 0 : (boosted ? (pct / 100) * 1.5 : pct / 100);
  if (gainNode) gainNode.gain.setTargetAtTime(raw, ACX.currentTime, 0.015);
  dnum.textContent = muted ? 0 : Math.round(pct);
  slv.textContent  = (muted ? 0 : Math.round(pct)) + '%';
  const f = Math.min(pct / 1000, 1) * 0.75;
  arc.style.strokeDashoffset = C - f * C;
}

sl.addEventListener('input', () => applyGain(+sl.value));
applyGain(100);

/* ── Microphone ────────────────────────────────────── */
async function startMic() {
  boot(); await resumeCtx();
  stopSource();
  setStatus('yellow','Requesting mic…');
  try {
    // iOS Safari needs exact:false and minimal constraints
    const constraints = {
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl:  false,
        sampleRate: { ideal: 44100 }
      }
    };
    micStream = await navigator.mediaDevices.getUserMedia(constraints);
    micSrc = ACX.createMediaStreamSource(micStream);
    micSrc.connect(gainNode);
    setStatus('green','🎙 Microphone Live');
    setOn('bmic');
    startViz();
    document.getElementById('hint').innerHTML = 'Microphone active — speak, play music nearby, or use headphones';
  } catch(e) {
    let msg = e.name === 'NotAllowedError'
      ? 'Mic permission denied — allow in browser/phone settings'
      : e.name === 'NotFoundError'
      ? 'No microphone found on this device'
      : e.message;
    setStatus('red', 'Mic error');
    document.getElementById('hint').textContent = '⚠ ' + msg;
  }
}

/* ── File picker ───────────────────────────────────── */
function pickFile() {
  boot(); // must call boot in tap handler before async
  document.getElementById('filein').click();
}

document.getElementById('filein').addEventListener('change', async function() {
  const file = this.files[0];
  this.value = '';
  if (!file) return;
  await resumeCtx();
  stopSource();
  setStatus('yellow','Decoding…');
  document.getElementById('hint').textContent = '⏳ Decoding: ' + file.name;
  try {
    const ab = await file.arrayBuffer();
    audioBuf = await ACX.decodeAudioData(ab);
    pausedAt = 0;
    playBuf();
    setOn('bfile');
    document.getElementById('prow').style.display = 'flex';
    document.getElementById('hint').textContent = '🎵 ' + file.name;
  } catch(e) {
    setStatus('red','Decode failed');
    document.getElementById('hint').textContent = '⚠ Format not supported: try MP3 or WAV';
  }
});

function playBuf() {
  if (!audioBuf) return;
  if (bufSrc) { try { bufSrc.stop(); bufSrc.disconnect(); } catch(e){} }
  bufSrc = ACX.createBufferSource();
  bufSrc.buffer = audioBuf;
  bufSrc.connect(gainNode);
  bufSrc.start(0, pausedAt % audioBuf.duration);
  startedAt = ACX.currentTime - pausedAt;
  isPlaying  = true;
  bufSrc.onended = () => {
    if (isPlaying) { isPlaying = false; pausedAt = 0; setStatus('green','Finished'); }
  };
  setStatus('green','▶ Playing');
  startViz();
  trackProgress();
}

function trackProgress() {
  cancelAnimationFrame(progId);
  function tick() {
    if (!audioBuf) return;
    const elapsed = isPlaying ? ACX.currentTime - startedAt : pausedAt;
    const dur = audioBuf.duration;
    document.getElementById('pfi').style.width = Math.min(elapsed / dur * 100, 100) + '%';
    document.getElementById('tc').textContent  = fmt(elapsed);
    document.getElementById('tt').textContent  = fmt(dur);
    if (isPlaying) progId = requestAnimationFrame(tick);
  }
  tick();
}

document.getElementById('ptr').addEventListener('click', seek);
document.getElementById('ptr').addEventListener('touchend', seek, { passive: true });
function seek(e) {
  if (!audioBuf) return;
  const r   = e.currentTarget.getBoundingClientRect();
  const x   = (e.touches ? e.changedTouches[0].clientX : e.clientX) - r.left;
  pausedAt  = Math.max(0, Math.min(1, x / r.width)) * audioBuf.duration;
  if (isPlaying) playBuf();
  else trackProgress();
}

/* ── Stop ──────────────────────────────────────────── */
function stopSource() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (micSrc)    { try { micSrc.disconnect(); } catch(e){} micSrc = null; }
  if (bufSrc)    { try { bufSrc.stop(); bufSrc.disconnect(); } catch(e){} bufSrc = null; }
  isPlaying = false; pausedAt = 0;
  cancelAnimationFrame(rafId);
  cancelAnimationFrame(progId);
  clearViz();
}

function stopAll() {
  stopSource();
  audioBuf = null;
  setStatus('','Stopped');
  document.getElementById('hint').innerHTML = 'Tap <strong>Mic</strong> to boost microphone audio live,<br>or <strong>File</strong> to load and boost any audio file';
  document.getElementById('prow').style.display = 'none';
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('dbv').textContent = '−∞';
  document.getElementById('dbf').style.width = '0%';
}

/* ── Controls ──────────────────────────────────────── */
function toggleMute() {
  muted = !muted;
  const b = document.getElementById('mb');
  b.textContent = muted ? 'Unmute' : 'Mute';
  b.classList.toggle('mton', muted);
  applyGain(+sl.value);
}
function toggleBoost() {
  boosted = !boosted;
  const b = document.getElementById('bb');
  b.textContent = boosted ? '⚡ ON!' : '⚡ Boost';
  b.style.background = boosted ? 'linear-gradient(135deg,#ff8c00,#ffd700)' : '';
  applyGain(+sl.value);
}
function resetAll() {
  muted = false; boosted = false; sl.value = 100;
  document.getElementById('mb').textContent = 'Mute';
  document.getElementById('mb').classList.remove('mton');
  document.getElementById('bb').textContent = '⚡ Boost';
  document.getElementById('bb').style.background = '';
  applyGain(100);
}
function setP(v, el) {
  sl.value = v; applyGain(v);
  document.querySelectorAll('.pb').forEach(b => b.classList.remove('flash'));
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 600);
}

/* ── Visualizer ────────────────────────────────────── */
const cv   = document.getElementById('cv');
const c2   = cv.getContext('2d');
const fArr = new Uint8Array(128);
const tArr = new Uint8Array(256);
const fF32 = new Float32Array(128);

function startViz() {
  cancelAnimationFrame(rafId);
  function frame() {
    rafId = requestAnimationFrame(frame);
    const W = cv.offsetWidth || 300, H = cv.offsetHeight || 54;
    cv.width = W; cv.height = H;

    analyser.getByteFrequencyData(fArr);
    analyser.getByteTimeDomainData(tArr);
    analyser.getFloatTimeDomainData(fF32);

    // bg
    const th = document.documentElement.dataset.theme;
    c2.fillStyle = th === 'oled' ? '#0e0e0e' : th === 'light' ? '#e4e4f0' : '#22263a';
    c2.fillRect(0, 0, W, H);

    // bars
    const n  = fArr.length;
    const bw = W / n * 2;
    for (let i = 0; i < n; i++) {
      const v  = fArr[i] / 255;
      const bh = v * H;
      const g  = c2.createLinearGradient(0, H, 0, H - bh);
      g.addColorStop(0, `rgba(255,${55 + v * 110},10,0.92)`);
      g.addColorStop(1, `rgba(255,${150 + v * 70},0,0.55)`);
      c2.fillStyle = g;
      if (c2.roundRect) { c2.beginPath(); c2.roundRect(i*(bw+1.2), H-bh, bw, bh, 2); c2.fill(); }
      else { c2.fillRect(i*(bw+1.2), H-bh, bw, bh); }
    }

    // waveform
    c2.beginPath(); c2.strokeStyle = 'rgba(255,255,255,0.25)'; c2.lineWidth = 1.2;
    const sw = W / tArr.length;
    for (let i = 0; i < tArr.length; i++) {
      const y = (tArr[i] / 128) * H / 2;
      i === 0 ? c2.moveTo(0, y) : c2.lineTo(i * sw, y);
    }
    c2.stroke();

    // RMS dB
    let s = 0;
    for (let i = 0; i < fF32.length; i++) s += fF32[i] * fF32[i];
    const rms = Math.sqrt(s / fF32.length);
    const db  = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
    const pct = isFinite(db) ? Math.min(100, Math.max(0, (db + 60) / 60 * 100)) : 0;
    document.getElementById('dbf').style.width = pct + '%';
    document.getElementById('dbv').textContent = isFinite(db) ? db.toFixed(1) + ' dB' : '−∞';
    if (db > -1.5) {
      document.getElementById('clip').classList.add('on');
      clearTimeout(clipTmr);
      clipTmr = setTimeout(() => document.getElementById('clip').classList.remove('on'), 600);
    }
  }
  frame();
}

function clearViz() {
  cv.width = cv.offsetWidth || 300; cv.height = cv.offsetHeight || 54;
  const th = document.documentElement.dataset.theme;
  c2.fillStyle = th === 'oled' ? '#0e0e0e' : th === 'light' ? '#e4e4f0' : '#22263a';
  c2.fillRect(0, 0, cv.width, cv.height);
}

/* ── Helpers ──────────────────────────────────────── */
function setStatus(type, txt) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (type ? ' ' + type : '');
  document.getElementById('stxt').textContent = txt;
}
function setOn(id) {
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function fmt(s) {
  s = Math.max(0, s | 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

/* ── iOS AudioContext unlock on first tap ─────────── */
function unlockAudio() {
  if (!ACX) return;
  if (ACX.state === 'suspended') {
    ACX.resume();
    // Play silent buffer to unlock iOS
    const buf = ACX.createBuffer(1, 1, 22050);
    const s   = ACX.createBufferSource();
    s.buffer  = buf;
    s.connect(ACX.destination);
    s.start(0);
  }
}
document.addEventListener('touchstart', unlockAudio, { passive: true });
document.addEventListener('click', unlockAudio);
</script>
