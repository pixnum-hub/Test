<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a" id="metaThemeColor">
<title>SkyPulse</title>
<link rel="manifest" id="pwaManifest">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// Inline PWA manifest
const manifest={name:'SkyPulse',short_name:'SkyPulse',start_url:'.',display:'standalone',background_color:'#0a0f1a',theme_color:'#0a0f1a',icons:[{src:'https://cdn.jsdelivr.net/npm/twemoji@14/assets/72x72/1f324.png',sizes:'72x72',type:'image/png'}]};
const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.getElementById('pwaManifest').href=URL.createObjectURL(blob);
</script>
<style>
/* ── TOKENS ── */
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1c2539;
  --glass:rgba(255,255,255,.045);--gb:rgba(255,255,255,.09);
  --a:#38bdf8;--a2:#818cf8;--a3:#fb923c;
  --g:#22c55e;--r:#ef4444;--y:#eab308;
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --card:rgba(17,24,39,.88);
  --sh:0 8px 40px rgba(0,0,0,.45);
  --gw:0 0 32px rgba(56,189,248,.14);
  --rad:18px;--rsm:12px;
  --ease:.32s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#eef4ff;--bg2:#dbeafe;--bg3:#c7d9f7;
  --glass:rgba(255,255,255,.6);--gb:rgba(99,102,241,.2);
  --a:#1d6be8;--a2:#7c3aed;--a3:#ea580c;
  --t:#0f172a;--t2:#334155;--t3:#64748b;
  --card:rgba(255,255,255,.75);
  --sh:0 6px 30px rgba(29,107,232,.1);
  --gw:0 0 24px rgba(29,107,232,.1);
}
[data-theme="oled"]{
  --bg:#000;--bg2:#040404;--bg3:#0c0c0c;
  --glass:rgba(255,255,255,.022);--gb:rgba(255,255,255,.065);
  --a:#00e5ff;--a2:#b388ff;--a3:#ff7043;
  --t:#fff;--t2:#b0bec5;--t3:#546e7a;
  --card:rgba(6,6,6,.97);
  --sh:0 8px 40px rgba(0,0,0,.9);
  --gw:0 0 36px rgba(0,229,255,.1);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;transition:background var(--ease),color var(--ease);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── BG ORBS ── */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.15;animation:drift 20s ease-in-out infinite alternate;}
.o1{width:360px;height:360px;background:var(--a);top:-80px;left:-80px;}
.o2{width:300px;height:300px;background:var(--a2);bottom:-60px;right:-60px;animation-delay:-7s;}
.o3{width:240px;height:240px;background:var(--a3);top:45%;left:40%;animation-delay:-14s;}
[data-theme="oled"] .orb{opacity:.06;}[data-theme="light"] .orb{opacity:.09;}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}

/* ── APP ── */
.app{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;padding:16px 14px 100px;display:flex;flex-direction:column;gap:12px;flex:1;}
@media(min-width:540px){.app{padding:24px 20px 100px;gap:15px;}}
@media(min-width:860px){.app{max-width:820px;}}
@supports(padding:max(0px)){
  .app{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right));padding-top:max(16px,env(safe-area-inset-top));}
  footer{padding-bottom:max(16px,env(safe-area-inset-bottom));}
}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo{font-family:system-ui,sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:-.03em;color:var(--t);flex-shrink:0;white-space:nowrap;}
.logo em{font-style:normal;font-weight:500;color:var(--a);}
.theme-group{display:flex;gap:2px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:3px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-shrink:0;}
.tbtn{border:none;cursor:pointer;border-radius:50px;padding:5px 8px;font-size:.62rem;font-weight:700;font-family:system-ui,sans-serif;background:transparent;color:var(--t2);transition:all var(--ease);min-width:38px;line-height:1;white-space:nowrap;}
.tbtn.on{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;}
.tbtn:active{transform:scale(.94);}

/* ── REFRESH BAR ── */
.rbar-wrap{height:3px;background:var(--gb);border-radius:2px;overflow:hidden;}
.rbar{height:100%;background:linear-gradient(to right,var(--a),var(--a2));border-radius:2px;width:100%;}

/* ── GPS BANNER ── */
.gps-banner{display:flex;align-items:center;gap:8px;background:linear-gradient(120deg,rgba(34,197,94,.1),rgba(34,197,94,.03));border:1px solid rgba(34,197,94,.25);border-radius:var(--rsm);padding:9px 13px;font-size:.72rem;color:var(--t2);animation:fadeUp .4s ease both;}
.gps-banner .gdot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pdot 2s ease infinite;flex-shrink:0;}
.gps-banner strong{color:var(--g);}
.gps-banner .gdx{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.75rem;margin-left:auto;padding:2px 5px;}

/* ── SEARCH ── */
.srow{display:flex;gap:8px;align-items:stretch;}
.swrap{flex:1;position:relative;}
.sinput{width:100%;padding:13px 12px 13px 38px;background:var(--glass);border:1px solid var(--gb);border-radius:var(--rsm);color:var(--t);font-family:system-ui,sans-serif;font-size:.9rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all var(--ease);outline:none;-webkit-appearance:none;appearance:none;}
.sinput::placeholder{color:var(--t3);}
.sinput:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(56,189,248,.15);background:var(--card);}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:.9rem;}
.aclist{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--bg2);border:1px solid var(--gb);border-radius:var(--rsm);overflow:hidden;z-index:100;box-shadow:var(--sh);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;}
.aclist.open{display:block;}
.acitem{padding:10px 14px;font-size:.84rem;color:var(--t2);cursor:pointer;transition:background var(--ease);display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--gb);}
.acitem:last-child{border-bottom:none;}
.acitem:hover{background:var(--glass);color:var(--t);}
.acname{font-weight:600;color:var(--t);}
.acregion{font-size:.68rem;color:var(--t3);}
.lbtn,.sbtn{border:none;border-radius:var(--rsm);cursor:pointer;transition:all var(--ease);-webkit-appearance:none;}
.lbtn{padding:0 13px;border:1px solid var(--gb);background:var(--glass);color:var(--a);font-size:1rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);min-width:48px;display:flex;align-items:center;justify-content:center;}
.lbtn:active{transform:scale(.92);}
.lbtn:disabled{opacity:.6;cursor:not-allowed;}
.sbtn{padding:13px 16px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-family:system-ui,sans-serif;font-weight:700;font-size:.82rem;white-space:nowrap;}
.sbtn:active{transform:scale(.95);opacity:.88;}

/* ── CONTROLS ── */
.crow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.clbl{font-size:.7rem;color:var(--t3);font-family:system-ui,sans-serif;}
.utog{display:flex;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:3px;gap:2px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.ubtn{border:none;cursor:pointer;border-radius:50px;padding:5px 11px;font-size:.7rem;font-weight:700;font-family:system-ui,sans-serif;background:transparent;color:var(--t3);transition:all var(--ease);min-width:38px;}
.ubtn.on{background:var(--a);color:#fff;}
.ubtn:active{transform:scale(.93);}

/* ── FAVS ── */
.favbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.favbar::-webkit-scrollbar{display:none;}
.fpill{display:inline-flex;align-items:center;gap:5px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:6px 11px;font-size:.72rem;color:var(--t2);white-space:nowrap;cursor:pointer;transition:all var(--ease);flex-shrink:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.fpill:active{transform:scale(.94);}
.fpill.cur{border-color:var(--a);color:var(--a);}
.fdel{opacity:.45;font-size:.7rem;color:var(--a3);margin-left:2px;}
.fadd{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(129,140,248,.07));border:1px dashed var(--a);border-radius:50px;padding:6px 11px;font-size:.72rem;color:var(--a);cursor:pointer;transition:all var(--ease);flex-shrink:0;white-space:nowrap;}
.fadd:active{transform:scale(.94);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pdot{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}
@keyframes rping{0%{transform:translate(-50%,-50%) scale(.4);opacity:1;}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0;}}

/* ── GPS PERMISSION CARD ── */
.gps-card{background:var(--card);border:1px solid var(--gb);border-radius:var(--rad);padding:32px 24px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--sh),var(--gw);animation:fadeUp .5s ease both;}
.gps-card .gem{font-size:3.5rem;margin-bottom:14px;animation:float 4s ease-in-out infinite;display:block;}
.gps-card h2{font-family:system-ui,sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:8px;}
.gps-card p{font-size:.8rem;color:var(--t2);line-height:1.6;max-width:280px;margin:0 auto 20px;}
.gps-card .gbtnwrap{display:flex;flex-direction:column;gap:9px;max-width:260px;margin:0 auto;}
.gbtn-yes{padding:14px;border:none;border-radius:var(--rsm);cursor:pointer;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-family:system-ui,sans-serif;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--ease);}
.gbtn-yes:active{transform:scale(.95);}
.gbtn-no{padding:13px;border:1px solid var(--gb);border-radius:var(--rsm);cursor:pointer;background:var(--glass);color:var(--t2);font-family:system-ui,sans-serif;font-weight:600;font-size:.85rem;transition:all var(--ease);}
.gbtn-no:active{transform:scale(.95);}
.gps-card .gnote{font-size:.6rem;color:var(--t3);margin-top:12px;}

/* ── GPS DETECTING STATE ── */
.gps-detecting{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:12px;animation:fadeUp .4s ease both;}
.gps-detecting .gem2{font-size:2.8rem;animation:float 2.5s ease-in-out infinite;}
.gps-detecting .gt{font-family:system-ui,sans-serif;font-size:.82rem;color:var(--a);}
.gps-detecting .gs{font-size:.68rem;color:var(--t3);font-family:system-ui,sans-serif;}

/* ── HERO ── */
.hero{background:var(--card);border:1px solid var(--gb);border-radius:var(--rad);padding:18px 18px 16px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--sh),var(--gw);position:relative;overflow:hidden;animation:fadeUp .5s ease both;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,.07),transparent 55%);pointer-events:none;}
.htop{display:flex;justify-content:space-between;align-items:flex-start;}
.hloc{font-family:system-ui,sans-serif;font-size:.68rem;color:var(--a);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.hcity{font-family:system-ui,sans-serif;font-weight:800;font-size:clamp(1.45rem,6vw,2.1rem);letter-spacing:-.04em;line-height:1.05;}
.hdate{font-family:system-ui,sans-serif;font-size:.62rem;color:var(--t3);margin-top:3px;}
.hem{font-size:clamp(3rem,14vw,4.8rem);animation:float 5s ease-in-out infinite;margin-left:8px;flex-shrink:0;line-height:1;filter:drop-shadow(0 6px 14px rgba(0,0,0,.3));}
.htr{display:flex;align-items:flex-end;gap:10px;margin-top:12px;}
.htemp{font-family:system-ui,sans-serif;font-weight:800;font-size:clamp(3rem,16vw,5.2rem);letter-spacing:-.07em;line-height:.9;background:linear-gradient(140deg,var(--t) 55%,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hmeta{padding-bottom:4px;}
.hfeel{font-size:.8rem;color:var(--t2);}
.hdesc{font-size:.85rem;color:var(--t2);margin-top:2px;text-transform:capitalize;}
.hpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--gb);border-radius:50px;padding:5px 9px;font-size:.7rem;color:var(--t2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.pill strong{color:var(--t);font-weight:600;}
.lupd{font-family:system-ui,sans-serif;font-size:.58rem;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:5px;}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pdot 2s ease infinite;flex-shrink:0;}

/* ── ALERT ── */
.alert{background:linear-gradient(120deg,rgba(251,146,60,.12),rgba(251,146,60,.03));border:1px solid rgba(251,146,60,.28);border-radius:var(--rsm);padding:11px 13px;display:flex;align-items:flex-start;gap:9px;font-size:.78rem;color:var(--t2);animation:fadeUp .5s ease both;}
.alert strong{color:var(--a3);}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;animation:fadeUp .5s .06s ease both;}
@media(min-width:860px){.sgrid{grid-template-columns:repeat(6,1fr);}}
.sc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:12px 8px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;transition:transform var(--ease);cursor:default;}
.sc:active{transform:scale(.95);}
.si{font-size:1.2rem;margin-bottom:4px;}
.sl{font-size:.58rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;font-family:system-ui,sans-serif;}
.sv{font-family:system-ui,sans-serif;font-weight:700;font-size:1.05rem;margin:3px 0 1px;color:var(--t);}
.ss{font-size:.58rem;color:var(--t3);}

/* ── SECTION TITLE ── */
.stitle{font-family:system-ui,sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.11em;text-transform:uppercase;color:var(--t3);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gb),transparent);}

/* ── HOURLY ── */
.hwrap{animation:fadeUp .5s .1s ease both;}
.hscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x mandatory;}
.hscroll::-webkit-scrollbar{display:none;}
.hcard{background:var(--card);border:1px solid var(--gb);border-radius:11px;padding:11px 9px;min-width:68px;max-width:68px;text-align:center;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-shrink:0;transition:all var(--ease);scroll-snap-align:start;}
.hcard.now{background:linear-gradient(135deg,rgba(56,189,248,.17),rgba(129,140,248,.1));border-color:var(--a);}
.hcard:active{transform:scale(.94);}
.htm{font-family:system-ui,sans-serif;font-size:.6rem;color:var(--t3);line-height:1;}
.htm.nl{color:var(--a);font-weight:700;}
.he{font-size:1.25rem;margin:5px 0;display:block;line-height:1;}
.htp{font-family:system-ui,sans-serif;font-weight:700;font-size:.85rem;}
.hr{font-size:.58rem;color:var(--a);font-family:system-ui,sans-serif;margin-top:3px;}

/* ── TREND CHART ── */
.tc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:fadeUp .5s .13s ease both;}
.ttabs{display:flex;gap:5px;margin-bottom:10px;}
.ttab{border:1px solid var(--gb);cursor:pointer;border-radius:50px;padding:5px 11px;font-size:.68rem;font-weight:600;font-family:system-ui,sans-serif;background:var(--glass);color:var(--t3);transition:all var(--ease);}
.ttab.on{background:var(--a);border-color:var(--a);color:#fff;}
.tsvg{width:100%;height:80px;overflow:visible;}
.tlbls{display:flex;justify-content:space-between;margin-top:4px;}
.tlbl{font-size:.56rem;color:var(--t3);font-family:system-ui,sans-serif;}

/* ── 7-DAY ── */
.fwrap{animation:fadeUp .5s .15s ease both;}
.flist{display:flex;flex-direction:column;gap:6px;}
.frow{background:var(--card);border:1px solid var(--gb);border-radius:11px;padding:11px 13px;display:grid;grid-template-columns:1fr 26px minmax(52px,72px) auto;align-items:center;gap:9px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:all var(--ease);}
.frow:active{background:var(--bg3);}
.fd{font-family:system-ui,sans-serif;font-weight:600;font-size:.85rem;}
.fdesc{font-size:.62rem;color:var(--t3);margin-top:1px;}
.fe{font-size:1.25rem;text-align:center;}
.fbw{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.fb{height:100%;border-radius:2px;background:linear-gradient(to right,var(--a2),var(--a3));}
.frang{font-family:system-ui,sans-serif;font-size:.75rem;display:flex;flex-direction:column;align-items:flex-end;gap:1px;white-space:nowrap;}
.fhi{color:var(--a3);font-weight:600;font-size:.82rem;}
.flo{color:var(--t3);font-size:.68rem;}

/* ── 2-COL PANELS ── */
.p2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(min-width:540px){.p2{gap:10px;}}
.pc{background:var(--card);border:1px solid var(--gb);border-radius:var(--rsm);padding:14px 13px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.pt{font-family:system-ui,sans-serif;font-weight:700;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}

/* UV */
.uvbig{font-family:system-ui,sans-serif;font-weight:800;font-size:1.9rem;line-height:1;}
.uvlbl{font-size:.72rem;color:var(--t2);margin-top:2px;}
.uvt{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:7px 0;}
.uvf{height:100%;border-radius:3px;background:linear-gradient(to right,#22c55e,#eab308,#ef4444);}
.uvtip{font-size:.65rem;color:var(--t3);}

/* AQI */
.aqirw{display:flex;justify-content:center;margin:4px 0 7px;}
.aqir{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg3);}
.aqir::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--card);}
.aqin{font-family:system-ui,sans-serif;font-weight:800;font-size:1.2rem;position:relative;z-index:1;}
.aqil{text-align:center;font-size:.7rem;}
.aqimr{display:flex;justify-content:space-between;margin-top:7px;}
.aqim{font-size:.6rem;color:var(--t3);font-family:system-ui,sans-serif;text-align:center;}
.aqim strong{display:block;color:var(--t2);font-size:.72rem;}

/* BODY COMFORT */
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:4px;}
.bi{background:var(--glass);border:1px solid var(--gb);border-radius:9px;padding:10px 11px;display:flex;align-items:center;gap:9px;}
.bii{font-size:1.4rem;flex-shrink:0;}
.bln{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;font-family:system-ui,sans-serif;}

/* ════ STATE ════ */
let unit='C', wunit='kmh', wxData=null;

const RF_MS = 10*60*1000; // 10 min

/* ════ THEME ════ */
const THEME_COLORS = {dark:'#0a0f1a', light:'#eef4ff', oled:'#000000'};
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('metaThemeColor').content = THEME_COLORS[t];
  ['l','d','o'].forEach(x =>
    document.getElementById('t'+x).classList.toggle('on',

});

/* ════ UNITS ════ */
function setUnit(u){
  unit=u;
  document.getElementById('uc').classList.toggle('on',u==='C');

  if(wxData) render(wxData);
}
function setWind(u){
  wunit=u;
  document.getElementById('uk').classList.toggle('on',u==='kmh');

/* ════════════════════════════════════════════
   GPS SYSTEM — AUTO DETECT ON LOAD
════════════════════════════════════════════ */
function initApp(){
  if(!('geolocation' in navigator)){
    loadKolkata(); return;
  }
  if(navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(perm=>{
      if(perm.state==='granted'){
        silentGPS();
      } else if(perm.state==='denied'){
        loadCachedOrKolkata();
      } else {
        showGPSCard();
      }
      perm.onchange = ()=>{
        if(perm.state==='granted') silentGPS();
        else if(perm.state==='denied') loadCachedOrKolkata();
      };
    }).catch(()=>{ silentGPS(); });
  } else {
    showGPSCard();
  }
}

function showGPSCard(){
  document.getElementById('wx').innerHTML = `
    <div class="gps-card">
      <span class="gem">📍</span>
      <h2>Use Your Location?</h2>
      <p>SkyPulse can instantly show weather for where you are right now. Your location is never stored on any server.</p>
      <div class="gbtnwrap">
        <button class="gbtn-yes" onclick="triggerGPS(true)">📍 Use My Location</button>
        <button class="gbtn-no" onclick="loadCachedOrKolkata()">🌆 Use Kolkata Instead</button>
      </div>
      <div class="gnote">You can change this anytime via the 📍 button</div>
    </div>`;
}

function silentGPS(){
  navigator.geolocation.getCurrentPosition(
    pos => onGPSSuccess(pos),
    ()  => loadCachedOrKolkata(),
    { enableHighAccuracy:true, timeout:8000, maximumAge:300000 }
  );
}

function triggerGPS(showUI=false){
  if(showUI){
    document.getElementById('wx').innerHTML = `
      <div class="gps-detecting">
        <div class="gem2">📡</div>
        <div class="gt">Detecting your location…</div>
        <div class="gs">Please allow location access in your browser</div>
      </div>`;
  }
  navigator.geolocation.getCurrentPosition(
    pos => onGPSSuccess(pos),
    err => {
      const m={1:'Location access denied',2:'Position unavailable',3:'Request timed out'};
      toast('❌ '+(m[err.code]||'GPS error'));
      loadCachedOrKolkata();
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

function onGPSSuccess(pos){
  const {latitude:la, longitude:lo, accuracy:ac} = pos.coords;
  localStorage.setItem('wxLat',la);
  localStorage.setItem('wxLon',lo);
  localStorage.setItem('wxLocT',Date.now());
  document.getElementById('sinput').value = `${la.toFixed(4)}, ${lo.toFixed(4)}`;
  loadCoords(la, lo, null, true, Math.round(ac));
}

function manualGPS(){
  const btn=document.getElementById('lbtn');
  btn.innerHTML='⏳'; btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.innerHTML='✅'; btn.disabled=false;
      setTimeout(()=>{btn.innerHTML='📍';},2000);
      const {latitude:la,longitude:lo,accuracy:ac}=pos.coords;
      localStorage.setItem('wxLat',la); localStorage.setItem('wxLon',lo); localStorage.setItem('wxLocT',Date.now());
      document.getElementById('sinput').value=`${la.toFixed(4)}, ${lo.toFixed(4)}`;
      loadCoords(la,lo,null,true,Math.round(ac));
      toast(`📍 Location updated (±${Math.round(ac)}m)`);
    },
    err => {
      btn.innerHTML='📍'; btn.disabled=false;
      const m={1:'Location denied — enable in browser settings',2:'Position unavailable',3:'Timed out'};
      toast('❌ '+(m[err.code]||'GPS error'));
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

function loadCachedOrKolkata(){
  const la=localStorage.getItem('wxLat');
  const lo=localStorage.getItem('wxLon');
  const t=localStorage.getItem('wxLocT');
  if(la&&lo&&t&&(Date.now()-t)<30*60*1000){
    document.getElementById('sinput').value=`${(+la).toFixed(4)}, ${(+lo).toFixed(4)}`;
    loadCoords(+la,+lo,null,false);
    toast('📍 Using recent location');
  } else {
    loadKolkata();
  }
}

function loadKolkata(){
  document.getElementById('sinput').value='Kolkata';
  doSearch();
}

function showGPSBanner(loc,la,lo,acc){
  const b=document.getElementById('gpsBanner');
  b.style.display='block';
  const ns=lo>=0?'E':'W';
  const locName = (loc&&loc.name)?loc.name:'My Location';
  const locAdmin= (loc&&loc.admin)?', '+loc.admin:'';
  b.innerHTML=`<div class="gps-banner">

    <button class="gdx" onclick="document.getElementById('gpsBanner').style.display='none'" title="Dismiss">✕</button>
  </div>`;
}

/* ════ GEOCODE ════ */
async function geocode(q){
  const m=q.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if(m) return{lat:+m[1],lon:+m[2],name:`${(+m[1]).toFixed(2)}, ${(+m[2]).toFixed(2)}`,country:'',admin:''};
  const j=await(await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`)).json();
  if(!j.results?.length) throw new Error('City not found');
  const c=j.results[0];
  return{lat:c.latitude,lon:c.longitude,name:c.name,country:c.country||'',admin:c.admin1||''};
}

/* ════ SEARCH (by city name) ════ */
async function doSearch(silent=false){
  const q=document.getElementById('sinput').value.trim();
  if(!q){toast('Enter a city name');return;}
  if(!silent) showLoading();
  try{
    const loc=await geocode(q);
    await loadCoords(loc.lat,loc.lon,loc,false,null,silent);
  }catch(e){
    toast('❌ '+e.message);
    document.getElementById('wx').innerHTML='';
  }
}

/* ════ LOAD WEATHER BY COORDS ════ */
async function loadCoords(lat,lon,loc=null,fromGPS=false,acc=null,silent=false){
  if(!silent) showLoading();
  try{
    const wxUrl=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      +`&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,`
      +`weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure,`
      +`uv_index,is_day,visibility,cloud_cover,dew_point_2m,snowfall`
      +`&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m,`
      +`surface_pressure,dew_point_2m,snowfall`
      +`&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,`
      +`precipitation_sum,precipitation_probability_max,uv_index_max,wind_speed_10m_max,`
      +`snowfall_sum`
      +`&timezone=auto&forecast_days=7&past_days=1`;

    const aqUrl=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}`
      +`&current=pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone,european_aqi,us_aqi`
      +`&hourly=pm2_5,european_aqi,us_aqi`
      +`&forecast_days=7&timezone=auto`;

    const [d, aqRaw] = await Promise.all([
      fetch(wxUrl).then(r=>r.json()),
      fetch(aqUrl).then(r=>r.json()).catch(()=>null)
    ]);

    d.aqi = aqRaw;

    /* Reverse-geocode if no loc provided */
    if(!loc){
      try{
        const rv=await(await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)).json();
        loc={
          lat, lon,
          name: rv.address?.city||rv.address?.town||rv.address?.village||rv.address?.county||'My Location',
          country: rv.address?.country||'',
          admin: rv.address?.state||''
        };
      }catch{
        loc={lat,lon,name:'My Location',country:'',admin:''};
      }
    }

    /* FIX: preserve existing compareData for other cities, only update current city entry */
    const prevCompare = compareData.filter(x=>x.name!==loc.name);

    wxData={...d, loc, fetchedAt:new Date(), fromGPS, acc};
    curCity=loc.name;

    /* Rebuild compareData: current city first, others preserved */
    const c=d.current;
    compareData=[
      {name:loc.name, temp:c.temperature_2m, hum:c.relative_humidity_2m, code:c.weather_code, wind:c.wind_speed_10m},
      ...prevCompare
    ];

    renderFavs();
    render(wxData);
    startRBar();
    document.getElementById('actrow').style.display='flex';
    if(fromGPS) showGPSBanner(loc,lat,lon,acc);
    else document.getElementById('gpsBanner').style.display='none';

  }catch(e){
    console.error(e);
    toast('❌ Could not load weather data');
    document.getElementById('wx').innerHTML='';
  }
}

function showLoading(){
  document.getElementById('wx').innerHTML=`<div class="loading"><div class="spinner"></div><div class="ltxt">Fetching weather…</div></div>`;
}

}[c]||'Unknown');

/* Real AQI from Open-Meteo air-quality response */
function parseAQI(aq){
  if(!aq||!aq.current) return null;
  const cur=aq.current;
  const val = cur.us_aqi ?? cur.european_aqi ?? null;
  if(val===null) return null;
  return{
    val:   Math.round(val),
    pm25:  cur.pm2_5   != null ? cur.pm2_5.toFixed(1)   : null,
    pm10:  cur.pm10    != null ? cur.pm10.toFixed(1)     : null,
    no2:   cur.nitrogen_dioxide != null ? cur.nitrogen_dioxide.toFixed(1) : null,
    o3:    cur.ozone   != null ? cur.ozone.toFixed(1)    : null,
    co:    cur.carbon_monoxide  != null ? (cur.carbon_monoxide/1000).toFixed(2) : null,
  };
}
function aqiInfo(v){
  if(v<=50)  return{l:'Good',          desc:'Air quality is satisfactory.',          c:'#22c55e'};
  if(v<=100) return{l:'Moderate',      desc:'Acceptable; some pollutants present.',   c:'#eab308'};
  if(v<=150) return{l:'Unhealthy*',    desc:'Sensitive groups may be affected.',      c:'#f97316'};
  if(v<=200) return{l:'Unhealthy',     desc:'Everyone may experience effects.',       c:'#ef4444'};
  if(v<=300) return{l:'Very Unhealthy',desc:'Health alert — limit outdoor activity.', c:'#a855f7'};
  return          {l:'Hazardous',     desc:'Emergency conditions — stay indoors.',   c:'#7f1d1d'};
}
function hCol(v){ return v<30?'#22c55e':v<60?'#eab308':'#ef4444'; }
function hLbl(v){ return v<30?'Low':v<60?'Moderate':'High'; }

/* Moon phase */
function moonPhase(date){
  const base=new Date('2000-01-06T18:14:00Z');
  const syn=29.53058867;
  const phase=(((date-base)/(864e5)%syn)+syn)%syn;
  const illum=Math.round((1-Math.cos(2*Math.PI*phase/syn))/2*100);
  const names=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const ems  =['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const idx = phase<1.85?0:phase<7.38?1:phase<9.22?2:phase<14.77?3:phase<16.61?4:phase<22.15?5:phase<23.99?6:7;
  return{name:names[idx], em:ems[idx], illum, age:Math.round(phase)};
}

/* Trend chart */
function switchTrend(m){
  tMode=m;
  document.getElementById('tt0').classList.toggle('on',m==='temp');
  document.getElementById('tt1').classList.toggle('on',m==='rain');
  if(wxData) drawTrend(wxData);
}
function drawTrend(d){
  const hi=new Date().getHours();
  const labs=[],vals=[];
  for(let i=hi;i<hi+24&&i<d.hourly.time.length;i+=2){
    const h=new Date(d.hourly.time[i]).getHours();
    labs.push(h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p');
    vals.push(tMode==='temp'?Math.round(d.hourly.temperature_2m[i]):d.hourly.precipitation_probability[i]);
  }
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=300,H=60,P=6;
  const pts=vals.map((v,i)=>`${P+i/(vals.length-1||1)*(W-P*2)},${H-P-((v-mn)/rng)*(H-P*2)}`);
  const col=tMode==='temp'?'var(--a)':'var(--a2)';
  const wrap=document.getElementById('tsvgw');
  if(!wrap)return;
  wrap.innerHTML=`<svg class="tsvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="M${pts[0]} ${pts.slice(1).map(p=>'L'+p).join(' ')} L${W-P},${H} L${P},${H} Z" fill="url(#tg)"/>
    <path d="M${pts[0]} ${pts.slice(1).map(p=>'L'+p).join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>{
      const[x,y]=p.split(',');
      const lbl=tMode==='temp'?dT(vals[i]):`${vals[i]}%`;
      return `<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`
        +(i%2===0?`<text x="${x}" y="${+y-6}" text-anchor="middle" fill="${col}" font-size="7" font-family="system-ui,sans-serif">${lbl}</text>`:'');
    }).join('')}
  </svg>`;
  document.getElementById('tlbls').innerHTML=labs.map((l,i)=>
    `<span class="tlbl" style="${i===0||i===labs.length-1?'':'opacity:.6'}">${l}</span>`
  ).join('');
}

/* Activity scores */
function actScores(temp,hum,wind,rain,uv){
  const sc=(b,pen=[])=>Math.max(0,Math.min(100,Math.round(b-pen.reduce((a,x)=>a+x,0))));
  return[
    {n:'Running', e:'🏃', s:sc(90,[rain>50?30:0, temp>35?20:temp<5?25:0, hum>85?10:0])},
    {n:'Cycling', e:'🚴', s:sc(90,[rain>40?35:0, wind>30?20:0, temp<5?20:0])},
    {n:'Hiking',  e:'🥾', s:sc(85,[rain>60?40:0, temp>38?20:0, uv>8?15:0])},
    {n:'Picnic',  e:'🧺', s:sc(95,[rain>30?50:0, wind>25?10:0])},
    {n:'Swimming',e:'🏊', s:sc(80,[temp<25?30:0, rain>50?20:0])},
    {n:'Golf',    e:'⛳', s:sc(85,[rain>40?40:0, wind>25?20:0, temp<10?15:0])},
  ];
}

/* Clothing */
function clothing(temp,rain,wind,uv){
  const i=[];
  if(temp<10)  i.push({e:'🧥',l:'Heavy Coat'});
  else if(temp<18) i.push({e:'🧣',l:'Light Jacket'});
  else i.push({e:'👕',l:temp>28?'T-Shirt':'Long Sleeve'});
  if(rain>50) i.push({e:'☂️',l:'Umbrella'});
  if(rain>30) i.push({e:'🌂',l:'Raincoat'});
  if(wind>25) i.push({e:'🌬️',l:'Windbreaker'});
  if(uv>5) i.push({e:'🕶️',l:'Sunglasses'},{e:'🧴',l:'Sunscreen'});
  if(temp>28) i.push({e:'🧢',l:'Sun Hat'});
  if(temp<15) i.push({e:'🧤',l:'Gloves'});
  i.push({e:'👟',l:rain>40?'Rain Boots':'Sneakers'});
  const tip=temp>32?'Stay hydrated — it\'s very hot!':temp<10?'Bundle up, it\'s cold!':rain>60?'Heavy rain likely. Waterproof everything!':'Good conditions outside today!';
  return{i,tip};
}

/* Health index */
function healthIdx(temp,hum,wind,uv){
  return{
    'Pollen':    Math.min(100,Math.round(20+(temp>20?20:0)+(hum>60?15:0)+(wind<15?10:0))),
    'Mold':      Math.min(100,Math.round(10+(hum>70?40:hum>50?20:5)+(temp>15&&temp<30?15:0))),
    'Dust':      Math.min(100,Math.round(10+(wind>20?40:wind>10?20:5)+(hum<40?20:0))),
    'Cold Risk': Math.min(100,Math.round(20+(temp<15?30:0)+(hum>70?15:0))),
  };
}

/* Compare cities */
async function addCompareCity(){
  const name=prompt('City to compare:');
  if(!name)return;
  try{
    const loc=await geocode(name);

    /* Don't duplicate */
    compareData=compareData.filter(x=>x.name!==loc.name);
    compareData.push({name:loc.name,temp:d.current.temperature_2m,hum:d.current.relative_humidity_2m,code:d.current.weather_code,wind:d.current.wind_speed_10m});
    renderCompare();

/* Rain countdown from hourly data */
function rainCountdown(hourly,hi){
  if(hourly.precipitation_probability[hi]>=60) return{state:'raining',mins:0};
  for(let i=hi+1;i<Math.min(hi+12,hourly.time.length);i++){
    if(hourly.precipitation_probability[i]>=60) return{state:'soon',mins:(i-hi)*60};
  }
  return{state:'clear',mins:null};
}

/* Custom alert thresholds */
let alertThresh = JSON.parse(localStorage.getItem('wxAlerts')||'{"rain":60,"aqi":100,"wind":50,"uv":7}');
function saveAlerts(){
  alertThresh.rain = +document.getElementById('atRain').value||60;
  alertThresh.aqi  = +document.getElementById('atAqi').value||100;
  alertThresh.wind = +document.getElementById('atWind').value||50;
  alertThresh.uv   = +document.getElementById('atUv').value||7;

  const st=document.getElementById('atStatus');
  if(st){ st.textContent='✅ Thresholds saved!'; setTimeout(()=>{ if(st)st.textContent=''; },2500); }
  toast('🔔 Alert thresholds updated');

function checkAlerts(current,aqiVal){
  if(!notifyOn||Notification.permission!=='granted') return;
  const msgs=[];
  const hi=new Date().getHours();
  const maxRain=wxData?.hourly?.precipitation_probability
    ? Math.max(...(wxData.hourly.precipitation_probability.slice(hi,hi+3)||[0]))
    : 0;
  if(maxRain>=alertThresh.rain) msgs.push(`🌧️ Rain probability ≥${alertThresh.rain}%`);
  if(aqiVal!=null && aqiVal>=alertThresh.aqi) msgs.push(`🌬️ AQI ${aqiVal} ≥ threshold ${alertThresh.aqi}`);
  if(current.wind_speed_10m>=alertThresh.wind) msgs.push(`💨 Wind ${Math.round(current.wind_speed_10m)} km/h ≥ ${alertThresh.wind}`);
  if((current.uv_index||0)>=alertThresh.uv) msgs.push(`☀️ UV ${current.uv_index} ≥ ${alertThresh.uv}`);
  if(msgs.length) new Notification('SkyPulse Alert — '+curCity,{body:msgs.join('\n')});
}

/* Pressure trend from hourly data */
function pressureTrend(hourly,hi){
  const vals=[];
  for(let i=Math.max(0,hi-5);i<=hi&&i<hourly.time.length;i++){
    if(hourly.surface_pressure?.[i]!=null) vals.push(hourly.surface_pressure[i]);
  }
  if(vals.length<2) return{arrow:'→',label:'Steady',tip:'Stable conditions expected.',color:'var(--t2)',delta:0};
  const delta=vals[vals.length-1]-vals[0];
  if(delta>1.5)  return{arrow:'↑',label:'Rising', tip:'Improving weather expected.',   color:'var(--g)',  delta};
  if(delta<-1.5) return{arrow:'↓',label:'Falling',tip:'Deteriorating weather likely.', color:'var(--a3)', delta};
  return             {arrow:'→',label:'Steady', tip:'Stable conditions expected.',   color:'var(--t2)', delta};
}

/* Golden hour & Blue hour calculation */
function goldenBlueHours(sunriseMs,sunsetMs){
  const goldenDur=40*60000;
  const blueDur  =20*60000;
  const fmt=ms=>new Date(ms).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const dur=m=>`${Math.round(m/60000)} min`;
  return{
    morningBlue: {start:fmt(sunriseMs-blueDur),  end:fmt(sunriseMs),            dur:dur(blueDur),   label:'Morning Blue Hour',  em:'🌌'},
    morningGold: {start:fmt(sunriseMs),           end:fmt(sunriseMs+goldenDur),  dur:dur(goldenDur), label:'Morning Golden Hour', em:'🌅'},
    eveningGold: {start:fmt(sunsetMs-goldenDur),  end:fmt(sunsetMs),             dur:dur(goldenDur), label:'Evening Golden Hour', em:'🌇'},
    eveningBlue: {start:fmt(sunsetMs),            end:fmt(sunsetMs+blueDur),     dur:dur(blueDur),   label:'Evening Blue Hour',   em:'🌆'},
  };
}

/* Historical comparison (yesterday from past_days=1) */
function historicalCompare(daily){
  if(!daily.time||daily.time.length<2) return null;
  const yd={temp_max:daily.temperature_2m_max[0], temp_min:daily.temperature_2m_min[0], rain:daily.precipitation_sum[0]||0};
  const td={temp_max:daily.temperature_2m_max[1], temp_min:daily.temperature_2m_min[1], rain:daily.precipitation_sum[1]||0};
  return{
    yd, td,
    diffMax:  +(td.temp_max-yd.temp_max).toFixed(1),
    diffMin:  +(td.temp_min-yd.temp_min).toFixed(1),
    diffRain: +(td.rain-yd.rain).toFixed(1),
  };
}

/* Dew point comfort */
function dewComfort(dp){
  if(dp<10)  return{label:'Very Dry',    tip:'Very low humidity — may feel dry.',    pct:10};
  if(dp<13)  return{label:'Dry & Crisp', tip:'Comfortable, low humidity.',           pct:25};
  if(dp<16)  return{label:'Comfortable', tip:'Pleasant humidity levels.',            pct:40};
  if(dp<18)  return{label:'Comfortable', tip:'Ideal outdoor conditions.',            pct:55};
  if(dp<21)  return{label:'Humid',       tip:'Starting to feel muggy.',              pct:68};
  if(dp<24)  return{label:'Very Humid',  tip:'Uncomfortable, oppressive.',           pct:82};
  return          {label:'Oppressive',  tip:'Extremely humid — limit activity.',    pct:95};
}

/* Best day planner */
function bestDayPlanner(daily){
  const start=1; // index 0 = yesterday (past_days=1)
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const scores=[];
  for(let i=start;i<daily.time.length;i++){
    const dt=new Date(daily.time[i]+'T12:00:00');
    const nm=i===start?'Today':i===start+1?'Tomorrow':DAYS[dt.getDay()];
    const tmax=daily.temperature_2m_max[i]||25;
    const rain=daily.precipitation_probability_max?.[i]||0;
    const wind=daily.wind_speed_10m_max[i]||10;
    const uv=daily.uv_index_max[i]||3;
    const score=Math.max(0,Math.min(100,Math.round(
      100-(rain*0.4)-(tmax>35?20:tmax<10?15:0)-(wind>30?15:0)-(uv>9?10:0)
    )));
    const acts=[];
    if(rain<30&&tmax>15&&tmax<35) acts.push('🏃 Running');
    if(rain<20&&wind<25) acts.push('🚴 Cycling');
    if(rain<40&&tmax>10) acts.push('🥾 Hiking');
    if(rain<20&&tmax>20) acts.push('🧺 Picnic');
    scores.push({nm,score,acts:acts.slice(0,3),date:daily.time[i]});
  }
  return scores.sort((a,b)=>b.score-a.score);
}

    ${aqParsed?`
    <div class="aqirw"><div class="aqir" style="background:conic-gradient(${ai.c} ${aqiD}deg,var(--bg3) ${aqiD}deg)"><div class="aqin" style="color:${ai.c}">${aqiV}</div></div></div>
    <div class="aqil" style="color:${ai.c};font-weight:700">${ai.l}</div>
    <div class="aqil" style="font-size:.62rem;color:var(--t3);margin-top:3px;line-height:1.4">${ai.desc}</div>
    <div style="margin-top:9px;display:flex;flex-direction:column;gap:5px;">
      ${[
        ['PM2.5',aqParsed.pm25,'μg/m³',35],
        ['PM10', aqParsed.pm10, 'μg/m³',150],
        ['NO₂',  aqParsed.no2,  'μg/m³',200],
        ['O₃',   aqParsed.o3,   'μg/m³',180],
        ['CO',   aqParsed.co,   'mg/m³',10],
      ].filter(([,v])=>v!==null).map(([name,val,unit2,max])=>{
        const pct=Math.min(100,Math.round((+val/max)*100));
        const col=pct<30?'#22c55e':pct<65?'#eab308':'#ef4444';
        return `<div style="display:flex;align-items:center;gap:7px;">
          <div style="font-size:.62rem;color:var(--t3);font-family:system-ui,sans-serif;width:36px;flex-shrink:0">${name}</div>
          <div style="flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${col};border-radius:2px;"></div></div>
          <div style="font-size:.62rem;font-family:system-ui,sans-serif;color:var(--t2);white-space:nowrap;">${val} ${unit2}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:.58rem;color:var(--t3);margin-top:7px;">Source: Open-Meteo Air Quality · US AQI</div>`
    :`<div style="padding:14px 0;text-align:center;color:var(--t3);font-size:.75rem;">No AQI data available<br>for this location</div>`}
  </div>
</div>

${hist?`

  /* FIX: These MUST be called after innerHTML is set — outside the template literal */
  drawTrend(d);

  requestAnimationFrame(()=>initRadarMap(loc.lat, loc.lon));

/* ════ LEAFLET RADAR MAP ════ */
let leafletMap=null, wxTileLayer=null, curRadarLayer='precipitation_new';

function initRadarMap(lat,lon){
  // If map already exists, just pan to new location
  if(leafletMap){
    leafletMap.setView([lat,lon],7);
    return;
  }
  const el=document.getElementById('radarMap');
  if(!el) return;

  // Dark-styled base tiles from CartoDB (free, no key)
  leafletMap = L.map('radarMap',{
    center:[lat,lon],
    zoom:7,
    zoomControl:true,
    attributionControl:false,
    scrollWheelZoom:false
  });

  // Base layer — CartoDB Dark Matter (free, no key needed)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19,
    subdomains:'abcd'
  }).addTo(leafletMap);

  // Weather overlay — OpenWeatherMap free tiles (no key needed for basic layers)
  wxTileLayer = L.tileLayer(
    `https://tile.openweathermap.org/map/${curRadarLayer}/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2`,
    {opacity:0.65, maxZoom:19}
  ).addTo(leafletMap);

  // Custom marker for current city
  const icon=L.divIcon({
    html:`<div style="width:14px;height:14px;background:var(--a,#38bdf8);border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 8px rgba(56,189,248,.7);"></div>`,
    iconSize:[14,14],iconAnchor:[7,7],className:''
  });
  L.marker([lat,lon],{icon}).addTo(leafletMap)
    .bindPopup(`<b style="font-family:system-ui,sans-serif">${curCity||'Location'}</b>`,{className:'leaflet-popup-custom'});

  // Prevent map from interfering with page scroll on mobile
  leafletMap.on('touchstart',()=>{ leafletMap.scrollWheelZoom.disable(); });
}

function setRadarLayer(layer){
  curRadarLayer=layer;
  // Update button states
  document.querySelectorAll('.rlbtn').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('onclick')===`setRadarLayer('${layer}')`);
  });
  if(!leafletMap||!wxTileLayer) return;
  // Swap weather tile URL
  wxTileLayer.setUrl(
    `https://tile.openweathermap.org/map/${layer}/{z}/{x}/{y}.png?appid=9de243494c0b295cca9337e1e96b00e2`
  );
}

/* ════ BOOT ════ */
window.addEventListener('DOMContentLoaded', initApp);
</script>
