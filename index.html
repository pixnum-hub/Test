<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vitalis — Medical AI Agent</title>
<meta name="description" content="A free, no-signup medical information assistant.">
<style>
  :root[data-theme="light"]{
    --bg:#F5F8F8; --surface:#FFFFFF; --surface-2:#EEF3F3; --text:#0E2028; --muted:#5A7078;
    --accent:#0F7A6E; --accent-ink:#FFFFFF; --border:#DCE6E6; --danger:#B3261E;
    --bubble-user:#0F7A6E; --bubble-user-text:#FFFFFF; --bubble-agent:#FFFFFF; --bubble-agent-text:#0E2028;
    --shadow:0 1px 3px rgba(14,32,40,.08);
  }
  :root[data-theme="dark"]{
    --bg:#0E161B; --surface:#152029; --surface-2:#1C2933; --text:#E8F0F1; --muted:#8FA7AD;
    --accent:#2FD9C4; --accent-ink:#03211D; --border:#26363F; --danger:#FF6B60;
    --bubble-user:#2FD9C4; --bubble-user-text:#03211D; --bubble-agent:#1C2933; --bubble-agent-text:#E8F0F1;
    --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  :root[data-theme="oled"]{
    --bg:#000000; --surface:#000000; --surface-2:#0A0A0A; --text:#F2F2F2; --muted:#8A8A8A;
    --accent:#2FD9C4; --accent-ink:#000000; --border:#1B1B1B; --danger:#FF6B60;
    --bubble-user:#2FD9C4; --bubble-user-text:#000000; --bubble-agent:#0A0A0A; --bubble-agent-text:#F2F2F2;
    --shadow:none;
  }
  :root[data-theme="hc"]{
    --bg:#000000; --surface:#000000; --surface-2:#000000; --text:#FFFFFF; --muted:#FFFF00;
    --accent:#FFFF00; --accent-ink:#000000; --border:#FFFFFF; --danger:#FF3B3B;
    --bubble-user:#FFFF00; --bubble-user-text:#000000; --bubble-agent:#000000; --bubble-agent-text:#FFFFFF;
    --shadow:none;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    display:flex; flex-direction:column; min-height:100dvh;
    transition:background .2s,color .2s;
  }
  [data-theme="hc"] *{ border-color:var(--border)!important; }
  .app{ flex:1; display:flex; flex-direction:column; max-width:640px; width:100%; margin:0 auto; }

  header{
    position:sticky; top:0; z-index:5; background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand svg{ flex:none; }
  .brand-text h1{ font-size:17px; margin:0; letter-spacing:.2px; font-weight:800; }
  .brand-text p{ margin:0; font-size:11px; color:var(--muted); }
  .ecg{ stroke:var(--accent); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:160; stroke-dashoffset:160; animation:draw 2.4s ease-out forwards, pulse 3.6s ease-in-out 2.4s infinite; }
  @keyframes draw{ to{ stroke-dashoffset:0; } }
  @keyframes pulse{ 0%,100%{ opacity:1;} 50%{ opacity:.55; } }
  @media (prefers-reduced-motion:reduce){ .ecg{ animation:none; stroke-dashoffset:0; } }

  #themeBtn{
    border:1px solid var(--border); background:var(--surface-2); color:var(--text);
    border-radius:10px; padding:8px 10px; font-size:12px; font-weight:700; cursor:pointer;
    white-space:nowrap;
  }
  #themeBtn:focus-visible, .composer button:focus-visible, .chip:focus-visible{
    outline:3px solid var(--accent); outline-offset:2px;
  }

  .disclaimer{
    margin:10px 14px 0; font-size:11.5px; color:var(--muted); background:var(--surface-2);
    border:1px solid var(--border); border-radius:10px; padding:8px 10px; line-height:1.4;
  }

  .chips{ display:flex; gap:8px; overflow-x:auto; padding:10px 14px 2px; }
  .chip{
    flex:none; border:1px solid var(--border); background:var(--surface); color:var(--text);
    border-radius:999px; padding:7px 12px; font-size:12.5px; cursor:pointer;
  }

  .chat{ flex:1; overflow-y:auto; padding:12px 14px 8px; display:flex; flex-direction:column; gap:10px; }
  .msg{ max-width:84%; padding:10px 13px; border-radius:16px; font-size:14.5px; line-height:1.45; box-shadow:var(--shadow); }
  .msg.agent{ align-self:flex-start; background:var(--bubble-agent); color:var(--bubble-agent-text); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg.user{ align-self:flex-end; background:var(--bubble-user); color:var(--bubble-user-text); border-bottom-right-radius:4px; }
  .msg.emergency{ border:1.5px solid var(--danger); color:var(--danger); font-weight:700; }
  .msg small{ display:block; margin-top:6px; opacity:.75; font-weight:400; font-size:11px; }
  .banner{ font-weight:800; font-size:13px; padding:8px 10px; border-radius:10px; margin-bottom:8px; }
  .u-low{ background:#1FA97A22; color:#1FA97A; border:1px solid #1FA97A; }
  .u-mid{ background:#E0A50022; color:#C98A00; border:1px solid #C98A00; }
  .u-high{ background:#E0453522; color:#E04535; border:1px solid #E04535; }
  [data-theme="hc"] .banner{ background:#000!important; color:var(--accent)!important; border:2px solid var(--accent)!important; }
  .rank-row{ display:flex; justify-content:space-between; font-size:13.5px; font-weight:700; margin-top:8px; }
  .rank-row .pct{ font-weight:600; color:var(--muted); font-size:12px; }
  .bar{ height:5px; background:var(--surface-2); border-radius:4px; overflow:hidden; margin:3px 0; }
  .bar-fill{ height:100%; background:var(--accent); }
  .rank-advice{ font-size:12.5px; color:var(--muted); margin-bottom:2px; }
  .followup{ margin-top:8px; font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; align-items:center; gap:5px; }
  .fchip{ border:1px solid var(--border); background:var(--surface-2); color:var(--text); border-radius:999px;
    padding:4px 10px; font-size:11.5px; cursor:pointer; }
  .typing{ align-self:flex-start; display:flex; gap:4px; padding:12px 14px; }
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation:bounce 1.1s infinite; }
  .typing span:nth-child(2){ animation-delay:.15s; } .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0);} 30%{ transform:translateY(-5px);} }

  .composer{
    position:sticky; bottom:0; display:flex; gap:8px; padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
    background:var(--surface); border-top:1px solid var(--border);
  }
  .composer input{
    flex:1; border:1px solid var(--border); background:var(--surface-2); color:var(--text);
    border-radius:12px; padding:12px 14px; font-size:15px; min-width:0;
  }
  .composer input:focus-visible{ outline:2px solid var(--accent); }
  .composer button{
    border:none; background:var(--accent); color:var(--accent-ink); border-radius:12px;
    padding:0 18px; font-weight:800; font-size:14px; cursor:pointer;
  }

  footer{
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
  }
  footer p{ margin:0; font-size:11.5px; color:var(--muted); line-height:1.5; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <svg width="30" height="30" viewBox="0 0 100 40" aria-hidden="true">
        <polyline class="ecg" points="0,20 20,20 27,5 35,35 42,20 100,20"/>
      </svg>
      <div class="brand-text">
        <h1>Vitalis</h1>
        <p>Medical AI agent · no signup</p>
      </div>
    </div>
    <button id="themeBtn" type="button" aria-label="Change theme">Theme: Light</button>
  </header>

  <p class="disclaimer">⚠️ Triage guidance from symptom overlap, not a clinical diagnosis. For emergencies, contact local emergency services immediately.</p>

  <div class="chips" id="chips">
    <button class="chip" type="button">fever, cough, sore throat</button>
    <button class="chip" type="button">headache, nausea, light sensitivity</button>
    <button class="chip" type="button">stomach pain, vomiting, diarrhea</button>
    <button class="chip" type="button">drug: ibuprofen</button>
  </div>

  <main class="chat" id="chat" aria-live="polite"></main>

  <form class="composer" id="composer">
    <input id="input" type="text" placeholder="Describe symptoms or type 'drug: name'…" autocomplete="off" aria-label="Message">
    <button type="submit">Send</button>
  </form>
</div>

<footer>
  <p>© <span id="year"></span> Manik Roy. All Rights Reserved.</p>
</footer>

<script>
(function(){
  "use strict";

  /* ---------- Theme ---------- */
  var themes = ["light","dark","oled","hc"];
  var labels = {light:"Light", dark:"Dark", oled:"OLED", hc:"HC"};
  var idx = 0;
  var mql = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
  if(mql && mql.matches) idx = 1;
  var root = document.documentElement;
  var themeBtn = document.getElementById("themeBtn");
  function applyTheme(){
    root.setAttribute("data-theme", themes[idx]);
    themeBtn.textContent = "Theme: " + labels[themes[idx]];
  }
  themeBtn.addEventListener("click", function(){
    idx = (idx + 1) % themes.length;
    applyTheme();
  });
  applyTheme();

  /* ---------- Footer year ---------- */
  document.getElementById("year").textContent = new Date().getFullYear();

  /* ---------- Chat plumbing ---------- */
  var chat = document.getElementById("chat");
  var form = document.getElementById("composer");
  var input = document.getElementById("input");

  function addMsg(text, who, extraClass){
    var div = document.createElement("div");
    div.className = "msg " + who + (extraClass ? " " + extraClass : "");
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }
  function addTyping(){
    var t = document.createElement("div");
    t.className = "typing"; t.id = "typing-indicator";
    t.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping(){
    var t = document.getElementById("typing-indicator");
    if(t) t.remove();
  }

  addMsg("Hi, I'm Vitalis. List your symptoms (e.g. \"fever, cough, sore throat\") and I'll rank likely possibilities and an urgency level. Type <b>drug: name</b> to look up a medicine. This is triage guidance, not a diagnosis.", "agent");

  /* ---------- Emergency keywords (checked first, overrides everything) ---------- */
  var emergencyWords = ["chest pain","can't breathe","cannot breathe","difficulty breathing",
    "severe bleeding","suicid","unconscious","stroke","numb face","slurred speech",
    "overdose","seizure","not breathing","heart attack"];

  /* ---------- Condition knowledge base: weighted differential engine ---------- */
  /* urgency: 1 self-care, 2 see doctor soon, 3 seek urgent care */
  var conditions = [
    { t:"Common cold", u:1, s:["runny nose","congestion","sneezing","sore throat","mild cough","stuffy nose"],
      advice:"Rest, fluids, and steam inhalation. See a doctor if it worsens after 10 days." },
    { t:"Influenza (flu)", u:2, s:["fever","chills","body ache","fatigue","cough","headache","sore throat"],
      advice:"Rest and fluids; antivirals can help if started early. See a doctor if breathing becomes hard or fever is very high." },
    { t:"Migraine", u:1, s:["headache","nausea","light sensitivity","throbbing","aura","dizzy"],
      advice:"Rest in a dark quiet room and stay hydrated. See a doctor if headaches are frequent, severe, or new in pattern." },
    { t:"Tension headache", u:1, s:["headache","neck pain","stress","pressure","fatigue"],
      advice:"Gentle stretching, hydration, and stress reduction often help. See a doctor if pain is persistent or severe." },
    { t:"Gastroenteritis (stomach flu)", u:2, s:["nausea","vomiting","diarrhea","stomach pain","fever","abdominal pain"],
      advice:"Sip oral rehydration fluids and rest the gut with bland food. Seek care if you can't keep fluids down or see blood." },
    { t:"Urinary tract infection", u:2, s:["burning urination","frequent urination","pelvic pain","cloudy urine","lower abdominal pain"],
      advice:"Drink plenty of water. See a doctor promptly — UTIs are usually treated with antibiotics." },
    { t:"Allergic rhinitis", u:1, s:["sneezing","itchy eyes","runny nose","congestion","allerg"],
      advice:"Antihistamines and avoiding triggers often help. See a doctor if symptoms are persistent or severe." },
    { t:"Strep throat", u:2, s:["sore throat","fever","swollen glands","difficulty swallowing"],
      advice:"See a doctor for testing — strep needs antibiotics to prevent complications." },
    { t:"Anxiety / stress response", u:1, s:["anxious","racing heart","stressed","trouble sleeping","restless","dizzy"],
      advice:"Slow breathing exercises and talking to someone you trust can help. A mental health professional can offer further support." },
    { t:"Musculoskeletal back strain", u:1, s:["back pain","stiffness","muscle spasm"],
      advice:"Gentle movement, heat, and rest usually help. See a doctor if there's numbness, weakness, or bladder changes." },
    { t:"Dehydration", u:2, s:["dizzy","fatigue","dry mouth","dark urine","headache"],
      advice:"Rehydrate with water or electrolyte fluids. Seek care if confusion or fainting occurs." },
    { t:"Allergic skin reaction", u:2, s:["rash","itching","hives","swelling","allerg"],
      advice:"Antihistamines can ease mild reactions. Seek emergency care if there's facial swelling or breathing trouble." },
    { t:"Insomnia / sleep disruption", u:1, s:["can't sleep","trouble sleeping","restless","fatigue","stressed"],
      advice:"Keep a consistent sleep schedule and limit screens before bed. See a doctor if it persists beyond a few weeks." }
  ];

  function scoreConditions(text){
    return conditions.map(function(c){
      var matched = c.s.filter(function(sym){ return text.indexOf(sym) !== -1; });
      return { c:c, matched:matched, pct:Math.round((matched.length / c.s.length) * 100) };
    }).filter(function(r){ return r.matched.length > 0; })
      .sort(function(a,b){ return b.matched.length - a.matched.length || b.pct - a.pct; });
  }

  var urgencyText = {1:"Self-care may be sufficient — monitor at home.", 2:"Consider seeing a doctor soon.", 3:"Seek urgent medical care."};
  var urgencyClass = {1:"u-low", 2:"u-mid", 3:"u-high"};

  /* ---------- Drug lookup via openFDA (free, no key) ---------- */
  function fetchDrug(name){
    var url = "https://api.fda.gov/drug/label.json?search=openfda.brand_name:%22" +
      encodeURIComponent(name) + "%22+openfda.generic_name:%22" + encodeURIComponent(name) +
      "%22&search_operator=OR&limit=1";
    return fetch(url).then(function(r){
      if(!r.ok) throw new Error("not found");
      return r.json();
    }).then(function(data){
      var r = data.results && data.results[0];
      if(!r) throw new Error("not found");
      function pick(field){ return r[field] && r[field][0] ? r[field][0].slice(0,320) : null; }
      var purpose = pick("purpose") || pick("indications_and_usage");
      var warnings = pick("warnings") || pick("warnings_and_cautions");
      var dosage = pick("dosage_and_administration");
      var out = "<b>" + name.charAt(0).toUpperCase()+name.slice(1) + "</b><br>";
      out += purpose ? ("Purpose: " + purpose + "…<br>") : "";
      out += dosage ? ("Dosage note: " + dosage + "…<br>") : "";
      out += warnings ? ("Warnings: " + warnings + "…") : "";
      out += "<small>Source: openFDA drug label database. Always follow your own package insert and pharmacist/doctor advice.</small>";
      return out;
    });
  }

  /* ---------- Response engine ---------- */
  function handle(raw){
    var text = raw.toLowerCase();

    for(var e=0;e<emergencyWords.length;e++){
      if(text.indexOf(emergencyWords[e]) !== -1){
        return Promise.resolve({
          html:"🚨 This may be a medical emergency. Please call your local emergency number or go to the nearest emergency room right now. Do not wait for further replies here.",
          cls:"emergency"
        });
      }
    }

    var drugMatch = raw.match(/^\s*(drug|medicine|med)\s*[:\-]\s*(.+)$/i);
    if(drugMatch){
      var name = drugMatch[2].trim();
      return fetchDrug(name).then(function(html){ return {html:html, cls:""}; })
        .catch(function(){
          return {html:"I couldn't find label data for \"" + name + "\" in the openFDA database. Double-check the spelling, or consult a pharmacist.", cls:""};
        });
    }

    var ranked = scoreConditions(text);
    if(ranked.length){
      var top = ranked.slice(0,4);
      var worstU = top.reduce(function(m,r){ return Math.max(m, r.c.u); }, 1);
      var html = "<div class='banner " + urgencyClass[worstU] + "'>" + urgencyText[worstU] + "</div>";
      html += "<b>Possible considerations, ranked by symptom overlap:</b><br>";
      top.forEach(function(r,i){
        html += "<div class='rank-row'><span>" + (i+1) + ". " + r.c.t + "</span><span class='pct'>" + r.pct + "% overlap</span></div>";
        html += "<div class='bar'><div class='bar-fill' style='width:" + r.pct + "%'></div></div>";
        html += "<div class='rank-advice'>" + r.c.advice + "</div>";
      });
      html += "<small>Ranking reflects keyword overlap with common conditions — not a clinical probability or diagnosis. A licensed clinician is needed to confirm any cause.</small>";
      html += "<div class='followup'>How long has this lasted? " +
        "<button class='fchip' data-d='short'>&lt;24 hrs</button>" +
        "<button class='fchip' data-d='mid'>2–6 days</button>" +
        "<button class='fchip' data-d='long'>1+ week</button></div>" +
        "<div class='followup'>How severe does it feel? " +
        "<button class='fchip' data-s='mild'>Mild</button>" +
        "<button class='fchip' data-s='moderate'>Moderate</button>" +
        "<button class='fchip' data-s='severe'>Severe</button></div>";
      return Promise.resolve({html:html, cls:"", refine:{u:worstU}});
    }

    return Promise.resolve({
      html:"I can assess symptoms or look up medicine info — try \"fever, cough, sore throat\" or \"drug: aspirin\".",
      cls:""
    });
  }

  /* ---------- Follow-up refinement (duration / severity chips) ---------- */
  var pendingRefine = null, chosenDuration = null, chosenSeverity = null;

  function tryRefine(msgDiv){
    if(!pendingRefine || !chosenDuration || !chosenSeverity) return;
    var u = pendingRefine.u;
    if(chosenSeverity === "severe") u = Math.max(u, 3);
    else if(chosenSeverity === "moderate" && chosenDuration === "long") u = Math.max(u, 2);
    if(chosenDuration === "long") u = Math.max(u, 2);
    u = Math.min(u, 3);
    addMsg("<div class='banner " + urgencyClass[u] + "'>Updated guidance: " + urgencyText[u] +
      "</div><small>Based on duration (" + chosenDuration + ") and severity (" + chosenSeverity +
      ") you selected. Still not a diagnosis — when in doubt, contact a clinician.</small>", "agent");
    pendingRefine = null; chosenDuration = null; chosenSeverity = null;
  }

  function send(text){
    if(!text.trim()) return;
    addMsg(text.replace(/</g,"&lt;"), "user");
    input.value = "";
    addTyping();
    handle(text).then(function(res){
      removeTyping();
      var div = addMsg(res.html, "agent", res.cls);
      if(res.refine){ pendingRefine = res.refine; chosenDuration = null; chosenSeverity = null; }
    });
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    send(input.value);
  });

  document.getElementById("chips").addEventListener("click", function(e){
    if(e.target.classList.contains("chip")) send(e.target.textContent);
  });

  chat.addEventListener("click", function(e){
    if(!e.target.classList.contains("fchip")) return;
    if(e.target.dataset.d){ chosenDuration = e.target.dataset.d; }
    if(e.target.dataset.s){ chosenSeverity = e.target.dataset.s; }
    e.target.style.opacity = "0.5";
    tryRefine();
  });
})();
</script>
</body>
</html>
