<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Weather AI</title>

<style>
:root{
  --bg:#000;
  --text:#fff;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;}
.app{max-width:420px;margin:auto;padding:15px;}
.heading{text-align:center;font-size:24px;font-weight:700;}
input,button{padding:12px;border:none;border-radius:20px;background:#1c1c1e;color:white;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:#111;padding:15px;border-radius:15px;text-align:center;}
.scroll{display:flex;overflow-x:auto;gap:10px;}
.scroll .card{min-width:85px;}
.aqi-good{color:#00e400;} .aqi-mod{color:#ffff00;}
.aqi-usg{color:#ff7e00;} .aqi-unhealthy{color:#ff0000;}
</style>
</head>

<body>
<div class="app">

<div class="heading">🌤 Smart Weather AI</div>

<input id="cityInput" placeholder="Search city">
<button onclick="searchCity()">Search</button>
<button onclick="detectLocation()">📍 Use Location</button>

<div id="locationInfo">Loading Kolkata...</div>
<div id="mainTemp" style="font-size:60px;text-align:center;">--</div>

<!-- Weather -->
<div class="grid">
<div class="card">Wind: <span id="wind"></span></div>
<div class="card">Humidity: <span id="hum"></span></div>
</div>

<!-- AQI -->
<div class="grid">
<div class="card">AQI: <span id="aqi"></span></div>
<div class="card">PM2.5: <span id="pm"></span></div>
</div>

<!-- 24h Temp -->
<h3>24h Temp</h3>
<div id="temp24" class="scroll"></div>

<!-- 24h AQI -->
<h3>24h AQI</h3>
<div id="aqi24" class="scroll"></div>

<!-- 24h Rain -->
<h3>24h Rain</h3>
<div id="rain24" class="scroll"></div>

<!-- 7 days -->
<h3>7 Days</h3>
<div id="days7" class="scroll"></div>

</div>

<script>
const KOLKATA=[22.57,88.36];

function safe(arr,i){return arr?.[i]??0;}

function aqiCalc(pm){
if(pm<=12)return (50/12)*pm;
if(pm<=35.4)return 51+(pm-12)*2.1;
if(pm<=55.4)return 101+(pm-35.4)*2.5;
return 151+(pm-55.4)*2;
}

function aqiColor(a){
if(a<=50)return"aqi-good";
if(a<=100)return"aqi-mod";
if(a<=150)return"aqi-usg";
return"aqi-unhealthy";
}

async function load(lat,lon){
try{

let w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relative_humidity_2m,precipitation,precipitation_probability&daily=temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json());

let a=await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm2_5`).then(r=>r.json());

let idx=0;

document.getElementById("mainTemp").innerText=w.current_weather.temperature+"°C";
document.getElementById("wind").innerText=w.current_weather.windspeed;
document.getElementById("hum").innerText=safe(w.hourly.relative_humidity_2m,idx);

let pm=safe(a.hourly.pm2_5,idx);
let aq=Math.round(aqiCalc(pm));

let aqiEl=document.getElementById("aqi");
aqiEl.innerText=aq;
aqiEl.className=aqiColor(aq);

document.getElementById("pm").innerText=pm;

let t24=document.getElementById("temp24"); t24.innerHTML="";
let a24=document.getElementById("aqi24"); a24.innerHTML="";
let r24=document.getElementById("rain24"); r24.innerHTML="";

for(let i=0;i<24;i++){

let temp=safe(w.hourly.temperature_2m,i);
let rain=safe(w.hourly.precipitation,i);
let prob=safe(w.hourly.precipitation_probability,i);
let aqi=Math.round(aqiCalc(safe(a.hourly.pm2_5,i)));

t24.innerHTML+=`<div class="card">${i}:00<br>${temp}°</div>`;

a24.innerHTML+=`<div class="card ${aqiColor(aqi)}">${i}:00<br>${aqi}</div>`;

r24.innerHTML+=`
<div class="card">
${i}:00<br>${rain}mm
<div style="height:4px;background:#333;margin-top:4px;">
<div style="width:${Math.min(rain*10,100)}%;height:100%;background:#00c6ff;"></div>
</div>
${prob}%
</div>`;
}

let d7=document.getElementById("days7"); d7.innerHTML="";
for(let i=0;i<7;i++){
d7.innerHTML+=`<div class="card">${w.daily.temperature_2m_min[i]}°/${w.daily.temperature_2m_max[i]}°</div>`;
}

}catch{alert("Data error");}
}

function detectLocation(){
navigator.geolocation.getCurrentPosition(p=>{
load(p.coords.latitude,p.coords.longitude);
},()=>load(...KOLKATA));
}

function searchCity(){
let c=document.getElementById("cityInput").value;
fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${c}`)
.then(r=>r.json()).then(d=>{
let x=d.results[0];
load(x.latitude,x.longitude);
});
}

window.onload=detectLocation;
</script>

</body>
</html>
