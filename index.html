<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4db8f0" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0277bd" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Velora">
<meta name="application-name" content="Velora">
<meta name="msapplication-TileColor" content="#0d0f14">
<meta name="msapplication-TileImage" content="icon-144x144.png">
<meta name="msapplication-config" content="none">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" sizes="152x152" href="icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icon-144x144.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192x192.png">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<meta name="description" content="Velora – real-time weather, AQI, allergy index, rain index, UV, astronomy & 10 smart health scores. By Manik Roy.">
<meta name="author" content="Manik Roy">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f14;--s1:#141720;--s2:#1c2030;--s3:#242840;--tx:#e4e8ff;--mu:#6b75a8;--ac:#4db8f0;--gn:#5ec97a;--yn:#f0c040;--or:#f08040;--rd:#e85555;--bd:rgba(255,255,255,.07);--sh:0 4px 24px rgba(0,0,0,.5);--r:14px;--f:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
[data-theme=light]{--bg:#eef1fa;--s1:#fff;--s2:#e8ecf8;--s3:#dde3f5;--tx:#111827;--mu:#4a5490;--ac:#0277bd;--bd:rgba(0,0,0,.07);--sh:0 4px 20px rgba(0,0,0,.1)}
[data-theme=oled]{--bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#181818;--tx:#fff;--mu:#6b75a8;--bd:rgba(255,255,255,.05);--sh:0 4px 24px rgba(0,0,0,.9)}
[data-theme=hc]{--bg:#000;--s1:#000;--s2:#111;--s3:#222;--tx:#fff;--mu:#ffff00;--ac:#00ffff;--gn:#00ff00;--yn:#ffaa00;--or:#ff6600;--rd:#ff0000;--bd:#fff;--sh:none}
body{background:var(--bg);color:var(--tx);font-family:var(--f);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s}

/* OFFLINE */
#ob{display:none;width:100%;background:var(--rd);color:#fff;text-align:center;font-size:.85rem;padding:6px;letter-spacing:1px;position:sticky;top:0;z-index:99}

/* HEADER */
header{width:100%;max-width:520px;padding:14px 12px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.logo{font-size:1.15rem;font-weight:800;color:var(--ac);letter-spacing:-.5px}
.hrow{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.btn{background:var(--s1);border:1px solid var(--bd);color:var(--tx);font-size:.72rem;font-family:var(--f);padding:4px 8px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover,.btn.on{background:var(--ac);color:#000;border-color:var(--ac)}
.btn.uf{background:var(--yn);color:#000;border-color:var(--yn)}

/* MAIN */
main{width:100%;max-width:520px;padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:10px}

/* SEARCH */
.swrap{position:relative}
.srow{display:flex;gap:7px}
.srow input{flex:1;background:var(--s1);border:1px solid var(--bd);color:var(--tx);font-family:var(--f);font-size:1rem;padding:11px 14px;border-radius:var(--r);outline:none;transition:border .2s}
.srow input::placeholder{color:var(--mu);opacity:.7}
.srow input:focus{border-color:var(--ac)}
.srow button{background:var(--ac);color:#000;font-weight:700;font-size:.75rem;border:none;padding:11px 16px;border-radius:var(--r);cursor:pointer}
#sug{position:absolute;top:calc(100% + 4px);left:0;right:52px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;z-index:99;overflow:hidden;box-shadow:var(--sh);display:none}
.si{padding:11px 14px;font-size:.92rem;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s}
.si:last-child{border-bottom:none}
.si:hover{background:var(--s2)}

/* FAVS */
.favrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.favrow::-webkit-scrollbar{display:none}
.fc{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:.75rem;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .2s}
.fc:hover{border-color:var(--ac);color:var(--ac)}
.fx{opacity:.3;font-size:.58rem}.fx:hover{opacity:1;color:var(--rd)}

/* CARD */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh);animation:up .35s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slbl{font-size:.78rem;text-transform:uppercase;letter-spacing:2px;color:var(--mu);margin-bottom:10px}

/* HERO */
.hero{text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:var(--hglow,radial-gradient(ellipse at 50% 0%,rgba(77,184,240,.12),transparent 70%));pointer-events:none}
.cname{font-size:1.35rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px}
.star{background:none;border:none;color:var(--tx);font-size:.95rem;cursor:pointer;opacity:.3;transition:opacity .2s;padding:0}
.star.on,.star:hover{opacity:1}
.dline{font-size:.82rem;color:var(--mu);margin:3px 0 14px}
.tbig{font-size:4rem;font-weight:800;line-height:1;letter-spacing:-3px;color:var(--ac)}
.tbig sup{font-size:1.7rem;vertical-align:top;margin-top:8px}
.cond{font-size:.82rem;color:var(--mu);text-transform:uppercase;letter-spacing:2px;margin:5px 0 14px}
.srow3{display:flex;border-top:1px solid var(--bd);padding-top:12px}
.st{flex:1;text-align:center;border-right:1px solid var(--bd)}
.st:last-child{border-right:none}
.sv{font-size:1rem;font-weight:700}
.sk{font-size:.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* SUN ROW */
.sunrow{display:flex;gap:8px}
.sc{flex:1;background:var(--s2);border-radius:11px;padding:10px 8px;text-align:center}
.sico{font-size:1.3rem}
.sv2{font-size:1rem;font-weight:700;margin:3px 0 2px}
.sk2{font-size:.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:.8px}
.uvt{height:5px;border-radius:3px;background:linear-gradient(to right,#5ec97a,#f0c040,#f08040,#e85555,#7b1fa2);margin-top:6px;overflow:hidden;position:relative}
.uvf{height:100%;background:rgba(0,0,0,.45);position:absolute;right:0;top:0}

/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.met{background:var(--s2);border-radius:11px;padding:10px 8px;text-align:center}
.mv{font-size:1rem;font-weight:700}
.mk{font-size:.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* ALLERGY CARD — dedicated full card */
.alg-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh);animation:up .35s ease both}
.alg-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.alg-num{font-size:2rem;font-weight:800;line-height:1}
.alg-lbl{font-size:.9rem;font-weight:700;margin-top:2px}
.alg-bar{height:8px;border-radius:4px;overflow:hidden;background:linear-gradient(to right,#5ec97a,#aed561,#f0c040,#f08040,#e85555)}
.alg-cur-wrap{position:relative;height:14px}
.alg-cur{position:absolute;top:1px;width:3px;height:10px;border-radius:2px;background:var(--tx);transition:left .6s cubic-bezier(.34,1.56,.64,1)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.pg{background:var(--s2);border-radius:10px;padding:8px;text-align:center;border:1px solid var(--bd)}
.pv{font-size:.95rem;font-weight:700}
.pk{font-size:.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pest{font-size:.76rem;color:var(--mu);margin-top:8px;text-align:center}

/* AQI CARD */
.aqi-bar{height:8px;border-radius:4px;overflow:hidden;background:linear-gradient(to right,#5ec97a,#aed561,#f0c040,#f08040,#e85555,#7b1fa2);margin-top:12px}
.aqi-cur-wrap{position:relative;height:14px}
.aqi-cur{position:absolute;top:1px;width:3px;height:10px;border-radius:2px;background:var(--tx);transition:left .6s cubic-bezier(.34,1.56,.64,1)}
.aqi-leg{display:flex;justify-content:space-between;font-size:.7rem;color:var(--mu)}
.pollgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.poll{background:var(--s2);border-radius:10px;padding:8px;text-align:center}
.pollv{font-size:.95rem;font-weight:700}
.pollk{font-size:.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* TIP */
.tip{background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:var(--r);padding:14px 16px;font-size:.9rem;line-height:1.6;color:var(--mu);animation:up .35s ease both}
.tip strong{color:var(--tx);display:block;margin-bottom:6px;font-size:.82rem;text-transform:uppercase;letter-spacing:1px}

/* TILES (smart scores) */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tile{background:var(--s2);border-radius:12px;padding:12px;border:1px solid var(--bd)}
.tval{font-size:1.05rem;font-weight:800;margin:2px 0}
.tlbl{font-size:.75rem;color:var(--mu);text-transform:uppercase;letter-spacing:.8px}
.tbar{height:4px;border-radius:2px;background:var(--s3);margin-top:7px;overflow:hidden}
.tbar div{height:100%;border-radius:2px;transition:width .6s}

/* HOURLY */
.hscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hscroll::-webkit-scrollbar{display:none}
.hc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:10px 10px;text-align:center;min-width:62px;flex-shrink:0}
.ht{font-size:.7rem;color:var(--mu);margin-bottom:3px}
.hi{font-size:1.35rem;line-height:1.2}
.hte{font-size:.9rem;font-weight:700;margin-top:3px}
.hr{font-size:.7rem;color:var(--ac);margin-top:2px}

/* FORECAST */
.flist{display:flex;flex-direction:column;gap:7px}
.fi{background:var(--s2);border-radius:11px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.fd{font-size:.9rem;font-weight:700;width:76px}
.fic{font-size:1.3rem;flex:1;text-align:center}
.frng{font-size:.9rem;display:flex;gap:8px}
.fhi{font-weight:700}
.flo{color:var(--mu)}



/* FEATURE 17: Emoji Summary Bar */
.emojisummary{background:var(--s2);border-radius:12px;padding:10px 14px;font-size:.88rem;letter-spacing:.5px;text-align:center;border:1px solid var(--bd);word-break:break-all}

/* FEATURE 18: Feels-Like Badge */
.flbadge{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border-radius:20px;padding:5px 14px;font-size:.84rem;font-weight:700;border:1px solid var(--bd);margin-top:6px}

/* FEATURE 16: Local Time */
.ltime{font-size:.78rem;color:var(--mu);font-family:var(--f);margin-top:2px}

/* FEATURE 11: Twilight rows */
.twrow{display:flex;gap:7px;flex-wrap:wrap}
.twc{flex:1;min-width:80px;background:var(--s2);border-radius:11px;padding:9px 8px;text-align:center;border:1px solid var(--bd)}
.twico{font-size:1.2rem}
.twv{font-size:.84rem;font-weight:700;margin:3px 0 2px}
.twk{font-size:.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:.8px}

/* FEATURE 6: Shake indicator */
#shakeHint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:7px 16px;font-size:.72rem;color:var(--mu);opacity:0;transition:opacity .4s;pointer-events:none;z-index:99;white-space:nowrap}

/* FEATURE 24: Unit panel */
.unit-panel{background:var(--s2);border-radius:12px;padding:10px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border:1px solid var(--bd)}
.unit-grp{display:flex;gap:4px;align-items:center;font-size:.72rem;color:var(--mu)}
.unit-grp span{font-weight:700;color:var(--tx)}
.ubtn{background:var(--s1);border:1px solid var(--bd);color:var(--tx);font-size:.65rem;padding:3px 8px;border-radius:12px;cursor:pointer;transition:all .2s}
.ubtn.uon{background:var(--ac);color:#000;border-color:var(--ac)}

/* FEATURE 23: Battery saver */
@media (prefers-reduced-motion:reduce){.card{animation:none}*{transition:none!important}}

/* SPARKLINE */
.spark-wrap{background:var(--s2);border-radius:12px;padding:12px 14px;border:1px solid var(--bd);margin-top:0}
.spark-lbl{font-size:.78rem;text-transform:uppercase;letter-spacing:2px;color:var(--mu);margin-bottom:8px}
.spark-svg{width:100%;height:48px;overflow:visible}
.spark-svg polyline{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.spark-svg text{font-size:10px;font-family:var(--f);fill:var(--mu)}
/* RAIN TREND */
.rtrend{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:700;margin-top:4px}
/* NEW TILES extra */
.tile-wide{grid-column:span 2}

/* MSG */
.msg{text-align:center;padding:40px 16px;color:var(--mu);font-size:.95rem;animation:up .4s ease}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.upd{text-align:center;font-size:.74rem;color:var(--mu);padding:2px 0}

footer{width:100%;max-width:520px;text-align:center;padding:14px 12px 22px;font-size:.78rem;color:var(--mu);border-top:1px solid var(--bd);margin-top:6px}
footer strong{color:var(--ac)}
</style>
</head>
<body>
<div id="ob">⚡ OFFLINE</div>
<header>
  <div class="logo"> Velora</div>
  <div class="hrow">
    <button class="btn" id="ub" onclick="toggleF()">°C</button>
    <button class="btn" onclick="doRefresh()">↻</button>
    <button class="btn" id="impbtn" onclick="toggleImperial()" title="Toggle metric/imperial">MI</button>
    <button class="btn" onclick="setT('dark')" id="td">DARK</button>
    <button class="btn" onclick="setT('light')" id="tl">LITE</button>
    <button class="btn" onclick="setT('oled')" id="to">OLED</button>
    <button class="btn" onclick="setT('hc')" id="th">HC</button>
  </div>
</header>
<main>
  <div class="swrap">
    <div class="srow">
      <input id="ci" type="text" placeholder="Search city…" autocomplete="off" oninput="onInp(this.value)" onkeydown="if(event.key==='Enter'){hideSug();doFetch()}if(event.key==='Escape')hideSug()">
      <button onclick="doFetch()">GO</button>
    </div>
    <div id="sug"></div>
  </div>
  <div id="favrow" class="favrow"></div>
  <div id="out"><div class="msg"><div class="spin"></div><br>Loading weather…</div></div>
  <div id="upd" class="upd"></div>
</main>
<div id="shakeHint">📳 Refreshing…</div>
<footer>© <strong>Manik Roy</strong> <span id="yr"></span> · All Rights Reserved</footer>

<script>
// ── INIT ─────────────────────────────────────────────────────────────
document.getElementById('yr').textContent = new Date().getFullYear();
const TH=['dark','light','oled','hc'];
function setT(t){document.documentElement.setAttribute('data-theme',t);TH.forEach(x=>document.getElementById('t'+x[0]).classList.remove('on'));document.getElementById('t'+t[0]).classList.add('on');localStorage.setItem('vtheme',t);}
setT(localStorage.getItem('vtheme')||'dark');
let useF=localStorage.getItem('vunit')==='F';
const C2F=c=>Math.round(c*9/5+32);
const tF=c=>useF?`${C2F(c)}°F`:`${Math.round(c)}°C`;
const tS=c=>useF?`${C2F(c)}°`:`${Math.round(c)}°`;
function toggleF(){useF=!useF;localStorage.setItem('vunit',useF?'F':'C');const b=document.getElementById('ub');b.textContent=useF?'°F':'°C';b.classList.toggle('uf',useF);if(LD)render(...LD);}
if(useF){document.getElementById('ub').textContent='°F';document.getElementById('ub').classList.add('uf');}
let LD=null;

// ── OFFLINE ───────────────────────────────────────────────────────────
const chkNet=()=>document.getElementById('ob').style.display=navigator.onLine?'none':'block';
window.addEventListener('online',chkNet);window.addEventListener('offline',chkNet);chkNet();

// ── PULL TO REFRESH ───────────────────────────────────────────────────
let ptY=0;
document.addEventListener('touchstart',e=>{if(window.scrollY<=5)ptY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{if(ptY&&e.changedTouches[0].clientY-ptY>60)doRefresh();ptY=0;});

// ── FAVOURITES ────────────────────────────────────────────────────────
const gF=()=>{try{return JSON.parse(localStorage.getItem('vfavs')||'[]');}catch{return[];}};
const sF=f=>localStorage.setItem('vfavs',JSON.stringify(f));
function renderFavs(){
  const f=gF(),r=document.getElementById('favrow');
  r.innerHTML=f.map(c=>`<div class="fc" onclick="loadFav('${esc(c)}')">⭐ ${c} <span class="fx" onclick="event.stopPropagation();rmFav('${esc(c)}')">✕</span></div>`).join('');
}
const esc=s=>s.replace(/'/g,"\\'");
function addFav(c){const f=gF();if(!f.includes(c)){f.unshift(c);if(f.length>8)f.pop();sF(f);renderFavs();}}
function rmFav(c){sF(gF().filter(x=>x!==c));renderFavs();}
function loadFav(c){document.getElementById('ci').value=c;doFetch(c);}
function togFav(c){const f=gF();f.includes(c)?rmFav(c):addFav(c);renderFavs();updStar(c);}
function updStar(c){const b=document.getElementById('starbtn');if(b){const on=gF().includes(c);b.textContent=on?'⭐':'☆';b.className='star'+(on?' on':'');}}
renderFavs();

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────
let sugTmr=null;
function hideSug(){document.getElementById('sug').style.display='none';}
async function onInp(v){
  clearTimeout(sugTmr);hideSug();
  if(v.length<2)return;
  sugTmr=setTimeout(async()=>{
    try{
      const d=await fT(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=6`);
      if(!d.results?.length){hideSug();return;}
      const b=document.getElementById('sug');
      b.innerHTML=d.results.map(r=>`<div class="si" onclick="pickSug('${esc(r.name+', '+r.country_code)}')">${r.name}${r.admin1?', '+r.admin1:''}, ${r.country_code}</div>`).join('');
      b.style.display='block';
    }catch{}
  },320);
}
function pickSug(v){document.getElementById('ci').value=v;hideSug();doFetch(v);}
document.addEventListener('click',e=>{if(!e.target.closest('.swrap'))hideSug();});

// ── WEATHER CODES ────────────────────────────────────────────────────
const WI={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌨️',71:'❄️',73:'❄️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WD={0:'Clear',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Showers',81:'Heavy Showers',82:'Violent Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};

// ── HELPERS ───────────────────────────────────────────────────────────
function fT(url,ms=8000,strictOk=true){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t)).then(r=>{if(strictOk&&!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();});}
function windDir(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]||'–';}
function fmtTime(iso){if(!iso)return'–';const d=new Date(iso),h=d.getHours()%12||12,m=String(d.getMinutes()).padStart(2,'0'),a=d.getHours()>=12?'PM':'AM';return`${h}:${m} ${a}`;}
function hlabel(iso){const d=new Date(iso),h=d.getHours()%12||12,a=d.getHours()>=12?'PM':'AM';return h+a;}
function dlabel(iso,i){if(i===0)return'Today';if(i===1)return'Tomorrow';return new Date(iso).toLocaleDateString('en',{weekday:'short'});}
function pct(v,max=500){return Math.min(100,Math.max(0,v/max*100));}
function bar(w,c){return`<div class="tbar"><div style="width:${w}%;background:${c}"></div></div>`;}
function aqiCol(v){return v<=50?'#5ec97a':v<=100?'#f0c040':v<=150?'#f08040':v<=200?'#e85555':v<=300?'#ab47bc':'#7b1fa2';}
function aqiLbl(v){return v<=50?'Good':v<=100?'Moderate':v<=150?'Unhealthy · Sensitive':v<=200?'Unhealthy':v<=300?'Very Unhealthy':'Hazardous';}
function uvLbl(v){return v<=2?'Low':v<=5?'Moderate':v<=7?'High':v<=10?'Very High':'Extreme';}
function moonPhase(){const d=new Date(),ref=new Date('2000-01-06'),diff=(d-ref)/86400000,cyc=diff%29.53;const p=cyc/29.53;const n=p<=.03||p>.97?'🌑 New Moon':p<=.22?'🌒 Waxing Crescent':p<=.28?'🌓 First Quarter':p<=.47?'🌔 Waxing Gibbous':p<=.53?'🌕 Full Moon':p<=.72?'🌖 Waning Gibbous':p<=.78?'🌗 Last Quarter':'🌘 Waning Crescent';return{n,pct:Math.round(Math.abs(.5-p)*200)};}

// ── ALLERGY INDEX (computed from weather, no broken API dep) ──────────
function allergyIndex(temp,hum,wind,code,dew){
  // Rain washes pollen out → very low
  if([61,63,65,80,81,82,95,96,99].includes(code))return{score:0,pct:0,label:'Very Low',sub:'Rain clearing air',color:'#5ec97a',tip:'Rain is washing pollen away. Low allergy risk today.'};
  // Fog also low
  if([45,48].includes(code))return{score:1,pct:10,label:'Low',sub:'Foggy conditions',color:'#5ec97a',tip:'Foggy weather suppresses pollen dispersal.'};
  // Snow = no pollen
  if([71,73,75,77,85,86].includes(code))return{score:0,pct:0,label:'None',sub:'Snow season',color:'#5ec97a',tip:'No pollen active during snow.'};
  // Compute score from multiple real weather factors
  let s=0;
  // Temperature: pollen peaks 15–25°C
  if(temp>=10&&temp<=30) s+=3; else if(temp>30) s+=2; else s+=0;
  // Low humidity = more airborne pollen
  if(hum<40) s+=3; else if(hum<60) s+=2; else if(hum<75) s+=1;
  // Moderate wind disperses pollen
  if(wind>=10&&wind<=30) s+=3; else if(wind>30) s+=1; else if(wind<10) s+=1;
  // Dew point: dry air = more pollen
  if(dew<5) s+=1;
  // Clear/sunny days = more pollen
  if([0,1].includes(code)) s+=1;
  s=Math.min(10,s);
  const p=s*10;
  if(s<=2)return{score:s,pct:p,label:'Low',sub:'Minimal pollen',color:'#5ec97a',tip:'Low allergy risk. Most people can enjoy outdoors freely.'};
  if(s<=4)return{score:s,pct:p,label:'Moderate',sub:'Some pollen active',color:'#aed561',tip:'Moderate pollen. Consider antihistamines if sensitive.'};
  if(s<=6)return{score:s,pct:p,label:'High',sub:'Significant pollen',color:'#f0c040',tip:'High pollen. Keep windows closed, shower after outdoors.'};
  if(s<=8)return{score:s,pct:p,label:'Very High',sub:'Heavy pollen dispersal',color:'#f08040',tip:'Very high pollen. Limit outdoor time, take medication.'};
  return{score:s,pct:p,label:'Extreme',sub:'Peak pollen season',color:'#e85555',tip:'Extreme pollen. Stay indoors, wear a mask outside.'};
}


// ── FEATURE 3: Feels-Like Sparkline (SVG) ──────────────────────────
function sparklineSVG(vals,color,showLabels=true){
  if(!vals||vals.length<2)return'';
  const w=300,h=48,pad=16;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*(w-pad*2);
    const y=h-pad-(((v-mn)/rng)*(h-pad*2));
    return[x,y];
  });
  const poly=pts.map(p=>p.join(',')).join(' ');
  const first=pts[0],last=pts[pts.length-1];
  const mid=pts[Math.floor(pts.length/2)];
  return`<svg class="spark-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${poly}" stroke="${color}" opacity=".9"/>
    ${showLabels?`<text x="${first[0]}" y="${first[1]-4}" text-anchor="middle">${Math.round(vals[0])}°</text>
    <text x="${mid[0]}" y="${mid[1]-4}" text-anchor="middle">${Math.round(vals[Math.floor(vals.length/2)])}°</text>
    <text x="${last[0]}" y="${last[1]-4}" text-anchor="middle">${Math.round(vals[vals.length-1])}°</text>`:''}
  </svg>`;
}

// ── FEATURE 8: Breathing Quality Index ──────────────────────────────
function breathingQuality(aqi,hum,temp,code){
  let s=10;
  if(aqi>200)s-=5;else if(aqi>150)s-=4;else if(aqi>100)s-=3;else if(aqi>50)s-=1;
  if(hum>80)s-=2;else if(hum>70)s-=1;
  if(temp>35)s-=2;else if(temp<-5)s-=1;
  if([45,48].includes(code))s-=1;
  if([95,96,99].includes(code))s-=1;
  s=Math.min(10,Math.max(0,Math.round(s)));
  if(s>=8)return{s,l:'Excellent',c:'#5ec97a',tip:'Clean, easy breathing conditions.'};
  if(s>=6)return{s,l:'Good',c:'#aed561',tip:'Good air for most people.'};
  if(s>=4)return{s,l:'Moderate',c:'#f0c040',tip:'Sensitive individuals may notice irritation.'};
  if(s>=2)return{s,l:'Poor',c:'#f08040',tip:'Limit prolonged outdoor exertion.'};
  return{s,l:'Very Poor',c:'#e85555',tip:'Stay indoors. Keep windows closed.'};
}

// ── FEATURE 6: Hydration Reminder Score ─────────────────────────────
function hydrationScore(temp,hum,uv,wind,code){
  // Base: 8 glasses/day. Add extra based on conditions.
  let extra=0;
  if(temp>=30)extra+=3;else if(temp>=25)extra+=2;else if(temp>=20)extra+=1;
  if(hum<30)extra+=2;else if(hum<50)extra+=1;
  if(uv>=8)extra+=2;else if(uv>=5)extra+=1;
  if(wind>30)extra+=1;
  if([95,96,99,80,81,82].includes(code))extra+=1;
  const total=8+extra;
  const c=extra<=0?'#5ec97a':extra<=2?'#f0c040':extra<=4?'#f08040':'#e85555';
  const l=extra<=0?'Normal':'Drink More';
  const tip=extra<=0?`Drink your usual 8 glasses today.`:`Drink ~${total} glasses today. Heat & UV increase fluid loss.`;
  return{extra,total,c,l,tip};
}

// ── FEATURE 10: Cold & Flu Risk ──────────────────────────────────────
function coldFluRisk(temp,hum,wind,code){
  let s=0;
  // Cold temps help viruses survive
  if(temp<5)s+=4;else if(temp<10)s+=3;else if(temp<15)s+=2;else if(temp<20)s+=1;
  // Low humidity = virus stays airborne longer
  if(hum<30)s+=3;else if(hum<50)s+=2;else if(hum<65)s+=1;
  // Wind increases exposure
  if(wind>20)s+=1;
  // Rain/cold combo = people stay indoors in groups
  if([61,63,65,80,81].includes(code))s+=1;
  s=Math.min(10,s);
  if(s<=2)return{s,l:'Low',c:'#5ec97a',tip:'Low virus survival conditions.'};
  if(s<=4)return{s,l:'Moderate',c:'#f0c040',tip:'Wash hands regularly. Ventilate indoors.'};
  if(s<=7)return{s,l:'High',c:'#f08040',tip:'Peak cold & flu weather. Boost immunity.'};
  return{s,l:'Very High',c:'#e85555',tip:'High risk. Avoid crowded indoor spaces.'};
}

// ── FEATURE 15: Lightning Risk (CAPE proxy) ──────────────────────────
function lightningRisk(temp,dew,pressure,code){
  // CAPE proxy: temperature-dewpoint spread and instability
  const spread=temp-dew; // small spread = more moisture = more instability
  let s=0;
  if([95,96,99].includes(code))return{s:10,l:'Active Storm',c:'#e85555',tip:'Lightning active. Stay indoors away from windows.'};
  if([80,81,82].includes(code))s+=3;
  if(spread<5)s+=3;else if(spread<10)s+=2;else if(spread<15)s+=1;
  if(temp>28)s+=2;else if(temp>22)s+=1;
  if(pressure<1005)s+=2;else if(pressure<1010)s+=1;
  s=Math.min(10,s);
  if(s<=2)return{s,l:'Very Low',c:'#5ec97a',tip:'Atmosphere stable. No lightning risk.'};
  if(s<=4)return{s,l:'Low',c:'#aed561',tip:'Minimal instability. Low lightning chance.'};
  if(s<=6)return{s,l:'Moderate',c:'#f0c040',tip:'Some instability. Watch for developing storms.'};
  if(s<=8)return{s,l:'High',c:'#f08040',tip:'Unstable atmosphere. Seek shelter if outdoors.'};
  return{s,l:'Extreme',c:'#e85555',tip:'Severe instability. Stay indoors. Unplug electronics.'};
}

// ── FEATURE 5: Thunderstorm Proximity ───────────────────────────────
function stormProximity(code,pressure,pressTrend,wind,code24){
  const activeNow=[95,96,99].includes(code);
  const approaching=!activeNow&&pressTrend<-1&&wind>15&&code24;
  const possible=!activeNow&&!approaching&&(pressure<1005||[80,81,82].includes(code));
  if(activeNow)return{l:'⚡ Storm Active',c:'#e85555',sub:'Take shelter immediately',show:true};
  if(approaching)return{l:'⚠️ Storm Approaching',c:'#f08040',sub:`Pressure dropping ${Math.abs(pressTrend).toFixed(1)} hPa/hr`,show:true};
  if(possible)return{l:'🌩️ Storm Possible',c:'#f0c040',sub:'Unstable conditions developing',show:true};
  return{l:'Clear',c:'#5ec97a',sub:'No storm threat',show:false};
}

// ── FEATURE 17: Rain Trend ───────────────────────────────────────────
function rainTrend(precipArr){
  if(!precipArr||precipArr.length<4)return{t:'Unknown',icon:'❓',c:'var(--mu)'};
  const vals=precipArr.slice(0,8).map(Number);
  const first=vals.slice(0,4).reduce((a,b)=>a+b,0);
  const second=vals.slice(4,8).reduce((a,b)=>a+b,0);
  const diff=second-first;
  if(vals.every(v=>v===0))return{t:'No Rain Expected',icon:'☀️',c:'#5ec97a'};
  if(diff>1)return{t:'Rain Increasing',icon:'📈',c:'#1a8fd1'};
  if(diff<-1)return{t:'Rain Decreasing',icon:'📉',c:'#aed561'};
  if(first>0||second>0)return{t:'Rain Steady',icon:'〰️',c:'#4db8f0'};
  return{t:'Clearing',icon:'🌤️',c:'#5ec97a'};
}


// ── FEATURE 16: Local City Time ─────────────────────────────────────
function cityTime(tzOffset){
  // Open-Meteo returns utc_offset_seconds in wd.utc_offset_seconds
  const utcMs=Date.now()+(new Date().getTimezoneOffset()*60000);
  const cityMs=utcMs+(tzOffset||0)*1000;
  const d=new Date(cityMs);
  const h=d.getUTCHours()%12||12,m=String(d.getUTCMinutes()).padStart(2,'0'),a=d.getUTCHours()>=12?'PM':'AM';
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return`${days[d.getUTCDay()]} ${h}:${m} ${a}`;
}

// ── FEATURE 11: Twilight Times ───────────────────────────────────────
function twilightTimes(rise,set){
  if(!rise||!set)return null;
  const r=new Date(rise),s=new Date(set);
  const fmt=d=>{const h=d.getHours()%12||12,m=String(d.getMinutes()).padStart(2,'0'),a=d.getHours()>=12?'PM':'AM';return`${h}:${m}${a}`;};
  // Civil: 6° below horizon (~30 min before/after)
  // Nautical: 12° below (~60 min)
  // Astronomical: 18° below (~90 min)
  return{
    astroDawn: fmt(new Date(r.getTime()-90*60000)),
    nautDawn:  fmt(new Date(r.getTime()-60*60000)),
    civilDawn: fmt(new Date(r.getTime()-30*60000)),
    sunrise:   fmt(r),
    sunset:    fmt(s),
    civilDusk: fmt(new Date(s.getTime()+30*60000)),
    nautDusk:  fmt(new Date(s.getTime()+60*60000)),
    astroDusk: fmt(new Date(s.getTime()+90*60000)),
  };
}

// ── FEATURE 6: Shake to Refresh ─────────────────────────────────────
function initShake(){
  if(!window.DeviceMotionEvent)return;
  let last=0,lx=0,ly=0,lz=0;
  const handler=e=>{
    const acc=e.accelerationIncludingGravity||e.acceleration;
    if(!acc)return;
    const now=Date.now();
    if(now-last<100)return;
    last=now;
    const dx=Math.abs((acc.x||0)-lx),dy=Math.abs((acc.y||0)-ly),dz=Math.abs((acc.z||0)-lz);
    lx=acc.x||0;ly=acc.y||0;lz=acc.z||0;
    if(dx+dy+dz>40){
      const hint=document.getElementById('shakeHint');
      if(hint){hint.style.opacity='1';setTimeout(()=>hint.style.opacity='0',1500);}
      doRefresh();
    }
  };
  // iOS 13+ needs permission
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    // Add button to request
    const btn=document.createElement('button');
    btn.className='btn';btn.textContent='📳 Shake';btn.title='Enable shake to refresh';
    btn.onclick=()=>{DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted'){window.addEventListener('devicemotion',handler);btn.remove();}});};
    document.querySelector('.hrow')?.prepend(btn);
  }else{
    window.addEventListener('devicemotion',handler,{passive:true});
  }
}

// ── LOCATION ─────────────────────────────────────────────────────────
async function ipLoc(){
  // Try multiple free IP geolocation providers in sequence
  const providers=[
    async()=>{
      const d=await fT('https://ipapi.co/json/',4000,false);
      if(!d.latitude)throw new Error('no data');
      return{lat:d.latitude,lon:d.longitude,name:`${d.city||d.region||'Unknown'}, ${d.country_code||''}`};
    },
    async()=>{
      const d=await fT('https://ip-api.com/json/?fields=lat,lon,city,countryCode,status',4000,false);
      if(d.status!=='success')throw new Error('no data');
      return{lat:d.lat,lon:d.lon,name:`${d.city||'Unknown'}, ${d.countryCode||''}`};
    },
    async()=>{
      const d=await fT('https://freeipapi.com/api/json',4000,false);
      if(!d.latitude)throw new Error('no data');
      return{lat:d.latitude,lon:d.longitude,name:`${d.cityName||'Unknown'}, ${d.countryCode||''}`};
    }
  ];
  for(const provider of providers){
    try{return await provider();}catch{}
  }
  // Final fallback: load London so the app always shows something useful
  return{lat:51.5074,lon:-0.1278,name:'London, GB (default)'};
}
function gpsLoc(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej(new Error('No GPS'));navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),rej,{timeout:8000,maximumAge:60000});});}

// ── MAIN FETCH ────────────────────────────────────────────────────────
async function doFetch(cityOvr){
  const city=cityOvr||document.getElementById('ci').value.trim();
  setOut('<div class="msg"><div class="spin"></div><br>Detecting your location…</div>');
  document.getElementById('upd').textContent='';
  try{
    let lat,lon,name;
    if(city){
      const geo=await fT(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
      if(!geo.results?.length)throw new Error('City not found. Try another name.');
      lat=geo.results[0].latitude;lon=geo.results[0].longitude;
      name=`${geo.results[0].name}, ${geo.results[0].country_code}`;
    }else{const loc=await ipLoc();lat=loc.lat;lon=loc.lon;name=loc.name;}

    const wurl=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code,apparent_temperature,precipitation,surface_pressure,visibility,dew_point_2m,uv_index,is_day&timeformat=iso8601&hourly=temperature_2m,apparent_temperature,weather_code,precipitation_probability,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,uv_index_max,precipitation_sum&timezone=auto&forecast_days=7&wind_speed_unit=kmh`;
    const aurl=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone&timezone=auto`;

    const wd=await fT(wurl);
    let ad={};try{ad=await fT(aurl);}catch{}

    try{localStorage.setItem('vcache',JSON.stringify({name,lat,wd,ad,ts:Date.now()}));}catch{}
    LD=[name,lat,wd,ad];render(name,lat,wd,ad);
    document.getElementById('upd').textContent=`↻ Updated ${new Date().toLocaleTimeString()}`;
    updStar(name);
  }catch(e){
    try{const c=JSON.parse(localStorage.getItem('vcache')||'{}');if(c.wd){LD=[c.name,c.lat,c.wd,c.ad];render(c.name,c.lat,c.wd,c.ad);document.getElementById('upd').textContent=`Cached · ${c.ts?new Date(c.ts).toLocaleTimeString():"–"}`;return;}}catch{}
    setOut(`<div class="msg">⚠️ ${e.message||'Network error'}<br><small style="opacity:.6">Search a city above.</small><br><br><button onclick="useGPS()" style="margin-top:8px;background:var(--ac);color:#000;border:none;padding:8px 18px;border-radius:20px;font-size:.7rem;cursor:pointer">📍 Use GPS</button></div>`);
  }
}

    const wurl=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code,apparent_temperature,precipitation,surface_pressure,visibility,dew_point_2m,uv_index,is_day&timeformat=iso8601&hourly=temperature_2m,apparent_temperature,weather_code,precipitation_probability,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,uv_index_max,precipitation_sum&timezone=auto&forecast_days=7&wind_speed_unit=kmh`;
    const aurl=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${loc.lat}&longitude=${loc.lon}&current=us_aqi,pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone&timezone=auto`;
    const wd=await fT(wurl);let ad={};try{ad=await fT(aurl);}catch{}
    LD=[name,loc.lat,wd,ad];render(name,loc.lat,wd,ad);
    document.getElementById('upd').textContent=`↻ Updated ${new Date().toLocaleTimeString()}`;
  }catch{setOut('<div class="msg">⚠️ GPS denied. Search a city above.</div>');}
}
function doRefresh(){doFetch(document.getElementById('ci').value.trim()||undefined);}

// ── RENDER ────────────────────────────────────────────────────────────
function render(name,lat,wd,ad){
  const c=wd.current,d=wd.daily,h=wd.hourly,now=new Date();
  setBg(c.weather_code,c.is_day);
  const dateStr=now.toLocaleDateString('en',{weekday:'long',day:'numeric',month:'short'});
  const pressure=Math.round(c.surface_pressure??1013);
  const vis=(Number(c.visibility??10000)/1000).toFixed(1);
  const dew=c.dew_point_2m??0;
  const uv=c.uv_index??0;
  const wdg=windDir(c.wind_direction_10m??0);
  const rise=d.sunrise?.[0],set=d.sunset?.[0];
  const moon=moonPhase();
  const isFav=gF().includes(name);

  // ── NEW FEATURES ──────────────────────────────────────────────────
  // Feature 16: Local city time
  const tzOff=wd.utc_offset_seconds??0;
  const localTime=cityTime(tzOff);

  // Feature 17: Emoji summary
  const emSum=emojiSummary(c.temperature_2m,c.weather_code,c.wind_speed_10m,c.precipitation,aqi,useF);

  // Feature 18: Feels-like badge
  const fb=feelsBadge(c.apparent_temperature);

  // Feature 11: Twilight times
  const tw=twilightTimes(rise,set);

  // Feature 24: Unit-aware speed/pressure/dist/rain
  const windSpd=applyUnits(c.wind_speed_10m,'speed');
  const pressDisp=applyUnits(pressure,'press');
  const visDisp=applyUnits(Number(vis),'dist');
  const rainDisp=applyUnits(c.precipitation,'rain');

  const nI=Math.max(0,h.time.findIndex(t=>new Date(t)>=now));
  const sH=h.time.slice(nI,nI+12),sT=h.temperature_2m.slice(nI,nI+12),sW=h.weather_code.slice(nI,nI+12),sR=(h.precipitation_probability||[]).slice(nI,nI+12),sPR=(h.precipitation||[]).slice(nI,nI+12);

  // AQI
  const aqiOk=ad.current?.us_aqi!=null;
  const aqi=ad.current?.us_aqi??0;
  const pm25=Number(ad.current?.pm2_5??0),pm10=Number(ad.current?.pm10??0);
  const co=(Number(ad.current?.carbon_monoxide??0)/1000).toFixed(2);
  const no2=Number(ad.current?.nitrogen_dioxide??0).toFixed(1);
  const o3=Number(ad.current?.ozone??0).toFixed(1);

  // ── ALLERGY INDEX (weather-based, always works) ──────────────────
  const alg=allergyIndex(c.temperature_2m,c.relative_humidity_2m,c.wind_speed_10m,c.weather_code,dew);

  // Smart scores
  const cloudPct=[0,1].includes(c.weather_code)?5:[2].includes(c.weather_code)?35:70;
  const sgScore=Math.max(0,10-Math.round(cloudPct/10)-Math.round(moon.pct/20));
  const heatHI=c.temperature_2m+(0.33*c.relative_humidity_2m*.06105*Math.exp(17.27*c.temperature_2m/(237.7+c.temperature_2m)))-4;
  const heatRisk=Math.min(10,Math.max(0,Math.round((heatHI-25)*.3+uv*.2)));
  const heatLbl=heatRisk<=2?'Low':heatRisk<=5?'Moderate':heatRisk<=7?'High':'Extreme';
  const heatC=heatRisk<=2?'#5ec97a':heatRisk<=5?'#f0c040':heatRisk<=7?'#f08040':'#e85555';
  const nightT=d.temperature_2m_min?.[0]??c.temperature_2m;
  const sleepRaw=10-Math.abs(nightT-17)*.4-Math.abs(c.relative_humidity_2m-50)*.05;
  const sleepScore=Math.min(10,Math.max(0,Math.round(sleepRaw)));
  const sleepLbl=sleepScore>=8?'Excellent':sleepScore>=6?'Good':sleepScore>=4?'Fair':'Poor';
  const artS=Math.min(10,Math.max(0,Math.round((1015-pressure)*.05+(20-c.temperature_2m)*.15)));
  const artLbl=artS<=2?'Low':artS<=5?'Moderate':artS<=7?'High':'Severe';
  const rainP=sR[0]??0;
  const actS=Math.min(10,Math.max(0,Math.round(10-(c.temperature_2m>32?3:0)-(c.wind_speed_10m>40?3:0)-(rainP>50?4:0)-(uv>8?2:0))));
  const actLbl=actS>=8?'Ideal':actS>=6?'Good':actS>=4?'Fair':'Poor';
  const migraineP=pressure<1000||(pressure<1010&&c.weather_code>=61);
  const frostWarn=nightT<3&&dew<4;
  const umbrellaP=(sR.length>0?Math.max(...sR.slice(0,6).map(Number)):-1)>50;
  const laundry=c.wind_speed_10m>8&&c.relative_humidity_2m<70&&[0,1,2].includes(c.weather_code);
  const bestI=d.temperature_2m_max.reduce((bi,v,i)=>(v<32&&(d.precipitation_probability_max?.[i]??0)<20&&v>d.temperature_2m_max[bi])?i:bi,0);
  const anom=Math.round(c.temperature_2m-(lat>0?lat*.2-5:-(lat*.2)-5));
  const anomTxt=anom>2?`+${anom}° above avg`:anom<-2?`${anom}° below avg`:'Near avg';


  // ── NEW FEATURES ────────────────────────────────────────────────
  // Feature 3 & 16: Sparklines (24h feels-like + temperature)
  const fullFL=h.apparent_temperature?h.apparent_temperature.slice(nI,nI+24):h.temperature_2m.slice(nI,nI+24);
  const fullT24=h.temperature_2m.slice(nI,nI+24);
  const sparkFL=sparklineSVG(fullFL,'#4db8f0');
  const sparkT=sparklineSVG(fullT24,'#f08040');

  // Feature 8: Breathing Quality
  const bq=breathingQuality(aqi,c.relative_humidity_2m,c.temperature_2m,c.weather_code);

  // Feature 10: Cold & Flu Risk
  const flu=coldFluRisk(c.temperature_2m,c.relative_humidity_2m,c.wind_speed_10m,c.weather_code);
  // Feature 6: Hydration Score
  const hydro=hydrationScore(c.temperature_2m,c.relative_humidity_2m,uv,c.wind_speed_10m,c.weather_code);

  // Feature 15: Lightning Risk
  const ltng=lightningRisk(c.temperature_2m,dew,pressure,c.weather_code);

  // Feature 5: Storm Proximity (estimate pressure trend from daily)
  const pressTrend=(d.surface_pressure_max&&d.surface_pressure_min)?(d.surface_pressure_min[0]-d.surface_pressure_max[0])/12:-0.5;
  const tmrwCode=d.weather_code?.[1]??0;
  const storm=stormProximity(c.weather_code,pressure,pressTrend,c.wind_speed_10m,[80,82,95,96,99].includes(tmrwCode));

  // Feature 17: Rain Trend
  const rtnd=rainTrend(h.precipitation||[]);

  // Hourly
  function rainBar(p,mm){const w=Math.min(100,Math.max(0,Number(p)||0)),c=w<20?'#6b75a8':w<50?'#4db8f0':w<75?'#1a8fd1':'#0d5fa8';return`<div style="height:3px;border-radius:2px;background:var(--s3);margin-top:4px;overflow:hidden"><div style="width:${w}%;height:100%;background:${c};border-radius:2px"></div></div>`;}
  const hourlyH=sH.map((t,i)=>{const prob=Number(sR[i]??0),mm=Number(sPR[i]??0).toFixed(1)*1,mc=mm>0?'#4db8f0':'var(--mu)';return`<div class="hc"><div class="ht">${hlabel(t)}</div><div class="hi">${WI[sW[i]]||'🌡️'}</div><div class="hte">${tS(sT[i])}</div><div class="hr" style="color:${prob>50?'#4db8f0':'var(--mu)'}">💧${Math.round(prob)}%</div><div style="font-size:.68rem;color:${mc};font-weight:700">${mm>0?mm+'mm':'–'}</div>${rainBar(prob,mm)}</div>`;}).join('');

  // 7-day
  const fcH=d.time.map((t,i)=>{const prob=Number(d.precipitation_probability_max?.[i]??0),mm=Number(d.precipitation_sum?.[i]??0).toFixed(1)*1,rc=prob<20?'#6b75a8':prob<50?'#4db8f0':prob<75?'#1a8fd1':'#0d5fa8',mc=mm>0?'#4db8f0':'var(--mu)';return`<div class="fi"${i===bestI?' style="border:1px solid var(--gn)"':''}><div class="fd">${dlabel(t,i)}${i===bestI?' ⭐':''}</div><div class="fic">${WI[d.weather_code[i]]||'🌡️'}</div><div style="flex:1;padding:0 6px"><div style="font-size:.74rem;color:${rc};font-weight:700">💧${Math.round(prob)}%</div><div style="font-size:.7rem;color:${mc}">${mm>0?mm+' mm':'No rain'}</div><div style="height:3px;border-radius:2px;background:var(--s3);margin-top:3px;overflow:hidden"><div style="width:${prob}%;height:100%;background:${rc};border-radius:2px"></div></div></div><div class="frng"><span class="fhi">${tS(d.temperature_2m_max[i])}</span><span class="flo">${tS(d.temperature_2m_min[i])}</span></div></div>`;}).join('');

  // Tip
  const tipT=alg.score>=7?{t:`🌿 ${alg.label} Allergy Risk`,m:alg.tip}:aqiOk&&aqi>150?{t:'😷 Poor Air Quality',m:'Limit outdoor exposure. Consider a mask outside.'}:uv>=8?{t:'🕶️ High UV Alert',m:'SPF 50+, hat & sunglasses. Seek shade midday.'}:migraineP?{t:'🧠 Migraine Alert',m:'Pressure drop detected. Hydrate and rest if prone to migraines.'}:frostWarn?{t:'❄️ Frost Warning',m:'Windshield may freeze overnight. Cover your car.'}:umbrellaP?{t:'☂️ Bring an Umbrella',m:'Rain likely in the next 6 hours.'}:{t:'✅ Good Conditions',m:'Enjoy the day! Air quality and conditions look favourable.'};

  setOut(`
    <div class="card hero" style="animation-delay:0s">
      <div class="cname">${name}<button class="star${isFav?' on':''}" id="starbtn" onclick="togFav('${esc(name)}')">${isFav?'⭐':'☆'}</button></div>
      <div class="dline">${dateStr} · ${c.is_day?'☀️ Day':'🌙 Night'}</div>
      <div class="ltime">🕐 Local Time: ${localTime}</div>
      <div class="tbig" style="margin-top:8px">${useF?C2F(c.temperature_2m):Math.round(c.temperature_2m)}<sup>${useF?'°F':'°C'}</sup></div>
      <div class="cond">${WI[c.weather_code]||'🌡️'} ${WD[c.weather_code]||''} · Feels ${tF(c.apparent_temperature)}</div>
      <div style="display:flex;justify-content:center"><div class="flbadge" style="color:${fb.c};border-color:${fb.c}44">${fb.ico} ${fb.l}</div></div>
      <div class="emojisummary" style="margin-top:10px">${emSum}</div>
      <div class="srow3" style="margin-top:12px">
        <div class="st"><div class="sv">${c.relative_humidity_2m}%</div><div class="sk">Humidity</div></div>
        <div class="st"><div class="sv">${windSpd}</div><div class="sk">Wind</div></div>
        <div class="st"><div class="sv">${rainDisp}</div><div class="sk">Rain</div></div>
      </div>
    </div>

    <div class="card" style="animation-delay:.05s">
      <div class="slbl">Sun, UV & Moon</div>
      <div class="sunrow">
        <div class="sc"><div class="sico">🌅</div><div class="sv2">${fmtTime(rise)}</div><div class="sk2">Sunrise</div></div>
        <div class="sc"><div class="sico">🌇</div><div class="sv2">${fmtTime(set)}</div><div class="sk2">Sunset</div></div>
        <div class="sc"><div class="sico">🔆</div><div class="sv2">${uv.toFixed(1)} <span style="font-size:.72rem;opacity:.8">${uvLbl(uv)}</span></div><div class="sk2">UV Index</div><div class="uvt"><div class="uvf" style="width:${100-Math.min(100,uv/11*100)}%"></div></div></div>
        <div class="sc"><div class="sico">${moon.n.split(' ')[0]}</div><div class="sv2">${moon.pct}%</div><div class="sk2">${moon.n.split(' ').slice(1).join(' ')}</div></div>
      </div>
    </div>

    ${tw?`<div class="card" style="animation-delay:.08s">
      <div class="slbl">🌅 Twilight Stages</div>
      <div class="twrow">
        <div class="twc"><div class="twico">🌌</div><div class="twv">${tw.astroDawn}</div><div class="twk">Astro Dawn</div></div>
        <div class="twc"><div class="twico">🌃</div><div class="twv">${tw.nautDawn}</div><div class="twk">Nautical Dawn</div></div>
        <div class="twc"><div class="twico">🌆</div><div class="twv">${tw.civilDawn}</div><div class="twk">Civil Dawn</div></div>
        <div class="twc"><div class="twico">☀️</div><div class="twv">${tw.sunrise}</div><div class="twk">Sunrise</div></div>
      </div>
      <div class="twrow" style="margin-top:7px">
        <div class="twc"><div class="twico">🌇</div><div class="twv">${tw.sunset}</div><div class="twk">Sunset</div></div>
        <div class="twc"><div class="twico">🌆</div><div class="twv">${tw.civilDusk}</div><div class="twk">Civil Dusk</div></div>
        <div class="twc"><div class="twico">🌃</div><div class="twv">${tw.nautDusk}</div><div class="twk">Nautical Dusk</div></div>
        <div class="twc"><div class="twico">🌌</div><div class="twv">${tw.astroDusk}</div><div class="twk">Astro Dusk</div></div>
      </div>
    </div>`:''}

    <div class="card" style="animation-delay:.09s">
      <div class="slbl">Atmospheric Details</div>
      <div class="mgrid">
        <div class="met"><div class="mv">${visDisp}</div><div class="mk">Visibility</div></div>
        <div class="met"><div class="mv">${tF(dew)}</div><div class="mk">Dew Point</div></div>
        <div class="met"><div class="mv">${pressDisp}</div><div class="mk">Pressure</div></div>
        <div class="met"><div class="mv">${wdg} ${c.wind_direction_10m??0}°</div><div class="mk">Wind Dir.</div></div>
        <div class="met"><div class="mv">${anomTxt}</div><div class="mk">Temp Anomaly</div></div>
      </div>
    </div>


    <div class="card" style="animation-delay:.11s">
      <div class="slbl">📈 24h Temperature Trend</div>
      <div class="spark-wrap" style="margin:0 -4px">
        <div style="display:flex;justify-content:space-between;font-size:.74rem;color:var(--mu);margin-bottom:6px"><span>Temperature</span><span style="color:#f08040;font-weight:700">Now → +24h</span></div>
        ${sparkT}
        <div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:.74rem;color:var(--mu);margin-bottom:6px"><span>Feels Like</span><span style="color:#4db8f0;font-weight:700">Now → +24h</span></div>
          ${sparkFL}
        </div>
      </div>
      <div class="rtrend" style="margin-top:10px;border-top:1px solid var(--bd);padding-top:8px">
        <span style="font-size:1.1rem">${rtnd.icon}</span>
        <span style="color:${rtnd.c}">${rtnd.t}</span>
        ${rtnd.t!=='No Rain Expected'&&rtnd.t!=='Unknown'?`<span style="font-size:.6rem;color:var(--mu);margin-left:auto">next 8h</span>`:''}
      </div>
    </div>

    <div class="alg-card" style="animation-delay:.12s">
      <div class="slbl">🌿 Allergy Index</div>
      <div class="alg-top">
        <div>
          <div class="alg-num" style="color:${alg.color}">${alg.label}</div>
          <div class="alg-lbl" style="color:${alg.color}">${alg.sub}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:2.4rem;font-weight:800;color:${alg.color}">${alg.score}<span style="font-size:1.2rem;opacity:.5">/10</span></div>
        </div>
      </div>
      <div class="alg-bar"></div>
      <div class="alg-cur-wrap"><div class="alg-cur" style="left:${alg.pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--mu);margin-top:2px"><span>Very Low</span><span>Moderate</span><span>Extreme</span></div>
      <div class="pgrid">
        <div class="pg"><div class="pv" style="color:${c.relative_humidity_2m<50?'#f08040':'#5ec97a'}">${c.relative_humidity_2m}%</div><div class="pk">Humidity</div></div>
        <div class="pg"><div class="pv" style="color:${c.wind_speed_10m>10&&c.wind_speed_10m<30?'#f08040':'#5ec97a'}">${Math.round(c.wind_speed_10m)} km/h</div><div class="pk">Wind</div></div>
        <div class="pg"><div class="pv" style="color:${c.temperature_2m>10&&c.temperature_2m<30?'#f08040':'#5ec97a'}">${tF(c.temperature_2m)}</div><div class="pk">Temp</div></div>
        <div class="pg"><div class="pv" style="color:${[0,1].includes(c.weather_code)?'#f08040':'#5ec97a'}">${WI[c.weather_code]||'🌡️'} ${[0,1].includes(c.weather_code)?'High':'Lower'}</div><div class="pk">Sun Exposure</div></div>
        <div class="pg"><div class="pv" style="color:${dew<5?'#f08040':'#5ec97a'}">${tF(dew)}</div><div class="pk">Dew Point</div></div>
        <div class="pg"><div class="pv" style="color:${alg.color}">${alg.label}</div><div class="pk">Overall Risk</div></div>
      </div>
      <div class="pest">⚠️ ${alg.tip}</div>
    </div>

    <div class="tip" style="animation-delay:.15s"><strong>${tipT.t}</strong>${tipT.m}</div>

    ${aqiOk?`<div class="card" style="animation-delay:.18s">

        <div class="poll"><div class="pollv">${pressure}</div><div class="pollk">hPa</div></div>

        <div class="tile"><div style="font-size:1.1rem">🌡️</div><div class="tval" style="color:${heatC}">${heatLbl}</div><div class="tlbl">Heat Stroke Risk</div>${bar(heatRisk*10,heatC)}</div>
        <div class="tile"><div style="font-size:1.1rem">🦴</div><div class="tval" style="color:${artS<=2?'#5ec97a':artS<=5?'#f0c040':'#e85555'}">${artLbl}</div><div class="tlbl">Arthritis Index</div>${bar(artS*10,artS<=2?'#5ec97a':artS<=5?'#f0c040':'#e85555')}</div>
        <div class="tile"><div style="font-size:1.1rem">🏃</div><div class="tval" style="color:${actS>=8?'#5ec97a':actS>=5?'#f0c040':'#e85555'}">${actLbl}</div><div class="tlbl">Activity Score</div>${bar(actS*10,actS>=8?'#5ec97a':actS>=5?'#f0c040':'#e85555')}</div>
        <div class="tile"><div style="font-size:1.1rem">🔭</div><div class="tval" style="color:${sgScore>=7?'#5ec97a':sgScore>=4?'#f0c040':'#e85555'}">${sgScore}/10</div><div class="tlbl">Stargazing</div>${bar(sgScore*10,sgScore>=7?'#5ec97a':sgScore>=4?'#f0c040':'#e85555')}</div>
        <div class="tile"><div style="font-size:1.1rem">👕</div><div class="tval" style="color:${laundry?'#5ec97a':'#e85555'}">${laundry?'Good':'Poor'}</div><div class="tlbl">Laundry Drying</div>${bar(laundry?80:20,laundry?'#5ec97a':'#e85555')}</div>
        <div class="tile"><div style="font-size:1.1rem">❄️</div><div class="tval" style="color:${frostWarn?'#4db8f0':'#5ec97a'}">${frostWarn?'Warning':'Clear'}</div><div class="tlbl">Frost / Windshield</div>${bar(frostWarn?90:10,frostWarn?'#4db8f0':'#5ec97a')}</div>
        <div class="tile"><div style="font-size:1.1rem">🧠</div><div class="tval" style="color:${migraineP?'#e85555':'#5ec97a'}">${migraineP?'Risk':'Low Risk'}</div><div class="tlbl">Migraine Trigger</div>${bar(migraineP?80:15,migraineP?'#e85555':'#5ec97a')}</div>
        <div class="tile"><div style="font-size:1.1rem">☂️</div><div class="tval" style="color:${umbrellaP?'#4db8f0':'#5ec97a'}">${umbrellaP?'Yes':'No'}</div><div class="tlbl">Umbrella Needed</div>${bar(umbrellaP?90:10,umbrellaP?'#4db8f0':'#5ec97a')}</div>

        <div class="tile"><div style="font-size:1.1rem">🫁</div><div class="tval" style="color:${bq.c}">${bq.l}</div><div class="tlbl">Breathing Quality</div>${bar(bq.s*10,bq.c)}</div>
        <div class="tile"><div style="font-size:1.1rem">🤧</div><div class="tval" style="color:${flu.c}">${flu.l}</div><div class="tlbl">Cold & Flu Risk</div>${bar(flu.s*10,flu.c)}</div>
        <div class="tile"><div style="font-size:1.1rem">💧</div><div class="tval" style="color:${hydro.c}">${hydro.total} glasses</div><div class="tlbl">Hydration Today${hydro.extra>0?' +'+hydro.extra:''}</div>${bar(Math.min(100,(hydro.total/16)*100),hydro.c)}</div>
        <div class="tile"><div style="font-size:1.1rem">⚡</div><div class="tval" style="color:${ltng.c}">${ltng.l}</div><div class="tlbl">Lightning Risk</div>${bar(ltng.s*10,ltng.c)}</div>
        ${storm.show?`<div class="tile"><div style="font-size:1.1rem">🌩️</div><div class="tval" style="color:${storm.c}">${storm.l}</div><div class="tlbl">${storm.sub}</div>${bar(storm.l.includes('Active')?100:storm.l.includes('Approaching')?70:40,storm.c)}</div>`:''}

        <div class="tile"><div style="font-size:1.1rem">🌌</div><div class="tval" style="color:${lat>50||lat<-50?'#f0c040':'var(--mu)'}">${lat>55||lat<-55?'Possible':lat>45||lat<-45?'Low':'Unlikely'}</div><div class="tlbl">Aurora Probability</div>${bar(lat>55||lat<-55?60:lat>45||lat<-45?25:5,'#4db8f0')}</div>
      </div>
    </div>


    <div class="card" style="animation-delay:.27s">
      <div class="slbl">Hourly · Next 12h</div>
      <div class="hscroll">${hourlyH}</div>
    </div>

    <div class="card" style="animation-delay:.3s">
      <div class="slbl">7-Day Forecast · ⭐ Best Day</div>
      <div class="flist">${fcH}</div>
    </div>
  `);
}
function setOut(h){document.getElementById('out').innerHTML=h;}

// ── SERVICE WORKER ───────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    fetch('./sw.js',{method:'HEAD'}).then(r=>{
      if(!r.ok)return;
      navigator.serviceWorker.register('./sw.js').then(reg=>{
        // Notify user when new version is available
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              const b=document.createElement('button');
              b.textContent='🔄 Update available — tap to reload';
              b.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--ac);color:#000;border:none;padding:10px 18px;border-radius:20px;font-size:.72rem;font-weight:700;cursor:pointer;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.4)';
              b.onclick=()=>window.location.reload();
              document.body.appendChild(b);
            }
          });
        });
      }).catch(()=>{});
    }).catch(()=>{});
  });
  // Install prompt (Add to Home Screen)
  let dp=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();dp=e;
    const b=document.createElement('button');
    b.className='btn';b.textContent='📲 Install';
    b.style.cssText='background:#5ec97a;color:#000;border-color:#5ec97a';
    b.onclick=()=>{dp.prompt();dp.userChoice.then(()=>{dp=null;b.remove();});};
    document.querySelector('.hrow').prepend(b);
  });
}

initShake();
initBattery();
// Sync imperial button state
if(useImperial)document.getElementById('impbtn')?.classList.add('uon');
doFetch();
</script>
