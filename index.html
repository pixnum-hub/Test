<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA MEGA PRO Vastu Compass 2026</title>
<style>
:root{
  --bg-color:#121212; --text-color:#fff; --accent-color:#00ffcc; --highlight-color:#ffcc00;
}
[data-theme="light"]{
  --bg-color:#f0f0f0; --text-color:#121212; --accent-color:#0077cc; --highlight-color:#ff6600;
}
[data-theme="oled"]{
  --bg-color:#000; --text-color:#00ffcc; --accent-color:#00ffcc; --highlight-color:#ffcc00;
}
html,body{
  margin:0; padding:0; height:100%;
  display:flex; flex-direction:column;
  font-family:Arial,sans-serif; background:var(--bg-color); color:var(--text-color);
}
body{
  justify-content:center; align-items:center;
}
.app-wrapper{
  display:flex; flex-direction:column; flex:1; width:100%; max-width:480px; height:100%;
  justify-content:center; align-items:center;
  padding:10px;
}
.direction{font-size:1.5rem; font-weight:bold; margin-bottom:5px; backdrop-filter:blur(5px);}
.degree-display{font-size:1rem; margin-bottom:5px;}
.vastu-suggestion{font-size:1rem; margin-bottom:15px; max-width:300px; backdrop-filter:blur(5px);}
.theme-toggle{
  margin:10px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
}
/* 🔹 Buttons: dark green hue with gradient and hover effect */
.theme-toggle button{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: linear-gradient(to bottom, #00cc66, #007a3d); /* dark green gradient */
  color:#fff;
  font-weight:bold;
  backdrop-filter:blur(5px);
  transition: transform 0.1s, background 0.2s;
}
.theme-toggle button:hover{
  background: linear-gradient(to bottom, #00e680, #00994d); /* slightly lighter green on hover */
  transform: scale(1.05);
}
.room-select{
  margin:10px; padding:8px; border-radius:8px; background:rgba(255,255,255,0.1); color:var(--text-color); border:none; font-weight:bold;
}
footer{padding:15px; font-size:0.9rem; text-align:center;}
/* 🔹 Compass: smaller frame, permanently black background */
.compass-container{
  width:85%; max-width:400px; aspect-ratio:1/1;
  display:flex; justify-content:center; align-items:center;
  border-radius:50%; border:3px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(15px); position:relative;
  background:#000;
}
.needle{
  width:6px; height:60%;
  background:linear-gradient(to top,#ffcc00,#ff6600);
  position:absolute; top:50%; left:50%; transform-origin:bottom center;
  transform:translate(-50%,-100%) rotate(0deg); border-radius:3px;
  transition: transform 0.1s linear;
}
.zone-label{position:absolute; font-size:0.8rem; font-weight:bold; color:var(--text-color); transform:translate(-50%,-50%);}
@media(max-width:500px){.needle{height:90px;}}
</style>
</head>
<body>

<div class="app-wrapper">
  <div class="direction" id="direction">N</div>
  <div class="degree-display" id="degree">0°</div>
  <div class="vastu-suggestion" id="suggestion">Align your home according to Vastu.</div>
  
  <div class="compass-container" id="compass">
    <div class="needle" id="needle"></div>
    <div class="zone-label" style="top:10%; left:50%;">N</div>
    <div class="zone-label" style="top:30%; left:80%;">NE</div>
    <div class="zone-label" style="top:50%; left:90%;">E</div>
    <div class="zone-label" style="top:70%; left:80%;">SE</div>
    <div class="zone-label" style="top:90%; left:50%;">S</div>
    <div class="zone-label" style="top:70%; left:20%;">SW</div>
    <div class="zone-label" style="top:50%; left:10%;">W</div>
    <div class="zone-label" style="top:30%; left:20%;">NW</div>
  </div>

  <select id="roomSelect" class="room-select">
    <option value="Bedroom">Bedroom</option>
    <option value="Kitchen">Kitchen</option>
    <option value="Living Room">Living Room</option>
    <option value="Office">Office/Study</option>
    <option value="Puja Room">Puja Room</option>
  </select>

  <div class="theme-toggle">
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('oled')">OLED</button>
    <button onclick="generateVastuPDF()">PDF Report</button>
    <button onclick="exportHistory()">Export CSV</button>
    <button onclick="alert('AR Overlay Coming Soon')">AR Overlay</button>
  </div>
</div>

<footer>© Manik Roy <span id="year"></span>. All Rights Reserved.</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();
function setTheme(theme){ document.documentElement.setAttribute('data-theme',theme); }

const needle=document.getElementById('needle');
const directionText=document.getElementById('direction');
const degreeText=document.getElementById('degree');
const suggestionText=document.getElementById('suggestion');
const roomSelect=document.getElementById('roomSelect');
const compass=document.getElementById('compass');

const vastuZones=[
  {dir:'N', text:'Wealth, Career – Safe, study, cash locker', start:337.5, end:22.5},
  {dir:'NE', text:'Puja / Meditation / Spiritual activities', start:22.5, end:67.5},
  {dir:'E', text:'Living room, windows, social interactions', start:67.5, end:112.5},
  {dir:'SE', text:'Kitchen / Fire-related items', start:112.5, end:157.5},
  {dir:'S', text:'Stability, master bedroom', start:157.5, end:202.5},
  {dir:'SW', text:'Heavy furniture, bedroom for elders', start:202.5, end:247.5},
  {dir:'W', text:'Children’s room, study, entertainment', start:247.5, end:292.5},
  {dir:'NW', text:'Guest room, storage', start:292.5, end:337.5}
];

let currentAngle=0,targetAngle=0;
let historyLog=[];

function getZone(angle){
  for(let z of vastuZones){
    if(z.start>z.end){ if(angle>=z.start||angle<z.end) return z; }
    else{ if(angle>=z.start && angle<z.end) return z; }
  }
  return vastuZones[0];
}

function animateNeedle(){
  let diff = targetAngle - currentAngle;
  if(diff > 180) diff -= 360; 
  if(diff < -180) diff += 360;
  currentAngle += diff * 0.1;
  needle.style.transform = `translate(-50%,-100%) rotate(${currentAngle}deg)`;

  const zone = getZone(currentAngle);
  directionText.textContent = zone.dir;
  degreeText.textContent = Math.round(currentAngle)+'°';
  suggestionText.textContent = `${zone.text} (${roomSelect.value})`;

  historyLog.push({date:new Date().toLocaleString(), room:roomSelect.value, dir:zone.dir, degree:Math.round(currentAngle)});

  compass.style.background = "#000"; // permanently black

  requestAnimationFrame(animateNeedle);
}
animateNeedle();

if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation', event=>{
    let heading = event.alpha;
    if(typeof event.webkitCompassHeading!=="undefined") heading=event.webkitCompassHeading;
    if(heading!==null){ targetAngle=360-heading; }
  }, true);
}else{ alert("Device orientation not supported."); }

if("Notification" in window){
  Notification.requestPermission().then(p=>{
    if(p==="granted"){ setInterval(()=>{ new Notification("Vastu Reminder",{body:"Check your home’s Vastu alignment today!"}); },24*60*60*1000);}
  });
}

function generateVastuPDF(){
  if(!window.jspdf){ alert("PDF library not loaded!"); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF();
  doc.setFontSize(16); doc.text("Vastu Compass Report",20,20);
  historyLog.forEach((h,i)=>{ doc.setFontSize(12); doc.text(`${h.date} | Room: ${h.room} | Dir: ${h.dir} | Deg: ${h.degree}`,20,30+i*10); });
  doc.save("Vastu_Report.pdf");
}

function exportHistory(){
  let csv="Date,Room,Direction,Degree\n";
  historyLog.forEach(h=>{ csv+="\ufeff"+`${h.date},${h.room},${h.dir},${h.degree}\n`; });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement('a'); link.href=URL.createObjectURL(blob);
  link.download="Vastu_History.csv"; link.click();
}

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(console.error); }
</script>
</body>
  </html>
