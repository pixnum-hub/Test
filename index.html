<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLIGHTDECK — Live Air Traffic</title>
<style>
:root{
  --bg:#0A0E15; --panel:#121826; --panel2:#0D1220; --line:#232C3D;
  --text:#E7ECF3; --sub:#8B97AC; --accent:#FFA630; --accent2:#5B8DEF;
  --climb:#4ADE80; --descent:#F87171; --level:#5B8DEF; --ground:#6B7686;
  --radius:10px; --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
[data-theme="light"]{
  --bg:#F3F5F9; --panel:#FFFFFF; --panel2:#EDF1F7; --line:#DDE3ED;
  --text:#141B29; --sub:#5B6577; --accent:#C4620A; --accent2:#2563EB;
  --climb:#16A34A; --descent:#DC2626; --level:#2563EB; --ground:#8A93A3;
}
[data-theme="oled"]{
  --bg:#000000; --panel:#000000; --panel2:#0A0A0A; --line:#1B1B1B;
  --text:#F2F2F2; --sub:#8A8A8A; --accent:#FFB03A; --accent2:#63A4FF;
  --climb:#42E28C; --descent:#FF6B6B; --level:#63A4FF; --ground:#5C5C5C;
}
[data-theme="hc"]{
  --bg:#000000; --panel:#000000; --panel2:#000000; --line:#FFFFFF;
  --text:#FFFFFF; --sub:#FFFFFF; --accent:#FFFF00; --accent2:#00FFFF;
  --climb:#00FF66; --descent:#FF3333; --level:#00FFFF; --ground:#FFFFFF;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;}
body{min-height:100vh;display:flex;flex-direction:column;}
a{color:inherit;}
button,select{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:720px;margin:0 auto;width:100%;}

header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700;letter-spacing:2px;font-size:15px;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--climb);box-shadow:0 0 8px var(--climb);
  animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.clock{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--sub);letter-spacing:1px;}
.theme-btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);width:34px;height:34px;
  border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}

.sweep{position:relative;height:2px;background:var(--line);overflow:hidden;}
.sweep::after{content:'';position:absolute;top:0;left:-30%;width:30%;height:100%;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:sweep 2.4s linear infinite;}
@keyframes sweep{0%{left:-30%;}100%{left:100%;}}
@media (prefers-reduced-motion:reduce){.sweep::after,.brand .dot{animation:none;}}

.controls{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;align-items:center;}
.controls button, .controls select{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;}
.controls button:active{transform:translateY(1px);}
#status{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--sub);text-align:right;}

main.strips{flex:1;padding:0 12px 12px;overflow-y:auto;}
.empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:14px;}
.strip{display:grid;grid-template-columns:5px 1fr auto;gap:0;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;
  animation:fadein .35s ease both;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.strip .tab{background:var(--phase-color,var(--level));}
.strip .main{padding:10px 12px;min-width:0;}
.strip .call{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:1px;}
.strip .country{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strip .data{display:flex;flex-direction:column;justify-content:center;gap:2px;padding:10px 12px;
  border-left:1px solid var(--line);font-family:var(--mono);font-size:11px;text-align:right;min-width:96px;}
.strip .data b{font-size:13px;color:var(--text);font-weight:700;}
.strip .data span{color:var(--sub);}

footer{border-top:1px solid var(--line);padding:16px 12px 20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:6px;font-size:12px;color:var(--sub);}
footer .themes{display:flex;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:1px;}
footer .themes span{opacity:.55;}

@media (max-width:420px){
  .brand span{font-size:13px;}
  .strip .data{min-width:82px;font-size:10px;}
  .strip .call{font-size:14px;}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="dot"></span> ✈ <span>FLIGHTDECK</span></div>
    <div class="clock" id="clock">--:--:-- UTC</div>
    <button class="theme-btn" id="themeBtn" aria-label="Change theme" title="Change theme">◐</button>
  </header>
  <div class="sweep"></div>
  <div class="controls">
    <button id="nearBtn">📍 Near me</button>
    <select id="regionSel" aria-label="Region">
      <option value="">Region…</option>
    </select>
    <span id="status">Loading…</span>
  </div>
  <main class="strips" id="strips"><div class="empty">Choose a region or use “Near me” to load live flights.</div></main>
  <footer>
    <div>© Manik Roy <span id="year"></span>. All Rights Reserved.</div>
    <div class="themes" id="themeLabel"><span>Data: OpenSky Network (no key)</span></div>
  </footer>
</div>

<script>
const REGIONS = {
  "North America": [15,-170,72,-50],
  "Europe": [35,-25,60,40],
  "East Asia": [18,100,46,146],
  "South Asia": [5,65,35,92],
  "Middle East": [12,34,42,63],
  "Australia": [-44,112,-10,154],
  "South America": [-56,-82,13,-34],
  "Global (busy)": [24,-10,60,40]
};
const sel = document.getElementById('regionSel');
Object.keys(REGIONS).forEach(k=>{
  const o=document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o);
});

document.getElementById('year').textContent = new Date().getFullYear();

// ---- theme cycle ----
const THEMES = ['dark','light','oled','hc'];
const NAMES = {dark:'Dark',light:'Light',oled:'OLED Black',hc:'High Contrast'};
let themeIdx = 0;
const root = document.documentElement;
const themeLabel = document.getElementById('themeLabel');
function applyTheme(){
  root.setAttribute('data-theme', THEMES[themeIdx]);
  themeLabel.querySelector('span').textContent = 'Theme: ' + NAMES[THEMES[themeIdx]];
}
document.getElementById('themeBtn').addEventListener('click', ()=>{
  themeIdx = (themeIdx+1) % THEMES.length; applyTheme();
});
applyTheme();

// ---- clock ----
function tick(){
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toISOString().substr(11,8) + ' UTC';
}
tick(); setInterval(tick,1000);

// ---- flight data ----
const statusEl = document.getElementById('status');
const stripsEl = document.getElementById('strips');
let refreshTimer = null;
let lastBox = null;

async function loadBox(box){
  lastBox = box;
  const [lamin,lomin,lamax,lomax] = box;
  statusEl.textContent = 'Loading…';
  try{
    const url = `https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    render(data.states || []);
    statusEl.textContent = (data.states? data.states.length : 0) + ' aircraft · updated ' +
      new Date().toLocaleTimeString();
  }catch(err){
    statusEl.textContent = 'Unavailable — retrying…';
  }
  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(()=>loadBox(box), 20000);
}

function phase(vr){
  if(vr === null) return {c:'level',l:'LVL'};
  if(vr > 1) return {c:'climb',l:'CLB'};
  if(vr < -1) return {c:'descent',l:'DSC'};
  return {c:'level',l:'LVL'};
}

function render(states){
  stripsEl.innerHTML = '';
  const flying = states.filter(s=>!s[8] && s[5]!=null && s[6]!=null)
    .sort((a,b)=>(b[9]||0)-(a[9]||0)).slice(0,60);
  if(flying.length === 0){
    stripsEl.innerHTML = '<div class="empty">No airborne traffic found in this area right now.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  flying.forEach(s=>{
    const [icao24,callsign,country,,,lon,lat,baroAlt,,velocity,track,vrate] = s;
    const ph = phase(vrate);
    const altFt = baroAlt!=null ? Math.round(baroAlt*3.28084).toLocaleString() : '—';
    const spdKt = velocity!=null ? Math.round(velocity*1.94384) : '—';
    const hdg = track!=null ? Math.round(track)+'°' : '—';
    const el = document.createElement('div');
    el.className = 'strip';
    el.innerHTML = `
      <div class="tab" style="--phase-color:var(--${ph.c})"></div>
      <div class="main">
        <div class="call">${(callsign||icao24||'—').trim()||'—'}</div>
        <div class="country">${country||'Unknown origin'}</div>
      </div>
      <div class="data">
        <span>ALT · <b>${altFt}</b> ft</span>
        <span>SPD · <b>${spdKt}</b> kt · ${ph.l}</span>
        <span>HDG · <b>${hdg}</b></span>
      </div>`;
    frag.appendChild(el);
  });
  stripsEl.appendChild(frag);
}

document.getElementById('nearBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){ statusEl.textContent = 'Geolocation unsupported'; return; }
  statusEl.textContent = 'Locating…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lon} = pos.coords;
    sel.value = '';
    loadBox([lat-2.5, lon-2.5, lat+2.5, lon+2.5]);
  }, ()=>{ statusEl.textContent = 'Location denied — pick a region instead.'; });
});

sel.addEventListener('change', ()=>{
  if(sel.value && REGIONS[sel.value]) loadBox(REGIONS[sel.value]);
});
</script>
</body>
</html>
