<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Leaf — PDF Editor</title>
<style>
  :root{
    --bg:#f3f1ea; --surface:#ffffff; --ink:#1c1a15; --sub:#6b6558;
    --line:#d8d3c6; --accent:#2f6f4e; --accent-ink:#ffffff; --danger:#a3402f;
    --radius:10px; --shadow:0 1px 2px rgba(28,26,21,.08);
  }
  [data-theme="dark"]{
    --bg:#1b1c19; --surface:#242520; --ink:#ece8dd; --sub:#a29c8c;
    --line:#3a3b34; --accent:#5fae86; --accent-ink:#0f1210; --danger:#e08268;
    --shadow:0 1px 2px rgba(0,0,0,.4);
  }
  [data-theme="oled"]{
    --bg:#000000; --surface:#0a0a0a; --ink:#e9e6da; --sub:#8f8a7c;
    --line:#232320; --accent:#5fae86; --accent-ink:#000000; --danger:#e08268;
    --shadow:none;
  }
  [data-theme="hc"]{
    --bg:#000000; --surface:#000000; --ink:#ffffff; --sub:#ffffff;
    --line:#ffffff; --accent:#ffe600; --accent-ink:#000000; --danger:#ff5c4d;
    --radius:2px; --shadow:none;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; min-height:100vh;
    transition:background .2s,color .2s;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--bg); z-index:5;
  }
  .brand{display:flex; align-items:baseline; gap:8px;}
  .brand b{font-size:1.15rem; letter-spacing:.2px;}
  .brand span{font-size:.72rem; color:var(--sub); text-transform:uppercase; letter-spacing:.12em;}
  #themeBtn{
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    border-radius:999px; padding:8px 14px; font-size:.78rem; cursor:pointer;
  }
  main{flex:1; width:100%; max-width:860px; margin:0 auto; padding:16px; padding-bottom:40px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px;}
  .tab{
    flex:1; border:1px solid var(--line); background:var(--surface); color:var(--sub);
    border-radius:8px; padding:10px; font-size:.82rem; font-weight:600; cursor:pointer;
  }
  .tab.active{color:var(--ink); border-color:var(--accent); outline:1px solid var(--accent);}
  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px; margin-bottom:16px;
  }
  #drop{
    border:1.5px dashed var(--line); border-radius:var(--radius); padding:28px 16px;
    text-align:center; color:var(--sub); cursor:pointer;
  }
  #drop b{color:var(--ink);}
  #fileInput{display:none;}
  .toolbar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px;}
  button.action, select.action{
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    border-radius:8px; padding:9px 12px; font-size:.82rem; cursor:pointer;
  }
  button.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600;}
  button.primary:disabled{opacity:.5; cursor:not-allowed;}
  button.active{outline:2px solid var(--accent); outline-offset:1px;}
  #hint{font-size:.78rem; color:var(--sub); margin:0 0 12px;}
  #statusBar{display:none; font-size:.8rem; padding:10px 14px; border-radius:8px; margin:0 0 14px; word-break:break-word;}
  #statusBar.error{display:block; background:rgba(163,64,47,.12); color:var(--danger); border:1px solid var(--danger);}
  #statusBar.info{display:block; background:rgba(47,111,78,.12); color:var(--accent); border:1px solid var(--accent);}
  #pages{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
  .page{
    border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--surface);
    position:relative; display:flex; flex-direction:column;
  }
  .page canvas{width:100%; display:block; cursor:crosshair; touch-action:manipulation;}
  .page .bar{
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 8px; font-size:.7rem; color:var(--sub); border-top:1px solid var(--line);
  }
  .page .bar button{border:none; background:transparent; color:var(--ink); font-size:.85rem; cursor:pointer; padding:2px 6px;}
  .page .bar button.del{color:var(--danger);}
  .page.removed{opacity:.35;}
  #createText{
    width:100%; min-height:260px; resize:vertical; border:1px solid var(--line); border-radius:8px;
    padding:12px; background:var(--surface); color:var(--ink); font-size:.95rem; line-height:1.5;
    font-family:inherit;
  }
  footer{
    border-top:1px solid var(--line); padding:16px; text-align:center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    color:var(--sub); font-size:.75rem;
  }
  @media (min-width:600px){ main{padding:24px;} }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="brand"><b>Leaf</b><span>PDF Editor</span></div>
  <button id="themeBtn" type="button">Light</button>
</header>

<main>
  <div class="tabs">
    <button class="tab active" id="tabEdit" type="button">Edit PDF</button>
    <button class="tab" id="tabCreate" type="button">Create PDF</button>
  </div>
  <div id="statusBar"></div>

  <section id="editSection">
    <div class="panel" id="uploadPanel">
      <div id="drop">
        <div><b>Tap to choose a PDF</b></div>
        <div>or drop it here — nothing leaves your device</div>
      </div>
      <input type="file" id="fileInput" accept="application/pdf">
    </div>

    <div class="panel" id="editPanel" style="display:none;">
      <div class="toolbar">
        <button class="action" id="textModeBtn" type="button">Add text</button>
        <button class="action" id="newFileBtn" type="button">Open another PDF</button>
        <button class="action" id="printEditBtn" type="button" disabled>🖨 Print</button>
        <button class="action primary" id="downloadBtn" type="button" disabled>Download PDF</button>
      </div>
      <p id="hint">Tap a page to rotate or delete it. Turn on "Add text", then tap anywhere on a page to place a label.</p>
      <div id="pages"></div>
    </div>
  </section>

  <section id="createSection" style="display:none;">
    <div class="panel">
      <div class="toolbar">
        <button class="action" id="boldBtn" type="button"><b>B</b></button>
        <button class="action" id="italicBtn" type="button"><i>I</i></button>
        <select class="action" id="sizeSelect">
          <option value="10">10 pt</option>
          <option value="12" selected>12 pt</option>
          <option value="14">14 pt</option>
          <option value="18">18 pt</option>
          <option value="24">24 pt</option>
          <option value="32">32 pt</option>
        </select>
        <select class="action" id="alignSelect">
          <option value="left" selected>Left</option>
          <option value="center">Center</option>
          <option value="right">Right</option>
        </select>
        <select class="action" id="pageSizeSelect">
          <option value="A4" selected>A4</option>
          <option value="Letter">Letter</option>
        </select>
      </div>
      <textarea id="createText" placeholder="Start typing your document…"></textarea>
      <div class="toolbar" style="margin-top:14px;">
        <button class="action" id="printCreateBtn" type="button">🖨 Print</button>
        <button class="action primary" id="createDownloadBtn" type="button">Download PDF</button>
      </div>
    </div>
  </section>
</main>

<footer>
  <div>© <span id="year"></span> Manik Roy. All Rights Reserved.</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

const statusBar = document.getElementById('statusBar');
function showStatus(msg, type){
  statusBar.textContent = msg;
  statusBar.className = type; // 'error' or 'info'
}
function clearStatus(){ statusBar.className=''; statusBar.textContent=''; }
window.addEventListener('error', ev=>{
  showStatus('Script error: ' + (ev.message || 'something failed to load') +
    '. If this mentions PDFLib or pdfjsLib, your network may be blocking cdnjs.cloudflare.com — try switching wifi/data or a different browser.', 'error');
});

if(typeof pdfjsLib === 'undefined' || typeof PDFLib === 'undefined'){
  showStatus('The PDF engine failed to load from the CDN (cdnjs.cloudflare.com). Check your connection or try a different network, then reload the page.', 'error');
} else {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

// ---- Theme cycling (in-memory only) ----
const THEMES = ['light','dark','oled','hc'];
const THEME_LABELS = {light:'Light', dark:'Dark', oled:'OLED', hc:'High contrast'};
let themeIndex = 1;
const themeBtn = document.getElementById('themeBtn');
function applyTheme(){
  document.body.setAttribute('data-theme', THEMES[themeIndex]);
  themeBtn.textContent = THEME_LABELS[THEMES[themeIndex]];
}
themeBtn.addEventListener('click', ()=>{ themeIndex=(themeIndex+1)%THEMES.length; applyTheme(); });
applyTheme();

// ---- Tab switching ----
const tabEdit = document.getElementById('tabEdit'), tabCreate = document.getElementById('tabCreate');
const editSection = document.getElementById('editSection'), createSection = document.getElementById('createSection');
tabEdit.addEventListener('click', ()=>{
  tabEdit.classList.add('active'); tabCreate.classList.remove('active');
  editSection.style.display='block'; createSection.style.display='none';
});
tabCreate.addEventListener('click', ()=>{
  tabCreate.classList.add('active'); tabEdit.classList.remove('active');
  createSection.style.display='block'; editSection.style.display='none';
});

function openPdfBytesInNewTab(bytes){
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}
function downloadPdfBytes(bytes, name){
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  try{
    const a = document.createElement('a');
    a.href = url; a.download = name; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); a.remove();
    showStatus('If nothing downloaded, the PDF opened in a new tab — use your browser\'s Share/Save icon there.', 'info');
  }catch(err){
    // Some mobile browsers block the download attribute on blob URLs — fall back to opening it.
    window.open(url, '_blank');
    showStatus('Your browser opened the PDF instead of downloading it directly — use Share → Save to Files (or the download icon) from there.', 'info');
  }
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}
function wrapLine(text, font, size, maxWidth){
  if(text==='') return [''];
  const words = text.split(' ');
  const lines=[]; let cur='';
  for(const w of words){
    const test = cur ? cur+' '+w : w;
    if(font.widthOfTextAtSize(test,size) > maxWidth && cur){ lines.push(cur); cur=w; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  return lines;
}
// Standard PDF fonts only support WinAnsi. Test each character against the
// actual font (WinAnsi does cover curly quotes, em/en dash, ellipsis, bullet, etc.)
// and only swap in "?" for characters the font genuinely can't encode (emoji, CJK, etc.)
function sanitizeText(text, font){
  let changed = false;
  const out = Array.from(text).map(ch=>{
    if(ch === '\t') return ' ';
    try{ font.widthOfTextAtSize(ch, 10); return ch; }
    catch(e){ changed = true; return '?'; }
  }).join('');
  return {text:out, changed};
}

/* ---------------- EDIT PDF ---------------- */
let originalBytes = null;
let pageState = [];
let textMode = false;

const fileInput = document.getElementById('fileInput');
const drop = document.getElementById('drop');
const uploadPanel = document.getElementById('uploadPanel');
const editPanel = document.getElementById('editPanel');
const pagesEl = document.getElementById('pages');
const downloadBtn = document.getElementById('downloadBtn');
const printEditBtn = document.getElementById('printEditBtn');
const textModeBtn = document.getElementById('textModeBtn');

drop.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
document.getElementById('newFileBtn').addEventListener('click', ()=>{
  editPanel.style.display='none'; uploadPanel.style.display='block';
  pagesEl.innerHTML=''; fileInput.value='';
});
textModeBtn.addEventListener('click', ()=>{
  textMode = !textMode; textModeBtn.classList.toggle('active', textMode);
});

async function loadFile(file){
  originalBytes = await file.arrayBuffer();
  await renderAllPages(originalBytes.slice(0));
  uploadPanel.style.display='none'; editPanel.style.display='block';
  downloadBtn.disabled = false; printEditBtn.disabled = false;
}

async function renderAllPages(bytesCopy){
  pagesEl.innerHTML='';
  const pdf = await pdfjsLib.getDocument({data:bytesCopy}).promise;
  pageState = [];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const state = {rotation:0, removed:false, texts:[]};
    pageState.push(state);
    const card = document.createElement('div');
    card.className='page';

    const naturalVp = page.getViewport({scale:1});
    const scale = 320/naturalVp.width;
    const vp = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext:ctx, viewport:vp}).promise;

    canvas.addEventListener('click', ev=>{
      if(!textMode) return;
      const r = canvas.getBoundingClientRect();
      const x = (ev.clientX - r.left) * (canvas.width / r.width);
      const y = (ev.clientY - r.top) * (canvas.height / r.height);
      const label = prompt('Text to add:');
      if(label){
        state.texts.push({x,y,text:label});
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
        ctx.font = '12px sans-serif';
        ctx.fillText(label, x+6, y-6);
      }
    });

    const bar = document.createElement('div');
    bar.className='bar';
    bar.innerHTML = `<span>Page ${i}</span>`;
    const btns = document.createElement('div');
    const rotBtn = document.createElement('button');
    rotBtn.textContent='⟳ Rotate'; rotBtn.type='button';
    rotBtn.addEventListener('click', ()=>{
      state.rotation = (state.rotation+90)%360;
      canvas.style.transform = `rotate(${state.rotation}deg)`;
    });
    const delBtn = document.createElement('button');
    delBtn.textContent='🗑'; delBtn.type='button'; delBtn.className='del';
    delBtn.addEventListener('click', ()=>{
      state.removed = !state.removed;
      card.classList.toggle('removed', state.removed);
    });
    btns.appendChild(rotBtn); btns.appendChild(delBtn);
    bar.appendChild(btns);
    card.appendChild(canvas); card.appendChild(bar);
    pagesEl.appendChild(card);
  }
}

async function buildEditedPdfBytes(){
  const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;
  const srcDoc = await PDFDocument.load(originalBytes.slice(0));
  const outDoc = await PDFDocument.create();
  const font = await outDoc.embedFont(StandardFonts.Helvetica);
  const indicesToCopy = pageState.map((s,i)=>({s,i})).filter(o=>!o.s.removed).map(o=>o.i);
  const copied = await outDoc.copyPages(srcDoc, indicesToCopy);
  let anyChanged = false;
  copied.forEach((p, idx)=>{
    const state = pageState[indicesToCopy[idx]];
    if(state.rotation){
      const current = p.getRotation().angle || 0;
      p.setRotation(degrees(current + state.rotation));
    }
    const {width,height} = p.getSize();
    state.texts.forEach(t=>{
      const scale = width/320;
      const safe = sanitizeText(t.text, font);
      if(safe.changed) anyChanged = true;
      p.drawText(safe.text, {x:t.x*scale, y:height-(t.y*scale), size:12*scale, font, color:rgb(0.63,0.13,0.09)});
    });
    outDoc.addPage(p);
  });
  return {bytes: await outDoc.save(), warned: anyChanged};
}

downloadBtn.addEventListener('click', async ()=>{
  clearStatus();
  downloadBtn.disabled = true; downloadBtn.textContent = 'Preparing…';
  try{
    const {bytes, warned} = await buildEditedPdfBytes();
    downloadPdfBytes(bytes, 'edited.pdf');
    if(warned) showStatus('Some characters (emoji/symbols) aren\'t supported by the PDF font and were replaced with "?".', 'info');
  }
  catch(err){ showStatus('Could not save the PDF: ' + err.message, 'error'); }
  finally{ downloadBtn.disabled=false; downloadBtn.textContent='Download PDF'; }
});
printEditBtn.addEventListener('click', async ()=>{
  printEditBtn.disabled = true;
  try{ const {bytes} = await buildEditedPdfBytes(); openPdfBytesInNewTab(bytes); }
  catch(err){ showStatus('Could not print the PDF: ' + err.message, 'error'); }
  finally{ printEditBtn.disabled=false; }
});

/* ---------------- CREATE PDF ---------------- */
const PAGE_SIZES = { A4:[595.28,841.89], Letter:[612,792] };
const boldBtn = document.getElementById('boldBtn');
const italicBtn = document.getElementById('italicBtn');
const sizeSelect = document.getElementById('sizeSelect');
const alignSelect = document.getElementById('alignSelect');
const pageSizeSelect = document.getElementById('pageSizeSelect');
const createText = document.getElementById('createText');
boldBtn.addEventListener('click', ()=> boldBtn.classList.toggle('active'));
italicBtn.addEventListener('click', ()=> italicBtn.classList.toggle('active'));

async function buildCreatedPdfBytes(){
  const { PDFDocument, StandardFonts } = PDFLib;
  const bold = boldBtn.classList.contains('active');
  const italic = italicBtn.classList.contains('active');
  const size = parseInt(sizeSelect.value,10);
  const align = alignSelect.value;
  const [pw,ph] = PAGE_SIZES[pageSizeSelect.value];
  const fontKey = bold&&italic ? StandardFonts.HelveticaBoldOblique
    : bold ? StandardFonts.HelveticaBold
    : italic ? StandardFonts.HelveticaOblique
    : StandardFonts.Helvetica;
  const doc = await PDFDocument.create();
  const font = await doc.embedFont(fontKey);
  const margin=50, lineHeight=size*1.4, maxWidth=pw-margin*2;
  let page = doc.addPage([pw,ph]);
  let y = ph - margin;
  const paragraphs = (createText.value || ' ').split('\n');
  let anyChanged = false;
  for(const para of paragraphs){
    const safe = sanitizeText(para, font);
    if(safe.changed) anyChanged = true;
    for(const line of wrapLine(safe.text, font, size, maxWidth)){
      if(y < margin){ page = doc.addPage([pw,ph]); y = ph - margin; }
      const w = font.widthOfTextAtSize(line, size);
      let x = margin;
      if(align==='center') x = margin + (maxWidth-w)/2;
      else if(align==='right') x = margin + (maxWidth-w);
      page.drawText(line, {x, y, size, font});
      y -= lineHeight;
    }
    y -= lineHeight*0.3;
  }
  return {bytes: await doc.save(), warned: anyChanged};
}

document.getElementById('createDownloadBtn').addEventListener('click', async (e)=>{
  clearStatus();
  const btn = e.currentTarget;
  btn.disabled = true; btn.textContent = 'Preparing…';
  try{
    const {bytes, warned} = await buildCreatedPdfBytes();
    downloadPdfBytes(bytes, 'document.pdf');
    if(warned) showStatus('Some characters (emoji/symbols) aren\'t supported by the PDF font and were replaced with "?".', 'info');
  }
  catch(err){ showStatus('Could not create the PDF: ' + err.message, 'error'); }
  finally{ btn.disabled=false; btn.textContent='Download PDF'; }
});
document.getElementById('printCreateBtn').addEventListener('click', async (e)=>{
  const btn = e.currentTarget;
  btn.disabled = true;
  try{ const {bytes} = await buildCreatedPdfBytes(); openPdfBytesInNewTab(bytes); }
  catch(err){ showStatus('Could not print the PDF: ' + err.message, 'error'); }
  finally{ btn.disabled=false; }
});
</script>
</body>
</html>
