<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FlightBoard — Live Air Traffic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220; --panel:#121B2E; --panel2:#0E1626; --border:#23304A;
    --text:#E4ECF7; --dim:#8B9AB5; --accent:#FFB020; --accent2:#3ADB76;
    --danger:#FF5C5C; --focus:#63B3FF; --radius:10px; --bw:1px;
  }
  html[data-theme="light"]{
    --bg:#F4F6F9; --panel:#FFFFFF; --panel2:#ECEFF4; --border:#D8DEE8;
    --text:#101826; --dim:#5B6B84; --accent:#B9720A; --accent2:#1F9D55;
    --danger:#C0392B; --focus:#1D6FE0;
  }
  html[data-theme="oled"]{
    --bg:#000000; --panel:#0A0A0A; --panel2:#050505; --border:#1C1C1C;
    --text:#E4ECF7; --dim:#7C8AA0; --accent:#FFB020; --accent2:#3ADB76;
    --danger:#FF5C5C; --focus:#63B3FF;
  }
  html[data-theme="hc"]{
    --bg:#000000; --panel:#000000; --panel2:#000000; --border:#FFFFFF;
    --text:#FFFFFF; --dim:#FFFFFF; --accent:#FFFF00; --accent2:#00FF66;
    --danger:#FF4141; --focus:#FFFF00; --radius:0px; --bw:2px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    display:flex; flex-direction:column; transition:background .2s,color .2s;}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}
  a{color:inherit;}
  :focus-visible{outline:3px solid var(--focus); outline-offset:2px;}

  header{position:sticky; top:0; z-index:10; background:var(--panel);
    border-bottom:var(--bw) solid var(--border); padding:.8rem 1rem;}
  .brandrow{display:flex; align-items:center; justify-content:space-between; gap:.6rem;}
  .brand{display:flex; align-items:center; gap:.6rem; min-width:0;}
  .radar{width:26px; height:26px; border-radius:50%; flex:none;
    border:var(--bw) solid var(--accent); position:relative; overflow:hidden;
    background:radial-gradient(circle,var(--panel2) 0%, var(--panel) 100%);}
  .radar::after{content:""; position:absolute; inset:0;
    background:conic-gradient(from 0deg, var(--accent), transparent 35%);
    animation:sweep 3s linear infinite;}
  @keyframes sweep{to{transform:rotate(360deg);}}
  .brand h1{font-size:1.05rem; margin:0; letter-spacing:.03em; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;}
  .brand small{display:block; color:var(--dim); font-size:.68rem; letter-spacing:.08em;}
  .themebar{display:flex; gap:.35rem; flex:none;}
  .themebar button{width:34px; height:34px; border-radius:var(--radius);
    border:var(--bw) solid var(--border); background:var(--panel2); color:var(--text);
    cursor:pointer; font-size:.9rem; display:flex; align-items:center; justify-content:center;}
  .themebar button[aria-pressed="true"]{border-color:var(--accent); color:var(--accent);}

  .controls{display:flex; flex-wrap:wrap; gap:.5rem; padding:.7rem 1rem;
    background:var(--panel2); border-bottom:var(--bw) solid var(--border);}
  select,input[type="text"],button.action{
    font:inherit; font-size:.85rem; padding:.55rem .7rem; border-radius:var(--radius);
    border:var(--bw) solid var(--border); background:var(--panel); color:var(--text);}
  select{flex:1 1 130px;}
  input[type="text"]{flex:2 1 160px;}
  button.action{background:var(--accent); color:#1A1200; border:none; font-weight:600;
    cursor:pointer; flex:none;}
  html[data-theme="hc"] button.action{color:#000;}
  button.action:disabled{opacity:.55; cursor:progress;}
  .status{width:100%; font-size:.75rem; color:var(--dim); display:flex;
    justify-content:space-between; gap:.5rem; flex-wrap:wrap;}
  .live-dot{display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--accent2); margin-right:.35rem; animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  main{flex:1; padding:.8rem 1rem 1.2rem; max-width:820px; width:100%; margin:0 auto;}
  .empty,.err{color:var(--dim); text-align:center; padding:2.5rem 1rem; font-size:.9rem;}
  .err{color:var(--danger);}

  .strip{background:var(--panel); border:var(--bw) solid var(--border);
    border-left:4px solid var(--accent2); border-radius:var(--radius);
    margin-bottom:.55rem; padding:.65rem .8rem; cursor:pointer;}
  .strip.ground{border-left-color:var(--dim);}
  .strip.emergency{border-left-color:var(--danger); animation:pulse 1s ease-in-out infinite;}
  .row1{display:flex; justify-content:space-between; align-items:baseline; gap:.5rem;}
  .callsign{font-weight:700; font-size:1rem; letter-spacing:.03em;}
  .country{font-size:.72rem; color:var(--dim); text-align:right;}
  .row2{display:flex; flex-wrap:wrap; gap:.4rem .9rem; margin-top:.35rem;
    font-size:.78rem; color:var(--dim);}
  .row2 b{color:var(--text); font-weight:600;}
  .badge{font-size:.66rem; text-transform:uppercase; letter-spacing:.05em;
    padding:.15rem .4rem; border-radius:4px; border:var(--bw) solid var(--border);}
  .badge.up{color:var(--accent2); border-color:var(--accent2);}
  .badge.down{color:var(--accent);border-color:var(--accent);}
  .details{margin-top:.5rem; padding-top:.5rem; border-top:1px dashed var(--border);
    font-size:.75rem; color:var(--dim); display:grid; grid-template-columns:1fr 1fr; gap:.3rem .8rem;}
  .details b{color:var(--text);}
  .hidden{display:none;}

  footer{border-top:var(--bw) solid var(--border); background:var(--panel);
    padding:1.1rem 1rem; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:.25rem; min-height:70px;}
  footer p{margin:0; font-size:.78rem; color:var(--dim);}
  footer .src{font-size:.7rem;}

  @media(min-width:640px){
    .brand h1{font-size:1.25rem;}
    .strip{padding:.8rem 1rem;}
  }
  @media(prefers-reduced-motion:reduce){
    .radar::after,.live-dot,.strip.emergency{animation:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brandrow">
    <div class="brand">
      <div class="radar" aria-hidden="true"></div>
      <div>
        <h1>FLIGHTBOARD</h1>
        <small>LIVE AIR TRAFFIC</small>
      </div>
    </div>
    <div class="themebar" role="group" aria-label="Theme">
      <button data-theme-btn="dark" title="Dark" aria-label="Dark theme">🌙</button>
      <button data-theme-btn="light" title="Light" aria-label="Light theme">☀️</button>
      <button data-theme-btn="oled" title="OLED true black" aria-label="OLED theme">⚫</button>
      <button data-theme-btn="hc" title="High contrast" aria-label="High contrast theme">◐</button>
    </div>
  </div>
</header>

<div class="controls">
  <select id="region" aria-label="Region">
    <option value="NA">North America</option>
    <option value="EU" selected>Europe</option>
    <option value="ASIA">Asia</option>
    <option value="ME">Middle East</option>
    <option value="OC">Oceania</option>
    <option value="SA">South America</option>
    <option value="NEAR">Near me</option>
  </select>
  <input type="text" id="search" placeholder="Filter callsign or country…" aria-label="Filter flights">
  <button class="action" id="refreshBtn">Refresh</button>
  <div class="status">
    <span><span class="live-dot" aria-hidden="true"></span><span id="statusText">Loading…</span></span>
    <span id="countText"></span>
  </div>
</div>

<main id="list"><p class="empty">Fetching live flights…</p></main>

<footer>
  <p>Data via OpenSky Network — no key, updates every 20s.</p>
  <p>© Manik Roy <span id="year"></span>. All Rights Reserved.</p>
</footer>

<script>
const REGIONS = {
  NA:{lamin:24,lomin:-125,lamax:50,lomax:-66},
  EU:{lamin:36,lomin:-10,lamax:60,lomax:30},
  ASIA:{lamin:5,lomin:95,lamax:45,lomax:145},
  ME:{lamin:12,lomin:34,lamax:42,lomax:63},
  OC:{lamin:-45,lomin:110,lamax:-10,lomax:155},
  SA:{lamin:-55,lomin:-80,lamax:13,lomax:-35},
};

document.getElementById('year').textContent = new Date().getFullYear();

const listEl = document.getElementById('list');
const statusEl = document.getElementById('statusText');
const countEl = document.getElementById('countText');
const regionSel = document.getElementById('region');
const searchInp = document.getElementById('search');
const refreshBtn = document.getElementById('refreshBtn');

let flights = [];
let timer = null;
let nearBox = null;

function setTheme(name){
  document.documentElement.setAttribute('data-theme', name);
  document.querySelectorAll('[data-theme-btn]').forEach(b=>{
    b.setAttribute('aria-pressed', b.dataset.themeBtn === name ? 'true' : 'false');
  });
}
document.querySelectorAll('[data-theme-btn]').forEach(b=>{
  b.addEventListener('click', ()=>setTheme(b.dataset.themeBtn));
});
setTheme('dark');

function msToKt(v){ return v==null ? null : Math.round(v * 1.94384); }
function mToFt(v){ return v==null ? null : Math.round(v * 3.28084); }

function boxFor(code){
  if(code === 'NEAR'){
    return nearBox || REGIONS.EU;
  }
  return REGIONS[code];
}

async function requestNear(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(REGIONS.EU); return; }
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const {latitude:la, longitude:lo} = pos.coords;
        nearBox = {lamin:la-5, lamax:la+5, lomin:lo-5, lomax:lo+5};
        resolve(nearBox);
      },
      ()=>resolve(REGIONS.EU),
      {timeout:6000}
    );
  });
}

async function fetchFlights(){
  refreshBtn.disabled = true;
  statusEl.textContent = 'Updating…';
  try{
    let box = boxFor(regionSel.value);
    if(regionSel.value === 'NEAR' && !nearBox){ box = await requestNear(); }
    const url = `https://opensky-network.org/api/states/all?lamin=${box.lamin}&lomin=${box.lomin}&lamax=${box.lamax}&lomax=${box.lomax}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    flights = (data.states || []).map(s=>({
      icao24:s[0], callsign:(s[1]||'').trim() || '—', country:s[2],
      lon:s[5], lat:s[6], altBaro:s[7], onGround:s[8], velocity:s[9],
      track:s[10], vRate:s[11], altGeo:s[13], squawk:s[14], lastContact:s[4],
    }));
    statusEl.textContent = 'Live';
    render();
  }catch(err){
    statusEl.textContent = 'Error';
    listEl.innerHTML = `<p class="err">Couldn't reach OpenSky Network right now (${err.message}). It's a free public API and occasionally rate-limits or times out — Refresh will retry.</p>`;
    countEl.textContent = '';
  }finally{
    refreshBtn.disabled = false;
  }
}

function render(){
  const q = searchInp.value.trim().toLowerCase();
  let rows = flights.filter(f=>
    !q || f.callsign.toLowerCase().includes(q) || (f.country||'').toLowerCase().includes(q)
  );
  rows.sort((a,b)=>(b.altBaro||0) - (a.altBaro||0));
  countEl.textContent = rows.length + ' aircraft';
  rows = rows.slice(0, 80);

  if(rows.length === 0){
    listEl.innerHTML = '<p class="empty">No aircraft match right now. Try another region or clear the filter.</p>';
    return;
  }

  listEl.innerHTML = rows.map(f=>{
    const emergency = ['7500','7600','7700'].includes(f.squawk);
    const cls = emergency ? 'emergency' : (f.onGround ? 'ground' : '');
    const ft = mToFt(f.altBaro);
    const kt = msToKt(f.velocity);
    const vArrow = f.vRate > 1 ? '↑' : (f.vRate < -1 ? '↓' : '→');
    const badgeCls = f.onGround ? 'down' : 'up';
    const badgeTxt = f.onGround ? 'GROUND' : 'AIRBORNE';
    return `
    <div class="strip ${cls}" data-id="${f.icao24}" tabindex="0" role="button" aria-expanded="false">
      <div class="row1">
        <span class="callsign mono">${f.callsign}</span>
        <span class="country">${f.country||''}</span>
      </div>
      <div class="row2">
        <span class="badge ${badgeCls}">${badgeTxt}</span>
        <span>ALT <b class="mono">${ft!=null ? ft.toLocaleString()+' ft' : '—'}</b></span>
        <span>SPD <b class="mono">${kt!=null ? kt+' kt' : '—'}</b></span>
        <span>HDG <b class="mono">${f.track!=null ? Math.round(f.track)+'°' : '—'}</b></span>
        <span>V/S <b class="mono">${vArrow}</b></span>
        ${emergency ? `<span class="badge" style="color:var(--danger);border-color:var(--danger)">SQUAWK ${f.squawk}</span>` : ''}
      </div>
      <div class="details hidden">
        <span>ICAO24: <b class="mono">${f.icao24}</b></span>
        <span>Squawk: <b class="mono">${f.squawk||'—'}</b></span>
        <span>Lat/Lon: <b class="mono">${f.lat?.toFixed(2)}, ${f.lon?.toFixed(2)}</b></span>
        <span>Last contact: <b class="mono">${f.lastContact ? new Date(f.lastContact*1000).toLocaleTimeString() : '—'}</b></span>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.strip').forEach(el=>{
    const open = ()=>{
      const d = el.querySelector('.details');
      d.classList.toggle('hidden');
      el.setAttribute('aria-expanded', d.classList.contains('hidden') ? 'false' : 'true');
    };
    el.addEventListener('click', open);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); }});
  });
}

function restartTimer(){
  if(timer) clearInterval(timer);
  timer = setInterval(fetchFlights, 20000);
}

regionSel.addEventListener('change', ()=>{ fetchFlights(); restartTimer(); });
searchInp.addEventListener('input', render);
refreshBtn.addEventListener('click', fetchFlights);

fetchFlights();
restartTimer();
</script>
</body>
</html>
