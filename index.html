<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Speedometer</title>

<style>

:root{
--bg:#f4f6fa;
--card:#ffffff;
--text:#111;
--accent:#0a84ff;
}

body.dark{
--bg:#0f1115;
--card:#1c1f26;
--text:#ffffff;
}

body.oled{
--bg:#000;
--card:#000;
--text:#fff;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:16px;
text-align:center;
}

h1{
margin:10px 0;
}

canvas{
width:100%;
max-width:300px;
}

.speed{
font-size:44px;
font-weight:bold;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.card{
background:var(--card);
padding:12px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.controls{
margin-top:15px;
}

button,select{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
font-size:14px;
}

footer{
margin-top:auto;
padding:15px;
font-size:13px;
opacity:.7;
}

</style>
</head>

<body>

<div class="container">

<h1>Ultimate Speedometer</h1>

<select id="mode">
<option>Walking</option>
<option>Car</option>
<option>Bus</option>
<option>Train</option>
<option>Aeroplane</option>
</select>

<canvas id="gauge" width="300" height="300"></canvas>

<div class="speed" id="speed">0</div>
<div>km/h</div>

<div class="panel">

<div class="card">
Distance<br>
<b id="distance">0 km</b>
</div>

<div class="card">
Average<br>
<b id="avg">0 km/h</b>
</div>

<div class="card">
Top Speed<br>
<b id="top">0 km/h</b>
</div>

<div class="card">
Altitude<br>
<b id="alt">0 m</b>
</div>

<div class="card">
Direction<br>
<b id="dir">-</b>
</div>

<div class="card">
Status<br>
<b id="status">Idle</b>
</div>

</div>

<div class="controls">

<button onclick="startGPS()">Start GPS</button>
<button onclick="resetTrip()">Reset Trip</button>

<br>

<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('oled')">OLED</button>

</div>

</div>

<footer>
© Manik Roy <span id="year"></span>. All Rights Reserved.
</footer>

<script>

document.getElementById("year").textContent=new Date().getFullYear()

function setTheme(t){
document.body.classList.remove("dark","oled")
if(t==="dark")document.body.classList.add("dark")
if(t==="oled")document.body.classList.add("oled")
}

const canvas=document.getElementById("gauge")
const ctx=canvas.getContext("2d")

let maxSpeed=900

function drawGauge(speed){

ctx.clearRect(0,0,300,300)

let c=150

ctx.beginPath()
ctx.arc(c,c,120,Math.PI,0)
ctx.lineWidth=20
ctx.strokeStyle="#ddd"
ctx.stroke()

let angle=Math.PI+(speed/maxSpeed)*Math.PI

ctx.beginPath()
ctx.moveTo(c,c)
ctx.lineTo(c+100*Math.cos(angle),c+100*Math.sin(angle))
ctx.lineWidth=5
ctx.strokeStyle="red"
ctx.stroke()

ctx.beginPath()
ctx.arc(c,c,7,0,Math.PI*2)
ctx.fill()

}

drawGauge(0)

let lastPos=null
let lastTime=null

let totalDistance=0
let speedSum=0
let speedCount=0
let topSpeed=0

function toRad(v){return v*Math.PI/180}

function calcDist(a,b){

let R=6371

let dLat=toRad(b.lat-a.lat)
let dLon=toRad(b.lon-a.lon)

let lat1=toRad(a.lat)
let lat2=toRad(b.lat)

let h=Math.sin(dLat/2)**2+
Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2

return 2*R*Math.asin(Math.sqrt(h))

}

function direction(heading){

if(heading==null)return "-"

const dirs=["N","NE","E","SE","S","SW","W","NW"]

return dirs[Math.round(heading/45)%8]

}

function startGPS(){

document.getElementById("status").textContent="Starting..."

navigator.geolocation.watchPosition(update,error,{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
})

}

function update(pos){

document.getElementById("status").textContent="Tracking"

let lat=pos.coords.latitude
let lon=pos.coords.longitude

let time=Date.now()

let speed=0

if(lastPos){

let dist=calcDist(lastPos,{lat,lon})

let t=(time-lastTime)/3600000

speed=dist/t

totalDistance+=dist

}

lastPos={lat,lon}
lastTime=time

speed=Math.round(speed)

if(speed>topSpeed) topSpeed=speed

speedSum+=speed
speedCount++

let avg=Math.round(speedSum/speedCount)

document.getElementById("speed").textContent=speed
document.getElementById("distance").textContent=totalDistance.toFixed(2)+" km"
document.getElementById("avg").textContent=avg+" km/h"
document.getElementById("top").textContent=topSpeed+" km/h"

let alt=pos.coords.altitude||0
document.getElementById("alt").textContent=Math.round(alt)+" m"

document.getElementById("dir").textContent=direction(pos.coords.heading)

drawGauge(speed)

}

function error(){

document.getElementById("status").textContent="Location blocked"

alert("Please allow location permission.")

}

function resetTrip(){

totalDistance=0
speedSum=0
speedCount=0
topSpeed=0
lastPos=null

document.getElementById("distance").textContent="0 km"
document.getElementById("avg").textContent="0 km/h"
document.getElementById("top").textContent="0 km/h"

}

</script>

</body>
  </html>
