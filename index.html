<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast ULTRA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:system-ui;
background:#0b0f14;
color:white;
margin:0;
padding:0;
}

header{
display:flex;
justify-content:space-between;
padding:16px;
background:#111827;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:60%;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.container{
padding:16px;
}

.card{
background:#111827;
border-radius:14px;
padding:16px;
margin-bottom:16px;
}

.temp{
font-size:48px;
font-weight:700;
}

#map{
height:300px;
border-radius:12px;
margin-top:10px;
}

.hourly{
display:flex;
overflow:auto;
gap:12px;
}

.hour{
min-width:80px;
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
}

.day{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<header>

<h2>SkyCast ULTRA</h2>

<div>
<input id="city" placeholder="Search city">
<button onclick="searchCity()">Search</button>
</div>

</header>

<div class="container">

<div class="card">

<div id="location">Loading...</div>

<div class="temp" id="temp">--</div>

<div id="desc"></div>

</div>

<div class="card">

<h3>Hourly Forecast</h3>

<div class="hourly" id="hourly"></div>

</div>

<div class="card">

<h3>10-Day Forecast</h3>

<div id="daily"></div>

</div>

<div class="card">

<h3>Weather Radar</h3>

<div id="map"></div>

</div>

<div class="card">

<h3>Air Quality</h3>

<div id="aqi">--</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([22.5726,88.3639],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map);


async function weather(lat,lon){

const url =
`https://api.open-meteo.com/v1/forecast?
latitude=${lat}
&longitude=${lon}
&current=temperature_2m,weather_code
&hourly=temperature_2m
&daily=temperature_2m_max,temperature_2m_min
&timezone=auto`;

const r = await fetch(url);
const data = await r.json();

renderWeather(data)

}


function renderWeather(d){

document.getElementById("temp").innerHTML =
Math.round(d.current.temperature_2m)+"°C";

document.getElementById("location").innerHTML =
"Current Weather";

const hourly = d.hourly.temperature_2m.slice(0,12);

let html="";

hourly.forEach((t,i)=>{

html+=`
<div class="hour">
<div>${i}h</div>
<div>${Math.round(t)}°</div>
</div>
`;

});

document.getElementById("hourly").innerHTML=html;


const dailyMax = d.daily.temperature_2m_max;
const dailyMin = d.daily.temperature_2m_min;

let dhtml="";

dailyMax.forEach((m,i)=>{

dhtml+=`
<div class="day">
<div>Day ${i+1}</div>
<div>${Math.round(m)}° / ${Math.round(dailyMin[i])}°</div>
</div>
`;

});

document.getElementById("daily").innerHTML=dhtml;

}


async function searchCity(){

const city=document.getElementById("city").value;

const url=
`https://nominatim.openstreetmap.org/search?q=${city}&format=json`;

const r=await fetch(url);

const data=await r.json();

const lat=data[0].lat;
const lon=data[0].lon;

map.setView([lat,lon],7);

weather(lat,lon);

airQuality(lat,lon);

}


async function airQuality(lat,lon){

const url=
`https://air-quality-api.open-meteo.com/v1/air-quality?
latitude=${lat}
&longitude=${lon}
&hourly=pm2_5`;

const r=await fetch(url);

const data=await r.json();

document.getElementById("aqi").innerHTML=
"PM2.5 : "+data.hourly.pm2_5[0];

}


weather(22.5726,88.3639);
airQuality(22.5726,88.3639);

</script>

</body>
</html>
