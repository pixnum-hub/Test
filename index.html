<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tactical GPS Elite</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
background:#0a1225;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
}

.app{

width:100%;
max-width:430px;
margin:10px;
padding:10px;
border-radius:20px;
border:2px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);

}

#map{
height:300px;
border-radius:12px;
margin-bottom:8px;
}

.panel{
font-size:13px;
margin:3px 0;
}

button{

width:100%;
padding:10px;
margin:4px 0;
border:none;
border-radius:8px;
background:#00ff88;
font-weight:bold;

}

canvas{

width:100%;
background:#000;
border-radius:10px;
margin-top:8px;

}

.footer{
text-align:center;
font-size:12px;
opacity:.7;
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<h3 style="text-align:center">🛰 Tactical GPS Elite</h3>

<div id="map"></div>

<div class="panel" id="coords"></div>
<div class="panel" id="speed"></div>
<div class="panel" id="distance"></div>
<div class="panel" id="maxspeed"></div>
<div class="panel" id="accuracy"></div>
<div class="panel" id="signal"></div>

<button onclick="startTracking()">Start Tracking</button>
<button onclick="addWaypoint()">Add Waypoint</button>
<button onclick="replayTrack()">Replay Track</button>
<button onclick="exportGPX()">Export GPX</button>
<button onclick="shareLocation()">Share Location</button>

<canvas id="compass" height="200"></canvas>
<canvas id="accuracyGraph" height="120"></canvas>
<canvas id="skyplot" height="200"></canvas>

<div class="footer">
© Manik Roy <span id="year"></span>. All Rights Reserved.
</div>

</div>

<script>

document.getElementById("year").textContent=new Date().getFullYear()

/* MAP */

let map=L.map("map").setView([20,0],3)

let osm=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

let topo=L.tileLayer(
"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png"
)

let satellite=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
)

L.control.layers({
OSM:osm,
Topo:topo,
Satellite:satellite
}).addTo(map)

/* GRID */

function drawGrid(){

for(let lat=-80;lat<80;lat+=0.01){

L.polyline([[lat,-180],[lat,180]],
{color:"rgba(0,255,0,.1)",weight:1}).addTo(map)

}

for(let lon=-180;lon<180;lon+=0.01){

L.polyline([[-80,lon],[80,lon]],
{color:"rgba(0,255,0,.1)",weight:1}).addTo(map)

}

}

drawGrid()

/* TRACK */

let track=[]
let marker=null
let poly=L.polyline([], {color:"lime"}).addTo(map)

let totalDistance=0
let maxSpeed=0

let accuracyHistory=[]

function startTracking(){

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude
let speed=pos.coords.speed||0
let acc=pos.coords.accuracy

updateGPS(lat,lon,speed,acc)

})

}

function updateGPS(lat,lon,speed,acc){

document.getElementById("coords").innerHTML=
`Lat ${lat.toFixed(6)} Lon ${lon.toFixed(6)}`

let kmh=speed*3.6

document.getElementById("speed").innerHTML=
`Speed ${kmh.toFixed(1)} km/h`

maxSpeed=Math.max(maxSpeed,kmh)

document.getElementById("maxspeed").innerHTML=
`Max Speed ${maxSpeed.toFixed(1)} km/h`

document.getElementById("accuracy").innerHTML=
`Accuracy ${acc.toFixed(1)} m`

document.getElementById("signal").innerHTML=
`Signal ${gpsQuality(acc)}`

map.setView([lat,lon],16)

if(!marker){
marker=L.marker([lat,lon]).addTo(map)
}else{
marker.setLatLng([lat,lon])
}

track.push([lat,lon])

poly.setLatLngs(track)

updateDistance()

accuracyHistory.push(acc)

drawAccuracy()

drawCompass(0)

simulateSkyplot()

}

function updateDistance(){

if(track.length<2) return

let p1=track[track.length-2]
let p2=track[track.length-1]

let d=calcDistance(p1,p2)

totalDistance+=d

document.getElementById("distance").innerHTML=
"Distance "+(totalDistance/1000).toFixed(2)+" km"

}

/* HAVERSINE */

function calcDistance(p1,p2){

let R=6371000

let φ1=p1[0]*Math.PI/180
let φ2=p2[0]*Math.PI/180

let Δφ=(p2[0]-p1[0])*Math.PI/180
let Δλ=(p2[1]-p1[1])*Math.PI/180

let a=Math.sin(Δφ/2)**2+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)**2

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

/* WAYPOINT */

function addWaypoint(){

if(track.length==0) return

L.marker(track[track.length-1])
.addTo(map)
.bindPopup("Waypoint")

}

/* SHARE */

function shareLocation(){

if(track.length==0) return

let p=track[track.length-1]

let url="https://maps.google.com/?q="+p[0]+","+p[1]

navigator.clipboard.writeText(url)

alert("Location link copied")

}

/* GPX */

function exportGPX(){

let gpx='<?xml version="1.0"?><gpx><trk><trkseg>'

track.forEach(p=>{
gpx+=`<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`
})

gpx+='</trkseg></trk></gpx>'

let blob=new Blob([gpx])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="track.gpx"

a.click()

}

/* REPLAY */

function replayTrack(i=0){

if(i>=track.length) return

marker.setLatLng(track[i])
map.setView(track[i],16)

setTimeout(()=>replayTrack(i+1),400)

}

/* SIGNAL QUALITY */

function gpsQuality(acc){

if(acc<5) return "Excellent 🟢"
if(acc<15) return "Good 🟡"
if(acc<30) return "Fair 🟠"
return "Poor 🔴"

}

/* COMPASS */

function drawCompass(angle){

let c=document.getElementById("compass")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,c.width,c.height)

ctx.beginPath()
ctx.arc(150,100,80,0,2*Math.PI)
ctx.strokeStyle="#00ff88"
ctx.stroke()

ctx.save()

ctx.translate(150,100)

ctx.rotate(angle*Math.PI/180)

ctx.beginPath()
ctx.moveTo(0,-70)
ctx.lineTo(0,70)

ctx.strokeStyle="red"
ctx.stroke()

ctx.restore()

}

/* ACCURACY GRAPH */

function drawAccuracy(){

let c=document.getElementById("accuracyGraph")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,c.width,c.height)

ctx.beginPath()

accuracyHistory.forEach((v,i)=>{

let x=i*10
let y=100-v

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.strokeStyle="#00ff88"

ctx.stroke()

}

/* SKY PLOT */

function simulateSkyplot(){

let c=document.getElementById("skyplot")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,c.width,c.height)

ctx.beginPath()
ctx.arc(150,100,90,0,2*Math.PI)

ctx.strokeStyle="#0f0"

ctx.stroke()

for(let i=0;i<12;i++){

let a=Math.random()*2*Math.PI
let r=Math.random()*80

let x=150+r*Math.cos(a)
let y=100+r*Math.sin(a)

ctx.fillStyle="#0f0"
ctx.fillRect(x,y,4,4)

}

}

</script>

</body>
</html>
