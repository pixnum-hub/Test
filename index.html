<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>बीज मंत्र · Beej Mantra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Sans+Devanagari:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"]{--bg:#F5EFE4;--card:#FFFFFF;--text:#241F1B;--muted:#77695A;--accent:#B8431E;--accent2:#D69A34;--ring:rgba(184,67,30,.18);--border:rgba(36,31,27,.12);--shadow:0 8px 24px rgba(36,31,27,.08)}
  :root[data-theme="dark"]{--bg:#131019;--card:#1D1926;--text:#F1E9DC;--muted:#A79A88;--accent:#E4A33B;--accent2:#C1521E;--ring:rgba(228,163,59,.2);--border:rgba(241,233,220,.1);--shadow:0 8px 28px rgba(0,0,0,.4)}
  :root[data-theme="oled"]{--bg:#000000;--card:#070707;--text:#F1E9DC;--muted:#8C8074;--accent:#E4A33B;--accent2:#C1521E;--ring:rgba(228,163,59,.16);--border:rgba(241,233,220,.08);--shadow:none}
  :root[data-theme="hc"]{--bg:#000000;--card:#000000;--text:#FFFFFF;--muted:#FFFFFF;--accent:#FFD400;--accent2:#00E5FF;--ring:rgba(255,212,0,.35);--border:#FFFFFF;--shadow:none}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);min-height:100%}
  body{font-family:'Inter',sans-serif;display:flex;flex-direction:column;min-height:100vh;transition:background .25s,color .25s}
  a{color:inherit}
  .wrap{max-width:640px;margin:0 auto;padding:0 18px;width:100%}
  header{padding-top:28px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:center;margin:0}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(30px,8vw,42px);text-align:center;margin:6px 0 2px;line-height:1.05}
  .devnote{font-family:'Noto Sans Devanagari',sans-serif;font-size:.55em;display:block;color:var(--accent);font-weight:500}
  .lede{text-align:center;color:var(--muted);font-size:14px;max-width:44ch;margin:10px auto 20px;line-height:1.5}
  .controls{display:flex;justify-content:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .btn{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:999px;padding:9px 16px;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:border-color .2s,transform .1s}
  .btn:active{transform:scale(.96)}
  .btn:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn.theme{display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  input[type="search"]{width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;margin-bottom:22px;font-family:'Inter',sans-serif}
  input[type="search"]::placeholder{color:var(--muted)}
  main{flex:1}
  .grid{display:grid;grid-template-columns:1fr;gap:14px;padding-bottom:20px}
  @media(min-width:520px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden}
  .card .rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
  .card.speaking .rings{opacity:1}
  .ring{position:absolute;border:1px solid var(--accent);border-radius:50%;width:40px;height:40px;animation:pulse 1.4s ease-out infinite}
  .ring.r2{animation-delay:.35s}.ring.r3{animation-delay:.7s}
  @keyframes pulse{0%{width:40px;height:40px;opacity:.65}100%{width:230px;height:230px;opacity:0}}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;position:relative}
  .syll{font-family:'Noto Sans Devanagari',sans-serif;font-size:44px;font-weight:700;color:var(--accent)}
  .iast{font-family:'Fraunces',serif;font-size:15px;color:var(--muted);font-style:italic}
  .deity{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);font-weight:600;margin-top:10px}
  .meaning{font-size:13.5px;color:var(--muted);line-height:1.45;margin-top:6px}
  .row2{display:flex;align-items:center;justify-content:space-between;margin-top:14px;position:relative}
  .play{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .play svg{width:13px;height:13px}
  .count{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .count b{color:var(--text)}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
  footer{border-top:1px solid var(--border);margin-top:20px;padding:22px 18px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center}
  footer .name{font-family:'Fraunces',serif;font-size:13px;color:var(--muted)}
  footer .copy{font-size:12px;color:var(--muted)}
  footer .copy b{color:var(--text);font-weight:600}
  @media(prefers-reduced-motion:reduce){.ring{animation:none;opacity:.3}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Seed sounds of the subtle body</p>
    <h1>Beej Mantra<span class="devnote">बीज मंत्र</span></h1>
    <p class="lede">Thirteen bīja syllables — the seed sounds of the chakras and their presiding deities. Tap a card to hear it spoken aloud.</p>
    <div class="controls">
      <button class="btn theme" id="themeBtn" aria-label="Toggle theme"><span class="dot" id="themeDot"></span><span id="themeLabel">Dark</span></button>
      <button class="btn" id="resetBtn">Reset counts</button>
    </div>
    <input type="search" id="search" placeholder="Search by syllable, deity or chakra…" aria-label="Search mantras">
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" hidden>No mantra matches that search.</p>
  </main>
</div>
<footer>
  <span class="name">Beej Mantra · A quiet study of sacred sound</span>
  <span class="copy">© <span id="year"></span> <b>Manik Roy</b>. All Rights Reserved.</span>
</footer>
<script>
const DATA = [
  {s:"ॐ",iast:"Oṁ",deity:"Pranava · The Origin",meaning:"The primordial sound said to contain all other mantras within it."},
  {s:"लं",iast:"Laṁ",deity:"Mūlādhāra · Root",meaning:"Seed of the earth element; grounding, stability, survival."},
  {s:"वं",iast:"Vaṁ",deity:"Svādhiṣṭhāna · Sacral",meaning:"Seed of the water element; fluidity, feeling, creativity."},
  {s:"रं",iast:"Raṁ",deity:"Maṇipūra · Navel",meaning:"Seed of the fire element; will, transformation, digestion."},
  {s:"यं",iast:"Yaṁ",deity:"Anāhata · Heart",meaning:"Seed of the air element; compassion, breath, connection."},
  {s:"हं",iast:"Haṁ",deity:"Viśuddha · Throat",meaning:"Seed of ether/space; voice, truth, expression."},
  {s:"क्षं",iast:"Kṣaṁ",deity:"Ājñā · Third Eye",meaning:"Union of all elements; intuition, inner sight."},
  {s:"ऐं",iast:"Aiṁ",deity:"Sarasvatī · Wisdom",meaning:"Seed of speech, learning and the arts."},
  {s:"ह्रीं",iast:"Hrīṁ",deity:"Māyā · Illusion",meaning:"The bīja of transformation; dissolving what is unreal."},
  {s:"श्रीं",iast:"Śrīṁ",deity:"Lakṣmī · Abundance",meaning:"Seed of prosperity, grace and beauty."},
  {s:"क्लीं",iast:"Klīṁ",deity:"Kṛṣṇa · Attraction",meaning:"Seed of magnetism and devotional longing."},
  {s:"गं",iast:"Gaṁ",deity:"Gaṇeśa · Remover of Obstacles",meaning:"Invoked first, to clear the way for any undertaking."},
  {s:"दुं",iast:"Duṁ",deity:"Durgā · Protection",meaning:"Seed of fierce, protective feminine strength."}
];
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const counts = Object.fromEntries(DATA.map(m => [m.iast, 0]));
let voice = null;
let currentUtterance = null; // kept alive on purpose: browsers can silently drop unreferenced utterances
const supported = 'speechSynthesis' in window;
if (supported){
  const pick = () => { const vs = speechSynthesis.getVoices(); voice = vs.find(v => /hi[-_]IN/i.test(v.lang)) || vs.find(v => /IN/i.test(v.lang)) || null; };
  pick(); speechSynthesis.onvoiceschanged = pick;
}
function toast(msg){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--card);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:999px;font-size:13px;z-index:99;box-shadow:var(--shadow)'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.opacity = '0', 2600);
}
async function networkTTS(text, card){
  // Fallback for browsers/webviews with no Web Speech API: fetches real audio
  // from a free, keyless, no-registration TTS endpoint.
  try{
    const url = 'https://api.streamelements.com/kappa/v2/speech?voice=Aditi&text=' + encodeURIComponent(text);
    const audio = new Audio(url);
    card.classList.add('speaking');
    audio.onended = () => card.classList.remove('speaking');
    audio.onerror = () => { card.classList.remove('speaking'); toast('No voice engine available on this device.'); };
    await audio.play();
  } catch(err){
    card.classList.remove('speaking');
    toast('No voice engine available on this device.');
  }
}
function speak(text, card){
  if(!supported){ networkTTS(text, card); return; }
  try{
    speechSynthesis.cancel();
    card.classList.add('speaking');
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      currentUtterance = u; // prevents premature garbage collection mid-speech
      if(voice) u.voice = voice;
      u.rate = 0.75; u.pitch = 1;
      u.onend = () => card.classList.remove('speaking');
      u.onerror = () => { card.classList.remove('speaking'); networkTTS(text, card); };
      speechSynthesis.speak(u);
      if(speechSynthesis.paused) speechSynthesis.resume();
    }, 40);
  } catch(err){
    networkTTS(text, card);
  }
}
function render(filter){
  const q = (filter||'').trim().toLowerCase();
  grid.innerHTML = '';
  const list = DATA.filter(m => !q || m.s.includes(q) || m.iast.toLowerCase().includes(q) || m.deity.toLowerCase().includes(q) || m.meaning.toLowerCase().includes(q));
  empty.hidden = list.length !== 0;
  list.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="rings"><span class="ring r1"></span><span class="ring r2"></span><span class="ring r3"></span></div>
      <div class="top"><span class="syll">${m.s}</span><span class="iast">${m.iast}</span></div>
      <div class="deity">${m.deity}</div>
      <div class="meaning">${m.meaning}</div>
      <div class="row2">
        <button class="play" aria-label="Play ${m.iast}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Chant</button>
        <span class="count">Repeats: <b>${counts[m.iast]}</b></span>
      </div>`;
    const doPlay = (e) => { e.stopPropagation(); counts[m.iast]++; card.querySelector('.count b').textContent = counts[m.iast]; speak(m.iast, card); };
    card.querySelector('.play').addEventListener('click', doPlay);
    card.addEventListener('click', doPlay);
    grid.appendChild(card);
  });
}
document.getElementById('search').addEventListener('input', e => render(e.target.value));
document.getElementById('resetBtn').addEventListener('click', () => { DATA.forEach(m => counts[m.iast] = 0); render(document.getElementById('search').value); });

const THEMES = ['dark','light','oled','hc'];
const LABELS = {dark:'Dark', light:'Light', oled:'OLED', hc:'High Contrast'};
let ti = 0;
document.getElementById('themeBtn').addEventListener('click', () => {
  ti = (ti + 1) % THEMES.length;
  const t = THEMES[ti];
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeLabel').textContent = LABELS[t];
});
document.getElementById('year').textContent = new Date().getFullYear();
render('');
</script>
</body>
</html>
