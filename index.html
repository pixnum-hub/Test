<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ZoniFy</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Theme & App Meta -->
<meta name="theme-color" content="#080a0f" id="metaThemeColor">
<meta name="application-name" content="ZoniFy">
<meta name="description" content="Global time at a glance. Track world cities, plan meetings across timezones.">
<meta name="mobile-web-app-capable" content="yes">

<!-- Apple PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZoniFy">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<!-- Microsoft Tiles -->
<meta name="msapplication-TileColor" content="#080a0f">
<meta name="msapplication-TileImage" content="icon-144.png">

<!-- Open Graph -->
<meta property="og:title" content="ZoniFy – World Clock">
<meta property="og:description" content="Global time at a glance. Track world cities, plan meetings across timezones.">
<meta property="og:type" content="website">
<meta property="og:image" content="icon-512.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0f;--surface:#0e1118;--border:#1e2330;--text:#d4d8e8;--muted:#525870;
    --accent:#6457d4;--accent2:#d4567a;--clock-bg:#111520;--glow:rgba(100,87,212,.12);
    --shadow:0 4px 28px rgba(0,0,0,.6);--r:20px;--t:.3s cubic-bezier(.4,0,.2,1);
    --danger:#d4567a;--danger-bg:rgba(212,86,122,.10);
    --work-color:#3dba6f;--sleep-color:#525870;--evening-color:#d4923a;
  }
  [data-theme="light"]{
    --bg:#eceaf5;--surface:#f8f7ff;--border:#d4d0ee;--text:#12122a;--muted:#7a779a;
    --accent:#4a3dcc;--accent2:#cc3d66;--clock-bg:#f0eeff;--glow:rgba(74,61,204,.07);
    --shadow:0 4px 24px rgba(74,61,204,.09);
  }
  [data-theme="oled"]{
    --bg:#000;--surface:#000;--border:#141414;--text:#e8e8f8;--muted:#444458;
    --accent:#8070ff;--accent2:#ff6090;--clock-bg:#080808;--glow:rgba(128,112,255,.10);
    --shadow:0 2px 16px rgba(0,0,0,.95);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);transition:background var(--t),color var(--t)}
  body{display:flex;flex-direction:column;min-height:100vh}

  /* ── HEADER ── */
  header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo-title{font-size:clamp(1.3rem,5vw,1.8rem);font-weight:800;letter-spacing:-.03em;color:#dde2f0}
  .logo-sub{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .theme-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:4px;gap:2px}
  .theme-btn{background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:30px;font-size:.68rem;font-family:'JetBrains Mono',monospace;font-weight:600;color:#9aa0b4;transition:all var(--t);letter-spacing:.04em;white-space:nowrap}
  .theme-btn.active{background:#2e3347;color:#c8ccda;box-shadow:none}

  /* ── 12h/24h TOGGLE ── */
  .format-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:4px;gap:2px}
  .format-btn{background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:30px;font-size:.68rem;font-family:'JetBrains Mono',monospace;font-weight:600;color:#9aa0b4;transition:all var(--t);letter-spacing:.04em;white-space:nowrap}
  .format-btn.active{background:#2e3347;color:#c8ccda;box-shadow:none}

  /* ── HERO ── */
  .hero{margin:20px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow);animation:fadeIn .4s ease both;text-align:center;display:flex;flex-direction:column;align-items:center}
  .hero-label{font-size:.62rem;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .hero-time{font-size:clamp(3rem,16vw,5.5rem);font-weight:800;letter-spacing:-.04em;line-height:1;font-family:'JetBrains Mono',monospace;display:flex;align-items:baseline;justify-content:center;gap:0}
  .hero-sec{font-size:.38em;color:var(--accent2);font-weight:600;margin-left:6px;opacity:.85;letter-spacing:-.02em}
  .ampm{font-size:.35em;color:var(--accent2);vertical-align:super;font-weight:600;margin-left:4px}
  .hero-date{margin-top:10px;font-size:.88rem;color:var(--muted);text-align:center}
  .hero-tz{margin-top:4px;font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--accent);opacity:.8;text-align:center}

  /* ── SEARCH ── */
  .search-wrap{margin:18px 20px 0;position:relative}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 44px 12px 16px;font-family:'Syne',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color var(--t)}
  .search-input::placeholder{color:var(--muted)}
  .search-input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem;pointer-events:none}

  /* ── SECTION ROW ── */
  .section-row{margin:18px 20px 10px;display:flex;align-items:center;justify-content:space-between}
  .section-label{font-size:.62rem;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .section-actions{display:flex;gap:8px;align-items:center}
  .add-btn{display:flex;align-items:center;gap:6px;background:#2e3347;border:1px solid #3a4060;border-radius:30px;padding:8px 16px;color:#c8ccda;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:transform var(--t),background var(--t)}
  .add-btn:hover{background:#363d56;color:#dde2f0}
  .add-btn:active{transform:scale(.95)}
  .add-btn svg{width:14px;height:14px;flex-shrink:0}

  /* ── LEGEND ── */
  .legend{margin:0 20px 10px;display:flex;gap:14px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:.6rem;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.04em}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend-dot.work{background:var(--work-color)}
  .legend-dot.evening{background:var(--evening-color)}
  .legend-dot.sleep{background:var(--sleep-color)}

  /* ── CLOCKS ── */
  .clocks{display:flex;flex-direction:column;gap:8px;padding:0 20px;flex:1}
  .no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem;display:none}
  .no-results.show{display:block}

  /* ── CLOCK CARD ── */
  .clock-card{background:var(--clock-bg);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden;box-shadow:var(--shadow);animation:cardFadeIn .35s ease both;touch-action:none}
  .clock-card.removing{animation:slideOut .3s ease forwards}
  .clock-card.hidden{display:none}
  .clock-card.dragging{opacity:.5;transform:scale(.98);z-index:50;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .clock-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .clock-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
  .clock-card[data-status="work"]::after{background:var(--work-color)}
  .clock-card[data-status="evening"]::after{background:var(--evening-color)}
  .clock-card[data-status="sleep"]::after{background:var(--sleep-color)}
  .clock-card[data-status=""]::after{background:var(--accent)}

  .card-inner{padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;z-index:1}

  /* Drag handle */
  .drag-handle{color:var(--muted);cursor:grab;flex-shrink:0;display:flex;align-items:center;opacity:.5;transition:opacity var(--t);touch-action:none}
  .drag-handle:active{cursor:grabbing;opacity:1}
  .drag-handle svg{width:16px;height:16px}

  /* Status dot */
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background var(--t)}
  .status-dot.work{background:var(--work-color);box-shadow:0 0 6px var(--work-color)}
  .status-dot.evening{background:var(--evening-color);box-shadow:0 0 6px var(--evening-color)}
  .status-dot.sleep{background:var(--sleep-color)}

  .del-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:10px;color:var(--muted);transition:color var(--t),background var(--t);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .del-btn:hover,.del-btn:active{color:var(--danger);background:var(--danger-bg)}
  .del-btn svg{width:15px;height:15px}

  .clock-info{flex:1;min-width:0}
  .clock-city{font-size:.93rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .clock-region{font-size:.63rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .clock-status-label{font-size:.58rem;font-family:'JetBrains Mono',monospace;margin-top:3px;font-weight:600;letter-spacing:.04em}
  .clock-status-label.work{color:var(--work-color)}
  .clock-status-label.evening{color:var(--evening-color)}
  .clock-status-label.sleep{color:var(--sleep-color)}

  /* Analog */
  .analog-wrap{width:42px;height:42px;flex-shrink:0}
  .analog-clock{width:42px;height:42px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);position:relative}
  .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:4px}
  .hour-hand{width:2px;height:28%;background:var(--text);margin-left:-1px}
  .min-hand{width:1.5px;height:36%;background:var(--accent);margin-left:-.75px}
  .sec-hand{width:1px;height:38%;background:var(--accent2);margin-left:-.5px}
  .center-dot{position:absolute;width:5px;height:5px;background:var(--accent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}

  /* Digital time */
  .clock-right{text-align:right;flex-shrink:0}
  .clock-time{font-family:'JetBrains Mono',monospace;font-size:clamp(1rem,3.8vw,1.35rem);font-weight:600;letter-spacing:-.03em;line-height:1;display:flex;align-items:baseline;justify-content:flex-end;gap:0}
  .clock-time .ampm{font-size:.55em;color:var(--accent2);font-weight:400;margin-left:2px}
  .clock-time .sec{font-size:.58em;color:var(--accent2);font-weight:400;margin-left:2px;opacity:.75}
  .clock-date-small{font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px;text-align:right}
  .diff-badge{font-size:.56rem;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:20px;margin-top:4px;display:inline-block}
  .diff-badge.ahead{background:rgba(124,106,247,.15);color:var(--accent)}
  .diff-badge.behind{background:rgba(247,106,140,.15);color:var(--accent2)}
  .diff-badge.same{background:rgba(255,255,255,.06);color:var(--muted)}

  /* ── MEETING PLANNER PANEL ── */
  .planner-panel{margin:0 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:none}
  .planner-panel.open{display:block;animation:fadeIn .3s ease both}
  .planner-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .planner-title{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:8px}
  .planner-title span{font-size:1rem}
  .planner-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:8px;display:flex}
  .planner-close svg{width:16px;height:16px}
  .planner-body{padding:14px 18px 18px}
  .planner-time-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .planner-label{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
  .time-picker{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--text);outline:none;transition:border-color var(--t);cursor:pointer;-webkit-appearance:none}
  .time-picker:focus{border-color:var(--accent)}
  .planner-grid{display:flex;flex-direction:column;gap:6px}
  .planner-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;background:var(--clock-bg);border:1px solid var(--border)}
  .planner-row-emoji{font-size:1.2rem;flex-shrink:0}
  .planner-row-city{font-size:.82rem;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .planner-row-time{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:600;flex-shrink:0;color:var(--accent)}
  .planner-row-status{font-size:.6rem;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;flex-shrink:0;font-weight:600}
  .planner-row-status.work{background:rgba(74,222,128,.12);color:var(--work-color)}
  .planner-row-status.evening{background:rgba(245,158,11,.12);color:var(--evening-color)}
  .planner-row-status.sleep{background:rgba(107,107,128,.12);color:var(--sleep-color)}

  /* ── MODAL OVERLAY ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--t)}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:28px 28px 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 40px rgba(0,0,0,.4)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:14px auto 0}
  .modal-header{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:10px;transition:color var(--t)}
  .modal-close:hover{color:var(--text)}
  .modal-close svg{width:20px;height:20px}
  .modal-search-wrap{margin:0 20px 12px;position:relative}
  .modal-search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 40px 10px 14px;font-family:'Syne',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color var(--t)}
  .modal-search::placeholder{color:var(--muted)}
  .modal-search:focus{border-color:var(--accent)}
  .modal-search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none}
  .modal-list{overflow-y:auto;flex:1;padding:0 12px 24px}
  .modal-group-label{font-size:.6rem;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:10px 8px 4px}
  .modal-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;cursor:pointer;transition:background var(--t);border:none;background:none;width:100%;text-align:left}
  .modal-item:hover,.modal-item:active{background:var(--clock-bg)}
  .modal-item.already-added{opacity:.35;pointer-events:none}
  .modal-item-emoji{font-size:1.4rem;flex-shrink:0;width:32px;text-align:center}
  .modal-item-info{flex:1;min-width:0}
  .modal-item-city{font-size:.9rem;font-weight:700;letter-spacing:-.01em;display:block}
  .modal-item-country{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px;display:block}
  .modal-item-time{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);font-weight:600;flex-shrink:0}
  .modal-item-check{color:var(--accent);flex-shrink:0}
  .modal-item-check svg{width:16px;height:16px}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:.8rem;font-family:'JetBrains Mono',monospace;color:var(--text);box-shadow:var(--shadow);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── FOOTER ── */
  footer{margin-top:28px;padding:18px 20px;text-align:center;font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--muted);border-top:1px solid var(--border);letter-spacing:.04em}
  footer span{color:var(--accent)}

  /* ── PWA INSTALL BANNER ── */
  .install-banner{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:12px 16px;gap:12px;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:300;max-width:calc(100vw - 40px);width:360px;animation:bannerFadeIn .3s ease both}
  .install-banner-icon{font-size:1.6rem;flex-shrink:0}
  .install-banner-text{flex:1;min-width:0}
  .install-banner-title{font-size:.82rem;font-weight:700;letter-spacing:-.01em}
  .install-banner-sub{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
  .install-banner-actions{display:flex;gap:6px;flex-shrink:0}
  .install-btn{background:#2e3347;border:1px solid #3a4060;border-radius:20px;padding:6px 14px;color:#c8ccda;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;cursor:pointer;transition:background var(--t)}
  .install-btn:hover{background:#363d56}
  .install-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .install-dismiss{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:8px;display:flex;align-items:center}
  .install-dismiss svg{width:14px;height:14px}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes cardFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bannerFadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes slideOut{to{opacity:0;transform:translateX(60px);max-height:0;margin-bottom:0;padding:0}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-title">ZoniFy</div>
    <div class="logo-sub">Global Time at a Glance</div>
  </div>
  <div class="header-right">
    <div class="format-toggle">
      <button class="format-btn active" data-fmt="12">12h</button>
      <button class="format-btn" data-fmt="24">24h</button>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" data-theme="dark">Dark</button>
      <button class="theme-btn" data-theme="light">Light</button>
      <button class="theme-btn" data-theme="oled">OLED</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-label">⦿ Your Local Time</div>
  <div class="hero-time" id="localTime">--:--<span class="ampm"></span></div>
  <div class="hero-date" id="localDate"></div>
  <div class="hero-tz" id="localTz"></div>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" placeholder="Search city or country…" id="searchInput">
  <span class="search-icon">⌕</span>
</div>

<div class="section-row">
  <div class="section-label">World Cities</div>
  <div class="section-actions">
    <button class="add-btn" id="openPlanner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Meeting

const pad = n => String(n).padStart(2,'0');
let activeCities = [];
let use24h = false;
let dragSrcIdx = null;

function loadCities() {
  const saved = localStorage.getItem('wc-cities');
  if (saved) {
    try {
      const names = JSON.parse(saved);
      activeCities = names.map(n => ALL_CITIES.find(c => c.city === n)).filter(Boolean);
    } catch(e){}
  }
  if (!activeCities.length)
    activeCities = DEFAULT_CITY_NAMES.map(n => ALL_CITIES.find(c => c.city === n)).filter(Boolean);
}

function saveCities() {
  localStorage.setItem('wc-cities', JSON.stringify(activeCities.map(c => c.city)));
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function localOffsetMinutes() { return -new Date().getTimezoneOffset(); }

function tzOffsetMinutes(tz) {
  const now = new Date();
  const d = new Date(now.toLocaleString('en-US',{timeZone:tz}));
  const u = new Date(now.toLocaleString('en-US',{timeZone:'UTC'}));
  return Math.round((d-u)/60000);
}

function getTzLabel() {
  const off = -new Date().getTimezoneOffset();
  const s = off>=0?'+':'−';
  const h = Math.floor(Math.abs(off)/60), m = Math.abs(off)%60;
  return `UTC${s}${pad(h)}${m?':'+pad(m):''}`;
}

function getH24inTz(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',hour12:false}).formatToParts(now);
  return parseInt(parts.find(p=>p.type==='hour').value);
}

function getStatus(h24) {
  if (h24 >= 8 && h24 < 18) return 'work';
  if (h24 >= 18 && h24 < 23) return 'evening';
  return 'sleep';
}

function getStatusLabel(h24) {
  if (h24 >= 8 && h24 < 18) return '● Working hours';
  if (h24 >= 18 && h24 < 23) return '● Evening';
  return '● Night / Sleep';
}

function formatTimeStr(h24, m, s, showSec=true) {
  if (use24h) {
    return showSec
      ? `${pad(h24)}:${pad(m)}<span class="sec">:${pad(s)}</span>`
      : `${pad(h24)}:${pad(m)}`;
  } else {
    const ampm = h24>=12?'PM':'AM';
    const h12 = h24%12||12;
    return showSec
      ? `${pad(h12)}:${pad(m)}<span class="sec">:${pad(s)}</span><span class="ampm">${ampm}</span>`
      : `${pad(h12)}:${pad(m)}<span class="ampm">${ampm}</span>`;
  }
}

function getCityTimeString(tz) {
  const now = new Date();
  const opts = {timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:!use24h};
  return new Intl.DateTimeFormat('en-US',opts).format(now);
}

/* ═══════════════════════════════════════════
   HERO LOCAL TIME
═══════════════════════════════════════════ */
function updateLocalTime() {
  const now = new Date();
  const h24 = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  let timeHTML;
  if (use24h) {
    timeHTML = `${pad(h24)}:${pad(m)}<span class="hero-sec">:${pad(s)}</span>`;
  } else {
    const ampm = h24 >= 12 ? 'PM' : 'AM';
    const h12 = h24 % 12 || 12;
    timeHTML = `${pad(h12)}:${pad(m)}<span class="hero-sec">:${pad(s)}</span><span class="ampm">${ampm}</span>`;
  }
  const el = document.getElementById('localTime');
  if (el) el.innerHTML = timeHTML;
  const dateEl = document.getElementById('localDate');
  if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const tzEl = document.getElementById('localTz');
  if (tzEl) tzEl.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone + ' · ' + getTzLabel();
}

/* ═══════════════════════════════════════════
   BUILD CARDS
═══════════════════════════════════════════ */
function buildCards() {
  const container = document.getElementById('clocksContainer');
  container.innerHTML = '';
  activeCities.forEach((ci, i) => createCard(ci, i, container));
  updateCityTimes();
  applySearch();
}

function createCard(ci, i, container) {
  const h24 = getH24inTz(ci.tz);
  const status = getStatus(h24);
  const statusLabel = getStatusLabel(h24);

  const card = document.createElement('div');
  card.className = 'clock-card';
  card.dataset.city = ci.city;
  card.dataset.index = i;
  card.dataset.status = status;
  card.dataset.search = (ci.city+' '+ci.country+' '+ci.region).toLowerCase();
  card.draggable = true;

  card.innerHTML = `
    <div class="card-inner">
      <div class="drag-handle" title="Drag to reorder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/>
        </svg>
      </div>
      <div class="status-dot ${status}" title="${statusLabel}"></div>
      <div class="analog-wrap">
        <div class="analog-clock">
          <div class="hand hour-hand" id="hr${i}"></div>
          <div class="hand min-hand" id="mn${i}"></div>
          <div class="hand sec-hand" id="sc${i}"></div>
          <div class="center-dot"></div>
        </div>
      </div>
      <div class="clock-info">
        <div class="clock-city">${ci.emoji} ${ci.city}</div>
        <div class="clock-region">${ci.country} · ${ci.region}</div>
        <div class="clock-status-label ${status}" id="sl${i}">${statusLabel}</div>
      </div>
      <div class="clock-right">
        <div class="clock-time" id="tm${i}">--:--</div>
        <div class="clock-date-small" id="dt${i}">--</div>
        <div class="diff-badge same" id="dif${i}"></div>
      </div>
      <button class="del-btn" title="Remove ${ci.city}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  `;

  // Delete
  card.querySelector('.del-btn').addEventListener('click', e => {
    e.stopPropagation();
    deleteCity(ci.city, card);
  });

  // Drag & Drop
  card.addEventListener('dragstart', e => {
    dragSrcIdx = i;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.clock-card').forEach(c => c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.clock-card').forEach(c => c.classList.remove('drag-over'));
    if (parseInt(card.dataset.index) !== dragSrcIdx) card.classList.add('drag-over');
  });
  card.addEventListener('drop', e => {
    e.preventDefault();
    const destIdx = parseInt(card.dataset.index);
    if (dragSrcIdx !== null && dragSrcIdx !== destIdx) {
      const moved = activeCities.splice(dragSrcIdx, 1)[0];
      activeCities.splice(destIdx, 0, moved);
      saveCities();
      buildCards();
      updatePlannerGrid();
      showToast(`↕️ ${moved.city} moved`);
    }
    dragSrcIdx = null;
  });

  // Touch drag (mobile)
  let touchStartY = 0, touchSrcIdx = null;
  card.querySelector('.drag-handle').addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchSrcIdx = i;
    card.classList.add('dragging');
    e.preventDefault();
  }, {passive:false});

  card.querySelector('.drag-handle').addEventListener('touchmove', e => {
    e.preventDefault();
    const y = e.touches[0].clientY;
    const els = document.elementsFromPoint(e.touches[0].clientX, y);
    const target = els.find(el => el.classList.contains('clock-card') && el !== card);
    document.querySelectorAll('.clock-card').forEach(c => c.classList.remove('drag-over'));
    if (target) target.classList.add('drag-over');
  }, {passive:false});

  card.querySelector('.drag-handle').addEventListener('touchend', e => {
    card.classList.remove('dragging');
    const y = e.changedTouches[0].clientY;
    const els = document.elementsFromPoint(e.changedTouches[0].clientX, y);
    const target = els.find(el => el.classList.contains('clock-card') && el !== card);
    document.querySelectorAll('.clock-card').forEach(c => c.classList.remove('drag-over'));
    if (target && touchSrcIdx !== null) {
      const destIdx = parseInt(target.dataset.index);
      if (touchSrcIdx !== destIdx) {
        const moved = activeCities.splice(touchSrcIdx, 1)[0];
        activeCities.splice(destIdx, 0, moved);
        saveCities();
        buildCards();
        updatePlannerGrid();
        showToast(`↕️ ${moved.city} moved`);
      }
    }
    touchSrcIdx = null;
  });

  container.appendChild(card);
}

function deleteCity(cityName, cardEl) {
  cardEl.classList.add('removing');
  setTimeout(() => {
    activeCities = activeCities.filter(c => c.city !== cityName);
    saveCities();
    buildCards();
    updateModalList();
    updatePlannerGrid();
    showToast(`🗑️ ${cityName} removed`);
  }, 280);
}

/* ═══════════════════════════════════════════
   UPDATE CITY TIMES
═══════════════════════════════════════════ */
function updateCityTimes() {
  const now = new Date();
  const localOff = localOffsetMinutes();
  activeCities.forEach((ci, i) => {
    const opts = {timeZone:ci.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
    const parts = new Intl.DateTimeFormat('en-US',opts).formatToParts(now);
    const p = {};
    parts.forEach(x => p[x.type]=x.value);
    const h24=parseInt(p.hour), m=parseInt(p.minute), s=parseInt(p.second);

    const tm = document.getElementById(`tm${i}`);
    if (tm) tm.innerHTML = formatTimeStr(h24, m, s, true);

    const dt = document.getElementById(`dt${i}`);
    if (dt) {
      const ds = new Date(now.toLocaleString('en-US',{timeZone:ci.tz}));
      dt.textContent = ds.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    }

    // Diff badge
    const tzOff = tzOffsetMinutes(ci.tz);
    const diff = tzOff - localOff;
    const db = document.getElementById(`dif${i}`);
    if (db) {
      if (diff===0){db.textContent='Same as you';db.className='diff-badge same';}
      else{
        const hrs=diff/60, sign=diff>0?'+':'';
        const lbl=Number.isInteger(hrs)?`${sign}${hrs}h`:`${sign}${(diff/60).toFixed(1)}h`;
        db.textContent=diff>0?`${lbl} ahead`:`${lbl} behind`;
        db.className=`diff-badge ${diff>0?'ahead':'behind'}`;
      }
    }

    // Status (update every tick for color correctness)
    const status = getStatus(h24);
    const card = document.querySelector(`.clock-card[data-city="${ci.city}"]`);
    if (card) {
      card.dataset.status = status;
      const dot = card.querySelector('.status-dot');
      if (dot) { dot.className = `status-dot ${status}`; }
      const sl = document.getElementById(`sl${i}`);
      if (sl) { sl.className = `clock-status-label ${status}`; sl.textContent = getStatusLabel(h24); }
    }

    // Analog
    const secDeg=s*6, minDeg=m*6+s*0.1, hrDeg=(h24%12)*30+m*0.5;
    const hr=document.getElementById(`hr${i}`);
    const mn=document.getElementById(`mn${i}`);
    const sc=document.getElementById(`sc${i}`);
    if(hr)hr.style.transform=`rotate(${hrDeg}deg)`;
    if(mn)mn.style.transform=`rotate(${minDeg}deg)`;
    if(sc)sc.style.transform=`rotate(${secDeg}deg)`;
  });
}

/* ═══════════════════════════════════════════
   MEETING PLANNER
═══════════════════════════════════════════ */
const plannerPanel = document.getElementById('plannerPanel');
const meetingTimeInput = document.getElementById('meetingTime');

document.getElementById('openPlanner').addEventListener('click', () => {
  const isOpen = plannerPanel.classList.toggle('open');
  if (isOpen) {
    // set default to next round hour
    const now = new Date();
    const next = new Date(now);
    next.setMinutes(0,0,0);
    next.setHours(now.getHours()+1);
    meetingTimeInput.value = `${pad(next.getHours())}:00`;
    updatePlannerGrid();
    document.getElementById('plannerLocalTz').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
  }
});

document.getElementById('closePlanner').addEventListener('click', () => {
  plannerPanel.classList.remove('open');
});

meetingTimeInput.addEventListener('input', updatePlannerGrid);

function updatePlannerGrid() {
  if (!plannerPanel.classList.contains('open')) return;
  const [hStr, mStr] = meetingTimeInput.value.split(':');
  const localH = parseInt(hStr)||9;
  const localM = parseInt(mStr)||0;

  // Convert local time to UTC
  const now = new Date();
  const base = new Date(now);
  base.setHours(localH, localM, 0, 0);

  const grid = document.getElementById('plannerGrid');
  grid.innerHTML = '';

  activeCities.forEach(ci => {
    // Get what this time is in the city's tz
    const cityTime = new Date(base.toLocaleString('en-US',{timeZone:ci.tz}));
    // Actually compute by offset diff
    const localOff = localOffsetMinutes();
    const cityOff = tzOffsetMinutes(ci.tz);
    const diffMin = cityOff - localOff;
    const totalMin = localH*60 + localM + diffMin;
    const cityH24 = ((Math.floor(totalMin/60)%24)+24)%24;
    const cityMin = ((totalMin%60)+60)%60;

    const status = getStatus(cityH24);
    let timeStr;
    if (use24h) {
      timeStr = `${pad(cityH24)}:${pad(cityMin)}`;
    } else {
      const ampm = cityH24>=12?'PM':'AM';
      const h12 = cityH24%12||12;
      timeStr = `${pad(h12)}:${pad(cityMin)} ${ampm}`;
    }

    const row = document.createElement('div');
    row.className = 'planner-row';
    row.innerHTML = `
      <span class="planner-row-emoji">${ci.emoji}</span>
      <span class="planner-row-city">${ci.city}</span>
      <span class="planner-row-time">${timeStr}</span>
      <span class="planner-row-status ${status}">${status==='work'?'✓ Good':'sleep'==='sleep'?'😴 Asleep':'🌙 Evening'}</span>
    `;
    // Fix status label text
    row.querySelector('.planner-row-status').textContent =
      status==='work' ? '✓ Good time' : status==='evening' ? '🌙 Evening' : '😴 Asleep';
    grid.appendChild(row);
  });
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
function applySearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.clock-card').forEach(card => {
    const match = !q || card.dataset.search.includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  document.getElementById('noResults').classList.toggle('show', visible===0);
}

document.getElementById('searchInput').addEventListener('input', applySearch);

/* ═══════════════════════════════════════════
   ADD CITY MODAL
═══════════════════════════════════════════ */
const modalOverlay = document.getElementById('modalOverlay');
const modalSearch = document.getElementById('modalSearch');

document.getElementById('openModal').addEventListener('click', () => {
  modalOverlay.classList.add('open');
  modalSearch.value = '';
  updateModalList();
  setTimeout(() => modalSearch.focus(), 350);
});

function closeModal() { modalOverlay.classList.remove('open'); }
document.getElementById('closeModal').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) closeModal(); });
modalSearch.addEventListener('input', updateModalList);

function updateModalList() {
  const q = modalSearch.value.toLowerCase().trim();
  const listEl = document.getElementById('modalList');
  const activeCityNames = new Set(activeCities.map(c=>c.city));
  const groups = {};
  ALL_CITIES.forEach(c => {
    if (q && !(c.city.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)||c.region.toLowerCase().includes(q))) return;
    if (!groups[c.region]) groups[c.region]=[];
    groups[c.region].push(c);
  });
  listEl.innerHTML='';
  ['Americas','Europe','Africa','Middle East','Asia','Oceania'].forEach(region => {
    const cities = groups[region];
    if (!cities?.length) return;
    const lbl = document.createElement('div');
    lbl.className='modal-group-label'; lbl.textContent=region;
    listEl.appendChild(lbl);
    cities.forEach(c => {
      const added = activeCityNames.has(c.city);
      const item = document.createElement('button');
      item.className='modal-item'+(added?' already-added':'');
      item.innerHTML=`
        <span class="modal-item-emoji">${c.emoji}</span>
        <span class="modal-item-info">
          <span class="modal-item-city">${c.city}</span>
          <span class="modal-item-country">${c.country} · ${c.region}</span>
        </span>
        <span class="modal-item-time">${getCityTimeString(c.tz)}</span>
        ${added?`<span class="modal-item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>`:''}
      `;
      if (!added) item.addEventListener('click', ()=>addCity(c));
      listEl.appendChild(item);
    });
  });
  if (!listEl.children.length)
    listEl.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--muted);font-size:.9rem;">No cities match your search.</div>';
}

function addCity(cityObj) {
  activeCities.push(cityObj);
  saveCities();
  buildCards();
  updateModalList();
  updatePlannerGrid();
  showToast(`✅ ${cityObj.city} added`);
}

/* ═══════════════════════════════════════════
   12H / 24H FORMAT TOGGLE
═══════════════════════════════════════════ */
document.querySelectorAll('.format-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    use24h = this.dataset.fmt === '24';
    document.querySelectorAll('.format-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    localStorage.setItem('wc-fmt', use24h?'24':'12');

    buildCards();       // full re-render so AM/PM spans appear/disappear correctly
    updatePlannerGrid();
    updateModalList();
  });
});

   THEME
═══════════════════════════════════════════ */
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const t = this.dataset.theme;
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    localStorage.setItem('wc-theme', t);
    // Update PWA theme-color meta
    const themeColors = { dark:'#080a0f', light:'#eceaf5', oled:'#000000' };
    document.getElementById('metaThemeColor')?.setAttribute('content', themeColors[t] || '#080a0f');
  });
});
const savedTheme = localStorage.getItem('wc-theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===savedTheme));
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

document.getElementById('footerYear').textContent = new Date().getFullYear();
document.getElementById('plannerLocalTz').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;

// PWA Install Prompt
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBanner) installBanner.style.display = 'flex';
});
document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    if (installBanner) installBanner.style.display = 'none';
  }
  deferredPrompt = null;
});
document.getElementById('installDismiss')?.addEventListener('click', () => {
  if (installBanner) installBanner.style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  if (installBanner) installBanner.style.display = 'none';
  deferredPrompt = null;
});
</script>
