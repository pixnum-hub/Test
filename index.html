<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tactical GPS</title>

<link rel="manifest" href="manifest.json">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
}

.frame{

width:100%;
max-width:420px;
border:2px solid rgba(255,255,255,0.2);
border-radius:20px;
margin:10px;
padding:10px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
}

#map{
height:350px;
border-radius:12px;
margin-bottom:10px;
}

button{

width:100%;
padding:10px;
margin:4px 0;
border:none;
border-radius:8px;
background:#00ff88;
font-weight:bold;
}

.data{
font-size:14px;
margin:5px 0;
}

.toggle{

position:absolute;
right:20px;
top:20px;
width:45px;
height:45px;
border-radius:50%;
background:#00ff88;
border:none;
}

.footer{
text-align:center;
font-size:12px;
opacity:.7;
margin-top:10px;
}

</style>
</head>

<body>

<div class="frame">

<button class="toggle" onclick="toggleMode()">🌙</button>

<h3 style="text-align:center;">🛰 Tactical GPS</h3>

<div id="map"></div>

<div class="data" id="coords">Waiting for GPS...</div>
<div class="data" id="speed"></div>
<div class="data" id="accuracy"></div>

<button onclick="startTracking()">Start Tracking</button>
<button onclick="addWaypoint()">Add Waypoint</button>
<button onclick="replayTrack()">Replay Track</button>

<div class="footer">
© Manik Roy <span id="year"></span>. All Rights Reserved.
</div>

</div>

<script>

document.getElementById("year").textContent=new Date().getFullYear()

let map=L.map("map").setView([20,0],3)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

let marker=null
let track=[]
let polyline=L.polyline([], {color:"lime"}).addTo(map)

function drawGrid(){

for(let lat=-80;lat<80;lat+=0.01){

L.polyline(
[[lat,-180],[lat,180]],
{color:"rgba(0,255,0,0.1)",weight:1}
).addTo(map)

}

for(let lon=-180;lon<180;lon+=0.01){

L.polyline(
[[-80,lon],[80,lon]],
{color:"rgba(0,255,0,0.1)",weight:1}
).addTo(map)

}

}

drawGrid()

function startTracking(){

navigator.geolocation.watchPosition(

pos=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude
const speed=pos.coords.speed||0
const accuracy=pos.coords.accuracy

document.getElementById("coords").innerHTML=
`Lat: ${lat.toFixed(6)} | Lon: ${lon.toFixed(6)}`

document.getElementById("speed").innerHTML=
`Speed: ${(speed*3.6).toFixed(1)} km/h`

document.getElementById("accuracy").innerHTML=
`Accuracy: ${accuracy.toFixed(1)} m`

map.setView([lat,lon],16)

if(!marker){

marker=L.marker([lat,lon]).addTo(map)

}else{

marker.setLatLng([lat,lon])

}

track.push([lat,lon])
polyline.setLatLngs(track)

},

err=>alert("GPS Error: "+err.message),

{enableHighAccuracy:true}

)

}

function addWaypoint(){

if(track.length==0)return

L.marker(track[track.length-1])
.addTo(map)
.bindPopup("Waypoint")
.openPopup()

}

function replayTrack(i=0){

if(i>=track.length)return

marker.setLatLng(track[i])
map.setView(track[i],16)

setTimeout(()=>replayTrack(i+1),400)

}

function toggleMode(){

document.body.style.background=
document.body.style.background==="black"
?"#0b1220":"black"

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
