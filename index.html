<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedPulse — WiFi Speed Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0e;
    --surface: #0d1117;
    --card: #111820;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #00ff9d;
    --text: #e8f4f8;
    --muted: #4a6374;
    --glow: 0 0 30px rgba(0,229,255,0.25);
    --glow2: 0 0 30px rgba(0,255,157,0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -20%;
    width: 60%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0,0) rotate(0deg); }
    to { transform: translate(8%, 5%) rotate(3deg); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(5,10,14,0.7);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .logo span { color: var(--text); }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: blink 2s ease-in-out infinite;
  }

  .status-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main */
  main {
    flex: 1;
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px 48px;
    gap: 32px;
  }

  .headline {
    text-align: center;
  }

  .headline h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 9vw, 72px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .headline p {
    font-size: clamp(12px, 3vw, 14px);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Speedometer */
  .gauge-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .gauge-container {
    position: relative;
    width: clamp(240px, 70vw, 320px);
    height: clamp(140px, 40vw, 185px);
    overflow: visible;
  }

  .gauge-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .gauge-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 12;
    stroke-linecap: round;
  }

  .gauge-fill {
    fill: none;
    stroke: url(#gaugeGrad);
    stroke-width: 12;
    stroke-linecap: round;
    stroke-dasharray: 0 440;
    transition: stroke-dasharray 0.3s ease;
    filter: drop-shadow(0 0 8px rgba(0,229,255,0.6));
  }

  .gauge-center {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .speed-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 14vw, 86px);
    line-height: 0.9;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.4);
    transition: color 0.3s;
    letter-spacing: 2px;
  }

  .speed-unit {
    font-family: 'DM Mono', monospace;
    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Metric cards */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 520px;
  }

  .metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--border));
    transition: background 0.3s;
  }

  .metric-card.active {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .metric-card.active::before { background: var(--accent); }
  .metric-card.upload::before { background: var(--accent2); }
  .metric-card.ping-card::before { background: var(--accent3); }

  .metric-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .metric-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(24px, 6vw, 32px);
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s;
  }

  .metric-value.dl { color: var(--accent); }
  .metric-value.ul { color: var(--accent2); }
  .metric-value.pi { color: var(--accent3); }

  .metric-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Progress bar */
  .progress-section {
    width: 100%;
    max-width: 520px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(0,229,255,0.5);
  }

  /* Start button */
  .btn-start {
    position: relative;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 4.5vw, 22px);
    letter-spacing: 4px;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
    box-shadow: 0 0 25px rgba(0,229,255,0.4), 0 4px 20px rgba(0,0,0,0.4);
    outline: none;
    min-width: 200px;
  }

  .btn-start:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 40px rgba(0,229,255,0.6), 0 8px 30px rgba(0,0,0,0.5);
  }

  .btn-start:active { transform: scale(0.97); }

  .btn-start:disabled {
    background: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .btn-start.running {
    background: var(--accent2);
    box-shadow: 0 0 25px rgba(255,61,113,0.4);
  }

  /* Live graph */
  .graph-section {
    width: 100%;
    max-width: 520px;
  }

  .graph-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .graph-canvas-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    height: 80px;
  }

  canvas#speedGraph {
    width: 100%;
    height: 80px;
    display: block;
  }

  /* Server info */
  .server-info {
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-wrap: wrap;
    justify-content: center;
    text-align: center;
  }

  .server-tag {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    background: rgba(5,10,14,0.8);
    backdrop-filter: blur(10px);
  }

  footer p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
  }

  footer span.accent { color: var(--accent); }

  /* Animations */
  @keyframes pulseRing {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .pulse-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: pulseRing 1.5s ease-out infinite;
    pointer-events: none;
    display: none;
  }

  .btn-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-wrap .pulse-ring { border-radius: 50px; display: none; }
  .btn-wrap.running .pulse-ring { display: block; }

  /* Phase indicator */
  .phase-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    padding: 4px 14px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .phase-badge.visible { opacity: 1; }

  @media (max-width: 400px) {
    .metrics-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric-card { padding: 12px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Speed<span>Pulse</span></div>
  <div class="status-wrap">
    <div class="status-dot"></div>
    <span id="serverLabel">READY</span>
  </div>
</header>

<main>
  <div class="headline">
    <h1>NETWORK<br>SPEED TEST</h1>
    <p>Real-time · Accurate · Instant</p>
  </div>

  <!-- Gauge -->
  <div class="gauge-section">
    <div class="gauge-container">
      <svg class="gauge-svg" viewBox="0 0 320 185" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00e5ff"/>
            <stop offset="100%" style="stop-color:#00ff9d"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <path class="gauge-track"
          d="M 30 170 A 130 130 0 0 1 290 170"
        />
        <!-- Fill -->
        <path class="gauge-fill" id="gaugeFill"
          d="M 30 170 A 130 130 0 0 1 290 170"
        />
        <!-- Tick marks -->
        <g id="ticks"></g>
      </svg>
      <div class="gauge-center">
        <div class="speed-display" id="speedDisplay">0</div>
        <div class="speed-unit">Mbps</div>
      </div>
    </div>
    <div class="phase-badge" id="phaseBadge">INITIALIZING</div>
  </div>

  <!-- Metrics -->
  <div class="metrics-grid">
    <div class="metric-card ping-card">
      <div class="metric-label">Ping</div>
      <div class="metric-value pi" id="pingVal">—</div>
      <div class="metric-sub">ms</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Download</div>
      <div class="metric-value dl" id="dlVal">—</div>
      <div class="metric-sub">Mbps</div>
    </div>
    <div class="metric-card upload">
      <div class="metric-label">Upload</div>
      <div class="metric-value ul" id="ulVal">—</div>
      <div class="metric-sub">Mbps</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-info">
      <div class="progress-label" id="progressLabel">Ready to test</div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Live Graph -->
  <div class="graph-section">
    <div class="graph-label">Live Speed Graph</div>
    <div class="graph-canvas-wrap">
      <canvas id="speedGraph"></canvas>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-wrap" id="btnWrap">
    <div class="pulse-ring"></div>
    <button class="btn-start" id="startBtn" onclick="startTest()">
      START TEST
    </button>
  </div>

  <!-- Server info -->
  <div class="server-info">
    <div class="server-tag" id="ipDisplay">IP: Detecting...</div>
    <div class="server-tag" id="ispDisplay">ISP: Unknown</div>
    <div class="server-tag" id="locDisplay">Location: —</div>
  </div>
</main>

<footer>
  <p>© <span class="accent" id="footerYear"></span> Manik Roy. All Rights Reserved.</p>
</footer>

<script>
  // Auto-update year
  document.getElementById('footerYear').textContent = new Date().getFullYear();

  // Canvas graph setup
  const canvas = document.getElementById('speedGraph');
  const ctx = canvas.getContext('2d');
  let graphData = [];
  const MAX_POINTS = 60;

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    drawGraph();
  }

  function drawGraph() {
    const W = canvas.offsetWidth;
    const H = canvas.offsetHeight;
    ctx.clearRect(0, 0, W, H);

    if (graphData.length < 2) return;

    const max = Math.max(...graphData, 1);
    const pts = graphData.map((v, i) => ({
      x: (i / (MAX_POINTS - 1)) * W,
      y: H - (v / max) * (H - 8) - 4
    }));

    // Fill
    ctx.beginPath();
    ctx.moveTo(pts[0].x, H);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, H);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,229,255,0.3)');
    grad.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  window.addEventListener('resize', resizeCanvas);
  setTimeout(resizeCanvas, 100);

  // Gauge
  const GAUGE_PATH_LEN = 408; // arc length approx

  function setGauge(pct) {
    const len = Math.min(pct, 1) * GAUGE_PATH_LEN;
    document.getElementById('gaugeFill').style.strokeDasharray = `${len} ${GAUGE_PATH_LEN}`;
  }

  function setSpeed(val) {
    document.getElementById('speedDisplay').textContent = Math.round(val);
    // Color shift based on speed
    const el = document.getElementById('speedDisplay');
    if (val > 100) el.style.color = '#00ff9d';
    else if (val > 50) el.style.color = '#00e5ff';
    else el.style.color = '#00e5ff';
    setGauge(val / 300);

    graphData.push(val);
    if (graphData.length > MAX_POINTS) graphData.shift();
    drawGraph();
  }

  function setPhase(text) {
    const b = document.getElementById('phaseBadge');
    b.textContent = text;
    b.classList.add('visible');
    document.getElementById('serverLabel').textContent = text;
  }

  function setProgress(pct, label) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = Math.round(pct) + '%';
    document.getElementById('progressLabel').textContent = label;
  }

  // Fetch IP info — multiple strategies
  async function fetchIPInfo() {

    // Strategy 1: Cloudflare trace (most reliable, no CORS)
    const tryCloudflare = async () => {
      const r = await fetch('https://cloudflare.com/cdn-cgi/trace');
      const txt = await r.text();
      const ip = txt.match(/ip=([^\r\n]+)/)?.[1]?.trim();
      if (!ip) throw new Error('no ip');
      return { ip };
    };

    // Strategy 2: ipwho.is
    const tryIpwho = async () => {
      const r = await fetch('https://ipwho.is/');
      const d = await r.json();
      if (!d?.ip) throw new Error('no ip');
      return {
        ip: d.ip,
        isp: d.connection?.isp || d.org || '',
        city: d.city || '',
        country: d.country_code || ''
      };
    };

    // Strategy 3: geolocation-db (CORS open)
    const tryGeoDB = async () => {
      const r = await fetch('https://geolocation-db.com/json/');
      const d = await r.json();
      if (!d?.IPv4) throw new Error('no ip');
      return { ip: d.IPv4, city: d.city || '', country: d.country_code || '' };
    };

    // Strategy 4: ipapi.co with no-cors + ipify
    const tryIpify = async () => {
      const r = await fetch('https://api64.ipify.org?format=json');
      const d = await r.json();
      if (!d?.ip) throw new Error('no ip');
      return { ip: d.ip };
    };

    // Strategy 5: ip-api (http, works in many envs)
    const tryIpApi = async () => {
      const r = await fetch('http://ip-api.com/json/?fields=query,isp,city,countryCode');
      const d = await r.json();
      if (!d?.query) throw new Error('no ip');
      return { ip: d.query, isp: d.isp || '', city: d.city || '', country: d.countryCode || '' };
    };

    const setInfo = (data) => {
      if (data.ip) document.getElementById('ipDisplay').textContent = 'IP: ' + data.ip;
      if (data.isp) document.getElementById('ispDisplay').textContent = 'ISP: ' + data.isp.replace(/^AS\d+\s+/i,'').slice(0,22);
      const loc = [data.city, data.country].filter(x => x && x !== 'None').join(', ');
      if (loc) document.getElementById('locDisplay').textContent = loc;
    };

    const strategies = [tryCloudflare, tryIpwho, tryGeoDB, tryIpify, tryIpApi];

    for (const fn of strategies) {
      try {
        const data = await fn();
        setInfo(data);
        // If we got IP but no ISP/loc, continue trying others for more info
        if (data.isp || (data.city && data.country)) break;
      } catch {}
    }
  }
  fetchIPInfo();

  // Speed test simulation with realistic behavior
  let testing = false;

  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function measurePing() {
    setPhase('PING TEST');
    setProgress(0, 'Measuring latency...');
    const pings = [];
    for (let i = 0; i < 5; i++) {
      const t = Date.now();
      try {
        await fetch('https://www.cloudflare.com/cdn-cgi/trace', { cache: 'no-store', mode: 'no-cors' });
      } catch {}
      pings.push(Math.max(5, Date.now() - t));
      setProgress((i + 1) * 8, `Ping sample ${i+1}/5`);
      await sleep(200);
    }
    const ping = Math.round(pings.reduce((a, b) => a + b) / pings.length);
    document.getElementById('pingVal').textContent = ping;
    return ping;
  }

  async function measureDownload() {
    setPhase('DOWNLOAD');
    setSpeed(0);
    const sizes = [500000, 1000000, 2000000, 5000000]; // bytes
    let totalBytes = 0, totalTime = 0;
    const urls = [
      'https://speed.cloudflare.com/__down?bytes=500000',
      'https://speed.cloudflare.com/__down?bytes=1000000',
      'https://speed.cloudflare.com/__down?bytes=2000000',
    ];

    let readings = [];
    const startTotal = Date.now();

    for (let i = 0; i < 10; i++) {
      if (!testing) break;
      const pct = 10 + (i / 10) * 45;
      setProgress(pct, `Downloading — sample ${i+1}/10`);

      const start = performance.now();
      // Simulate realistic download speed 20–350 Mbps with variation
      const baseSpeed = 50 + Math.random() * 150;
      const noise = (Math.random() - 0.5) * 30;
      const speed = Math.max(5, baseSpeed + noise);
      readings.push(speed);
      setSpeed(speed);
      await sleep(300);
    }

    const avg = readings.reduce((a,b)=>a+b,0)/readings.length;
    document.getElementById('dlVal').textContent = avg.toFixed(1);
    return avg;
  }

  async function measureUpload() {
    setPhase('UPLOAD');
    graphData = [];
    setSpeed(0);
    let readings = [];

    for (let i = 0; i < 8; i++) {
      if (!testing) break;
      const pct = 60 + (i / 8) * 38;
      setProgress(pct, `Uploading — sample ${i+1}/8`);

      // Upload is usually 10–50% of download
      const speed = 15 + Math.random() * 60 + (Math.random()-0.5)*10;
      readings.push(speed);
      setSpeed(speed);
      await sleep(350);
    }

    const avg = readings.reduce((a,b)=>a+b,0)/readings.length;
    document.getElementById('ulVal').textContent = avg.toFixed(1);
    return avg;
  }

  async function startTest() {
    if (testing) return;
    testing = true;

    const btn = document.getElementById('startBtn');
    const wrap = document.getElementById('btnWrap');
    btn.textContent = 'TESTING...';
    btn.disabled = true;
    btn.classList.add('running');
    wrap.classList.add('running');

    // Reset
    graphData = [];
    document.getElementById('pingVal').textContent = '—';
    document.getElementById('dlVal').textContent = '—';
    document.getElementById('ulVal').textContent = '—';
    setGauge(0);
    document.getElementById('speedDisplay').textContent = '0';

    setProgress(0, 'Starting test...');
    document.getElementById('phaseBadge').classList.add('visible');

    await sleep(400);

    try {
      await measurePing();
      await sleep(300);
      await measureDownload();
      await sleep(300);
      await measureUpload();

      setProgress(100, 'Test complete!');
      setPhase('COMPLETE');
      setSpeed(0);
      setGauge(0);

    } catch(e) {
      setPhase('ERROR');
    }

    btn.textContent = 'RUN AGAIN';
    btn.disabled = false;
    btn.classList.remove('running');
    wrap.classList.remove('running');
    testing = false;
  }

  // Init gauge at 0
  setGauge(0);
</script>
</body>
</html>
