<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AI Product Counter — Manik Roy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── THEMES ── */
[data-theme="dark"] {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#23273a; --surface3:#2d324a;
  --border:rgba(255,255,255,.08); --text:#e8eaf6; --muted:#7c829e;
  --accent:#6c8bff; --accent-glow:rgba(108,139,255,.3);
  --accent2:#ff7eb6; --accent2-glow:rgba(255,126,182,.2);
  --green:#4dffb0; --green-glow:rgba(77,255,176,.25);
  --warn:#ffb347; --warn-glow:rgba(255,179,71,.2);
  --shadow:rgba(0,0,0,.5);
}
[data-theme="light"] {
  --bg:#eef0fa; --surface:#fff; --surface2:#e8ebf7; --surface3:#dde2f5;
  --border:rgba(0,0,0,.08); --text:#1a1d2e; --muted:#6b7191;
  --accent:#3d5fe0; --accent-glow:rgba(61,95,224,.2);
  --accent2:#e0397a; --accent2-glow:rgba(224,57,122,.15);
  --green:#1ab87a; --green-glow:rgba(26,184,122,.2);
  --warn:#e07830; --warn-glow:rgba(224,120,48,.15);
  --shadow:rgba(0,0,0,.1);
}
[data-theme="oled"] {
  --bg:#000; --surface:#080808; --surface2:#111; --surface3:#191919;
  --border:rgba(255,255,255,.06); --text:#f0f0f0; --muted:#505870;
  --accent:#4dffb0; --accent-glow:rgba(77,255,176,.25);
  --accent2:#ff5f6d; --accent2-glow:rgba(255,95,109,.18);
  --green:#4dffb0; --green-glow:rgba(77,255,176,.25);
  --warn:#ffd166; --warn-glow:rgba(255,209,102,.2);
  --shadow:rgba(0,0,0,.9);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  transition:background .35s,color .35s;
  position:relative; overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 40% at 15% 5%, var(--accent-glow), transparent),
    radial-gradient(ellipse 45% 35% at 85% 90%, var(--accent2-glow), transparent);
  transition:background .35s;
}

/* ── LAYOUT ── */
.wrapper{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  padding:20px 14px 0;
  flex:1;display:flex;flex-direction:column;gap:14px;
}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;}
.brand-title{font-size:1.05rem;font-weight:800;letter-spacing:.02em;}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;}
.theme-group{display:flex;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px;}
.theme-btn{
  cursor:pointer;background:transparent;border:none;border-radius:999px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;color:var(--muted);transition:all .2s;
}
.theme-btn:active{transform:scale(.88);}
.theme-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent-glow);}

/* ── BIG TOTAL ── */
.total-card{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:20px 18px;box-shadow:0 6px 32px var(--shadow);
  display:flex;flex-direction:column;gap:10px;
  transition:background .35s,border-color .35s;
}
.total-top{display:flex;align-items:center;justify-content:space-between;}
.total-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.scan-count-badge{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);
}
.total-display{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 0;
}
.total-num{
  font-family:'JetBrains Mono',monospace;font-size:4rem;font-weight:700;
  color:var(--accent);text-shadow:0 0 30px var(--accent-glow);
  line-height:1;transition:all .2s;
}
.total-unit{
  font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--muted);
  align-self:flex-end;padding-bottom:8px;
}
.stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.stat-pill{
  background:var(--surface2);border-radius:10px;padding:7px 6px;text-align:center;
  transition:background .35s;
}
.stat-pill .sv{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;color:var(--green);display:block;}
.stat-pill .sl{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.btn-reset-total{
  cursor:pointer;background:transparent;border:1px dashed var(--border);border-radius:10px;
  padding:9px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);
  letter-spacing:.08em;width:100%;transition:all .2s;
}
.btn-reset-total:active{transform:scale(.97);}

/* ── SCAN ZONE ── */
.scan-card{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:18px;box-shadow:0 4px 24px var(--shadow);
  display:flex;flex-direction:column;gap:12px;
  transition:background .35s,border-color .35s;
}
.scan-title{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}

/* Upload / Camera area */
.drop-zone{
  border:2px dashed var(--border);border-radius:16px;
  min-height:180px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
  background:var(--surface2);
}
.drop-zone.dragover{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 4px var(--accent-glow);}
.drop-zone img.preview{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:14px;
  opacity:.85;
}
.drop-overlay{
  position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;gap:8px;pointer-events:none;
}
.drop-icon{font-size:2.2rem;filter:drop-shadow(0 0 8px var(--accent-glow));}
.drop-text{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);text-align:center;line-height:1.5;}
.drop-text strong{color:var(--accent);font-weight:600;}
input#fileInput{display:none;}

/* Camera / Upload buttons */
.capture-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-capture{
  cursor:pointer;border:none;border-radius:12px;padding:13px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .18s;
}
.btn-capture:active{transform:scale(.95);}
.btn-cam{background:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-glow);}
.btn-upload{background:var(--surface2);color:var(--text);border:1px solid var(--border);}

/* Product name input */
.field-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;}
input.product-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:600;
  color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s,background .35s;
}
input.product-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}

/* Analyse button */
.btn-analyse{
  cursor:pointer;border:none;border-radius:14px;padding:15px;
  background:var(--green);color:#000;
  font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px var(--green-glow);transition:all .2s;
}
.btn-analyse:active{transform:scale(.97);}
.btn-analyse:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── RESULT PANEL ── */
.result-panel{
  background:var(--surface2);border:1px solid var(--border);border-radius:14px;
  padding:14px;display:none;flex-direction:column;gap:10px;
  transition:background .35s;
}
.result-panel.show{display:flex;}
.result-top{display:flex;align-items:center;justify-content:space-between;}
.result-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.result-count{
  font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;
  color:var(--green);text-shadow:0 0 16px var(--green-glow);
}
.result-desc{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);line-height:1.6;}
.result-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-add-total{
  cursor:pointer;border:none;border-radius:10px;padding:11px;
  background:var(--accent);color:#fff;
  font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;
  box-shadow:0 3px 12px var(--accent-glow);transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.btn-add-total:active{transform:scale(.95);}
.btn-discard{
  cursor:pointer;border:1px solid var(--border);border-radius:10px;padding:11px;
  background:transparent;color:var(--muted);
  font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;
  transition:all .18s;
}
.result-edit{display:flex;align-items:center;gap:8px;}
.result-edit label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
input#manualCount{
  flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:.9rem;
  font-weight:700;color:var(--text);outline:none;text-align:center;
  transition:border-color .2s;
}
input#manualCount:focus{border-color:var(--accent);}

/* ── HISTORY LOG ── */
.log-card{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:16px 18px;transition:background .35s,border-color .35s;
}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.log-title{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.btn-clear-log{cursor:pointer;background:none;border:none;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent2);letter-spacing:.06em;}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.log-item{
  display:grid;grid-template-columns:auto 1fr auto auto;
  align-items:center;gap:8px;
  padding:8px 10px;background:var(--surface2);border-radius:10px;
  animation:slideIn .22s ease;transition:background .35s;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.log-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
.log-thumb-placeholder{width:36px;height:36px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.log-name{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-time{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);}
.log-pieces{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;color:var(--accent);}
.log-empty{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);text-align:center;padding:18px 0;opacity:.5;}

/* ── LOADING ── */
.loading-overlay{
  display:none;position:absolute;inset:0;border-radius:22px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:10;
}
.loading-overlay.show{display:flex;}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--green);letter-spacing:.1em;}

/* ── FOOTER ── */
footer{
  position:relative;z-index:1;width:100%;
  padding:20px 14px 18px;
  display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;
}
.footer-copy{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.05em;opacity:.7;}
.footer-rights{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);opacity:.4;letter-spacing:.08em;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--green);color:#000;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;
  padding:10px 20px;border-radius:999px;
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px var(--green-glow);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:420px){
  .total-num{font-size:5rem;}
}
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div>
      <div class="brand-title">AI Product Counter</div>
      <div class="brand-sub">Vision · Inventory</div>
    </div>
    <div class="theme-group">
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')" aria-label="Light">☀️</button>
      <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')" aria-label="Dark">🌙</button>
      <button class="theme-btn" data-theme="oled" onclick="setTheme('oled')" aria-label="OLED">⬛</button>
    </div>
  </header>

  <!-- GRAND TOTAL -->
  <div class="total-card">
    <div class="total-top">
      <span class="total-label">Grand Total</span>
      <span class="scan-count-badge" id="scanCountBadge">0 scans</span>
    </div>
    <div class="total-display">
      <div class="total-num" id="grandTotal">0</div>
      <div class="total-unit">pcs</div>
    </div>
    <div class="stats-mini">
      <div class="stat-pill"><span class="sv" id="statScans">0</span><span class="sl">Scans</span></div>
      <div class="stat-pill"><span class="sv" id="statAdded">0</span><span class="sl">Added</span></div>
      <div class="stat-pill"><span class="sv" id="statPeak">0</span><span class="sl">Peak Scan</span></div>
    </div>
    <button class="btn-reset-total" onclick="resetAll()">↺ Reset Everything</button>
  </div>

  <!-- SCAN CARD -->
  <div class="scan-card" style="position:relative;">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">AI counting pieces…</div>
    </div>

    <div class="scan-title">📸 Scan Product</div>

    <label class="field-label" for="productName">Product / Batch Label</label>
    <input class="product-input" id="productName" type="text" placeholder="e.g. Bolt M6 — Box A" value=""/>

    <!-- DROP ZONE -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <img class="preview" id="previewImg" src="" alt="" style="display:none;"/>
      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-icon">🖼️</div>
        <div class="drop-text"><strong>Tap to choose image</strong><br/>or drag & drop here<br/><span style="font-size:.6rem;opacity:.6;">JPG · PNG · WEBP</span></div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment"/>

    <div class="capture-row">
      <button class="btn-capture btn-cam" onclick="openCamera()">📷 Camera</button>
      <button class="btn-capture btn-upload" onclick="document.getElementById('fileInput').click()">🗂 Gallery</button>
    </div>

    <button class="btn-analyse" id="btnAnalyse" onclick="analyseImage()" disabled>
      🔍 Count Pieces with AI
    </button>

    <!-- RESULT PANEL -->
    <div class="result-panel" id="resultPanel">
      <div class="result-top">
        <span class="result-label">AI Detected</span>
        <span class="result-count" id="resultCount">0</span>
      </div>
      <div class="result-desc" id="resultDesc">—</div>
      <div class="result-edit">
        <label for="manualCount">Adjust:</label>
        <input type="number" id="manualCount" min="0" value="0"/>
      </div>
      <div class="result-actions">
        <button class="btn-add-total" onclick="addToTotal()">➕ Add to Total</button>
        <button class="btn-discard" onclick="discardResult()">✕ Discard</button>
      </div>
    </div>
  </div>

  <!-- HISTORY LOG -->
  <div class="log-card">
    <div class="log-header">
      <span class="log-title">📋 Scan History</span>
      <button class="btn-clear-log" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty">No scans yet — take a photo to start</div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <span class="footer-copy">© Manik Roy <span id="footerYear"></span></span>
  <span class="footer-rights">All Rights Reserved</span>
</footer>

<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
let grandTotal = 0;
let totalScans = 0;
let totalAdded = 0;
let peakScan   = 0;
const scanLog  = [];
let currentImageB64 = null;
let currentResult   = 0;

/* ── THEME ── */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.theme === t)
  );
  localStorage.setItem('mr_ai_theme', t);
}

/* ── TOAST ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── FILE INPUT ── */
document.getElementById('fileInput').addEventListener('change', function() {
  if (!this.files[0]) return;
  loadFile(this.files[0]);
});

function openCamera() {
  const inp = document.getElementById('fileInput');
  inp.setAttribute('capture', 'environment');
  inp.click();
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageB64 = dataUrl.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = dataUrl;
    img.style.display = 'block';
    document.getElementById('dropOverlay').style.display = 'none';
    document.getElementById('btnAnalyse').disabled = false;
    document.getElementById('resultPanel').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

/* ── DRAG & DROP ── */
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});

/* ── AI ANALYSE ── */
async function analyseImage() {
  if (!currentImageB64) return;
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');
  document.getElementById('btnAnalyse').disabled = true;
  document.getElementById('resultPanel').classList.remove('show');

  const productName = document.getElementById('productName').value.trim() || 'product';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: currentImageB64 }
            },
            {
              type: 'text',
              text: `You are an expert inventory counting AI. The user is counting: "${productName}".

Carefully count ALL individual pieces/items visible in this image.

Respond ONLY with a JSON object (no markdown, no extra text):
{
  "count": <integer number of pieces>,
  "description": "<one sentence: what you see and how you counted>",
  "confidence": "<high|medium|low>"
}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    let raw = '';
    data.content.forEach(block => { if (block.type === 'text') raw += block.text; });

    // Strip markdown fences if present
    raw = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    currentResult = Math.max(0, parseInt(parsed.count) || 0);
    const desc = parsed.description || 'Items counted.';
    const conf = parsed.confidence || 'medium';

    document.getElementById('resultCount').textContent = currentResult;
    document.getElementById('manualCount').value = currentResult;
    document.getElementById('resultDesc').textContent = `${desc} (Confidence: ${conf})`;
    document.getElementById('resultPanel').classList.add('show');

  } catch (err) {
    showToast('⚠️ Error — check connection');
    console.error(err);
    document.getElementById('btnAnalyse').disabled = false;
  }

  overlay.classList.remove('show');
}

/* ── Manual count sync ── */
document.getElementById('manualCount').addEventListener('input', function() {
  currentResult = Math.max(0, parseInt(this.value) || 0);
  document.getElementById('resultCount').textContent = currentResult;
});

/* ── ADD TO TOTAL ── */
function addToTotal() {
  const name     = document.getElementById('productName').value.trim() || 'Unknown Product';
  const pieces   = currentResult;
  const imgSrc   = document.getElementById('previewImg').src;
  const now      = new Date();
  const timeStr  = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  grandTotal += pieces;
  totalScans++;
  totalAdded += pieces;
  if (pieces > peakScan) peakScan = pieces;

  scanLog.unshift({ name, pieces, imgSrc, time: timeStr });
  if (scanLog.length > 60) scanLog.pop();

  updateTotals();
  renderLog();
  discardResult();

  animateTotal();
  showToast(`✅ +${pieces} pieces added!`);
}

function animateTotal() {
  const el = document.getElementById('grandTotal');
  el.style.transform = 'scale(1.18)';
  el.style.textShadow = '0 0 40px var(--accent-glow)';
  setTimeout(() => {
    el.style.transform = 'scale(1)';
    el.style.textShadow = '0 0 30px var(--accent-glow)';
  }, 220);
}

/* ── DISCARD ── */
function discardResult() {
  document.getElementById('resultPanel').classList.remove('show');
  currentResult = 0;
  // Reset image area
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('dropOverlay').style.display = 'flex';
  document.getElementById('btnAnalyse').disabled = true;
  document.getElementById('fileInput').value = '';
  currentImageB64 = null;
}

/* ── UPDATE UI ── */
function updateTotals() {
  document.getElementById('grandTotal').textContent    = grandTotal;
  document.getElementById('scanCountBadge').textContent = `${totalScans} scan${totalScans !== 1 ? 's' : ''}`;
  document.getElementById('statScans').textContent      = totalScans;
  document.getElementById('statAdded').textContent      = totalAdded;
  document.getElementById('statPeak').textContent       = peakScan;
}

/* ── LOG ── */
function renderLog() {
  const list = document.getElementById('logList');
  if (!scanLog.length) {
    list.innerHTML = '<div class="log-empty">No scans yet — take a photo to start</div>';
    return;
  }
  list.innerHTML = scanLog.map(e => `
    <div class="log-item">
      ${e.imgSrc
        ? `<img class="log-thumb" src="${e.imgSrc}" alt=""/>`
        : `<div class="log-thumb-placeholder">📦</div>`}
      <div>
        <div class="log-name">${e.name}</div>
        <div class="log-time">${e.time}</div>
      </div>
      <div class="log-pieces">${e.pieces}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted)">pcs</div>
    </div>`).join('');
}

function clearLog() {
  scanLog.length = 0;
  renderLog();
}

/* ── RESET ALL ── */
function resetAll() {
  grandTotal = 0; totalScans = 0; totalAdded = 0; peakScan = 0;
  scanLog.length = 0;
  updateTotals();
  renderLog();
  discardResult();
  showToast('↺ Counter reset');
}

/* ── FOOTER YEAR ── */
document.getElementById('footerYear').textContent = new Date().getFullYear();

/* ── INIT ── */
const saved = localStorage.getItem('mr_ai_theme');
if (saved) setTheme(saved); else setTheme('dark');
</script>
</body>
</html>
