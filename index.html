<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bus Speedometer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --panel:#121722; --panel-2:#171D2B; --text:#EAEEF6; --dim:#8B93A7;
    --accent:#FFC531; --accent-ink:#1A1400; --danger:#FF5A52; --track:#232B3D; --ring:#00000000;
    --border:transparent; --shadow:0 20px 60px -20px rgba(0,0,0,.6);
  }
  html[data-theme="light"]{
    --bg:#EDF0F5; --panel:#FFFFFF; --panel-2:#F4F6FA; --text:#151A24; --dim:#5B6472;
    --accent:#B9790A; --accent-ink:#FFF7E6; --danger:#C6303A; --track:#DCE1EA;
    --border:transparent; --shadow:0 16px 40px -18px rgba(20,25,40,.25);
  }
  html[data-theme="oled"]{
    --bg:#000000; --panel:#050505; --panel-2:#0A0A0A; --text:#FFFFFF; --dim:#8A8A8A;
    --accent:#FFC531; --accent-ink:#1A1400; --danger:#FF5A52; --track:#161616;
    --border:transparent; --shadow:none;
  }
  html[data-theme="hc"]{
    --bg:#000000; --panel:#000000; --panel-2:#000000; --text:#FFFFFF; --dim:#FFFFFF;
    --accent:#FFFF00; --accent-ink:#000000; --danger:#FF3B3B; --track:#555555;
    --border:#FFFFFF; --shadow:none;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  body,button{font-family:'Inter',system-ui,sans-serif;}
  .num{font-family:'JetBrains Mono',monospace;}
  .dial{font-family:'Rajdhani',sans-serif;}
  body{
    background:var(--bg); color:var(--text); min-height:100dvh;
    display:flex; justify-content:center; padding:max(18px,env(safe-area-inset-top)) 16px 20px;
    transition:background .25s ease,color .25s ease;
  }
  .app{width:100%; max-width:420px; display:flex; flex-direction:column; gap:18px;}
  header{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .eyebrow{font-size:.72rem; font-weight:700; letter-spacing:.14em; color:var(--dim); text-transform:uppercase;}
  .eyebrow b{color:var(--text);}
  .theme-toggle{display:flex; gap:6px; background:var(--panel); border:1px solid var(--border); padding:4px; border-radius:12px; box-shadow:var(--shadow);}
  .theme-toggle button{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:transparent;
    color:var(--dim); font-size:.68rem; font-weight:700; cursor:pointer; letter-spacing:.02em;
  }
  .theme-toggle button[aria-pressed="true"]{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .theme-toggle button:focus-visible, button:focus-visible, .stat:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow); padding:22px 18px;}
  .gauge-card{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .gauge{position:relative; width:clamp(230px,72vw,300px); aspect-ratio:1/1;}
  .tick{position:absolute; top:50%; left:50%; width:4px; height:13px; margin:-2px 0 0 -2px; border-radius:2px; background:var(--track); transition:background .18s ease;}
  .tick.on{background:var(--accent);}
  .tick.danger{background:var(--danger);}
  .readout{position:absolute; inset:20%; border-radius:50%; background:var(--panel-2); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; border:1px solid var(--border);}
  #speed{font-size:clamp(3rem,15vw,3.8rem); font-weight:700; line-height:1; color:var(--text); transition:color .18s ease;}
  #speed.danger{color:var(--danger);}
  .unit{font-size:.85rem; font-weight:600; letter-spacing:.08em; color:var(--dim); margin-top:2px;}
  .status{display:flex; align-items:center; gap:8px; font-size:.78rem; color:var(--dim); font-weight:600;}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--dim);}
  .dot.locked{background:#3ECF8E; box-shadow:0 0 0 4px rgba(62,207,142,.18);}
  .dot.weak{background:var(--accent); box-shadow:0 0 0 4px rgba(255,197,49,.18);}
  .dot.err{background:var(--danger); box-shadow:0 0 0 4px rgba(255,90,82,.18);}
  @media (prefers-reduced-motion:no-preference){ .dot.locked{animation:pulse 1.6s ease-in-out infinite;} }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .stat{background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); padding:12px 8px; text-align:center;}
  .stat .lbl{font-size:.62rem; font-weight:700; letter-spacing:.1em; color:var(--dim); text-transform:uppercase;}
  .stat .val{font-size:1.25rem; font-weight:700; margin-top:4px;}

  .controls{display:flex; gap:10px;}
  .btn{flex:1; padding:14px 10px; border-radius:14px; border:1px solid var(--border); font-weight:700; font-size:.85rem; letter-spacing:.04em; cursor:pointer; box-shadow:var(--shadow);}
  .btn-primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .btn-primary.active{background:var(--danger); border-color:var(--danger); color:#fff;}
  .btn-ghost{background:var(--panel); color:var(--text);}
  .btn-unit{flex:0 0 auto; width:64px;}

  footer{margin-top:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:2px; color:var(--dim); font-size:.72rem; line-height:1.5;}
  footer strong{color:var(--text);}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="eyebrow">Bus <b>Speedometer</b></div>
    <div class="theme-toggle" role="group" aria-label="Theme">
      <button data-theme-btn="dark" aria-pressed="true" title="Dark">D</button>
      <button data-theme-btn="light" aria-pressed="false" title="Light">L</button>
      <button data-theme-btn="oled" aria-pressed="false" title="OLED True Black">O</button>
      <button data-theme-btn="hc" aria-pressed="false" title="High Contrast">HC</button>
    </div>
  </header>

  <section class="panel gauge-card">
    <div class="gauge" id="gauge">
      <div class="readout">
        <div id="speed" class="num" aria-live="polite">0</div>
        <div class="unit"><span id="unitLabel">KM/H</span></div>
      </div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Tap start to track</span></div>
  </section>

  <section class="stats">
    <div class="stat"><div class="lbl">Max</div><div class="val num" id="maxVal">0</div></div>
    <div class="stat"><div class="lbl">Avg</div><div class="val num" id="avgVal">0</div></div>
    <div class="stat"><div class="lbl">Accuracy</div><div class="val num" id="accVal">–</div></div>
  </section>

  <section class="controls">
    <button class="btn btn-primary" id="toggleBtn">START</button>
    <button class="btn btn-ghost" id="resetBtn">RESET</button>
    <button class="btn btn-ghost btn-unit" id="unitBtn">MPH</button>
  </section>

  <footer>
    <div>&copy; Manik Roy <span id="year"></span>. <strong>All Rights Reserved.</strong></div>
  </footer>
</div>

<script>
(function(){
  var TICK_COUNT = 48, START_ANGLE = -135, SWEEP = 270, DANGER_FRAC = 0.85;
  var gauge = document.getElementById('gauge'), ticks = [];
  var speedEl = document.getElementById('speed'), dot = document.getElementById('dot'), statusText = document.getElementById('statusText');
  var maxValEl = document.getElementById('maxVal'), avgValEl = document.getElementById('avgVal'), accValEl = document.getElementById('accVal');
  var toggleBtn = document.getElementById('toggleBtn'), resetBtn = document.getElementById('resetBtn'), unitBtn = document.getElementById('unitBtn');
  var unitLabel = document.getElementById('unitLabel');

  var unit = 'kmh', tracking = false, watchId = null;
  var lastPos = null, lastTime = null, totalDist = 0, totalTime = 0, maxSpeed = 0;

  function maxScale(){ return unit === 'kmh' ? 120 : 75; }

  function buildTicks(){
    gauge.querySelectorAll('.tick').forEach(function(t){ t.remove(); });
    ticks = [];
    var r = gauge.clientWidth / 2 - 10;
    for(var i = 0; i < TICK_COUNT; i++){
      var angle = START_ANGLE + (SWEEP / (TICK_COUNT - 1)) * i;
      var el = document.createElement('div');
      el.className = 'tick';
      el.style.transform = 'rotate(' + angle + 'deg) translateY(-' + r + 'px)';
      gauge.appendChild(el);
      ticks.push(el);
    }
  }

  function toDisplay(mps){
    var v = unit === 'kmh' ? mps * 3.6 : mps * 2.23694;
    return v < 0 ? 0 : v;
  }

  function haversine(a, b){
    var R = 6371000, toRad = Math.PI / 180;
    var dLat = (b.latitude - a.latitude) * toRad, dLon = (b.longitude - a.longitude) * toRad;
    var la1 = a.latitude * toRad, la2 = b.latitude * toRad;
    var h = Math.sin(dLat/2)**2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function setStatus(cls, text){
    dot.className = 'dot ' + cls;
    statusText.textContent = text;
  }

  function render(speedMps, accuracy){
    var displaySpeed = toDisplay(speedMps);
    var frac = Math.min(displaySpeed / maxScale(), 1);
    var danger = frac >= DANGER_FRAC;
    var lit = Math.round(frac * TICK_COUNT);

    ticks.forEach(function(t, i){
      t.classList.toggle('on', i < lit);
      t.classList.toggle('danger', i < lit && danger);
    });
    speedEl.textContent = Math.round(displaySpeed);
    speedEl.classList.toggle('danger', danger);

    if(displaySpeed > maxSpeed) maxSpeed = displaySpeed;
    maxValEl.textContent = Math.round(maxSpeed);
    var avgMps = totalTime > 0 ? totalDist / totalTime : 0;
    avgValEl.textContent = Math.round(toDisplay(avgMps));
    if(typeof accuracy === 'number') accValEl.textContent = Math.round(accuracy) + 'm';
  }

  function onPosition(pos){
    var c = pos.coords, now = pos.timestamp;
    var speedMps = c.speed;

    if(lastPos && lastTime){
      var dt = (now - lastTime) / 1000;
      if(dt > 0){
        var dist = haversine(lastPos, c);
        if(speedMps == null) speedMps = dist / dt;
        totalDist += dist;
        totalTime += dt;
      }
    }
    lastPos = c; lastTime = now;
    setStatus(c.accuracy <= 25 ? 'locked' : 'weak', c.accuracy <= 25 ? 'GPS locked' : 'Weak GPS signal');
    render(speedMps || 0, c.accuracy);
  }

  function onError(err){
    setStatus('err', err.code === 1 ? 'Location permission denied' : 'GPS unavailable');
  }

  function startTracking(){
    if(!('geolocation' in navigator)){ setStatus('err', 'Geolocation not supported'); return; }
    tracking = true;
    toggleBtn.textContent = 'STOP';
    toggleBtn.classList.add('active');
    setStatus('weak', 'Acquiring GPS…');
    watchId = navigator.geolocation.watchPosition(onPosition, onError, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
  }

  function stopTracking(){
    tracking = false;
    toggleBtn.textContent = 'START';
    toggleBtn.classList.remove('active');
    if(watchId !== null) navigator.geolocation.clearWatch(watchId);
    watchId = null; lastPos = null; lastTime = null;
    setStatus('', 'Tracking stopped');
    render(0);
  }

  function resetStats(){
    maxSpeed = 0; totalDist = 0; totalTime = 0;
    render(0);
  }

  toggleBtn.addEventListener('click', function(){ tracking ? stopTracking() : startTracking(); });
  resetBtn.addEventListener('click', resetStats);
  unitBtn.addEventListener('click', function(){
    unit = unit === 'kmh' ? 'mph' : 'kmh';
    unitLabel.textContent = unit === 'kmh' ? 'KM/H' : 'MPH';
    unitBtn.textContent = unit === 'kmh' ? 'MPH' : 'KM/H';
  });

  document.querySelectorAll('[data-theme-btn]').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.documentElement.setAttribute('data-theme', btn.dataset.themeBtn);
      document.querySelectorAll('[data-theme-btn]').forEach(function(b){ b.setAttribute('aria-pressed', b === btn); });
    });
  });

  window.addEventListener('resize', buildTicks);
  document.getElementById('year').textContent = new Date().getFullYear() > 2026 ? '2026–' + new Date().getFullYear() : '2026';

  buildTicks();
  render(0);
})();
</script>
</body>
</html>
