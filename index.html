<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Vastu Compass</title>
<meta name="theme-color" content="#151414">
<meta name="description" content="A precision Vastu Compass — find true direction and see Vastu Shastra guidance for every zone of your home.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg-1:#1b1a17;
    --bg-2:#0d0c0b;
    --brass:#cb9c4d;
    --brass-light:#f0d999;
    --steel:#8a919b;
    --cream:#f8f1e0;
    --ink:#241a0d;
    --danger:#d3341c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, #2a2823 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    padding-top:calc(var(--safe-top) + 14px);
    padding-bottom:calc(var(--safe-bottom) + 14px);
  }

  .app-title{
    text-align:center;
    margin:4px 0 2px;
  }
  .app-title h1{
    font-size:22px;
    letter-spacing:0.14em;
    margin:0;
    font-weight:700;
    color:var(--brass-light);
    text-transform:uppercase;
  }
  .app-title .sub{
    font-size:13px;
    color:#b8ab8a;
    letter-spacing:0.05em;
    margin-top:2px;
  }

  .compass-stage{
    position:relative;
    width:min(82vw, 380px);
    aspect-ratio:1/1;
    margin:22px auto 6px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .fixed-pointer{
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:11px solid transparent;
    border-right:11px solid transparent;
    border-top:18px solid var(--danger);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    z-index:5;
  }

  .rotor{
    width:100%;
    height:100%;
    will-change:transform;
    transition:transform 0.15s linear;
  }
  .rotor svg{
    width:100%;
    height:100%;
    display:block;
  }

  .readout{
    text-align:center;
    margin-top:2px;
  }
  .readout .deg{
    font-size:40px;
    font-weight:700;
    color:var(--cream);
    letter-spacing:0.02em;
  }
  .readout .deg span{ font-size:22px; color:#c9bd9f; }
  .readout .zone{
    font-size:15px;
    color:var(--brass-light);
    margin-top:2px;
    letter-spacing:0.04em;
  }
  .readout .zone .sanskrit{
    color:#e3d3a0;
    opacity:0.85;
  }

  .status-msg{
    font-size:12.5px;
    color:#a79c86;
    text-align:center;
    max-width:320px;
    margin:8px auto 0;
    line-height:1.5;
  }

  button.enable-btn{
    margin-top:14px;
    background:linear-gradient(180deg,#eecd7c,#a97a34);
    color:#241a0d;
    border:none;
    padding:12px 26px;
    border-radius:30px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.03em;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
  }
  button.enable-btn:active{ transform:scale(0.97); }

  .guide-toggle{
    margin-top:20px;
    background:none;
    border:1px solid #6b6250;
    color:#e3d3a0;
    padding:9px 20px;
    border-radius:24px;
    font-size:13.5px;
    letter-spacing:0.03em;
  }

  .guide-panel{
    width:min(92vw,420px);
    margin:14px auto 0;
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease;
    border-radius:14px;
  }
  .guide-panel.open{ max-height:900px; }
  .guide-inner{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:8px;
  }
  .guide-row{
    display:flex;
    gap:12px;
    align-items:flex-start;
    padding:10px 8px;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .guide-row:last-child{ border-bottom:none; }
  .guide-row.active{
    background:rgba(240,217,153,0.08);
    border-radius:10px;
  }
  .guide-row .swatch{
    width:14px;height:14px;border-radius:4px;flex:0 0 auto;margin-top:3px;
    box-shadow:0 0 0 1px rgba(0,0,0,0.4) inset;
  }
  .guide-row .txt b{
    display:block;
    font-size:14.5px;
    color:var(--cream);
  }
  .guide-row .txt .dev{
    font-size:12.5px;
    color:#c9a95c;
    margin-left:6px;
  }
  .guide-row .txt p{
    margin:3px 0 0;
    font-size:12.5px;
    color:#b3a78d;
    line-height:1.45;
  }

  footer{
    margin-top:auto;
    padding-top:20px;
    font-size:11px;
    color:#5f584a;
    text-align:center;
  }
</style>
</head>

  <div class="status-msg" id="statusMsg">Vastu Compass uses your device's magnetic sensor. Hold your phone flat, level with the ground, and away from metal objects for an accurate reading.</div>

  <button class="enable-btn" id="enableBtn">Enable Compass</button>
  <button class="guide-toggle" id="guideToggle">Show all 16 direction meanings</button>

  <div class="guide-panel" id="guidePanel">
    <div class="guide-inner" id="guideInner"></div>
  </div>

  <footer>© Manik Roy 2026 · Vastu Compass</footer>

<script>
(function(){
  var rotor = document.getElementById('rotor');
  var degVal = document.getElementById('degVal');
  var zoneName = document.getElementById('zoneName');
  var statusMsg = document.getElementById('statusMsg');
  var enableBtn = document.getElementById('enableBtn');
  var guideToggle = document.getElementById('guideToggle');
  var guidePanel = document.getElementById('guidePanel');
  var guideInner = document.getElementById('guideInner');

  // 16-point Vastu direction data: name, Sanskrit, ruling force, guidance, color swatch
  var ZONES = [
    {n:'North',      ab:'N',   dev:'उत्तर',    ruler:'Kubera',  color:'#8fae82', use:'Wealth zone — best for cash lockers, safes and the main office desk.'},
    {n:'North-Northeast', ab:'NNE', dev:'—', ruler:'Water support', color:'#a9c1d8', use:'Supports the NE water zone — good for an open, uncluttered space.'},
    {n:'Northeast',  ab:'NE',  dev:'ईशान',    ruler:'Water / Ishana', color:'#9fc4dd', use:'Most sacred zone — ideal for the prayer room, main entrance or water storage.'},
    {n:'East-Northeast', ab:'ENE', dev:'—', ruler:'Sun support', color:'#e0c675', use:'Supports morning sunlight — good for a study nook or reading corner.'},
    {n:'East',       ab:'E',   dev:'पूर्व',    ruler:'Indra / Surya', color:'#e8c25f', use:'Sunrise direction — ideal for the main entrance, living room and windows.'},
    {n:'East-Southeast', ab:'ESE', dev:'—', ruler:'Fire support', color:'#dba077', use:'Transition zone between sun and fire — suited to a light dining area.'},
    {n:'Southeast',  ab:'SE',  dev:'आग्नेय',   ruler:'Agni', color:'#d38a5c', use:'Fire element — the traditional placement for the kitchen and stove.'},
    {n:'South-Southeast', ab:'SSE', dev:'—', ruler:'Fire support', color:'#c98c7a', use:'Good for kitchen storage or a utility extension.'},
    {n:'South',      ab:'S',   dev:'दक्षिण',   ruler:'Yama', color:'#c07a72', use:'Heavier energy — best for storage and solid furniture, avoid the main entrance here.'},
    {n:'South-Southwest', ab:'SSW', dev:'—', ruler:'Earth support', color:'#b98f7d', use:'Good for wardrobes and heavy cabinets.'},
    {n:'Southwest',  ab:'SW',  dev:'नैऋत्य',   ruler:'Rahu / Nirriti', color:'#a99479', use:'Most stable zone — ideal for the master bedroom and heavy furniture.'},
    {n:'West-Southwest', ab:'WSW', dev:'—', ruler:'Earth support', color:'#9fa591', use:'Suits a secondary bedroom or long-term storage.'},
    {n:'West',       ab:'W',   dev:'पश्चिम',   ruler:'Varuna', color:'#7fa0bd', use:'Water element — good for the dining room, study or children\u2019s room.'},
    {n:'West-Northwest', ab:'WNW', dev:'—', ruler:'Air support', color:'#a3aab3', use:'Suits a guest room or dressing area.'},
    {n:'Northwest',  ab:'NW',  dev:'वायव्य',   ruler:'Vayu', color:'#b7bcc3', use:'Air element — best for the guest room, garage or movable items.'},
    {n:'North-Northwest', ab:'NNW', dev:'—', ruler:'Air / wealth support', color:'#9fb098', use:'Supports the north wealth zone — keep this area light and open.'}
  ];

  // build guide list
  ZONES.forEach(function(z, i){
    var row = document.createElement('div');
    row.className = 'guide-row';
    row.id = 'zone-' + i;
    row.innerHTML =
      '<div class="swatch" style="background:'+z.color+'"></div>' +
      '<div class="txt"><b>'+z.n+' ('+z.ab+')'+(z.dev!=='—' ? '<span class="dev">'+z.dev+'</span>' : '')+'</b><p>'+z.use+'</p></div>';
    guideInner.appendChild(row);
  });

  guideToggle.addEventListener('click', function(){
    var open = guidePanel.classList.toggle('open');
    guideToggle.textContent = open ? 'Hide direction meanings' : 'Show all 16 direction meanings';
  });

  function zoneIndexFromHeading(h){
    return Math.round(h / 22.5) % 16;
  }

  var lastActive = -1;
  function updateHeading(heading){
    heading = ((heading % 360) + 360) % 360;
    rotor.style.transform = 'rotate(' + (-heading) + 'deg)';
    degVal.textContent = Math.round(heading);
    var idx = zoneIndexFromHeading(heading);
    var z = ZONES[idx];
    zoneName.innerHTML = z.n + ' <span class="sanskrit">' + (z.dev!=='—' ? z.dev : '') + '</span>';
    if(lastActive !== idx){
      var prev = document.getElementById('zone-' + lastActive);
      if(prev) prev.classList.remove('active');
      var cur = document.getElementById('zone-' + idx);
      if(cur){
        cur.classList.add('active');
        if(guidePanel.classList.contains('open')) cur.scrollIntoView({block:'nearest', behavior:'smooth'});
      }
      lastActive = idx;
    }
  }

  function handleOrientation(e){
    var heading;
    if(typeof e.webkitCompassHeading === 'number'){
      heading = e.webkitCompassHeading; // iOS: already true compass heading
    } else if(e.absolute && e.alpha !== null){
      heading = 360 - e.alpha;
    } else if(e.alpha !== null){
      heading = 360 - e.alpha;
    } else {
      return;
    }
    updateHeading(heading);
  }

  function startListening(){
    statusMsg.textContent = 'Reading device orientation…';
    if('ondeviceorientationabsolute' in window){
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    } else {
      window.addEventListener('deviceorientation', handleOrientation, true);
    }
    enableBtn.style.display = 'none';
  }

  enableBtn.addEventListener('click', function(){
    if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().then(function(resp){
        if(resp === 'granted'){
          startListening();
        } else {
          statusMsg.textContent = 'Compass permission was denied. You can re-enable it in your browser settings.';
        }
      }).catch(function(){
        statusMsg.textContent = 'Could not access the compass sensor on this device.';
      });
    } else if('DeviceOrientationEvent' in window){
      startListening();
    } else {
      statusMsg.textContent = 'This device or browser does not expose a compass sensor. Try on a mobile phone with Chrome or Safari.';
    }
  });

  // Desktop / no-sensor fallback: drag to rotate, for preview and testing
  var dragging = false, lastAngle = 0, currentHeading = 0;
  var stage = document.querySelector('.compass-stage');

  function angleFromEvent(evt){
    var rect = stage.getBoundingClientRect();
    var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    var x = (evt.touches ? evt.touches[0].clientX : evt.clientX) - cx;
    var y = (evt.touches ? evt.touches[0].clientY : evt.clientY) - cy;
    return Math.atan2(x, -y) * 180 / Math.PI;
  }

  function dragStart(evt){
    if(window.DeviceOrientationEvent && enableBtn.style.display === 'none') return; // sensor active, skip manual drag
    dragging = true;
    lastAngle = angleFromEvent(evt);
  }
  function dragMove(evt){
    if(!dragging) return;
    var a = angleFromEvent(evt);
    var delta = a - lastAngle;
    lastAngle = a;
    currentHeading = ((currentHeading + delta) % 360 + 360) % 360;
    updateHeading(currentHeading);
    evt.preventDefault();
  }
  function dragEnd(){ dragging = false; }

  stage.addEventListener('mousedown', dragStart);
  window.addEventListener('mousemove', dragMove);
  window.addEventListener('mouseup', dragEnd);
  stage.addEventListener('touchstart', dragStart, {passive:true});
  stage.addEventListener('touchmove', dragMove, {passive:false});
  stage.addEventListener('touchend', dragEnd);

  updateHeading(0);

  if(!(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') && 'DeviceOrientationEvent' in window){
    // Android/other browsers usually don't need explicit permission
    statusMsg.textContent = 'Tap "Enable Compass" to start, or drag the dial to explore directions manually.';
  }

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }
})();
</script>
