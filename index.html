<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downtime Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1219;
    --panel: #111820;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #00ff9d;
    --warn: #ffaa00;
    --text: #c9d8e8;
    --text-dim: #4a6278;
    --text-bright: #e8f4ff;
    --font-mono: 'Share Tech Mono', monospace;
    --font-head: 'Syne', sans-serif;
    --glow: 0 0 12px rgba(0,229,255,0.35);
    --glow-red: 0 0 12px rgba(255,61,113,0.4);
    --glow-green: 0 0 12px rgba(0,255,157,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
    box-shadow: var(--glow);
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.6; }
  }

  .logo h1 {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo h1 span { color: var(--accent); }

  .logo small {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
    font-family: var(--font-mono);
  }

  .header-meta {
    text-align: right;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .header-meta .live {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--accent3);
    font-size: 11px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: blink 1.2s step-start infinite;
    box-shadow: var(--glow-green);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Add URL bar ── */
  .add-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .add-bar input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 11px 16px;
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .add-bar input::placeholder { color: var(--text-dim); }

  .add-bar input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 11px 20px;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }

  .btn-sm {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-sm:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
  }

  .stat-card.ok::before { background: var(--accent3); }
  .stat-card.down::before { background: var(--accent2); }
  .stat-card.warn::before { background: var(--warn); }
  .stat-card.total::before { background: var(--accent); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.ok .stat-value { color: var(--accent3); }
  .stat-card.down .stat-value { color: var(--accent2); }
  .stat-card.warn .stat-value { color: var(--warn); }
  .stat-card.total .stat-value { color: var(--accent); }

  /* ── Monitor list ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .monitors {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .monitor-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .monitor-card:hover { border-color: #2e4558; }

  .monitor-card.status-down {
    border-color: rgba(255,61,113,0.3);
    background: rgba(255,61,113,0.04);
    animation: flash-red 2s ease-in-out infinite;
  }

  @keyframes flash-red {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 18px rgba(255,61,113,0.15); }
  }

  .status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-up { background: var(--accent3); box-shadow: var(--glow-green); animation: pulse-green 2.5s ease-in-out infinite; }
  .status-down { background: var(--accent2); box-shadow: var(--glow-red); animation: pulse-red 1s ease-in-out infinite; }
  .status-checking { background: var(--warn); box-shadow: 0 0 8px rgba(255,170,0,0.4); animation: pulse-yellow 1s ease-in-out infinite; }
  .status-unknown { background: var(--text-dim); }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 4px rgba(0,255,157,0.3); }
    50% { box-shadow: 0 0 14px rgba(0,255,157,0.7); }
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 4px rgba(255,61,113,0.4); }
    50% { box-shadow: 0 0 16px rgba(255,61,113,0.9); }
  }

  @keyframes pulse-yellow {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .monitor-info { min-width: 0; }

  .monitor-name {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .monitor-url {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .monitor-meta {
    text-align: right;
    min-width: 100px;
  }

  .monitor-status-text {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .text-up { color: var(--accent3); }
  .text-down { color: var(--accent2); }
  .text-checking { color: var(--warn); }
  .text-unknown { color: var(--text-dim); }

  .monitor-time {
    font-size: 10px;
    color: var(--text-dim);
  }

  .monitor-ping {
    font-size: 11px;
    color: var(--accent);
    margin-top: 2px;
  }

  /* History sparkline */
  .history-bar {
    display: flex;
    gap: 2px;
    align-items: center;
    margin-top: 6px;
  }

  .history-bar span {
    width: 6px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Log panel ── */
  .log-panel {
    margin-top: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .log-title {
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .log-entries {
    max-height: 200px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-entries::-webkit-scrollbar { width: 4px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 12px;
    padding: 6px 16px;
    font-size: 12px;
    border-bottom: 1px solid rgba(30,45,61,0.4);
    animation: slide-in 0.3s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-time { color: var(--text-dim); }
  .log-msg-ok { color: var(--accent3); }
  .log-msg-down { color: var(--accent2); }
  .log-msg-info { color: var(--accent); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.7;
  }

  /* ── Interval control ── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .control-group select {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    cursor: pointer;
  }

  .uptime-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .badge-up { background: rgba(0,255,157,0.15); color: var(--accent3); }
  .badge-down { background: rgba(255,61,113,0.15); color: var(--accent2); }
  .badge-warn { background: rgba(255,170,0,0.15); color: var(--warn); }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .monitor-card { grid-template-columns: auto 1fr auto; }
    .monitor-meta { display: none; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <h1>Downtime<span>Detector</span></h1>
        <small>Real-time uptime monitor</small>
      </div>
    </div>
    <div class="header-meta">
      <div class="live"><span class="live-dot"></span>MONITORING ACTIVE</div>
      <div id="clock">--:--:-- UTC</div>
      <div id="check-count">0 checks run</div>
    </div>
  </header>

  <!-- Add URL -->
  <div class="add-bar">
    <input type="text" id="url-input" placeholder="https://example.com — add a URL to monitor..." />
    <button class="btn" onclick="addMonitor()">+ ADD MONITOR</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card ok">
      <div class="stat-label">Online</div>
      <div class="stat-value" id="stat-up">0</div>
    </div>
    <div class="stat-card down">
      <div class="stat-label">Down</div>
      <div class="stat-value" id="stat-down">0</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Checking</div>
      <div class="stat-value" id="stat-checking">0</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="control-group">
      <span>CHECK INTERVAL:</span>
      <select id="interval-select" onchange="updateInterval()">
        <option value="10000">10 seconds</option>
        <option value="30000" selected>30 seconds</option>
        <option value="60000">60 seconds</option>
        <option value="300000">5 minutes</option>
      </select>
    </div>
    <button class="btn-sm" onclick="checkAll()">↻ CHECK ALL NOW</button>
    <button class="btn-sm" onclick="clearAll()">✕ CLEAR ALL</button>
  </div>

  <!-- Monitor list -->
  <div class="section-header">
    <span class="section-title">Monitors</span>
    <span class="section-title" id="monitor-count">0 endpoints</span>
  </div>

  <div class="monitors" id="monitors-list">
    <div class="empty-state">
      <div class="empty-icon">◉</div>
      <p>No monitors yet.<br>Add a URL above to start tracking uptime.</p>
    </div>
  </div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">Event Log</span>
      <button class="btn-sm" onclick="clearLog()">CLEAR</button>
    </div>
    <div class="log-entries" id="log-entries">
      <div class="log-entry">
        <span class="log-time" id="start-time">--</span>
        <span class="log-msg-info">▶ Downtime Detector initialized. Add URLs to begin monitoring.</span>
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ──
  const monitors = {};
  let checkInterval = 30000;
  let intervalTimer = null;
  let totalChecks = 0;

  // Default monitors to seed the app
  const defaults = [
    'https://google.com',
    'https://github.com',
    'https://anthropic.com',
  ];

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toUTCString().slice(17, 25) + ' UTC';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Helpers ──
  function ts() {
    return new Date().toISOString().replace('T',' ').slice(0,19);
  }

  function normalizeUrl(url) {
    url = url.trim();
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    return url;
  }

  function domainOf(url) {
    try { return new URL(url).hostname; } catch { return url; }
  }

  // ── Log ──
  function log(msg, type = 'info') {
    const el = document.getElementById('log-entries');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const cls = type === 'ok' ? 'log-msg-ok' : type === 'down' ? 'log-msg-down' : 'log-msg-info';
    entry.innerHTML = `<span class="log-time">${ts()}</span><span class="${cls}">${msg}</span>`;
    el.insertBefore(entry, el.firstChild);
    while (el.children.length > 60) el.removeChild(el.lastChild);
  }

  // Set start time
  document.getElementById('start-time').textContent = ts();

  // ── Check a single URL via fetch (no-cors for status) ──
  async function checkUrl(id) {
    const m = monitors[id];
    if (!m) return;
    m.status = 'checking';
    renderCard(id);
    updateStats();

    const start = performance.now();
    let status = 'unknown';
    let ping = null;
    let httpCode = null;

    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(m.url, {
        method: 'HEAD',
        mode: 'no-cors',
        signal: ctrl.signal,
        cache: 'no-store'
      });
      clearTimeout(timer);
      ping = Math.round(performance.now() - start);
      // no-cors gives opaque response — if we get here without throw, it's reachable
      httpCode = res.status || '(opaque)';
      status = 'up';
    } catch (e) {
      ping = Math.round(performance.now() - start);
      if (e.name === 'AbortError') {
        status = 'down';
        httpCode = 'TIMEOUT';
      } else if (e.message && e.message.toLowerCase().includes('cors')) {
        // CORS block usually means server is up but blocks us
        status = 'up';
        httpCode = 'CORS';
      } else {
        status = 'down';
        httpCode = 'NET_ERR';
      }
    }

    const prevStatus = m.status;
    m.status = status;
    m.ping = ping;
    m.httpCode = httpCode;
    m.lastChecked = new Date();
    m.history.push(status);
    if (m.history.length > 20) m.history.shift();
    if (status === 'up') m.upCount++; else if (status === 'down') m.downCount++;

    if (prevStatus !== 'checking' && prevStatus !== status) {
      if (status === 'up') log(`✔ ${domainOf(m.url)} is back ONLINE (${ping}ms)`, 'ok');
      else log(`✖ ${domainOf(m.url)} went DOWN — ${httpCode}`, 'down');
    } else if (prevStatus === 'checking') {
      if (status === 'up') log(`✔ ${domainOf(m.url)} — ONLINE (${ping}ms)`, 'ok');
      else log(`✖ ${domainOf(m.url)} — DOWN (${httpCode})`, 'down');
    }

    totalChecks++;
    document.getElementById('check-count').textContent = `${totalChecks} checks run`;
    renderCard(id);
    updateStats();
  }

  // ── Add Monitor ──
  function addMonitor(url) {
    url = url || document.getElementById('url-input').value;
    if (!url.trim()) return;
    url = normalizeUrl(url);
    const id = 'mon_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    monitors[id] = {
      id, url,
      status: 'unknown',
      ping: null,
      httpCode: null,
      lastChecked: null,
      history: [],
      upCount: 0,
      downCount: 0,
    };
    document.getElementById('url-input').value = '';
    log(`+ Added monitor: ${domainOf(url)}`, 'info');
    renderAll();
    updateStats();
    checkUrl(id);
  }

  // ── Remove ──
  function removeMonitor(id) {
    const m = monitors[id];
    if (m) log(`- Removed monitor: ${domainOf(m.url)}`, 'info');
    delete monitors[id];
    renderAll();
    updateStats();
  }

  // ── Render single card ──
  function renderCard(id) {
    const el = document.getElementById('card-' + id);
    if (!el) { renderAll(); return; }
    const m = monitors[id];
    el.className = `monitor-card ${m.status === 'down' ? 'status-down' : ''}`;
    el.innerHTML = cardHTML(m);
  }

  function historyBar(history) {
    if (!history.length) return '';
    const colors = { up: 'var(--accent3)', down: 'var(--accent2)', checking: 'var(--warn)', unknown: 'var(--text-dim)' };
    return '<div class="history-bar">' +
      history.map(s => `<span style="background:${colors[s] || 'var(--text-dim)'}"></span>`).join('') +
      '</div>';
  }

  function uptimePct(m) {
    const total = m.upCount + m.downCount;
    if (!total) return null;
    return Math.round((m.upCount / total) * 1000) / 10;
  }

  function cardHTML(m) {
    const statusClass = {
      up: 'status-up', down: 'status-down',
      checking: 'status-checking', unknown: 'status-unknown'
    }[m.status] || 'status-unknown';

    const textClass = {
      up: 'text-up', down: 'text-down',
      checking: 'text-checking', unknown: 'text-unknown'
    }[m.status] || 'text-unknown';

    const statusLabel = {
      up: '● ONLINE', down: '● OFFLINE',
      checking: '● CHECKING', unknown: '○ PENDING'
    }[m.status] || '○ UNKNOWN';

    const pct = uptimePct(m);
    const badgeClass = pct === null ? '' : pct >= 99 ? 'badge-up' : pct >= 90 ? 'badge-warn' : 'badge-down';
    const badgeLabel = pct !== null ? `${pct}% up` : '';

    const lastCheck = m.lastChecked
      ? m.lastChecked.toLocaleTimeString()
      : 'Never';

    return `
      <div class="status-indicator ${statusClass}"></div>
      <div class="monitor-info">
        <div class="monitor-name">${domainOf(m.url)}</div>
        <div class="monitor-url">${m.url}</div>
        ${historyBar(m.history)}
      </div>
      <div class="monitor-meta">
        <div class="monitor-status-text ${textClass}">${statusLabel}</div>
        <div class="monitor-time">Last: ${lastCheck}</div>
        ${m.ping !== null ? `<div class="monitor-ping">${m.ping}ms</div>` : ''}
        ${badgeLabel ? `<span class="uptime-badge ${badgeClass}">${badgeLabel}</span>` : ''}
      </div>
      <div>
        <button class="btn-sm" onclick="checkUrl('${m.id}')" title="Check now">↻</button>
        <br><br>
        <button class="btn-sm" onclick="removeMonitor('${m.id}')" title="Remove">✕</button>
      </div>
    `;
  }

  // ── Render all ──
  function renderAll() {
    const container = document.getElementById('monitors-list');
    const ids = Object.keys(monitors);
    document.getElementById('monitor-count').textContent = `${ids.length} endpoint${ids.length !== 1 ? 's' : ''}`;

    if (!ids.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">◉</div>
        <p>No monitors yet.<br>Add a URL above to start tracking uptime.</p>
      </div>`;
      return;
    }

    container.innerHTML = ids.map(id => {
      const m = monitors[id];
      return `<div class="monitor-card ${m.status === 'down' ? 'status-down' : ''}" id="card-${id}">${cardHTML(m)}</div>`;
    }).join('');
  }

  // ── Stats ──
  function updateStats() {
    const ms = Object.values(monitors);
    document.getElementById('stat-total').textContent = ms.length;
    document.getElementById('stat-up').textContent = ms.filter(m => m.status === 'up').length;
    document.getElementById('stat-down').textContent = ms.filter(m => m.status === 'down').length;
    document.getElementById('stat-checking').textContent = ms.filter(m => m.status === 'checking').length;
  }

  // ── Check all ──
  function checkAll() {
    Object.keys(monitors).forEach(id => checkUrl(id));
  }

  // ── Clear all ──
  function clearAll() {
    if (!Object.keys(monitors).length) return;
    if (confirm('Remove all monitors?')) {
      Object.keys(monitors).forEach(id => delete monitors[id]);
      log('✕ All monitors cleared.', 'info');
      renderAll();
      updateStats();
    }
  }

  // ── Clear log ──
  function clearLog() {
    document.getElementById('log-entries').innerHTML = '';
    log('Log cleared.', 'info');
  }

  // ── Interval ──
  function updateInterval() {
    checkInterval = parseInt(document.getElementById('interval-select').value);
    if (intervalTimer) clearInterval(intervalTimer);
    intervalTimer = setInterval(checkAll, checkInterval);
    log(`⏱ Check interval set to ${checkInterval / 1000}s`, 'info');
  }

  // ── Enter key ──
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMonitor();
  });

  // ── Init ──
  defaults.forEach(url => addMonitor(url));
  intervalTimer = setInterval(checkAll, checkInterval);
</script>
</body>
</html>
