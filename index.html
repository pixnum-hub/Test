
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Speedometer — Manik Roy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ─── CSS Variables / Themes ─────────────────────────────── */
  :root {
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --needle: #ff3d00;
    --font-display: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --radius: 16px;
    --trans: 0.35s cubic-bezier(.4,0,.2,1);
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: rgba(0,229,255,0.15);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --dial-bg: #0d1117;
    --dial-ring: rgba(0,229,255,0.2);
    --glow: rgba(0,229,255,0.3);
    --shadow: rgba(0,0,0,0.6);
  }

  [data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef4;
    --border: rgba(0,120,180,0.2);
    --text: #1a202c;
    --text-muted: #4a5568;
    --dial-bg: #f7fafc;
    --dial-ring: rgba(0,120,180,0.15);
    --glow: rgba(0,120,180,0.2);
    --shadow: rgba(0,0,0,0.15);
    --accent: #0077b6;
    --accent2: #e85d04;
    --needle: #e63946;
  }

  [data-theme="oled"] {
    --bg: #000000;
    --surface: #000000;
    --surface2: #080808;
    --border: rgba(0,229,255,0.1);
    --text: #ffffff;
    --text-muted: #666666;
    --dial-bg: #000000;
    --dial-ring: rgba(0,229,255,0.12);
    --glow: rgba(0,229,255,0.25);
    --shadow: rgba(0,0,0,0.9);
  }

  [data-theme="hc"] {
    --bg: #000000;
    --surface: #000000;
    --surface2: #111111;
    --border: #ffff00;
    --text: #ffffff;
    --text-muted: #ffff00;
    --dial-bg: #000000;
    --dial-ring: #ffff00;
    --glow: rgba(255,255,0,0.4);
    --shadow: rgba(0,0,0,0.9);
    --accent: #ffff00;
    --accent2: #ff6b6b;
    --needle: #ff0000;
  }

  /* ─── Reset & Base ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background var(--trans), color var(--trans);
    overflow-x: hidden;
  }

  /* ─── Header ─────────────────────────────────────────────── */
  header {
    width: 100%;
    max-width: 480px;
    padding: 18px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    transition: background var(--trans), border-color var(--trans);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 12px var(--glow);
    text-transform: uppercase;
  }

  .logo span { color: var(--text-muted); font-weight: 400; font-size: 0.7rem; display: block; letter-spacing: 0.05em; margin-top: 1px; }

  /* ─── Theme Toggle Cluster ───────────────────────────────── */
  .theme-cluster {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 5px 9px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  .theme-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 10px var(--glow);
  }

  /* ─── Main Content ───────────────────────────────────────── */
  main {
    flex: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ─── Mode Selector ──────────────────────────────────────── */
  .mode-row {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.25s;
    flex: 1;
    min-width: 56px;
    max-width: 76px;
  }

  .mode-btn:hover { border-color: var(--accent); transform: translateY(-2px); }

  .mode-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--surface), color-mix(in srgb, var(--accent) 10%, var(--surface)));
    box-shadow: 0 4px 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .mode-btn .icon { font-size: 1.6rem; line-height: 1; }
  .mode-btn .label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .mode-btn.active .label { color: var(--accent); }

  /* ─── Speedometer Dial ───────────────────────────────────── */
  .dial-wrap {
    position: relative;
    width: min(340px, 92vw);
    aspect-ratio: 1;
  }

  .dial-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px var(--glow));
    transition: filter var(--trans);
  }

  /* Centre readout overlay */
  .dial-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    padding-top: 30px;
  }

  .speed-value {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 12vw, 4.5rem);
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
    transition: color var(--trans);
  }

  .speed-unit {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .speed-mode-label {
    font-family: var(--font-body);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ─── Stats Strip ────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    transition: all var(--trans);
  }

  .stat-label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    color: var(--accent);
  }

  /* ─── Speed Bar ──────────────────────────────────────────── */
  .bar-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .bar-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .bar-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .bar-pct {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--accent);
  }

  .bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px var(--glow);
  }

  /* Range zones */
  .zone-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
  }
  .zone-label {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--text-muted);
  }

  /* ─── Status / GPS Indicator ─────────────────────────────── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .gps-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  .gps-dot.off { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: none; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ─── Control Buttons ────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .ctrl-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

  .ctrl-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 4px 20px var(--glow);
  }

  .ctrl-btn.primary:hover { filter: brightness(1.1); }

  /* ─── Unit Toggle ────────────────────────────────────────── */
  .unit-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
  }

  .unit-opt {
    padding: 8px 18px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .unit-opt.active {
    background: var(--accent);
    color: #000;
  }

  /* ─── Footer ─────────────────────────────────────────────── */
  footer {
    width: 100%;
    max-width: 480px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color var(--trans);
  }

  .footer-copy {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  .footer-rights {
    font-family: var(--font-body);
    font-size: 0.6rem;
    color: var(--text-muted);
    opacity: 0.6;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ─── Accuracy badge ─────────────────────────────────────── */
  .acc-badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    color: var(--text-muted);
  }

  /* ─── Animations ─────────────────────────────────────────── */
  @keyframes spin-in {
    from { opacity: 0; transform: scale(0.9) rotate(-5deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .dial-wrap { animation: spin-in 0.5s cubic-bezier(.34,1.56,.64,1); }

  /* ─── Needle Glow pulse when fast ───────────────────────────*/
  .needle-line { transition: stroke var(--trans); }

  /* ─── Scrollbar ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<!-- ───────────────── HEADER ───────────────────────────────── -->
<header>
  <div class="logo">
    Speedo<span>Real-time velocity</span>
  </div>
  <div class="theme-cluster">
    <button class="theme-btn" data-t="light">☀ Light</button>
    <button class="theme-btn active" data-t="dark">◐ Dark</button>
    <button class="theme-btn" data-t="oled">⬛ OLED</button>
    <button class="theme-btn" data-t="hc">⚡ HC</button>
  </div>
</header>

<!-- ───────────────── MAIN ─────────────────────────────────── -->
<main>

  <!-- Mode selector -->
  <div class="mode-row" id="modeRow">
    <button class="mode-btn active" data-mode="walk">
      <span class="icon">🚶</span><span class="label">Walk</span>
    </button>
    <button class="mode-btn" data-mode="bus">
      <span class="icon">🚌</span><span class="label">Bus</span>
    </button>
    <button class="mode-btn" data-mode="train">
      <span class="icon">🚂</span><span class="label">Train</span>
    </button>
    <button class="mode-btn" data-mode="plane">
      <span class="icon">✈️</span><span class="label">Plane</span>
    </button>
    <button class="mode-btn" data-mode="ship">
      <span class="icon">🛳️</span><span class="label">Ship</span>
    </button>
  </div>

  <!-- Unit toggle -->
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="unit-toggle">
      <button class="unit-opt active" data-unit="kmh">km/h</button>
      <button class="unit-opt" data-unit="mph">mph</button>
      <button class="unit-opt" data-unit="ms">m/s</button>
      <button class="unit-opt" data-unit="kn">kn</button>
    </div>
  </div>

  <!-- Dial -->
  <div class="dial-wrap" id="dialWrap">
    <svg class="dial-svg" id="dialSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="var(--surface2)"/>
          <stop offset="100%" stop-color="var(--dial-bg)"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-strong">
          <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer ring -->
      <circle cx="150" cy="150" r="145" fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
      <!-- Face -->
      <circle cx="150" cy="150" r="138" fill="url(#bgGrad)"/>
      <!-- Arc track -->
      <path id="arcTrack" fill="none" stroke="var(--surface2)" stroke-width="14" stroke-linecap="round"/>
      <!-- Arc fill (speed) -->
      <path id="arcFill" fill="none" stroke="var(--accent)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
      <!-- Arc danger zone -->
      <path id="arcDanger" fill="none" stroke="var(--accent2)" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

      <!-- Tick marks group -->
      <g id="ticks"></g>

      <!-- Centre hub -->
      <circle cx="150" cy="150" r="10" fill="var(--accent)" filter="url(#glow)"/>
      <circle cx="150" cy="150" r="5" fill="var(--bg)"/>

      <!-- Needle -->
      <g id="needleGroup" transform="rotate(-135, 150, 150)">
        <line class="needle-line" id="needleLine" x1="150" y1="150" x2="150" y2="42"
          stroke="var(--needle)" stroke-width="3" stroke-linecap="round" filter="url(#glow-strong)"/>
        <line x1="150" y1="150" x2="150" y2="185"
          stroke="var(--needle)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      </g>
    </svg>

    <!-- Centre readout -->
    <div class="dial-center">
      <div class="speed-value" id="speedValue">0</div>
      <div class="speed-unit" id="speedUnit">km/h</div>
      <div class="speed-mode-label" id="speedModeLabel">Walking</div>
    </div>
  </div>

  <!-- Speed bar -->
  <div class="bar-wrap">
    <div class="bar-header">
      <span class="bar-title">Speed Intensity</span>
      <span class="bar-pct" id="barPct">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill" style="width:0%"></div>
    </div>
    <div class="zone-labels">
      <span class="zone-label" id="zoneMin">0</span>
      <span class="zone-label" id="zoneMid" style="color:var(--accent)">NORMAL</span>
      <span class="zone-label" id="zoneMax">--</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Max Speed</div>
      <div class="stat-value" id="statMax">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Speed</div>
      <div class="stat-value" id="statAvg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Distance</div>
      <div class="stat-value" id="statDist">—</div>
    </div>
  </div>

  <!-- GPS status -->
  <div class="status-row">
    <div class="gps-dot off" id="gpsDot"></div>
    <span id="gpsStatus">GPS: Waiting…</span>
    <span class="acc-badge" id="accBadge">±— m</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn">▶ Start</button>
    <button class="ctrl-btn" id="resetBtn">↺ Reset</button>
  </div>

</main>

<!-- ───────────────── FOOTER ───────────────────────────────── -->
<footer>
  <div class="footer-copy">© <span id="footerYear"></span> Manik Roy</div>
  <div class="footer-rights">All Rights Reserved</div>
</footer>

<!-- ───────────────── SCRIPT ───────────────────────────────── -->
<script>
/* ── Config ─────────────────────────────────────────────────── */
const MODES = {
  walk:  { label: 'Walking',  max: 15,   typical: 6,   icon: '🚶' },
  bus:   { label: 'Bus',      max: 120,  typical: 50,  icon: '🚌' },
  train: { label: 'Train',    max: 350,  typical: 120, icon: '🚂' },
  plane: { label: 'Aircraft', max: 1100, typical: 850, icon: '✈️' },
  ship:  { label: 'Ship',     max: 80,   typical: 35,  icon: '🛳️' },
};

const UNITS = {
  kmh: { label: 'km/h', factor: 3.6,   dp: 1 },
  mph: { label: 'mph',  factor: 2.2369, dp: 1 },
  ms:  { label: 'm/s',  factor: 1,     dp: 2 },
  kn:  { label: 'kn',   factor: 1.9438, dp: 1 },
};

/* ── State ───────────────────────────────────────────────────── */
let state = {
  mode: 'walk',
  unit: 'kmh',
  theme: 'dark',
  running: false,
  watchId: null,
  speedMs: 0,
  maxSpeedMs: 0,
  totalDist: 0,
  readings: [],
  lastPos: null,
  startTime: null,
};

/* ── DOM refs ────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const speedValue  = $('speedValue');
const speedUnit   = $('speedUnit');
const speedModeLabel = $('speedModeLabel');
const barFill     = $('barFill');
const barPct      = $('barPct');
const zoneMin     = $('zoneMin');
const zoneMid     = $('zoneMid');
const zoneMax     = $('zoneMax');
const statMax     = $('statMax');
const statAvg     = $('statAvg');
const statDist    = $('statDist');
const gpsDot      = $('gpsDot');
const gpsStatus   = $('gpsStatus');
const accBadge    = $('accBadge');
const startBtn    = $('startBtn');
const resetBtn    = $('resetBtn');
const needleGroup = $('needleGroup');
const arcFill     = $('arcFill');
const arcTrack    = $('arcTrack');
const arcDanger   = $('arcDanger');
const ticksG      = $('ticks');
const footerYear  = $('footerYear');

/* ── Footer year (auto-updating) ────────────────────────────── */
footerYear.textContent = new Date().getFullYear();

/* ── SVG Helpers ─────────────────────────────────────────────── */
const CX = 150, CY = 150, R = 112;
const START_DEG = -135, END_DEG = 135; // 270° arc

function polarToXY(deg, r) {
  const rad = (deg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
}

function describeArc(startDeg, endDeg, r) {
  const [x1, y1] = polarToXY(startDeg, r);
  const [x2, y2] = polarToXY(endDeg, r);
  const large = endDeg - startDeg > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function buildDial() {
  const mode = MODES[state.mode];
  const max  = mode.max;

  arcTrack.setAttribute('d', describeArc(START_DEG, END_DEG, R));

  // Danger zone = top 20% of range
  const dangerFrac = 0.80;
  const dangerDeg  = START_DEG + dangerFrac * 270;
  arcDanger.setAttribute('d', describeArc(dangerDeg, END_DEG, R));

  // Ticks
  ticksG.innerHTML = '';
  const numMajor = 10;
  for (let i = 0; i <= numMajor; i++) {
    const frac = i / numMajor;
    const deg  = START_DEG + frac * 270;
    const [x1, y1] = polarToXY(deg, R - 8);
    const [x2, y2] = polarToXY(deg, R + 6);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'var(--text-muted)');
    line.setAttribute('stroke-width', i % 5 === 0 ? '2.5' : '1.2');
    line.setAttribute('stroke-linecap', 'round');
    ticksG.appendChild(line);

    // Labels at major ticks
    if (i % 2 === 0) {
      const val  = Math.round((frac * max));
      const disp = convertSpeed(val / 3.6); // val is km/h here, convert
      const [tx, ty] = polarToXY(deg, R - 26);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', tx); text.setAttribute('y', ty);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('fill', 'var(--text-muted)');
      text.setAttribute('font-family', 'Share Tech Mono, monospace');
      text.setAttribute('font-size', '9');
      text.textContent = Math.round(disp);
      ticksG.appendChild(text);
    }
  }

  // Zone labels
  zoneMin.textContent = '0';
  zoneMax.textContent = Math.round(convertSpeed(max / 3.6));
  zoneMid.textContent = mode.label.toUpperCase();

  updateNeedle();
}

function updateNeedle() {
  const mode    = MODES[state.mode];
  const maxMs   = mode.max / 3.6; // km/h → m/s
  const frac    = Math.min(state.speedMs / maxMs, 1);
  const deg     = START_DEG + frac * 270;

  needleGroup.setAttribute('transform', `rotate(${deg + 135}, 150, 150)`);

  // Arc fill
  if (frac > 0) {
    arcFill.setAttribute('d', describeArc(START_DEG, START_DEG + frac * 270, R));
  } else {
    arcFill.setAttribute('d', '');
  }

  // Display
  const disp = convertSpeed(state.speedMs);
  speedValue.textContent = disp.toFixed(UNITS[state.unit].dp);
  speedUnit.textContent  = UNITS[state.unit].label;
  speedModeLabel.textContent = mode.label;

  // Bar
  const pct = Math.round(frac * 100);
  barFill.style.width = pct + '%';
  barPct.textContent  = pct + '%';

  // Stats
  const maxDisp = convertSpeed(state.maxSpeedMs);
  statMax.textContent = state.maxSpeedMs > 0 ? maxDisp.toFixed(1) : '—';

  if (state.readings.length > 0) {
    const avgMs = state.readings.reduce((s, v) => s + v, 0) / state.readings.length;
    statAvg.textContent = convertSpeed(avgMs).toFixed(1);
  }

  if (state.totalDist > 0) {
    const km = state.totalDist / 1000;
    statDist.textContent = km >= 1 ? km.toFixed(2) + 'k' : state.totalDist.toFixed(0) + 'm';
  }
}

function convertSpeed(ms) {
  return ms * UNITS[state.unit].factor;
}

/* ── GPS ─────────────────────────────────────────────────────── */
function startGPS() {
  if (!navigator.geolocation) {
    gpsStatus.textContent = 'GPS: Not supported';
    return;
  }
  gpsStatus.textContent = 'GPS: Acquiring…';
  state.watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000,
  });
}

function stopGPS() {
  if (state.watchId !== null) {
    navigator.geolocation.clearWatch(state.watchId);
    state.watchId = null;
  }
  gpsDot.classList.add('off');
  gpsStatus.textContent = 'GPS: Stopped';
}

function onGPS(pos) {
  gpsDot.classList.remove('off');
  const acc = pos.coords.accuracy;
  accBadge.textContent = `±${Math.round(acc)}m`;
  gpsStatus.textContent = `GPS: ${pos.coords.latitude.toFixed(4)}°, ${pos.coords.longitude.toFixed(4)}°`;

  let speedMs = pos.coords.speed;
  if (speedMs === null || speedMs < 0) speedMs = 0;
  state.speedMs = speedMs;

  if (speedMs > state.maxSpeedMs) state.maxSpeedMs = speedMs;
  state.readings.push(speedMs);

  // Distance via Haversine
  if (state.lastPos) {
    state.totalDist += haversine(state.lastPos, pos.coords);
  }
  state.lastPos = pos.coords;

  updateNeedle();
}

function onGPSError(err) {
  gpsDot.classList.add('off');
  const msgs = { 1: 'Permission denied', 2: 'Position unavailable', 3: 'Timeout' };
  gpsStatus.textContent = `GPS: ${msgs[err.code] || 'Error'}`;
  // Fallback: simulate movement for demo
  simulateSpeed();
}

/* ── Demo Simulation (fallback) ─────────────────────────────── */
let simInterval = null;
let simTarget = 0;
let simCurrent = 0;

function simulateSpeed() {
  if (simInterval) return;
  gpsStatus.textContent = 'GPS: Demo Mode';
  accBadge.textContent  = '±DEMO';
  const mode = MODES[state.mode];
  simTarget = (mode.typical / 3.6) * (0.8 + Math.random() * 0.4);

  simInterval = setInterval(() => {
    if (!state.running) { clearInterval(simInterval); simInterval = null; return; }
    // Drift target occasionally
    if (Math.random() < 0.03) {
      simTarget = (mode.typical / 3.6) * (0.6 + Math.random() * 0.6);
    }
    // Smooth approach
    simCurrent += (simTarget - simCurrent) * 0.08 + (Math.random() - 0.5) * 0.15;
    simCurrent = Math.max(0, simCurrent);
    state.speedMs = simCurrent;
    if (simCurrent > state.maxSpeedMs) state.maxSpeedMs = simCurrent;
    state.readings.push(simCurrent);
    updateNeedle();
  }, 200);
}

/* ── Haversine ───────────────────────────────────────────────── */
function haversine(a, b) {
  const R = 6371000;
  const dLat = (b.latitude  - a.latitude)  * Math.PI / 180;
  const dLon = (b.longitude - a.longitude) * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 +
            Math.cos(a.latitude*Math.PI/180) * Math.cos(b.latitude*Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h));
}

/* ── Controls ────────────────────────────────────────────────── */
startBtn.addEventListener('click', () => {
  if (!state.running) {
    state.running = true;
    state.startTime = Date.now();
    startBtn.textContent = '⏸ Pause';
    startBtn.classList.add('primary');
    startGPS();
  } else {
    state.running = false;
    startBtn.textContent = '▶ Resume';
    stopGPS();
    if (simInterval) { clearInterval(simInterval); simInterval = null; }
  }
});

resetBtn.addEventListener('click', () => {
  state.running = false;
  state.speedMs = 0;
  state.maxSpeedMs = 0;
  state.totalDist = 0;
  state.readings = [];
  state.lastPos = null;
  simCurrent = 0;
  stopGPS();
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  startBtn.textContent = '▶ Start';
  startBtn.classList.add('primary');
  gpsDot.classList.add('off');
  gpsStatus.textContent = 'GPS: Waiting…';
  accBadge.textContent = '±— m';
  statMax.textContent = '—';
  statAvg.textContent = '—';
  statDist.textContent = '—';
  updateNeedle();
});

/* ── Mode Buttons ────────────────────────────────────────────── */
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    state.speedMs = 0;
    simCurrent = 0;
    simTarget = 0;
    buildDial();
  });
});

/* ── Unit Buttons ────────────────────────────────────────────── */
document.querySelectorAll('.unit-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.unit-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.unit = btn.dataset.unit;
    speedUnit.textContent = UNITS[state.unit].label;
    buildDial();
  });
});

/* ── Theme Buttons ───────────────────────────────────────────── */
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.theme = btn.dataset.t;
    document.documentElement.setAttribute('data-theme', state.theme);
    buildDial(); // refresh SVG colours
  });
});

/* ── Init ────────────────────────────────────────────────────── */
buildDial();
</script>
</body>
</html>
