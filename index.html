<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SKYSCOPE — Live Flight Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{--radius:10px;--mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;--sans:'Inter',system-ui,-apple-system,sans-serif;}
[data-theme="dark"]{--bg:#0a0f14;--panel:#111a22;--panel2:#0d151c;--border:#20303c;--text:#e6eef2;--muted:#7f97a3;--accent:#39ff8a;--accent2:#ffb454;--danger:#ff5c5c;}
[data-theme="light"]{--bg:#f1f4f2;--panel:#ffffff;--panel2:#e8edea;--border:#cfd9d3;--text:#0f1a1c;--muted:#4f6360;--accent:#0c8a4b;--accent2:#a85e08;--danger:#c23b3b;}
[data-theme="oled"]{--bg:#000000;--panel:#050708;--panel2:#000000;--border:#161c1e;--text:#f0f2f2;--muted:#7a8688;--accent:#00ff85;--accent2:#ffc24b;--danger:#ff4747;}
[data-theme="hc"]{--bg:#000000;--panel:#000000;--panel2:#000000;--border:#ffffff;--text:#ffffff;--muted:#ffe600;--accent:#00fdff;--accent2:#ffe600;--danger:#ff2b2b;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-tap-highlight-color:transparent;}
body{display:flex;flex-direction:column;min-height:100dvh;}
header{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:1000;}
.brand{display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-weight:700;letter-spacing:.06em;font-size:1rem;}
.sweep{position:relative;width:16px;height:16px;border-radius:50%;border:1px solid var(--accent);overflow:hidden;flex:none;}
.sweep::after{content:"";position:absolute;inset:0;background:conic-gradient(from 0deg,var(--accent) 0deg,transparent 60deg);animation:spin 2.4s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.live{margin-left:auto;display:flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.72rem;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{50%{opacity:.25;}}
.themebtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.4rem .6rem;font-family:var(--mono);font-size:.68rem;cursor:pointer;}
main{flex:1;display:flex;flex-direction:column;min-height:0;}
#map{flex:1;min-height:44vh;background:var(--panel2);}
[data-theme="dark"] .leaflet-tile-pane,[data-theme="oled"] .leaflet-tile-pane,[data-theme="hc"] .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.93) contrast(.9) saturate(.8);}
.plane-icon{color:var(--accent);filter:drop-shadow(0 0 3px var(--accent));}
aside{background:var(--panel);border-top:1px solid var(--border);display:flex;flex-direction:column;max-height:46vh;}
.controls{display:flex;gap:.5rem;padding:.7rem .8rem;border-bottom:1px solid var(--border);}
.controls input{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem .7rem;font-family:var(--mono);font-size:.85rem;min-width:0;}
.controls button{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem .7rem;font-size:.85rem;cursor:pointer;flex:none;}
.controls button.primary{background:var(--accent);color:#03130a;border-color:var(--accent);font-weight:700;}
#status{padding:.3rem .8rem;font-family:var(--mono);font-size:.72rem;color:var(--muted);}
#list{overflow-y:auto;flex:1;}
.row{display:flex;justify-content:space-between;gap:.6rem;padding:.6rem .8rem;border-bottom:1px solid var(--border);cursor:pointer;font-family:var(--mono);font-size:.78rem;}
.row:active,.row:hover{background:var(--panel2);}
.row b{color:var(--accent2);}
.row span.sub{color:var(--muted);}
#detail{border-top:1px solid var(--border);padding:.7rem .8rem;font-family:var(--mono);font-size:.78rem;display:none;}
#detail.show{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;}
#detail div span{color:var(--muted);display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;}
#detail div b{color:var(--accent);font-size:.9rem;}
footer{border-top:1px solid var(--border);background:var(--panel);padding:.8rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.25rem;font-size:.72rem;color:var(--muted);}
footer strong{color:var(--text);}
@media(min-width:820px){
 main{flex-direction:row;}
 #map{min-height:auto;height:100%;}
 aside{max-height:none;width:340px;border-top:none;border-left:1px solid var(--border);}
}
</style>
</head>
<body>
<header>
 <div class="brand"><span class="sweep"></span>SKYSCOPE</div>
 <div class="live"><span class="dot"></span><span id="liveText">CONNECTING…</span></div>
 <button class="themebtn" id="themeBtn" aria-label="Cycle theme">DARK</button>
</header>
<main>
 <div id="map" role="application" aria-label="Live aircraft map"></div>
 <aside>
  <div class="controls">
   <input id="search" type="text" placeholder="Filter by callsign…" autocomplete="off">
   <button id="locateBtn" class="primary">📍 Near me</button>
  </div>
  <div id="status">Loading nearby aircraft…</div>
  <div id="detail"></div>
  <div id="list"></div>
 </aside>
</main>
<footer>
 <div><strong>SKYSCOPE</strong> — live positions via OpenSky Network</div>
 <div>© Manik Roy <span id="year"></span>. All Rights Reserved.</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

/* ---------- Theme ---------- */
const THEMES=['dark','light','oled','hc'];
const html=document.documentElement, themeBtn=document.getElementById('themeBtn');
let themeIdx=0;
function applyTheme(){
 html.setAttribute('data-theme',THEMES[themeIdx]);
 themeBtn.textContent=THEMES[themeIdx].toUpperCase();
}
themeBtn.addEventListener('click',()=>{themeIdx=(themeIdx+1)%THEMES.length;applyTheme();});
applyTheme();

/* ---------- Map ---------- */
const map=L.map('map',{zoomControl:true}).setView([28.6,77.2],6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19,attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

const markers={};
let planes=[];
let selected=null;
const statusEl=document.getElementById('status');
const liveText=document.getElementById('liveText');
const listEl=document.getElementById('list');
const detailEl=document.getElementById('detail');
const searchEl=document.getElementById('search');

function planeSVG(rot){
 return `<svg class="plane-icon" width="26" height="26" viewBox="0 0 24 24" style="transform:rotate(${rot}deg)"><path fill="currentColor" d="M12 2l2 6 7 4v2l-7-2-1 5 3 2v2l-4-1-4 1v-2l3-2-1-5-7 2v-2l7-4z"/></svg>`;
}

function fmtNum(n,unit,dec=0){return (n===null||n===undefined)?'—':n.toFixed(dec)+unit;}

function renderList(){
 const q=searchEl.value.trim().toUpperCase();
 const filtered=planes.filter(p=>!q||(p.callsign||'').toUpperCase().includes(q));
 statusEl.textContent=`${filtered.length} aircraft in view`;
 listEl.innerHTML=filtered.slice(0,150).map(p=>`
  <div class="row" data-icao="${p.icao24}">
   <span><b>${p.callsign||'UNKNOWN'}</b> <span class="sub">${p.origin||''}</span></span>
   <span class="sub">${fmtNum(p.altFt,' ft')} · ${fmtNum(p.spdKt,' kt')}</span>
  </div>`).join('') || '<div style="padding:.8rem;color:var(--muted);font-family:var(--mono);font-size:.78rem">No aircraft match.</div>';
}

function showDetail(p){
 selected=p;
 detailEl.classList.add('show');
 detailEl.innerHTML=`
  <div><span>Callsign</span><b>${p.callsign||'—'}</b></div>
  <div><span>Country</span><b>${p.origin||'—'}</b></div>
  <div><span>Altitude</span><b>${fmtNum(p.altFt,' ft')}</b></div>
  <div><span>Speed</span><b>${fmtNum(p.spdKt,' kt')}</b></div>
  <div><span>Heading</span><b>${fmtNum(p.track,'°')}</b></div>
  <div><span>ICAO24</span><b>${p.icao24}</b></div>`;
 map.flyTo([p.lat,p.lon],8,{duration:.6});
}

function updateMarkers(){
 const seen=new Set();
 planes.forEach(p=>{
  if(p.lat===null||p.lon===null)return;
  seen.add(p.icao24);
  const icon=L.divIcon({className:'',html:planeSVG(p.track||0),iconSize:[26,26],iconAnchor:[13,13]});
  if(markers[p.icao24]){
   markers[p.icao24].setLatLng([p.lat,p.lon]);
   markers[p.icao24].setIcon(icon);
  }else{
   const m=L.marker([p.lat,p.lon],{icon}).addTo(map);
   m.bindTooltip(p.callsign||p.icao24,{direction:'top',offset:[0,-10]});
   m.on('click',()=>showDetail(p));
   markers[p.icao24]=m;
  }
 });
 Object.keys(markers).forEach(id=>{
  if(!seen.has(id)){map.removeLayer(markers[id]);delete markers[id];}
 });
}

async function fetchPlanes(){
 const b=map.getBounds();
 const url=`https://opensky-network.org/api/states/all?lamin=${b.getSouth()}&lomin=${b.getWest()}&lamax=${b.getNorth()}&lomax=${b.getEast()}`;
 try{
  const res=await fetch(url);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  planes=(data.states||[]).map(s=>({
   icao24:s[0],callsign:(s[1]||'').trim(),origin:s[2],
   lon:s[5],lat:s[6],altFt:s[7]!==null?s[7]*3.28084:null,
   spdKt:s[9]!==null?s[9]*1.94384:null,track:s[10]
  })).filter(p=>p.lat!==null&&p.lon!==null);
  liveText.textContent='LIVE · '+new Date().toLocaleTimeString();
  updateMarkers();
  renderList();
 }catch(e){
  liveText.textContent='RETRYING…';
  statusEl.textContent='Could not reach OpenSky right now — retrying shortly.';
 }
}

/* ---------- Interactions ---------- */
listEl.addEventListener('click',e=>{
 const row=e.target.closest('.row');
 if(!row)return;
 const p=planes.find(pl=>pl.icao24===row.dataset.icao);
 if(p)showDetail(p);
});
searchEl.addEventListener('input',renderList);
document.getElementById('locateBtn').addEventListener('click',()=>{
 if(!navigator.geolocation){alert('Geolocation is not available on this device.');return;}
 statusEl.textContent='Locating…';
 navigator.geolocation.getCurrentPosition(pos=>{
  map.setView([pos.coords.latitude,pos.coords.longitude],9);
  fetchPlanes();
 },()=>{statusEl.textContent='Location permission denied.';},{timeout:8000});
});
map.on('moveend',fetchPlanes);

fetchPlanes();
setInterval(fetchPlanes,15000);
</script>
</body>
</html>
