<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SKYWATCH — Live Flight Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --radius:10px; --gap:14px;
    --f-display:'Space Grotesk',sans-serif;
    --f-body:'Inter',sans-serif;
    --f-mono:'JetBrains Mono',monospace;
  }
  [data-theme="dark"]{
    --bg:#080c0d; --panel:#0f1618; --panel-2:#131c1e; --border:#1e2a2c;
    --text:#e7f3ef; --dim:#7f9793; --accent:#39ff88; --accent-dim:#1d6b45;
    --warn:#ffb547; --shadow:0 0 0 1px #1e2a2c;
  }
  [data-theme="light"]{
    --bg:#f4f7f6; --panel:#ffffff; --panel-2:#eef2f1; --border:#d7e0de;
    --text:#122421; --dim:#5c6f6b; --accent:#0e8f52; --accent-dim:#bfe8d4;
    --warn:#a8620b; --shadow:0 1px 3px rgba(18,36,33,.08);
  }
  [data-theme="oled"]{
    --bg:#000000; --panel:#000000; --panel-2:#0a0d0d; --border:#161c1c;
    --text:#eafff4; --dim:#5f7873; --accent:#00ff8c; --accent-dim:#0b4a2e;
    --warn:#ffb547; --shadow:0 0 0 1px #161c1c;
  }
  [data-theme="hc"]{
    --bg:#000000; --panel:#000000; --panel-2:#000000; --border:#ffffff;
    --text:#ffffff; --dim:#ffffff; --accent:#ffe600; --accent-dim:#ffe600;
    --warn:#ffe600; --shadow:0 0 0 2px #ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--f-body);
    min-height:100dvh; display:flex; flex-direction:column;
    transition:background .25s ease, color .25s ease;
  }
  [data-theme="hc"] *{ font-weight:600 !important; }
  a{color:var(--accent);}
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:10;
  }
  .brand{display:flex; flex-direction:column; line-height:1.05;}
  .brand b{font-family:var(--f-display); font-size:1.25rem; letter-spacing:.02em;}
  .brand span{font-size:.7rem; color:var(--dim); letter-spacing:.12em; text-transform:uppercase;}
  #themeBtn{
    font-family:var(--f-mono); font-size:.7rem; letter-spacing:.06em;
    background:var(--panel-2); color:var(--text); border:1px solid var(--border);
    border-radius:999px; padding:8px 14px; cursor:pointer; text-transform:uppercase;
  }
  #themeBtn:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }
  main{flex:1; width:100%; max-width:760px; margin:0 auto; padding:18px; display:flex; flex-direction:column; gap:22px;}

  .hero{display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center;}
  .radar{
    position:relative; width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, var(--panel-2) 0%, var(--panel) 70%);
    border:1px solid var(--border); overflow:hidden; flex-shrink:0;
  }
  .radar::before, .radar::after{content:''; position:absolute; border:1px solid var(--border); border-radius:50%;}
  .radar::before{inset:20%;}
  .radar::after{inset:40%;}
  .sweep{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg, var(--accent) 0deg, transparent 55deg, transparent 360deg);
    opacity:.35; animation:spin 4s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .sweep{animation:none;} }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .blip{
    position:absolute; width:5px; height:5px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 6px var(--accent); transform:translate(-50%,-50%);
  }
  .stat b{font-family:var(--f-mono); font-size:2.2rem; color:var(--accent);}
  .stat span{display:block; font-size:.75rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase;}

  .controls{display:flex; gap:10px; width:100%; flex-wrap:wrap;}
  .controls select, .controls input{
    flex:1; min-width:140px; background:var(--panel); color:var(--text);
    border:1px solid var(--border); border-radius:var(--radius); padding:11px 12px;
    font-family:var(--f-body); font-size:.9rem;
  }
  .status{font-family:var(--f-mono); font-size:.72rem; color:var(--dim); min-height:1em;}
  .status.err{color:var(--warn);}

  .list{display:flex; flex-direction:column; gap:8px;}
  .row{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 14px; display:grid;
    grid-template-columns:1fr auto; gap:4px 10px; align-items:center;
  }
  .row .call{font-family:var(--f-mono); font-weight:700; font-size:.95rem;}
  .row .country{font-size:.72rem; color:var(--dim); grid-column:1;}
  .row .metrics{
    grid-column:1 / -1; display:flex; gap:14px; flex-wrap:wrap;
    font-family:var(--f-mono); font-size:.78rem; color:var(--text);
    border-top:1px solid var(--border); margin-top:6px; padding-top:6px;
  }
  .row .metrics em{font-style:normal; color:var(--dim); margin-right:4px;}
  .vr-up{color:var(--accent);} .vr-down{color:var(--warn);}
  .empty{text-align:center; color:var(--dim); font-size:.85rem; padding:30px 10px;}

  footer{
    border-top:1px solid var(--border); padding:20px 16px 28px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; text-align:center; color:var(--dim); font-size:.75rem;
  }
  footer .src{font-size:.7rem;}
  @media (min-width:600px){
    .hero{flex-direction:row; text-align:left; justify-content:center;}
    .row{grid-template-columns:1fr 1fr auto;}
    .row .country{grid-column:auto;}
  }
</style>
</head>
<body>

<header>
  <div class="brand"><b>SKYWATCH</b><span>Live ATC-style Feed</span></div>
  <button id="themeBtn" type="button" aria-label="Cycle theme">Dark</button>
</header>

<main>
  <section class="hero">
    <div class="radar" id="radar"><div class="sweep"></div></div>
    <div class="stat">
      <b id="count">—</b>
      <span id="regionLabel">aircraft tracked</span>
    </div>
  </section>

  <section class="controls">
    <select id="region" aria-label="Region">
      <option value="eu">Europe</option>
      <option value="us">USA — East Coast</option>
      <option value="asia">Japan &amp; Korea</option>
      <option value="me">Middle East</option>
      <option value="in">India</option>
      <option value="au">Australia</option>
    </select>
    <input id="search" type="search" placeholder="Filter by callsign or country…" aria-label="Filter flights">
  </section>
  <div class="status" id="status" role="status"></div>

  <section class="list" id="list"></section>
</main>

<footer>
  <div>Data via <a href="https://opensky-network.org" target="_blank" rel="noopener">OpenSky Network</a> — free, keyless public API</div>
  <div class="src">Positions may be delayed. Not for navigation use.</div>
  <div id="copyright">© 2026 Manik Roy. All Rights Reserved.</div>
</footer>

<script>
  const REGIONS = {
    eu:  {label:'Europe',        lamin:36, lomin:-10, lamax:60, lomax:30},
    us:  {label:'USA — East',    lamin:25, lomin:-90, lamax:48, lomax:-65},
    asia:{label:'Japan & Korea', lamin:24, lomin:122, lamax:46, lomax:146},
    me:  {label:'Middle East',   lamin:12, lomin:34,  lamax:40, lomax:63},
    in:  {label:'India',         lamin:6,  lomin:68,  lamax:35, lomax:97},
    au:  {label:'Australia',     lamin:-44,lomin:112, lamax:-10,lomax:154},
  };
  const THEMES = ['dark','light','oled','hc'];
  const THEME_LABELS = {dark:'Dark', light:'Light', oled:'OLED Black', hc:'High Contrast'};
  const COMPASS = ['N','NE','E','SE','S','SW','W','NW'];

  const el = id => document.getElementById(id);
  const html = document.documentElement;
  let themeIdx = 0;
  let allFlights = [];
  let pollTimer = null;

  function setTheme(i){
    themeIdx = i % THEMES.length;
    const t = THEMES[themeIdx];
    html.setAttribute('data-theme', t);
    el('themeBtn').textContent = THEME_LABELS[t];
  }
  el('themeBtn').addEventListener('click', () => setTheme(themeIdx + 1));
  setTheme(0);

  function headingToCompass(deg){
    if (deg === null || deg === undefined) return '–';
    return COMPASS[Math.round(deg / 45) % 8];
  }

  function renderRadar(flights, region){
    const radar = el('radar');
    radar.querySelectorAll('.blip').forEach(b => b.remove());
    const frag = document.createDocumentFragment();
    flights.forEach(f => {
      if (f.lon === null || f.lat === null) return;
      const x = (f.lon - region.lomin) / (region.lomax - region.lomin) * 100;
      const y = 100 - (f.lat - region.lamin) / (region.lamax - region.lamin) * 100;
      if (x < 0 || x > 100 || y < 0 || y > 100) return;
      const dot = document.createElement('div');
      dot.className = 'blip';
      dot.style.left = x + '%';
      dot.style.top = y + '%';
      frag.appendChild(dot);
    });
    radar.appendChild(frag);
  }

  function renderList(flights){
    const list = el('list');
    const q = el('search').value.trim().toLowerCase();
    const filtered = flights.filter(f =>
      !q || f.callsign.toLowerCase().includes(q) || f.country.toLowerCase().includes(q)
    ).slice(0, 40);

    if (!filtered.length){
      list.innerHTML = '<div class="empty">No matching aircraft in this region right now.</div>';
      return;
    }
    list.innerHTML = filtered.map(f => {
      const alt = f.onGround ? 'GND' : (f.altitude !== null ? Math.round(f.altitude) + ' m' : '—');
      const spd = f.velocity !== null ? Math.round(f.velocity * 3.6) + ' km/h' : '—';
      const vr = f.vrate === null ? '<span>–</span>' :
        f.vrate > 1 ? '<span class="vr-up">▲ climbing</span>' :
        f.vrate < -1 ? '<span class="vr-down">▼ descending</span>' : '<span>▬ level</span>';
      const hdg = f.heading !== null ? Math.round(f.heading) + '° ' + headingToCompass(f.heading) : '—';
      return `<div class="row">
        <div class="call">${f.callsign || '—'}</div>
        <div class="country">${f.country}</div>
        <div class="metrics">
          <span><em>ALT</em>${alt}</span>
          <span><em>SPD</em>${spd}</span>
          <span><em>HDG</em>${hdg}</span>
          ${vr}
        </div>
      </div>`;
    }).join('');
  }

  async function fetchFlights(){
    const key = el('region').value;
    const region = REGIONS[key];
    const status = el('status');
    status.textContent = 'Fetching live positions…';
    status.classList.remove('err');
    const url = `https://opensky-network.org/api/states/all?lamin=${region.lamin}&lomin=${region.lomin}&lamax=${region.lamax}&lomax=${region.lomax}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const states = data.states || [];
      allFlights = states
        .filter(s => s[1] && s[1].trim())
        .map(s => ({
          icao24: s[0], callsign: s[1].trim(), country: s[2],
          lon: s[5], lat: s[6], altitude: s[7], onGround: s[8],
          velocity: s[9], heading: s[10], vrate: s[11],
        }))
        .sort((a, b) => (b.altitude || 0) - (a.altitude || 0));

      el('count').textContent = allFlights.length;
      el('regionLabel').textContent = 'aircraft over ' + region.label;
      renderRadar(allFlights, region);
      renderList(allFlights);
      status.textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch (err) {
      status.textContent = 'Signal lost — retrying shortly…';
      status.classList.add('err');
    }
  }

  function startPolling(){
    if (pollTimer) clearInterval(pollTimer);
    fetchFlights();
    pollTimer = setInterval(fetchFlights, 15000);
  }

  el('region').addEventListener('change', startPolling);
  el('search').addEventListener('input', () => renderList(allFlights));

  el('copyright').textContent = `© ${new Date().getFullYear()} Manik Roy. All Rights Reserved.`;

  startPolling();
</script>
</body>
</html>
