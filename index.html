<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VaaniLens — Voice & Image Translator</title>
<style>
:root{
  --bg:#f4f5f7; --surface:#ffffff; --text:#1a1a1e; --sub:#5c5f66;
  --accent:#5b5bf0; --accent2:#00b894; --border:#dfe1e6; --danger:#e0453c;
}
[data-theme="dark"]{
  --bg:#14151a; --surface:#1e2027; --text:#eceef1; --sub:#9aa0ab;
  --accent:#7c7cff; --accent2:#2ecf9e; --border:#2c2f38;
}
[data-theme="oled"]{
  --bg:#000000; --surface:#0a0a0a; --text:#f0f0f0; --sub:#8a8a8a;
  --accent:#8080ff; --accent2:#2ecf9e; --border:#1c1c1c;
}
[data-theme="hc"]{
  --bg:#000000; --surface:#000000; --text:#ffffff; --sub:#ffffff;
  --accent:#ffff00; --accent2:#00ffff; --border:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--text); font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  min-height:100vh; display:flex; flex-direction:column; transition:background .25s,color .25s;
}
header{
  padding:16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:5;
}
header h1{font-size:1.15rem; margin:0; letter-spacing:.3px}
header h1 span{color:var(--accent)}
#themeBtn{
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:10px; font-size:.85rem; cursor:pointer;
}
main{flex:1; width:100%; max-width:640px; margin:0 auto; padding:14px 14px 8px}
.tabs{display:flex; gap:8px; margin-bottom:14px}
.tabs button{
  flex:1; padding:11px; border-radius:12px; border:1px solid var(--border);
  background:var(--surface); color:var(--sub); font-size:.92rem; font-weight:600; cursor:pointer;
}
.tabs button.active{background:var(--accent); color:#fff; border-color:var(--accent)}
.panel{display:none}
.panel.active{display:block}
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:16px; margin-bottom:14px;
}
.row{display:flex; gap:10px; align-items:center}
select{
  flex:1; padding:10px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:.88rem;
}
.swap{
  background:var(--surface); border:1px solid var(--border); color:var(--accent);
  width:40px; height:40px; border-radius:50%; font-size:1.1rem; cursor:pointer; flex-shrink:0;
}
.big-btn{
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  padding:16px; margin-top:14px; border:none; border-radius:14px; font-size:1rem; font-weight:700;
  background:var(--accent); color:#fff; cursor:pointer;
}
.big-btn.listening{background:var(--danger); animation:pulse 1.1s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}
.big-btn:disabled{opacity:.55; cursor:not-allowed}
.mic-icon{font-size:1.2rem}
.result-box{
  margin-top:12px; padding:12px; border-radius:12px; background:var(--bg);
  border:1px solid var(--border); min-height:48px; font-size:.98rem; line-height:1.45; white-space:pre-wrap;
}
.result-label{font-size:.72rem; text-transform:uppercase; letter-spacing:.6px; color:var(--sub); margin-bottom:6px; display:flex; justify-content:space-between; align-items:center}
.icon-btn{background:none; border:none; color:var(--accent); cursor:pointer; font-size:1rem}
#fileInput{display:none}
.upload-zone{
  border:2px dashed var(--border); border-radius:14px; padding:26px 14px; text-align:center;
  color:var(--sub); cursor:pointer; font-size:.9rem;
}
.upload-zone img{max-width:100%; max-height:220px; border-radius:10px; margin-top:10px}
.status{font-size:.8rem; color:var(--sub); text-align:center; margin-top:8px; min-height:16px}
footer{
  text-align:center; padding:16px 10px 22px; font-size:.75rem; color:var(--sub);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
}
@media(min-width:640px){ main{padding-top:22px} }
</style>
</head>
<body data-theme="dark">
<header>
  <h1>Vaani<span>Lens</span></h1>
  <button id="themeBtn" onclick="cycleTheme()">🌙 Dark</button>
</header>

<main>
  <div class="tabs">
    <button class="active" id="tabVoiceBtn" onclick="showTab('voice')">🎙️ Voice</button>
    <button id="tabImageBtn" onclick="showTab('image')">🖼️ Image</button>
  </div>

  <!-- VOICE PANEL -->
  <section id="voicePanel" class="panel active">
    <div class="card">
      <div class="row">
        <select id="srcLangV"></select>
        <button class="swap" onclick="swapLangs('V')" title="Swap">⇄</button>
        <select id="tgtLangV"></select>
      </div>
      <button class="big-btn" id="micBtn" onclick="toggleListen()">
        <span class="mic-icon">🎤</span><span id="micLabel">Tap to Speak</span>
      </button>
      <div class="status" id="voiceStatus"></div>
      <div class="result-box" id="heardBox">
        <div class="result-label">You said</div>
        <div id="heardText"></div>
      </div>
      <div class="result-box" id="voiceOutBox">
        <div class="result-label">Translation <button class="icon-btn" onclick="speakOut()">🔊</button></div>
        <div id="voiceOutText"></div>
      </div>
    </div>
  </section>

  <!-- IMAGE PANEL -->
  <section id="imagePanel" class="panel">
    <div class="card">
      <div class="row">
        <select id="srcLangI"></select>
        <button class="swap" onclick="swapLangs('I')" title="Swap">⇄</button>
        <select id="tgtLangI"></select>
      </div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        📷 Tap to choose or capture a photo
        <img id="previewImg" style="display:none">
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <button class="big-btn" id="ocrBtn" onclick="runOCR()" disabled>Extract & Translate</button>
      <div class="status" id="imgStatus"></div>
      <div class="result-box" id="ocrBox">
        <div class="result-label">Detected Text</div>
        <div id="ocrText"></div>
      </div>
      <div class="result-box" id="imgOutBox">
        <div class="result-label">Translation <button class="icon-btn" onclick="speakImgOut()">🔊</button></div>
        <div id="imgOutText"></div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div>© <span id="year"></span> Manik Roy. All Rights Reserved.</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

// ---------- Theme ----------
const themes = [
  {id:'dark', label:'🌙 Dark'}, {id:'light', label:'☀️ Light'},
  {id:'oled', label:'⚫ OLED'}, {id:'hc', label:'◐ HC'}
];
let themeIdx = parseInt(localStorage.getItem('vl_theme') || '0');
function applyTheme(){
  const t = themes[themeIdx];
  document.body.setAttribute('data-theme', t.id === 'light' ? 'light' : t.id);
  if(t.id==='light') document.body.removeAttribute('data-theme');
  document.getElementById('themeBtn').textContent = t.label;
  localStorage.setItem('vl_theme', themeIdx);
}
function cycleTheme(){ themeIdx = (themeIdx+1) % themes.length; applyTheme(); }
applyTheme();

// ---------- Languages (code: [name, speechLocale]) ----------
const LANGS = {
  en:['English','en-US'], hi:['Hindi','hi-IN'], bn:['Bengali','bn-IN'], es:['Spanish','es-ES'],
  fr:['French','fr-FR'], de:['German','de-DE'], zh:['Chinese','zh-CN'], ja:['Japanese','ja-JP'],
  ko:['Korean','ko-KR'], ar:['Arabic','ar-SA'], ru:['Russian','ru-RU'], pt:['Portuguese','pt-PT'],
  it:['Italian','it-IT'], ta:['Tamil','ta-IN'], te:['Telugu','te-IN'], mr:['Marathi','mr-IN'],
  gu:['Gujarati','gu-IN'], pa:['Punjabi','pa-IN'], ur:['Urdu','ur-PK'], nl:['Dutch','nl-NL']
};
function fillSelects(srcId, tgtId, srcDefault, tgtDefault){
  const s = document.getElementById(srcId), t = document.getElementById(tgtId);
  for(const c in LANGS){
    s.innerHTML += `<option value="${c}" ${c===srcDefault?'selected':''}>${LANGS[c][0]}</option>`;
    t.innerHTML += `<option value="${c}" ${c===tgtDefault?'selected':''}>${LANGS[c][0]}</option>`;
  }
}
fillSelects('srcLangV','tgtLangV','en','hi');
fillSelects('srcLangI','tgtLangI','en','hi');

function swapLangs(suffix){
  const s = document.getElementById('srcLang'+suffix), t = document.getElementById('tgtLang'+suffix);
  const tmp = s.value; s.value = t.value; t.value = tmp;
}

// ---------- Tabs ----------
function showTab(name){
  document.getElementById('voicePanel').classList.toggle('active', name==='voice');
  document.getElementById('imagePanel').classList.toggle('active', name==='image');
  document.getElementById('tabVoiceBtn').classList.toggle('active', name==='voice');
  document.getElementById('tabImageBtn').classList.toggle('active', name==='image');
}

// ---------- Translation via MyMemory (free, no key) ----------
async function translateText(text, src, tgt){
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
  const res = await fetch(url);
  const data = await res.json();
  return data?.responseData?.translatedText || '(translation failed)';
}

// ---------- Voice: Speech Recognition ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, listening = false;

if(SR){
  recognition = new SR();
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
} 

function toggleListen(){
  if(!SR){ setStatus('voiceStatus','Speech recognition not supported on this browser.'); return; }
  if(listening){ recognition.stop(); return; }
  const srcCode = document.getElementById('srcLangV').value;
  recognition.lang = LANGS[srcCode][1];
  recognition.start();
}

if(SR){
  recognition.onstart = () => {
    listening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Listening… tap to stop';
    setStatus('voiceStatus','');
  };
  recognition.onend = () => {
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Tap to Speak';
  };
  recognition.onerror = (e) => setStatus('voiceStatus', 'Mic error: '+e.error);
  recognition.onresult = async (e) => {
    const heard = e.results[0][0].transcript;
    document.getElementById('heardText').textContent = heard;
    const src = document.getElementById('srcLangV').value;
    const tgt = document.getElementById('tgtLangV').value;
    setStatus('voiceStatus','Translating…');
    const out = await translateText(heard, src, tgt);
    document.getElementById('voiceOutText').textContent = out;
    setStatus('voiceStatus','Done');
  };
}

function speakOut(){
  const text = document.getElementById('voiceOutText').textContent;
  if(!text) return;
  const tgt = document.getElementById('tgtLangV').value;
  speak(text, LANGS[tgt][1]);
}
function speakImgOut(){
  const text = document.getElementById('imgOutText').textContent;
  if(!text) return;
  const tgt = document.getElementById('tgtLangI').value;
  speak(text, LANGS[tgt][1]);
}
function speak(text, locale){
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = locale;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function setStatus(id, msg){ document.getElementById(id).textContent = msg; }

// ---------- Image OCR + Translate ----------
let selectedFile = null;
document.getElementById('fileInput').addEventListener('change', (e) => {
  selectedFile = e.target.files[0];
  if(!selectedFile) return;
  const img = document.getElementById('previewImg');
  img.src = URL.createObjectURL(selectedFile);
  img.style.display = 'block';
  document.getElementById('ocrBtn').disabled = false;
  document.getElementById('ocrText').textContent = '';
  document.getElementById('imgOutText').textContent = '';
});

async function runOCR(){
  if(!selectedFile) return;
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true;
  setStatus('imgStatus','Reading text from image…');
  try{
    const result = await Tesseract.recognize(selectedFile, 'eng', {
      logger: m => { if(m.status==='recognizing text') setStatus('imgStatus', `Reading… ${Math.round(m.progress*100)}%`); }
    });
    const text = result.data.text.trim() || '(no text detected)';
    document.getElementById('ocrText').textContent = text;
    const src = document.getElementById('srcLangI').value;
    const tgt = document.getElementById('tgtLangI').value;
    setStatus('imgStatus','Translating…');
    const out = await translateText(text, src, tgt);
    document.getElementById('imgOutText').textContent = out;
    setStatus('imgStatus','Done');
  }catch(err){
    setStatus('imgStatus','Error reading image.');
  }finally{
    btn.disabled = false;
  }
}
</script>
</body>
</html>
